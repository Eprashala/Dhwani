<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Parashari Engine</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; padding: 20px; }
        .panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 10px; }
        .input-panel { width: 350px; }
        .chart-panel { flex-grow: 1; display: flex; justify-content: center; align-items: center; background-color: #fdfaf6; }
        
        label { font-weight: bold; font-size: 13px; color: #34495e; margin-top: 10px; display: block; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px;}
        button:hover { background-color: #922b21; }
        
        /* Suggestions box for location */
        #suggestions { list-style: none; padding: 0; margin: -10px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; max-height: 150px; overflow-y: auto; display: none; background: white;}
        #suggestions li { padding: 8px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee; }
        #suggestions li:hover { background-color: #f0f0f0; }
        
        .hidden-coords { display: flex; gap: 10px; }
        .hidden-coords input { background-color: #eee; color: #7f8c8d; }
        canvas { background-color: #fdfaf6; }
    </style>
</head>
<body>

    <div class="panel input-panel">
        <h3>Jataka Details</h3>
        
        <label>Native's Name</label>
        <input type="text" id="name" placeholder="Enter full name" value="Pramod">

        <label>Date of Birth</label>
        <input type="date" id="date" value="1982-02-11">

        <label>Time of Birth (with Seconds)</label>
        <input type="time" id="time" step="1" value="11:51:00">

        <label>Place of Birth</label>
        <input type="text" id="placeSearch" placeholder="Type city and select from list..." autocomplete="off">
        <ul id="suggestions"></ul>

        <div class="hidden-coords">
            <div>
                <label>Latitude</label>
                <input type="text" id="lat" value="19.3654" readonly>
            </div>
            <div>
                <label>Longitude</label>
                <input type="text" id="lon" value="73.3685" readonly>
            </div>
        </div>

        <button onclick="generateChart()">Calculate Spashtha Kundali</button>
        <p id="error-msg" style="color: red; font-size: 13px; text-align: center; margin-top: 10px;"></p>
    </div>

    <div class="panel chart-panel">
        <canvas id="kundaliCanvas" width="650" height="650"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('kundaliCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const pad = 30;

        // --- Location Autocomplete Logic ---
        const placeSearch = document.getElementById('placeSearch');
        const suggestions = document.getElementById('suggestions');
        let timeout = null;

        placeSearch.addEventListener('input', function() {
            clearTimeout(timeout);
            const query = this.value;
            if (query.length < 3) { suggestions.style.display = 'none'; return; }
            
            timeout = setTimeout(async () => {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
                const data = await response.json();
                
                suggestions.innerHTML = '';
                if (data.length > 0) {
                    suggestions.style.display = 'block';
                    data.forEach(place => {
                        const li = document.createElement('li');
                        li.textContent = place.display_name;
                        li.onclick = () => {
                            placeSearch.value = place.name;
                            document.getElementById('lat').value = parseFloat(place.lat).toFixed(4);
                            document.getElementById('lon').value = parseFloat(place.lon).toFixed(4);
                            suggestions.style.display = 'none';
                        };
                        suggestions.appendChild(li);
                    });
                }
            }, 500); // 500ms delay to prevent API spam
        });

        // --- Canvas Drawing Logic ---
        function drawGrid() {
            ctx.clearRect(0, 0, w, w);
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 2.5;
            
            ctx.beginPath();
            ctx.rect(pad, pad, w - 2*pad, w - 2*pad);
            ctx.moveTo(pad, pad); ctx.lineTo(w - pad, w - pad);
            ctx.moveTo(w - pad, pad); ctx.lineTo(pad, w - pad);
            ctx.moveTo(w/2, pad); ctx.lineTo(w - pad, w/2);
            ctx.lineTo(w/2, w - pad); ctx.lineTo(pad, w/2);
            ctx.closePath();
            ctx.stroke();
        }

        function formatDegree(decimalDeg) {
            if (decimalDeg === undefined || decimalDeg === null) return "";
            const deg = Math.floor(decimalDeg);
            const mins = Math.floor((decimalDeg % 1) * 60);
            // Formats to 28°05'
            return `${deg}°${mins.toString().padStart(2, '0')}'`;
        }

        async function generateChart() {
            const btn = document.querySelector('button');
            btn.innerText = "Calculating...";
            
            // Ensure time string has seconds formatted properly
            let timeStr = document.getElementById('time').value;
            if (timeStr.split(':').length === 2) timeStr += ":00";

            const payload = {
                date: document.getElementById('date').value,
                time: timeStr,
                lat: document.getElementById('lat').value,
                lon: document.getElementById('lon').value
            };

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('error-msg').innerText = "";
                    populateChart(data.houses, data.asc_sign);
                } else {
                    document.getElementById('error-msg').innerText = data.message;
                }
            } catch (err) {
                document.getElementById('error-msg').innerText = "Make sure the Python Flask server is running and updated!";
            } finally {
                btn.innerText = "Calculate Spashtha Kundali";
            }
        }

        function populateChart(houses, ascSign) {
            drawGrid();
            
            const coords = [
                {x: w/2, y: w*0.18}, {x: w*0.25, y: w*0.12}, {x: w*0.12, y: w*0.25}, {x: w*0.25, y: w*0.5},
                {x: w*0.12, y: w*0.75}, {x: w*0.25, y: w*0.88}, {x: w/2, y: w*0.82}, {x: w*0.75, y: w*0.88},
                {x: w*0.88, y: w*0.75}, {x: w*0.75, y: w*0.5}, {x: w*0.88, y: w*0.25}, {x: w*0.75, y: w*0.12}
            ];

            ctx.textAlign = "center";

            houses.forEach((bodies, idx) => {
                const cx = coords[idx].x;
                const cy = coords[idx].y;
                const currentSign = ((ascSign + idx - 1) % 12) + 1;

                // Draw Sign Number at the bottom of the house space
                ctx.fillStyle = "#95a5a6";
                ctx.font = "bold 14px Arial";
                ctx.fillText(currentSign, cx, cy + 35);

                // Sort bodies so Grahas are on top, Upagrahas below
                const sortedBodies = bodies.sort((a, b) => {
                    if (a.type === 'graha' && b.type !== 'graha') return -1;
                    if (a.type !== 'graha' && b.type === 'graha') return 1;
                    return 0;
                });

// Calculate starting Y position with tighter line spacing (13px instead of 14px)
                let startY = cy - ((sortedBodies.length * 13) / 2) + 5;

                sortedBodies.forEach((b, i) => {
                    const textY = startY + (i * 13);
                    const degText = formatDegree(b.deg);
                    
                    if (b.type === 'graha') {
                        ctx.fillStyle = "#c0392b";
                        // Reduced to 12px for wider Graha names
                        ctx.font = "bold 12px Arial";
                        ctx.fillText(`${b.name} ${degText}`, cx, textY);
                    } else {
                        ctx.fillStyle = "#8e44ad";
                        // Reduced to 10px for very wide Upagraha names
                        ctx.font = "italic 10px Arial";
                        ctx.fillText(`•${b.name} ${degText}`, cx, textY);
                    }
                });
            });
        }

        // Draw initial empty grid on load
        window.onload = drawGrid;
    </script>
</body>
</html>
