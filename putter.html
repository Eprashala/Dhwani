<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Cloud TTS Synthesizer</title>
    
    <!-- This single script tag loads the free cloud TTS engine -->
    <script src="https://js.puter.com/v2/"></script>
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #ccc;
            --primary-btn: #007bff;
            --primary-hover: #0056b3;
            --danger-btn: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 { text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; }
        select { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; }
        
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; }
        #play-btn { background-color: var(--primary-btn); }
        #play-btn:hover { background-color: var(--primary-hover); }
        
        .status { margin-top: 15px; font-size: 0.85rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Cloud Speech Synthesizer</h2>
    
    <div class="form-group">
        <label for="text-input">Text to Speak</label>
        <textarea id="text-input" placeholder="Enter text here..."></textarea>
    </div>

    <div class="form-group">
        <label for="lang-select">Language</label>
        <select id="lang-select">
            <option value="mr-IN">Marathi (India)</option>
            <option value="hi-IN">Hindi (India)</option>
            <option value="en-US">English (US)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="voice-select">Voice Model</label>
        <select id="voice-select">
            <!-- Voices populate dynamically based on language -->
        </select>
    </div>

    <div class="controls">
        <button id="play-btn">Speak</button>
    </div>
    
    <div class="status" id="status-text">Ready to stream audio.</div>
</div>

<script>
    // Define the exact cloud voices available for our target languages
    const cloudVoices = {
        "mr-IN": [
            { name: "Aarohi (Female)", id: "Aarohi" },
            { name: "Manohar (Male)", id: "Manohar" }
        ],
        "hi-IN": [
            { name: "Swara (Female)", id: "Swara" },
            { name: "Madhur (Male)", id: "Madhur" }
        ],
        "en-US": [
            { name: "Joanna (Female Standard)", id: "Joanna" },
            { name: "Matthew (Male Standard)", id: "Matthew" },
            { name: "Eve (Energetic)", id: "eve" },
            { name: "Rex (Confident)", id: "rex" }
        ]
    };

    const langSelect = document.getElementById('lang-select');
    const voiceSelect = document.getElementById('voice-select');
    const playBtn = document.getElementById('play-btn');
    const statusText = document.getElementById('status-text');
    let currentAudio = null;

    function populateVoices() {
        const selectedLang = langSelect.value;
        const voices = cloudVoices[selectedLang];
        
        voiceSelect.innerHTML = '';
        voices.forEach(voice => {
            const option = document.createElement('option');
            option.value = voice.id;
            option.textContent = voice.name;
            voiceSelect.appendChild(option);
        });
    }

    async function speakText() {
        const text = document.getElementById('text-input').value.trim();
        const selectedVoice = voiceSelect.value;
        const selectedLang = langSelect.value;

        if (!text) {
            statusText.textContent = "Please enter some text.";
            return;
        }

        // Stop any currently playing audio
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        statusText.textContent = "Connecting to cloud server...";
        playBtn.disabled = true;

        try {
            // Call the Puter API to generate the audio
            currentAudio = await puter.ai.txt2speech(text, {
                voice: selectedVoice,
                language: selectedLang,
                engine: "neural" 
            });

            statusText.textContent = "Streaming audio...";
            
            // Play the resulting MP3 object
            currentAudio.play();

            currentAudio.onended = () => {
                statusText.textContent = "Finished speaking.";
                playBtn.disabled = false;
            };

        } catch (error) {
            console.error("Cloud TTS Error:", error);
            statusText.textContent = "Error generating audio. Please try again.";
            playBtn.disabled = false;
        }
    }

    // Initialize dropdowns and listeners
    langSelect.addEventListener('change', populateVoices);
    playBtn.addEventListener('click', speakText);
    
    populateVoices(); // Run once on load
</script>
</body>
</html>
