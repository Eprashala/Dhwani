<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khagol Mandal | Master 3D Astronomical Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { 
            --bg-dark: #000000; 
            --panel-dark: rgba(5, 8, 12, 0.95);
            --accent-gold: #f1c40f;
            --text-light: #e2e8f0;
            --border-color: #1e293b;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text-light); overflow: hidden; touch-action: none;}

        header {
            display: flex; flex-direction: column; gap: 10px;
            background: var(--panel-dark); padding: 12px 20px; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(15px); z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap;}
        
        .header-title { display: flex; align-items: center; gap: 20px; font-weight: 800; color: var(--accent-gold); font-size: 20px; letter-spacing: 1px;}
        
        .view-toggle { display: flex; background: #0f172a; border-radius: 6px; padding: 3px; border: 1px solid var(--border-color); }
        .view-toggle input { display: none; }
        .view-toggle label { padding: 5px 12px; font-size: 12px; cursor: pointer; color: #94a3b8; border-radius: 4px; font-weight: bold; text-transform: uppercase; transition: 0.2s;}
        .view-toggle input:checked + label { background: var(--accent-gold); color: #000; }

        .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; width: 100%; }
        .input-group { display: flex; align-items: center; gap: 6px; position: relative;}
        .input-group label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: bold; white-space: nowrap;}
        
        input[type="text"], input[type="date"], input[type="time"], select {
            background: #0f172a; border: 1px solid var(--border-color); color: white; padding: 7px 10px; border-radius: 4px; outline: none; font-size: 13px; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent-gold); }

        .btn-calc {
            background: #b91c1c; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
        }
        .btn-calc:hover { background: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }

        .btn-gps { background: #0f172a; border: 1px solid var(--border-color); color: white; padding: 7px; border-radius: 4px; cursor: pointer; }
        .btn-gps:hover { border-color: var(--accent-gold); }

        .mobile-toggle-btn { display: none; background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap;}

        #suggestions { position: absolute; top: 100%; left: 40px; background: #0f172a; width: 220px; list-style: none; padding: 0; margin: 4px 0 0 0; border: 1px solid var(--border-color); border-radius: 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000;}
        #suggestions li { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #suggestions li:hover { background: #2563eb; }

        .action-group { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color);}
        
        main { position: relative; width: 100vw; height: calc(100vh - 100px); display: flex;}
        
        .filter-panel {
            width: 330px; background: var(--panel-dark); padding: 15px 20px; border-right: 1px solid var(--border-color); 
            overflow-y: auto; z-index: 50; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 25px rgba(0,0,0,0.9);
            transition: left 0.3s ease;
        }
        .filter-panel::-webkit-scrollbar { width: 4px; }
        .filter-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .filter-panel h4 { margin: 0 0 10px 0; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 0; width: 100%;}

        .filter-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); padding: 6px 10px; margin-bottom: 5px;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
        }
        .filter-item:hover { border-color: rgba(255,255,255,0.15); }
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; }
        .checkbox-wrapper label { margin: 0; font-size: 12.5px; cursor: pointer; color: #cbd5e1; white-space: nowrap; transition: 0.2s;}
        .checkbox-wrapper label:hover { color: #ffffff; }
        
        .lbl-container { background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 4px; border: 1px solid #334155; gap: 5px; cursor: pointer;}
        .lbl-container label { font-size: 11px; color: #f1c40f; cursor: pointer;}

        .house-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .house-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 0; text-align: center; border-radius: 4px; cursor: pointer; font-size: 13px;}
        .house-btn.active { background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: #10b981; font-weight: bold; }
        .house-all-btn { width: 100%; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .house-all-btn.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: #3b82f6; font-weight: bold; }

        #skyContainer { display: block; flex-grow: 1; position: relative; background: radial-gradient(circle at center, #060b14 0%, #000000 100%); width: 100%;}
        #skyCanvas3D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        #skyCanvas2D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        #kundliContainer { display: none; flex-grow: 1; justify-content: center; align-items: center; background: radial-gradient(circle at center, #0a0f1c 0%, #000000 100%); width: 100%; overflow: auto; padding: 20px;}
        #kundliCanvas { background: transparent; max-height: 90vh; max-width: 90vw; object-fit: contain;}

        .controls-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; pointer-events: auto;}
        .ctrl-btn { background: rgba(15, 23, 42, 0.85); color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center;}
        .ctrl-btn:hover { border-color: var(--accent-gold); color: white; transform: scale(1.05);}
        
        #error-msg { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #f1c40f; font-size: 13px; z-index: 100; font-weight: bold; padding: 10px 20px; background: rgba(0,0,0,0.85); border-radius: 8px; border: 1px solid #b91c1c; display: none; text-align: center;}

        @media (max-width: 900px) {
            .header-top { flex-direction: column; align-items: flex-start; gap: 10px;}
            .controls-row { overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; justify-content: flex-start; flex-wrap: nowrap;}
            .mobile-toggle-btn { display: block; }
            main { height: calc(100vh - 120px); overflow: hidden;}
            .filter-panel { position: absolute; top: 0; left: -360px; height: 100%; width: 320px; background: rgba(5, 8, 12, 0.98); }
            .filter-panel.open { left: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="header-title">
            KHAGOL 3D
            <div class="view-toggle">
                <input type="radio" id="view3d" name="viewToggle" value="3d" checked onchange="switchView()">
                <label for="view3d">3D</label>
                <input type="radio" id="viewKundli" name="viewToggle" value="kundli" onchange="switchView()">
                <label for="viewKundli">Kundli</label>
            </div>
        </div>
        <div class="action-group" style="margin-right: 15px;">
            <button class="btn-calc" onclick="generateMap()">Align Cosmos</button>
            <div class="checkbox-wrapper" style="margin-left: 5px;">
                <input type="checkbox" id="cbShowLabels" checked onchange="updateView()">
                <label for="cbShowLabels" style="color: var(--accent-gold); font-weight: bold; text-transform: uppercase;">Labels</label>
            </div>
        </div>

        <div class="input-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label>Time</label>
            <input type="time" id="time" step="1">
        </div>
        <div class="input-group">
            <button class="btn-gps" onclick="fetchBrowserLocation()" title="Detect Location">📍</button>
            <input type="text" id="placeSearch" placeholder="City..." autocomplete="off" style="width: 100px;">
            <ul id="suggestions"></ul>
            <input type="hidden" id="lat">
            <input type="hidden" id="lon">
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="langToggle" onchange="changeLanguage()" style="font-weight: normal; font-size: 12px; height: 26px; padding: 0 5px;">
                <option value="en">English</option>
                <option value="sa">संस्कृतम्</option>
                <option value="hi">हिन्दी</option>
                <option value="mr">मराठी</option>
            </select>
            <button class="mobile-toggle-btn" onclick="toggleMobileFilters()">⚙️ Filters</button>
        </div>
    </div>
    
    </header>

<main>
    <div class="filter-panel" id="filterDrawer">
        <div>
            <h4>Reference Frame</h4>
            <div style="display: flex; gap: 12px; margin-bottom: 10px; padding: 0 5px; flex-wrap: wrap;">
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radBhu" value="Earth" onchange="updateView()"> 
                    <label for="radBhu"><span style="color:#3b82f6;">🌍</span> Bhu</label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radSurya" value="Sun" checked onchange="updateView()"> 
                    <label for="radSurya"><span style="color:#f1c40f;">☀️</span> Surya</label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radLocal" value="Local" onchange="updateView()"> 
                    <label for="radLocal"><span style="color:#2ecc71;">🧍</span> My View</label>
                </div>
            </div>
        </div>
        <hr>
        <div>
            <h4>Individual Grahas</h4>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Surya" checked onchange="updateView()"><label for="cb_Surya">☀️ Surya</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Surya Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Surya" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Chandra" checked onchange="updateView()"><label for="cb_Chandra">☽ Chandra</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Chandra Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Chandra" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Mangal" checked onchange="updateView()"><label for="cb_Mangal">♂ Mangal</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Mangal Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Mangal" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Budh" checked onchange="updateView()"><label for="cb_Budh">☿ Budh</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Budh Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Budh" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Guru" checked onchange="updateView()"><label for="cb_Guru">♃ Guru</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Guru Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Guru" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Shukra" checked onchange="updateView()"><label for="cb_Shukra">♀ Shukra</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Shukra Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Shukra" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Shani" checked onchange="updateView()"><label for="cb_Shani">♄ Shani</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Shani Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Shani" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cb_Earth" checked onchange="updateView()"><label for="cb_Earth">⊕ Earth</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Earth Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Earth" checked onchange="updateView()"></label></div>
        </div>
        <hr>
        <div>
            <h4>Cosmic Architecture</h4>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbPlanetOrbits" checked onchange="updateView()"><label for="cbPlanetOrbits">Orbital Paths</label></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbMoonOrbit" checked onchange="updateView()"><label for="cbMoonOrbit">Lunar Orbit</label></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbRashis" checked onchange="updateView()"><label for="cbRashis">Rashis (30°)</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Rashi Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Rashis" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbNakshatras" checked onchange="updateView()"><label for="cbNakshatras">Nakshatras (13°20')</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Nakshatra Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Nakshatras" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbVedicStars" checked onchange="updateView()"><label for="cbVedicStars">Sacred Stars</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Stars Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_VedicStars" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbOuter" checked onchange="updateView()"><label for="cbOuter">Arun, Varun, Yama</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Outer Planets Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Outer" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbNodes" checked onchange="updateView()"><label for="cbNodes">Rahu & Ketu</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Nodes Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Nodes" checked onchange="updateView()"></label></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbUpagrahas" checked onchange="updateView()"><label for="cbUpagrahas">Upagrahas</label></div><label class="checkbox-wrapper lbl-container" title="Toggle Upagrahas Text"><span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Upagrahas" checked onchange="updateView()"></label></div>
        </div>
        
        <hr>
        <div>
            <h4>Quantum States</h4>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbAsta" onchange="updateView()"><label for="cbAsta" style="color: #f87171;">🔥 Show Combustion (Asta)</label></div><div class="lbl-container" onclick="alert('Asta (Combustion): Planet darkens when near Surya.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbVakri" onchange="updateView();"><label for="cbVakri" style="color: #c084fc;">🌀 Show Retrogression (Vakri)</label></div><div class="lbl-container" onclick="alert('Vakri: Purple aura and (R) symbol.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbUchaNeecha" onchange="updateView();"><label for="cbUchaNeecha" style="color: #fbbf24;">🌟 Show Ucha / Neecha</label></div><div class="lbl-container" onclick="alert('Ucha/Neecha: Scale shifts and ↑ ↓ arrows.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbMooltrikona" onchange="updateView();"><label for="cbMooltrikona" style="color: #34d399;">📐 Show Mooltrikona</label></div><div class="lbl-container" onclick="alert('Mooltrikona: Glowing geometric triangle △.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbAwastha" onchange="updateView();"><label for="cbAwastha" style="color: #60a5fa;">⏱️ Show Awastha (Age)</label></div><div class="lbl-container" onclick="alert('Awastha: Size scales and pulsates based on degree.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbDigbala" onchange="updateView();"><label for="cbDigbala" style="color: #6ee7b7;">🧭 Show Digbala (Directional)</label></div><div class="lbl-container" onclick="alert('Digbala: Downward light pillar 🎯.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbMaitri" onchange="updateView();"><label for="cbMaitri" style="color: #a78bfa;">🕸️ Show Maitri (Friend Web)</label></div><div class="lbl-container" onclick="alert('Maitri: Green/Red gradient webs.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
            <div class="filter-item"><div class="checkbox-wrapper"><input type="checkbox" id="cbDrishti" onchange="updateView();"><label for="cbDrishti" style="color: #f472b6;">👁️ Show Drishti (Aspects)</label></div><div class="lbl-container" onclick="alert('Drishti: Target locked dashed laser beams.')" title="Info"><span style="font-size:12px; color: #60a5fa;">ℹ️</span></div></div>
        </div>
        
        <hr>
        <div>
            <h4>Bhava View (Houses)</h4>
            <button class="house-all-btn active" id="btnHouseAll" onclick="toggleAllHouses()">Observe All Bhavas</button>
            <div class="house-grid" id="houseGrid">
                <div class="house-btn active" onclick="toggleHouse(1)">1</div><div class="house-btn active" onclick="toggleHouse(2)">2</div>
                <div class="house-btn active" onclick="toggleHouse(3)">3</div><div class="house-btn active" onclick="toggleHouse(4)">4</div>
                <div class="house-btn active" onclick="toggleHouse(5)">5</div><div class="house-btn active" onclick="toggleHouse(6)">6</div>
                <div class="house-btn active" onclick="toggleHouse(7)">7</div><div class="house-btn active" onclick="toggleHouse(8)">8</div>
                <div class="house-btn active" onclick="toggleHouse(9)">9</div><div class="house-btn active" onclick="toggleHouse(10)">10</div>
                <div class="house-btn active" onclick="toggleHouse(11)">11</div><div class="house-btn active" onclick="toggleHouse(12)">12</div>
            </div>
        </div>
    </div>

    <!-- 3D VIEW CONTAINER -->
    <div id="skyContainer">
        <div class="controls-overlay">
            <button class="ctrl-btn" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
            <button class="ctrl-btn" onclick="resetCamera()" title="Reset Origin">⌂</button>
        </div>
        <div id="error-msg"></div>
        <canvas id="skyCanvas3D"></canvas>
        <canvas id="skyCanvas2D"></canvas>
    </div>

    <!-- 2D KUNDLI CONTAINER -->
    <div id="kundliContainer">
        <canvas id="kundliCanvas" width="800" height="800"></canvas>
    </div>
</main>

<script>
    // --- UI & STATE GLOBALS ---
    let currentView = '3d';

    function updateView() {
        if (!skyData || skyData.length === 0) return;
        const focus = document.querySelector('input[name="focus"]:checked').value; const isHelio = focus === 'Sun'; const isLocal = focus === 'Local';

        let flatBodies = []; skyData.forEach((h, idx) => { h.forEach(b => { if(b.abs_deg !== undefined) flatBodies.push({...b, house: idx + 1}); }); });
        Object.keys({ 'Arun': 56.4, 'Varun': 358.1, 'Yama': 301.2 }).forEach(p => flatBodies.push({ name: p, type: 'graha', abs_deg: { 'Arun': 56.4, 'Varun': 358.1, 'Yama': 301.2 }[p], deg: { 'Arun': 56.4, 'Varun': 358.1, 'Yama': 301.2 }[p] % 30, house: ((Math.floor({ 'Arun': 56.4, 'Varun': 358.1, 'Yama': 301.2 }[p] / 30) + 1 - asc_sign_global + 12) % 12) + 1 }));
        
        renderBodies = [...flatBodies]; let sun = flatBodies.find(b => b.name === 'Surya');
        if (sun) renderBodies.push({ name: 'Earth', type: 'graha', abs_deg: (sun.abs_deg + 180) % 360, deg: (sun.abs_deg + 180) % 30, house: ((Math.floor(((sun.abs_deg + 180) % 360) / 30) + 1 - asc_sign_global + 12) % 12) + 1 });

        let originOffset = (isHelio && sun) ? get3DVector(helioRadii['Earth'], sun.abs_deg + 180) : new THREE.Vector3(0,0,0);
        buildBoundaries(originOffset.x, originOffset.z);

        const stVakri = document.getElementById('cbVakri') ? document.getElementById('cbVakri').checked : false;

        const stMT = document.getElementById('cbMooltrikona') ? document.getElementById('cbMooltrikona').checked : false;
        const stAwastha = document.getElementById('cbAwastha') ? document.getElementById('cbAwastha').checked : false;
        const stDigbala = document.getElementById('cbDigbala') ? document.getElementById('cbDigbala').checked : false;

        // --- MASTER DECOUPLED DATA ENGINE ---
        renderBodies.forEach(b => {
            // Positional Math
            let lat = b.lat || (orbitalParams[b.name] ? orbitalParams[b.name].inc * Math.sin((b.abs_deg - orbitalParams[b.name].lan) * Math.PI / 180) : 0);
            let pos = new THREE.Vector3();

                else if (b.type === 'graha') pos = get3DVector(['Arun', 'Varun', 'Yama'].includes(b.name) ? geoRadii[b.name] : helioRadii[b.name], b.abs_deg, lat);
                else { pos = get3DVector(aprakasha.includes(b.name) ? helioRadii['Earth'] : temporalRadius, b.abs_deg, lat); if(!aprakasha.includes(b.name)) pos.add(originOffset); }
            } else {

            }
            b.pos3D = pos; 

            // Quantum State Math
            b.isUcha = false; b.isNeecha = false; b.isVakri = false; b.isMT = false; b.isDigbala = false; b.awasthaState = null; b.isCombust = false;

            if (stAwastha && ['Surya', 'Chandra', 'Mangal', 'Budh', 'Guru', 'Shukra', 'Shani'].includes(b.name)) b.awasthaState = getAwastha(b.abs_deg);
            
            if (stUcha && dignityDegrees[b.name]) {
                let dU = Math.abs(b.abs_deg - dignityDegrees[b.name].ucha); if(dU > 180) dU = 360 - dU;
                let dN = Math.abs(b.abs_deg - dignityDegrees[b.name].neecha); if(dN > 180) dN = 360 - dN;
                if (dU <= 15) b.isUcha = true; else if (dN <= 15) b.isNeecha = true;
            }
            if (stVakri && sun && checkVakri(b.name, b.abs_deg, sun.abs_deg)) b.isVakri = true;
            if (stMT && mooltrikonaRanges[b.name] && b.abs_deg >= mooltrikonaRanges[b.name].min && b.abs_deg <= mooltrikonaRanges[b.name].max) b.isMT = true;
            if (stDigbala && b.house && digbalaHouses[b.name] === b.house) b.isDigbala = true;
            
            if (stAsta && !isHelio && sun && combustionOrbs[b.name]) {
                let dS = Math.abs(sun.abs_deg - b.abs_deg); if (dS > 180) dS = 360 - dS;
                if (dS <= combustionOrbs[b.name]) b.isCombust = true;
            }
        });

        // Loop Meshes & Apply Pre-Calculated States
        Object.keys(planetMeshes).forEach(key => {
            const mesh = planetMeshes[key]; const body = renderBodies.find(b => b.name === key);
            let isE = document.getElementById('cb_' + key) ? document.getElementById('cb_' + key).checked : true;

            if (body && isE && (activeHouses.has(body.house) || key === 'Earth' || (isHelio && key === 'Surya'))) {
                const isO = ['Arun', 'Varun', 'Yama'].includes(key); const isN = ['Rahu', 'Ketu'].includes(key);
                if ((isO && !document.getElementById('cbOuter').checked) || (isN && !document.getElementById('cbNodes').checked) || (!isO && !isN && !body.type && !document.getElementById('cbUpagrahas').checked)) {
                    mesh.visible = false; return;

                mesh.visible = true; mesh.position.copy(body.pos3D); if(key==='Surya') sunLight.position.copy(mesh.position);

                let curScale = 1;
                if (mesh.material) {

                    if (mesh.material.emissive) mesh.material.emissive.setHex(0x000000);

                if (body.awasthaState) {

                    if (body.awasthaState.name === "Mrita" && mesh.material) mesh.material.color.lerp(new THREE.Color(0x444444), 0.6);
                }

                if (body.isUcha) {

                    curScale *= 1 + (0.6 * (1 - dU/15));
                    if(mesh.material.emissive) mesh.material.emissive.setHex(0x222222);
                } else if (body.isNeecha) {
                    let dN = Math.abs(body.abs_deg - dignityDegrees[key].neecha); if(dN > 180) dN = 360 - dN;
                    curScale *= 1 - (0.5 * (1 - dN/15));

                }

                mesh.scale.set(curScale, curScale, curScale); body.baseScale = curScale; 

                if (body.isCombust && mesh.material) {
                    mesh.material.color.setHex(0x333333); if(mesh.material.emissive) mesh.material.emissive.setHex(0x3a1000);

            } else mesh.visible = false;

        // Orbits

        const ringMat = new THREE.LineBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.35 });
        if (document.getElementById('cbPlanetOrbits').checked) {

                const pts = []; for(let d=0; d<=360; d+=1) pts.push(get3DVector(isHelio&&['Arun','Varun','Yama'].includes(k) ? geoRadii[k] : (isHelio?helioRadii:geoRadii)[k], d, orbitalParams[k] ? orbitalParams[k].inc * Math.sin((d - orbitalParams[k].lan) * Math.PI / 180) : 0));
                const r = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), ringMat); r.position.copy(new THREE.Vector3(0,0,0)); celestialGroup.add(r); dynamicOrbits.push(r);
            });
        }
        if (document.getElementById('cbMoonOrbit') && document.getElementById('cbMoonOrbit').checked && (!document.getElementById('cb_Chandra') || document.getElementById('cb_Chandra').checked)) {
            const pts = []; for(let d=0; d<=360; d+=2) pts.push(get3DVector(isHelio ? MOON_ORBIT_RADIUS : geoRadii['Chandra'], d, orbitalParams['Chandra'].inc * Math.sin((d - orbitalParams['Chandra'].lan) * Math.PI / 180)));
            const r = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.5 })); r.position.copy(renderBodies.find(b=>b.name==='Earth').pos3D); celestialGroup.add(r); dynamicOrbits.push(r);

        // Maitri Network (3D)

        if (document.getElementById('cbMaitri') && document.getElementById('cbMaitri').checked) {
            const cg = ['Surya', 'Chandra', 'Mangal', 'Budh', 'Guru', 'Shukra', 'Shani'];

        if (isLocal) {
            let latD = parseFloat(document.getElementById('lat').value)||0; let lonD = parseFloat(document.getElementById('lon').value)||0;

function drawKundli() {
        const cvs = document.getElementById('kundliCanvas'); const ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, cvs.width, cvs.height);
        
        // Draw the Chart Geometry
        ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 2; ctx.lineJoin = "round";
        ctx.strokeRect(50, 50, 700, 700);
        ctx.beginPath(); ctx.moveTo(50, 50); ctx.lineTo(750, 750); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(750, 50); ctx.lineTo(50, 750); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(400, 50); ctx.lineTo(750, 400); ctx.lineTo(400, 750); ctx.lineTo(50, 400); ctx.closePath(); ctx.stroke();

        // House Centers (For drawing Planets)

        const sO = document.getElementById('cbOuter').checked; const sN = document.getElementById('cbNodes').checked; const sU = document.getElementById('cbUpagrahas').checked; const sL = document.getElementById('cbShowLabels').checked; 
        const showRashis = document.getElementById('cbRashis') ? document.getElementById('cbRashis').checked : true;
        const showNakshatras = document.getElementById('cbNakshatras') ? document.getElementById('cbNakshatras').checked : true;
        
        // --- 2D GRAPHICS LAYER: MAITRI & DRISHTI ---
        if (document.getElementById('cbMaitri') && document.getElementById('cbMaitri').checked) {
            const cg = ['Surya', 'Chandra', 'Mangal', 'Budh', 'Guru', 'Shukra', 'Shani'];
            for (let i=0; i<cg.length; i++) for (let j=i+1; j<cg.length; j++) {
                let pA = renderBodies.find(b => b.name === cg[i]); let pB = renderBodies.find(b => b.name === cg[j]);
                let eA = document.getElementById('cb_'+cg[i]) ? document.getElementById('cb_'+cg[i]).checked : true;
                let eB = document.getElementById('cb_'+cg[j]) ? document.getElementById('cb_'+cg[j]).checked : true;
                if (pA && pB && eA && eB && activeHouses.has(pA.house) && activeHouses.has(pB.house) && pA.house !== pB.house) {
                    let tat = getTatkalika(pA.house, pB.house);

                    let cB = maitriColors[String(naisargikaMaitri[pB.name][pA.name] + tat)].getStyle();
                    
                    let grad = ctx.createLinearGradient(ha[pA.house].x, ha[pA.house].y, ha[pB.house].x, ha[pB.house].y);
                    grad.addColorStop(0, cA); grad.addColorStop(1, cB);
                    ctx.beginPath(); ctx.moveTo(ha[pA.house].x, ha[pA.house].y);
                    let mx = (ha[pA.house].x + ha[pB.house].x)/2; let my = (ha[pA.house].y + ha[pB.house].y)/2;

                    let dist = Math.sqrt(dx*dx + dy*dy);
                    ctx.quadraticCurveTo(mx - (dy/dist)*30, my + (dx/dist)*30, ha[pB.house].x, ha[pB.house].y);

                }

        }

        if (document.getElementById('cbDrishti') && document.getElementById('cbDrishti').checked) {

                        if (tHouse !== b.house) {
                            let x1 = ha[b.house].x; let y1 = ha[b.house].y; let x2 = ha[tHouse].x; let y2 = ha[tHouse].y;
                            ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(x1, y1);
                            let mx = (x1 + x2)/2; let my = (y1 + y2)/2; let dx = x2 - x1; let dy = y2 - y1; let dist = Math.sqrt(dx*dx + dy*dy);
                            let cx = mx + (dy/dist)*20; let cy = my - (dx/dist)*20;
                            ctx.quadraticCurveTo(cx, cy, x2, y2);
                            ctx.strokeStyle = pColors[b.name]||"#ffffff"; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.8; ctx.stroke(); ctx.setLineDash([]);
                            let angle = Math.atan2(y2 - cy, x2 - cx);
                            ctx.beginPath(); let arrX = x2 - Math.cos(angle)*25; let arrY = y2 - Math.sin(angle)*25;
                            ctx.moveTo(arrX, arrY); ctx.lineTo(arrX - 10 * Math.cos(angle - Math.PI / 6), arrY - 10 * Math.sin(angle - Math.PI / 6)); ctx.lineTo(arrX - 10 * Math.cos(angle + Math.PI / 6), arrY - 10 * Math.sin(angle + Math.PI / 6));
                            ctx.closePath(); ctx.fillStyle = pColors[b.name]||"#ffffff"; ctx.fill(); ctx.globalAlpha = 1.0;
                        }
                    });
                }
            });
        }
        // ----------------------------------------------

        // Draw Planets, Rashis, and Nakshatras
        for (let h=1; h<=12; h++) {
            
            // Draw Rashi Number
            if (showRashis) {
                let rashiNum = (h - 1 + asc_sign_global - 1 + 12) % 12 + 1;
                ctx.fillStyle = "rgba(241, 196, 15, 0.7)"; // Gold, slightly transparent
                ctx.font = "bold 20px 'Segoe UI', sans-serif"; 
                ctx.textAlign = "center"; 
                ctx.fillText(rashiNum, na[h].x, na[h].y);
            }

            let bh = renderBodies.filter(b => b.house === h && b.name !== 'Earth' && activeHouses.has(b.house)).filter(b => {
                let cb = document.getElementById('cb_' + b.name); if(cb && !cb.checked) return false;
                let iG = b.type === 'graha'; let iN = ['Rahu','Ketu'].includes(b.name); let iO = ['Arun','Varun','Yama'].includes(b.name);
                return !((!sO && iO) || (!sN && iN) || (!sU && !iG && !iN));
            });

            ctx.textAlign = "center"; 
            
            // Adjust starting Y position to account for the extra Nakshatra lines
            let lineSpacing = showNakshatras ? 30 : 18; 
            let sY = ha[h].y - ((bh.length - 1) * (lineSpacing / 2));
            
            bh.forEach((b, i) => {
                // Determine Symbols
                let sym = ""; 
                if(sL) sym = `${b.isVakri?" (R)":""}${b.isUcha?" ↑":""}${b.isNeecha?" ↓":""}${b.isMT?" △":""}${b.awasthaState?` ${b.awasthaState.symbol}`:""}${b.isDigbala?" 🎯":""}`;
                
                // Set Planet Text Color (Grey if combust)
                ctx.fillStyle = b.isCombust ? "#64748b" : (pColors[b.name] || "#ffffff"); 
                
                // Draw Planet Name and Degree
                ctx.font = "bold 14px 'Segoe UI', sans-serif";
                let mainText = `${(i18n[currentLang].names[b.name]||b.name).substring(0,3)} ${formatDegree(b.deg)}${sym}`;
                ctx.fillText(mainText, ha[h].x, sY + (i * lineSpacing));

                // Draw Nakshatra directly below if enabled
                if (showNakshatras) {
                    ctx.font = "italic 11px Arial";
                    ctx.fillStyle = "#94a3b8"; // Light grey for Nakshatras
                    ctx.fillText(`(${getNakshatraLocal(b.abs_deg)})`, ha[h].x, sY + (i * lineSpacing) + 14);
                }
            });
        }
    }

    function render2DOverlay() {
        ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height); if (!renderBodies || renderBodies.length === 0 || !document.getElementById('cbShowLabels').checked) return;
        const ctr = document.querySelector('input[name="focus"]:checked').value === 'Sun' ? renderBodies.find(b=>b.name==='Surya') : renderBodies.find(b=>b.name==='Earth');
        const cP = ctr ? ctr.pos3D : new THREE.Vector3(0,0,0); let dL = [];
        
        if (document.querySelector('input[name="focus"]:checked').value === 'Local') {
            [{l:'N',p:new THREE.Vector3(0,0,-4000),c:"#3498db"},{l:'S',p:new THREE.Vector3(0,0,4000),c:"#e74c3c"},{l:'E',p:new THREE.Vector3(4000,0,0),c:"#f1c40f"},{l:'W',p:new THREE.Vector3(-4000,0,0),c:"#f1c40f"}].forEach(cd => {
                let pt = toScreenXY(cd.p); if (pt.z < 1) { ctx2D.fillStyle=cd.c; ctx2D.font="bold 20px Arial"; ctx2D.fillText(cd.l,pt.x,pt.y); dL.push({x:pt.x-15,y:pt.y-15,w:30,h:30}); }
            });
        }
        
        if (document.getElementById('cbRashis').checked) for (let i = 0; i < 12; i++) { let pt = toScreenXY(get3DVector((window.innerWidth <= 900 ? 2000 : 2800) - 200, i * 30 + 15).add(cP).applyMatrix4(celestialGroup.matrixWorld)); if(pt.z < 1) { ctx2D.fillStyle = "rgba(241, 196, 15, 0.9)"; ctx2D.font = "bold 14px 'Segoe UI', sans-serif"; ctx2D.textAlign = "center"; ctx2D.fillText(i18n[currentLang].rashis[i], pt.x, pt.y); ctx2D.fillStyle = "rgba(16, 185, 129, 0.9)"; ctx2D.font = "italic 11px Arial"; ctx2D.fillText("Bhava " + ((i - (asc_sign_global - 1) + 12) % 12 + 1), pt.x, pt.y + 14); dL.push({ x: pt.x - 30, y: pt.y - 12, w: 60, h: 28 }); } }
        if (document.getElementById('cbNakshatras').checked) for (let i = 0; i < 27; i++) { let pt = toScreenXY(get3DVector((window.innerWidth <= 900 ? 2600 : 3600) - 150, i * NAKSHATRA_DEG + (NAKSHATRA_DEG / 2)).add(cP).applyMatrix4(celestialGroup.matrixWorld)); if(pt.z < 1) { ctx2D.fillStyle = "rgba(168, 85, 247, 0.9)"; ctx2D.font = "12px Arial"; ctx2D.textAlign = "center"; ctx2D.fillText(i18n[currentLang].nakshatras[i], pt.x, pt.y); dL.push({ x: pt.x - 40, y: pt.y - 10, w: 80, h: 14 }); } }
        if (document.getElementById('cbVedicStars').checked) sacredStarsList.forEach(s => { let pt = toScreenXY(s.meshPos.clone().applyMatrix4(celestialGroup.matrixWorld)); if(pt.z < 1) { ctx2D.fillStyle = "rgba(255, 255, 255, 0.85)"; ctx2D.font = "italic 11px Arial"; ctx2D.textAlign = "left"; ctx2D.fillText("✦ " + (i18n[currentLang].stars[s.id] || s.id), pt.x + 6, pt.y + 4); dL.push({ x: pt.x, y: pt.y - 8, w: 80, h: 14 }); } });

        renderBodies.forEach(b => {
            if ((activeHouses.has(b.house) || ['Earth','Surya'].includes(b.name)) && (!document.getElementById('cb_'+b.name) || document.getElementById('cb_'+b.name).checked)) {
                let iG = b.type === 'graha'; let iN = ['Rahu','Ketu'].includes(b.name); let iO = ['Arun','Varun','Yama'].includes(b.name);
                if ((!document.getElementById('cbOuter').checked && iO) || (!document.getElementById('cbNodes').checked && iN) || (!document.getElementById('cbUpagrahas').checked && !iG && !iN)) return;
                
                let p2D = toScreenXY(b.pos3D.clone().applyMatrix4(celestialGroup.matrixWorld)); if(p2D.z > 1) return;
                if (!iG) { ctx2D.fillStyle = aprakasha.includes(b.name) ? "rgba(241, 196, 15, 0.8)" : "rgba(168, 85, 247, 0.8)"; ctx2D.fillRect(p2D.x - 2, p2D.y - 2, 4, 4); }
                
                if (document.getElementById('cbShowLabels').checked) {
                    let sym = `${b.isVakri?" (R)":""}${b.isUcha?" ↑":""}${b.isNeecha?" ↓":""}${b.isMT?" △":""}${b.awasthaState?` ${b.awasthaState.symbol}`:""}${b.isDigbala?" 🎯":""}`;
                    let txt = `${symbols[b.name]||''} ${i18n[currentLang].names[b.name]||b.name} ${formatDegree(b.deg)}${sym}`;
                    ctx2D.font = iG ? "bold 12px 'Segoe UI', sans-serif" : "italic 10px Arial";
                    let isR = Math.cos(b.abs_deg*Math.PI/180) >= 0; let oX = isR ? 30 : -30; let tW = ctx2D.measureText(txt).width+6;
                    let rX = isR ? p2D.x+oX : p2D.x+oX-tW; let rt = {x:rX, y:p2D.y-7, w:tW, h:14};
                    while(checkOverlap(rt, dL)) { oX += isR?15:-15; rX = isR ? p2D.x+oX : p2D.x+oX-tW; rt.x = rX; } dL.push(rt);
                    ctx2D.beginPath(); ctx2D.moveTo(p2D.x, p2D.y); ctx2D.lineTo(p2D.x+oX, p2D.y); ctx2D.strokeStyle="rgba(255,255,255,0.2)"; ctx2D.stroke();
                    ctx2D.fillStyle = b.isCombust ? "#64748b" : (pColors[b.name]||"#ffffff"); ctx2D.textAlign = isR?"left":"right"; ctx2D.fillText(txt, p2D.x+oX, p2D.y+4);
                }
            }
        });
    }
    function toScreenXY(pos3D) { const pos = pos3D.clone(); pos.project(camera); return { x: (pos.x * canvas2D.width/2) + canvas2D.width/2, y: -(pos.y * canvas2D.height/2) + canvas2D.height/2, z: pos.z }; }
    function checkOverlap(rect, drawnRects) { for(let r of drawnRects) if(rect.x < r.x+r.w+6 && rect.x+rect.w+6 > r.x && rect.y < r.y+r.h+6 && rect.y+rect.h+6 > r.y) return true; return false; }
    
    window.addEventListener('resize', () => { 
        if(currentView === '3d') {
            const w = container.clientWidth; const h = container.clientHeight; camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); canvas2D.width=w; canvas2D.height=h; 
        }
    });
    window.onload = () => { initDefaults(); changeLanguage(); init3D(); };
</script>
</body>
