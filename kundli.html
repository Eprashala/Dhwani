<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Parashari & 3D Astronomical Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;}
        .container { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1600px; gap: 15px;}
        .panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-panel { width: 320px; height: fit-content; }
        .chart-panel { display: flex; flex-direction: column; align-items: center; background-color: #fdfaf6; }
        
        label { font-weight: bold; font-size: 13px; color: #34495e; margin-top: 10px; display: block; }
        input[type="text"], input[type="date"], input[type="time"] { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        .btn-calc { width: 100%; padding: 12px; background-color: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s;}
        .btn-calc:hover { background-color: #922b21; }
        
        #suggestions { list-style: none; padding: 0; margin: -10px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; max-height: 150px; overflow-y: auto; display: none; background: white;}
        #suggestions li { padding: 8px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee; }
        #suggestions li:hover { background-color: #f0f0f0; }
        
        .hidden-coords { display: flex; gap: 10px; }
        .hidden-coords input { background-color: #eee; color: #7f8c8d; }
        
        /* 3D Sky Map Container */
        #skyContainer { position: relative; width: 950px; height: 900px; background-color: #02050a; border-radius: 8px; overflow: hidden; }
        #skyContainer:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        #skyContainer:-moz-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        #skyContainer:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
        
        #skyCanvas3D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        #skyCanvas2D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; } 
        #kundaliCanvas { background-color: #fdfaf6; }
        
        h3 { margin-top: 0; color: #2c3e50; text-align: center; }
        .sky-title { color: #f1c40f; margin-bottom: 10px; font-size: 20px; text-align: center;}

        /* Floating UI Controls */
        .controls-overlay { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .ctrl-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 5px; width: 40px; height: 40px; font-size: 20px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s;}
        .ctrl-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05);}
        
        /* Cosmic Filters Panel */
        .filter-panel { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.75); padding: 15px; border-radius: 8px; color: white; z-index: 10; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); font-size: 13px;}
        .filter-panel h4 { margin: 0 0 10px 0; color: #f1c40f; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;}
        .filter-panel label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; color: #eee; font-weight: normal; margin-top: 0;}
        .filter-panel hr { border-color: rgba(255,255,255,0.2); margin: 12px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel input-panel">
            <h3>Jataka Details</h3>
            <label>Native's Name</label>
            <input type="text" id="name" placeholder="Enter full name" value="Pramod">
            <label>Date of Birth</label>
            <input type="date" id="date" value="1982-02-11">
            <label>Time of Birth (with Seconds)</label>
            <input type="time" id="time" step="1" value="11:51:00">
            <label>Place of Birth</label>
            <input type="text" id="placeSearch" placeholder="Type city and select..." autocomplete="off">
            <ul id="suggestions"></ul>
            <div class="hidden-coords">
                <div><label>Latitude</label><input type="text" id="lat" value="19.3654" readonly></div>
                <div><label>Longitude</label><input type="text" id="lon" value="73.3685" readonly></div>
            </div>
            <button class="btn-calc" onclick="generateChart()">Calculate Cosmic Map</button>
            <p id="error-msg" style="color: red; font-size: 13px; text-align: center; margin-top: 10px;"></p>
        </div>

        <div class="panel chart-panel">
            <h3>Spashtha Lagna Kundali</h3>
            <canvas id="kundaliCanvas" width="550" height="550"></canvas>
        </div>

        <div class="panel chart-panel" style="background-color: #111827; padding: 15px; flex-grow: 1;">
            <h3 class="sky-title">Khagol Mandal (Interactive 3D Engine)</h3>
            
            <div id="skyContainer">
                <div class="filter-panel">
                    <h4>Cosmic Filters</h4>
                    <label><input type="checkbox" id="cbPlanets" checked onchange="updateView()"> 1. Grahas (Planets)</label>
                    <label><input type="checkbox" id="cbNodes" checked onchange="updateView()"> 2. Rahu & Ketu</label>
                    <label><input type="checkbox" id="cbUpagrahas" checked onchange="updateView()"> 3. Upagrahas</label>
                    <label><input type="checkbox" id="cbPlanetOrbits" checked onchange="updateView()"> 4. Planet Orbits</label>
                    <label><input type="checkbox" id="cbMoonOrbit" checked onchange="updateView()"> 5. Moon's Orbit</label>
                    <label><input type="checkbox" id="cbRashis" checked onchange="updateView()"> 6. Rashis (Signs)</label>
                    <label><input type="checkbox" id="cbNakshatras" checked onchange="updateView()"> 7. Nakshatras</label>
                    <hr>
                    <h4>Center Focus</h4>
                    <label><input type="radio" name="focus" value="Earth" checked onchange="updateView()"> 🌍 Bhu (Geocentric)</label>
                    <label><input type="radio" name="focus" value="Sun" onchange="updateView()"> ☀️ Surya (Heliocentric)</label>
                </div>

                <div class="controls-overlay">
                    <button class="ctrl-btn" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
                    <button class="ctrl-btn" onclick="resetCamera()" title="Reset to Top-Down">⌂</button>
                </div>
                
                <canvas id="skyCanvas3D"></canvas>
                <canvas id="skyCanvas2D"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- Core Setup ---
        const kCanvas = document.getElementById('kundaliCanvas');
        const kCtx = kCanvas.getContext('2d');
        const container = document.getElementById('skyContainer');
        const canvas2D = document.getElementById('skyCanvas2D');
        const ctx2D = canvas2D.getContext('2d');

        let skyData = [];
        let scene, camera, renderer, controls;
        let planetMeshes = {};
        let dynamicOrbits = [];
        let sunLight;

        // --- Astronomical Distances (Adjusted for UI logic) ---
        // Geocentric Order (Earth at center)
        const geoRadii = { 'Chandra': 70, 'Budh': 130, 'Shukra': 190, 'Surya': 250, 'Mangal': 310, 'Guru': 380, 'Shani': 450 };
        // True Heliocentric Cosmic Order (Sun at center)
        const helioRadii = { 'Budh': 90, 'Shukra': 150, 'Earth': 210, 'Mangal': 270, 'Guru': 340, 'Shani': 410 };
        
        const rashiRadius = 550;
        const nakshatraRadius = 640;
        const upagrahaOrbit = 500;

        const sizes = { 'Earth': 16, 'Chandra': 5, 'Surya': 26, 'Budh': 6, 'Shukra': 9, 'Mangal': 8, 'Guru': 15, 'Shani': 13, 'Node': 5 };
        const symbols = { 'Surya': '☉', 'Chandra': '☽', 'Mangal': '♂', 'Budh': '☿', 'Guru': '♃', 'Shukra': '♀', 'Shani': '♄', 'Rahu': '☊', 'Ketu': '☋', 'Earth': '🌍' };
        const pColors = { 'Surya': '#f1c40f', 'Chandra': '#ffffff', 'Mangal': '#ff4d4d', 'Budh': '#2ecc71', 'Guru': '#f39c12', 'Shukra': '#ffb6c1', 'Shani': '#1a252f', 'Rahu': '#7f8c8d', 'Ketu': '#8d6e63', 'Earth': '#3498db' };
        
        const rashiSymbols = ['♈ Mesh', '♉ Vrish', '♊ Mithun', '♋ Karka', '♌ Simha', '♍ Kanya', '♎ Tula', '♏ Vrishchik', '♐ Dhanu', '♑ Makar', '♒ Kumbha', '♓ Meen'];
        
        // 27 Nakshatras with Sacred Symbols
        const nakshatrasList = [
            '🐴 Ashwini', '▽ Bharani', '🔥 Krittika', '🐂 Rohini', '🦌 Mrigashira', '💧 Ardra',
            '🏹 Punarvasu', '🌸 Pushya', '🐍 Ashlesha', '👑 Magha', '🛏️ P.Phalguni', '🛌 U.Phalguni',
            '✋ Hasta', '💎 Chitra', '🌾 Swati', '⛩️ Vishakha', '🪷 Anuradha', '☂️ Jyeshtha',
            '🪴 Mula', '🪭 P.Ashadha', '⛺ U.Ashadha', '👂 Shravana', '🥁 Dhanishta', '⭕ Shatabhisha',
            '⚔️ P.Bhadrapada', '🌊 U.Bhadrapada', '🐟 Revati'
        ];

        function getNakshatra(deg) { return nakshatrasList[Math.floor(deg / 13.333333)]; }
        function formatDegree(decimalDeg) {
            if (decimalDeg === undefined) return "";
            const deg = Math.floor(decimalDeg);
            const mins = Math.floor((decimalDeg % 1) * 60);
            return `${deg}°${mins.toString().padStart(2, '0')}'`;
        }

        // --- Geolocation Logic ---
        const placeSearch = document.getElementById('placeSearch');
        const suggestions = document.getElementById('suggestions');
        let timeout = null;
        placeSearch.addEventListener('input', function() {
            clearTimeout(timeout);
            if (this.value.length < 3) { suggestions.style.display = 'none'; return; }
            timeout = setTimeout(async () => {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${this.value}`);
                const data = await response.json();
                suggestions.innerHTML = '';
                if (data.length > 0) {
                    suggestions.style.display = 'block';
                    data.forEach(place => {
                        const li = document.createElement('li');
                        li.textContent = place.display_name;
                        li.onclick = () => {
                            placeSearch.value = place.name;
                            document.getElementById('lat').value = parseFloat(place.lat).toFixed(4);
                            document.getElementById('lon').value = parseFloat(place.lon).toFixed(4);
                            suggestions.style.display = 'none';
                        };
                        suggestions.appendChild(li);
                    });
                }
            }, 500);
        });

        // --- Initialize 3D Engine ---
        function init3D() {
            const width = container.clientWidth; const height = container.clientHeight;
            canvas2D.width = width; canvas2D.height = height;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, width / height, 1, 4000);
            resetCamera();

            const canvas3D = document.getElementById('skyCanvas3D');
            renderer = new THREE.WebGLRenderer({ canvas: canvas3D, antialias: true, alpha: true });
            renderer.setSize(width, height); renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;

            scene.add(new THREE.AmbientLight(0x404040, 0.5));

            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starVertices = [];
            for(let i=0; i<4000; i++) starVertices.push((Math.random()-0.5)*3000, (Math.random()-0.5)*3000, (Math.random()-0.5)*3000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8})));

            // Planets & Nodes
            createPlanet('Earth', sizes.Earth, 0x156289, false);
            createPlanet('Surya', sizes.Surya, 0xffaa00, true);
            createPlanet('Chandra', sizes.Chandra, 0xdddddd, false);
            createPlanet('Mangal', sizes.Mangal, 0xc1440e, false);
            createPlanet('Budh', sizes.Budh, 0x888888, false);
            createPlanet('Guru', sizes.Guru, 0xd39c14, false);
            createPlanet('Shukra', sizes.Shukra, 0xffd1dc, false);
            createPlanet('Shani', sizes.Shani, 0x333344, false);
            
            // Saturn Rings
            const saturnRingGeo = new THREE.RingGeometry(sizes.Shani + 4, sizes.Shani + 12, 32);
            const saturnRingMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
            const saturnRing = new THREE.Mesh(saturnRingGeo, saturnRingMat);
            saturnRing.rotation.x = Math.PI / 2;
            planetMeshes['Shani'].add(saturnRing);

            createNode('Rahu', 0x555555); createNode('Ketu', 0x8d6e63);

            animate();
        }

        function createPlanet(name, size, colorHex, isSun) {
            let mat;
            if (isSun) {
                mat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
                sunLight = new THREE.PointLight(0xffffff, 2, 2500);
                scene.add(sunLight);
            } else if (name === 'Earth') {
                mat = new THREE.MeshPhongMaterial({ color: colorHex, emissive: 0x072534 });
            } else {
                mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.7 });
            }
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 32, 32), mat);
            scene.add(mesh); planetMeshes[name] = mesh;
        }

        function createNode(name, colorHex) {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(sizes.Node, 16, 16), new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6 }));
            scene.add(mesh); planetMeshes[name] = mesh;
        }

        function resetCamera() { camera.position.set(0, 1300, 0); camera.lookAt(0, 0, 0); }

        // --- Fetch & Calculation ---
        async function generateChart() {
            const btn = document.querySelector('.btn-calc'); btn.innerText = "Aligning Cosmos...";
            let timeStr = document.getElementById('time').value; if (timeStr.split(':').length === 2) timeStr += ":00";
            const payload = { date: document.getElementById('date').value, time: timeStr, lat: document.getElementById('lat').value, lon: document.getElementById('lon').value };

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('error-msg').innerText = "";
                    skyData = data.houses; 
                    populateKundali(data.houses, data.asc_sign);
                    updateView();
                } else document.getElementById('error-msg').innerText = data.message;
            } catch (err) { document.getElementById('error-msg').innerText = "Python server error. Ensure it is running."; } 
            finally { btn.innerText = "Calculate Cosmic Map"; }
        }

        // --- Mathematical Matrix & 3D Updater ---
        let renderBodies = []; // Master list for 2D UI Overlay

        function updateView() {
            if (!skyData || skyData.length === 0) return;

            const showGrahas = document.getElementById('cbPlanets').checked;
            const showNodes = document.getElementById('cbNodes').checked;
            const centerFocus = document.querySelector('input[name="focus"]:checked').value;
            const isHelio = centerFocus === 'Sun';

            let flatBodies = [];
            skyData.forEach(h => { h.forEach(b => { if(b.abs_deg !== undefined) flatBodies.push(b); }); });
            
            // Build the Render List (Injecting Earth dynamically)
            renderBodies = [...flatBodies];
            let sun = flatBodies.find(b => b.name === 'Surya');
            if (sun) {
                renderBodies.push({ name: 'Earth', type: 'graha', abs_deg: (sun.abs_deg + 180) % 360, deg: (sun.abs_deg + 180) % 30 });
            }

            // Calculate exact X, Z coordinates for all entities based on Cosmic Focus
            renderBodies.forEach(b => {
                const rad = (b.abs_deg - 90) * (Math.PI / 180);
                if (isHelio) {
                    if (b.name === 'Surya') { b.x = 0; b.z = 0; }
                    else if (b.name === 'Earth') {
                        b.x = helioRadii['Earth'] * Math.cos(rad); b.z = helioRadii['Earth'] * Math.sin(rad);
                    }
                    else if (b.name === 'Chandra' || b.name === 'Rahu' || b.name === 'Ketu') {
                        // Nodes & Moon orbit the Earth
                        let eRad = ((sun.abs_deg + 180) - 90) * (Math.PI / 180);
                        let ex = helioRadii['Earth'] * Math.cos(eRad);
                        let ez = helioRadii['Earth'] * Math.sin(eRad);
                        b.x = ex + 45 * Math.cos(rad); b.z = ez + 45 * Math.sin(rad);
                    }
                    else if (b.type === 'graha') {
                        let radius = helioRadii[b.name] || upagrahaOrbit;
                        b.x = radius * Math.cos(rad); b.z = radius * Math.sin(rad);
                    }
                    else { // Upagrahas
                        b.x = upagrahaOrbit * Math.cos(rad); b.z = upagrahaOrbit * Math.sin(rad);
                    }
                } else {
                    // Geocentric (Earth Center)
                    if (b.name === 'Earth') { b.x = 0; b.z = 0; }
                    else {
                        let radius = (b.name === 'Rahu' || b.name === 'Ketu') ? geoRadii['Surya'] : (geoRadii[b.name] || upagrahaOrbit);
                        b.x = radius * Math.cos(rad); b.z = radius * Math.sin(rad);
                    }
                }
            });

            // Update 3D Meshes
            Object.keys(planetMeshes).forEach(key => {
                const mesh = planetMeshes[key];
                const body = renderBodies.find(b => b.name === key);
                if (body) {
                    const isNode = key === 'Rahu' || key === 'Ketu';
                    if ((isNode && !showNodes) || (!isNode && !showGrahas && key !== 'Surya' && key !== 'Earth')) {
                        mesh.visible = false;
                    } else {
                        mesh.visible = true;
                        mesh.position.set(body.x, 0, body.z);
                        if (key === 'Surya') sunLight.position.copy(mesh.position);
                    }
                } else mesh.visible = false;
            });

            // Rebuild Orbit Rings
            dynamicOrbits.forEach(r => scene.remove(r)); dynamicOrbits = [];
            const ringMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });

            // Planetary Orbits
            if (document.getElementById('cbPlanetOrbits').checked) {
                const radiiMap = isHelio ? helioRadii : geoRadii;
                const centerNode = isHelio ? {x:0, z:0} : {x:0, z:0};
                Object.keys(radiiMap).forEach(key => {
                    if (key === 'Chandra' || key === 'Earth') return; // Handled below
                    const geo = new THREE.EdgesGeometry(new THREE.RingGeometry(radiiMap[key], radiiMap[key]+0.5, 64));
                    const ring = new THREE.LineLoop(geo, ringMat);
                    ring.rotation.x = Math.PI / 2; ring.position.set(centerNode.x, 0, centerNode.z);
                    scene.add(ring); dynamicOrbits.push(ring);
                });
            }

            // Moon/Nodes Orbit
            if (document.getElementById('cbMoonOrbit').checked) {
                const earth = renderBodies.find(b => b.name === 'Earth');
                const mRadius = isHelio ? 45 : geoRadii['Chandra'];
                const geo = new THREE.EdgesGeometry(new THREE.RingGeometry(mRadius, mRadius+0.5, 64));
                const ring = new THREE.LineLoop(geo, new THREE.LineBasicMaterial({ color: 0x3498db, transparent: true, opacity: 0.35, dashSize: 5, gapSize: 3 }));
                ring.computeLineDistances();
                ring.rotation.x = Math.PI / 2;
                ring.position.set(earth.x, 0, earth.z);
                scene.add(ring); dynamicOrbits.push(ring);
            }
        }

        // --- Render Loop & 2D Projection ---
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); render2DOverlay(); }

        function toScreenXY(x, y, z) {
            const pos = new THREE.Vector3(x, y, z); pos.project(camera);
            return { x: (pos.x * canvas2D.width/2) + canvas2D.width/2, y: -(pos.y * canvas2D.height/2) + canvas2D.height/2 };
        }

        // Collision Box Algorithm
        function checkOverlap(rect, drawnRects) {
            for (let r of drawnRects) {
                // Generous padding to absolutely guarantee no overlap
                if (rect.x < r.x + r.w + 4 && rect.x + rect.w + 4 > r.x && rect.y < r.y + r.h + 4 && rect.y + rect.h + 4 > r.y) return true;
            }
            return false;
        }

        function render2DOverlay() {
            ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
            if (!renderBodies || renderBodies.length === 0) return;

            const showRashis = document.getElementById('cbRashis').checked;
            const showNakshatras = document.getElementById('cbNakshatras').checked;
            const showUpagrahas = document.getElementById('cbUpagrahas').checked;
            const showGrahas = document.getElementById('cbPlanets').checked;
            const showNodes = document.getElementById('cbNodes').checked;
            const isHelio = document.querySelector('input[name="focus"]:checked').value === 'Sun';

            // Find Center anchor for Rashis/Nakshatras
            const centerBody = isHelio ? renderBodies.find(b => b.name === 'Surya') : renderBodies.find(b => b.name === 'Earth');
            const centerX = centerBody ? centerBody.x : 0;
            const centerZ = centerBody ? centerBody.z : 0;

            // Draw Rashis
            if (showRashis) {
                ctx2D.lineWidth = 1; ctx2D.strokeStyle = "rgba(255, 255, 255, 0.12)";
                for (let i = 0; i < 12; i++) {
                    const sRad = (i * 30 - 90) * (Math.PI / 180);
                    const p1 = toScreenXY(40 * Math.cos(sRad) + centerX, 0, 40 * Math.sin(sRad) + centerZ);
                    const p2 = toScreenXY(rashiRadius * Math.cos(sRad) + centerX, 0, rashiRadius * Math.sin(sRad) + centerZ);
                    ctx2D.beginPath(); ctx2D.moveTo(p1.x, p1.y); ctx2D.lineTo(p2.x, p2.y); ctx2D.stroke();

                    const mRad = (i * 30 + 15 - 90) * (Math.PI / 180);
                    const pt = toScreenXY((rashiRadius - 25) * Math.cos(mRad) + centerX, 0, (rashiRadius - 25) * Math.sin(mRad) + centerZ);
                    ctx2D.fillStyle = "rgba(241, 196, 15, 0.65)"; ctx2D.font = "14px Arial"; ctx2D.textAlign = "center";
                    ctx2D.fillText(rashiSymbols[i], pt.x, pt.y);
                }
            }

            // Draw 27 Nakshatras Wheel
            if (showNakshatras) {
                ctx2D.lineWidth = 0.5; ctx2D.strokeStyle = "rgba(155, 89, 182, 0.4)";
                for (let i = 0; i < 27; i++) {
                    const sRad = (i * 13.333333 - 90) * (Math.PI / 180);
                    const p1 = toScreenXY(rashiRadius * Math.cos(sRad) + centerX, 0, rashiRadius * Math.sin(sRad) + centerZ);
                    const p2 = toScreenXY(nakshatraRadius * Math.cos(sRad) + centerX, 0, nakshatraRadius * Math.sin(sRad) + centerZ);
                    ctx2D.beginPath(); ctx2D.moveTo(p1.x, p1.y); ctx2D.lineTo(p2.x, p2.y); ctx2D.stroke();

                    const mRad = (i * 13.333333 + 6.666666 - 90) * (Math.PI / 180);
                    const pt = toScreenXY((nakshatraRadius - 25) * Math.cos(mRad) + centerX, 0, (nakshatraRadius - 25) * Math.sin(mRad) + centerZ);
                    ctx2D.fillStyle = "rgba(155, 89, 182, 0.9)"; ctx2D.font = "11px Arial"; ctx2D.textAlign = "center";
                    ctx2D.fillText(nakshatrasList[i], pt.x, pt.y);
                }
            }

            let drawnLabels = [];

            // Draw Smart Entity Labels
            renderBodies.forEach(b => {
                const isGraha = b.type === 'graha';
                const isNode = b.name === 'Rahu' || b.name === 'Ketu';
                if ((!showGrahas && isGraha && !isNode && b.name !== 'Surya' && b.name !== 'Earth') || 
                    (!showNodes && isNode) || 
                    (!showUpagrahas && !isGraha)) return;

                const pos2D = toScreenXY(b.x, 0, b.z);
                const rad = (b.abs_deg - 90) * (Math.PI / 180);

                if (!isGraha) {
                    ctx2D.fillStyle = "rgba(155, 89, 182, 0.8)"; ctx2D.fillRect(pos2D.x - 3, pos2D.y - 3, 6, 6);
                }

                const degTxt = formatDegree(b.deg);
                const labelText = `${symbols[b.name] || ''} ${b.name} ${degTxt}`;
                
                ctx2D.font = isGraha ? "bold 13px Arial" : "italic 11px Arial";
                const textW = ctx2D.measureText(labelText).width + 10; 
                const textH = showNakshatras ? 28 : 16; 
                
                let textRadiusOffset = 22; 
                let isRightSide = Math.cos(rad) >= 0;
                let textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset);
                let rectX = isRightSide ? textX : textX - textW; 
                let rectY = pos2D.y - textH/2;
                
                // Advanced Anti-Overlap 
                let rect = { x: rectX, y: rectY, w: textW, h: textH };
                while (checkOverlap(rect, drawnLabels)) {
                    textRadiusOffset += 18; 
                    textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset);
                    rectX = isRightSide ? textX : textX - textW; 
                    rect.x = rectX;
                }
                drawnLabels.push(rect); 

                if (textRadiusOffset > 22) {
                    ctx2D.beginPath(); ctx2D.moveTo(pos2D.x, pos2D.y); ctx2D.lineTo(textX, pos2D.y);
                    ctx2D.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx2D.stroke();
                }

                ctx2D.fillStyle = pColors[b.name] || "#ffffff";
                ctx2D.textAlign = isRightSide ? "left" : "right";
                ctx2D.shadowBlur = 5; ctx2D.shadowColor = "black";
                
                ctx2D.fillText(labelText, textX, pos2D.y + 4);
                if(showNakshatras && b.name !== 'Earth' && b.name !== 'Surya') {
                    ctx2D.font = "11px Arial"; ctx2D.fillStyle = "#bbbbbb";
                    ctx2D.fillText(`(${getNakshatra(b.abs_deg)})`, textX, pos2D.y + 18);
                }
                ctx2D.shadowBlur = 0;
            });
        }

        // --- Traditional 2D Kundali Render ---
        function populateKundali(houses, ascSign) {
            const w = kCanvas.width; const pad = 30;
            kCtx.clearRect(0, 0, w, w); kCtx.strokeStyle = '#e67e22'; kCtx.lineWidth = 2.5;
            kCtx.beginPath(); kCtx.rect(pad, pad, w - 2*pad, w - 2*pad);
            kCtx.moveTo(pad, pad); kCtx.lineTo(w - pad, w - pad); kCtx.moveTo(w - pad, pad); kCtx.lineTo(pad, w - pad);
            kCtx.moveTo(w/2, pad); kCtx.lineTo(w - pad, w/2); kCtx.lineTo(w/2, w - pad); kCtx.lineTo(pad, w/2);
            kCtx.closePath(); kCtx.stroke();

            const coords = [{x: w/2, y: w*0.18}, {x: w*0.25, y: w*0.12}, {x: w*0.12, y: w*0.25}, {x: w*0.25, y: w*0.5}, {x: w*0.12, y: w*0.75}, {x: w*0.25, y: w*0.88}, {x: w/2, y: w*0.82}, {x: w*0.75, y: w*0.88}, {x: w*0.88, y: w*0.75}, {x: w*0.75, y: w*0.5}, {x: w*0.88, y: w*0.25}, {x: w*0.75, y: w*0.12}];

            kCtx.textAlign = "center";
            houses.forEach((bodies, idx) => {
                const cx = coords[idx].x; const cy = coords[idx].y;
                kCtx.fillStyle = "#95a5a6"; kCtx.font = "bold 14px Arial"; kCtx.fillText(((ascSign + idx - 1) % 12) + 1, cx, cy + 40);

                const sortedBodies = bodies.sort((a, b) => { if (a.type === 'graha' && b.type !== 'graha') return -1; if (a.type !== 'graha' && b.type === 'graha') return 1; return 0; });
                let startY = cy - ((sortedBodies.length * 15) / 2) + 5;
                
                sortedBodies.forEach((b, i) => {
                    // Do not render Earth in traditional Parashari Kundali
                    if (b.name === 'Earth') return;
                    
                    const textY = startY + (i * 15);
                    if (b.type === 'graha') {
                        kCtx.fillStyle = "#c0392b"; kCtx.font = "bold 11px Arial";
                        kCtx.fillText(`${symbols[b.name]||''} ${b.name} ${formatDegree(b.deg)} (${getNakshatra(b.abs_deg)})`, cx, textY);
                    } else {
                        kCtx.fillStyle = "#8e44ad"; kCtx.font = "italic 9px Arial";
                        kCtx.fillText(`•${b.name} ${formatDegree(b.deg)}`, cx, textY);
                    }
                });
            });
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) container.requestFullscreen().catch(e => console.log(e));
            else document.exitFullscreen();
        }

        window.addEventListener('resize', () => {
            const width = container.clientWidth; const height = container.clientHeight;
            camera.aspect = width / height; camera.updateProjectionMatrix();
            renderer.setSize(width, height); canvas2D.width = width; canvas2D.height = height;
        });

        window.onload = () => { populateKundali([[],[],[],[],[],[],[],[],[],[],[],[]], 1); init3D(); };
    </script>
</body>
