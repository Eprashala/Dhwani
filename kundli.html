<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Parashari & 3D Astronomical Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --bg-color: #f4f6f9; --panel-bg: white; --text-color: #34495e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden;}
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1800px; gap: 15px;}
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .input-panel { width: 320px; height: fit-content; flex-shrink: 0;}
        .chart-panel { display: flex; flex-direction: column; align-items: center; background-color: #fdfaf6; }
        
        label { font-weight: bold; font-size: 13px; color: var(--text-color); margin-top: 10px; display: block; }
        input[type="text"], input[type="date"], input[type="time"] { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        .btn-calc { width: 100%; padding: 12px; background-color: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s;}
        .btn-calc:hover { background-color: #922b21; }
        
        #suggestions { list-style: none; padding: 0; margin: -10px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; max-height: 150px; overflow-y: auto; display: none; background: white;}
        #suggestions li { padding: 8px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #eee; }
        #suggestions li:hover { background-color: #f0f0f0; }
        
        .hidden-coords { display: flex; gap: 10px; }
        .hidden-coords input { background-color: #eee; color: #7f8c8d; }
        
        h3 { margin-top: 0; color: #2c3e50; text-align: center; }
        .sky-title { color: #f1c40f; margin-bottom: 10px; font-size: 20px; text-align: center; width: 100%;}

        .sky-wrapper { display: flex; width: 100%; gap: 15px; align-items: stretch; position: relative;}
        
        .filter-panel { width: 230px; background: #0a0f18; padding: 20px; border-radius: 8px; color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); border: 1px solid #2c3e50; flex-shrink: 0; z-index: 10;}
        .filter-panel h4 { margin: 0 0 12px 0; color: #f1c40f; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        .filter-panel label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; color: #eee; font-weight: normal; margin-top: 0; font-size: 13px;}
        .filter-panel hr { border-color: rgba(255,255,255,0.1); margin: 15px 0; }
        
        #skyContainer { flex-grow: 1; height: 950px; min-width: 600px; position: relative; background-color: #020408; border-radius: 8px; overflow: hidden; }
        #skyContainer:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
        #skyContainer:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
        
        #skyCanvas3D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        #skyCanvas2D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; } 
        
        .controls-overlay { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: auto;}
        .ctrl-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 5px; width: 40px; height: 40px; font-size: 18px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .ctrl-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05);}

        /* Language Toggle */
        .lang-select { background: rgba(0,0,0,0.8); color: #f1c40f; border: 1px solid #f1c40f; border-radius: 5px; padding: 5px; font-weight: bold; outline: none; cursor: pointer; }
        
        body.mobile-mode { padding: 5px; }
        body.mobile-mode .container { flex-direction: column; align-items: center; }
        body.mobile-mode .sky-wrapper { flex-direction: column-reverse; }
        body.mobile-mode .filter-panel { width: 100%; display: flex; flex-wrap: wrap; gap: 15px; box-sizing: border-box;}
        body.mobile-mode .filter-panel > div { flex: 1; min-width: 150px; }
        body.mobile-mode #skyContainer { width: 100%; height: 75vh; min-width: unset;}
        body.mobile-mode .input-panel { width: 100%; box-sizing: border-box; }
        body.mobile-mode canvas#kundaliCanvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel input-panel">
            <h3 data-i18n="jataka_details">Jataka Details</h3>
            <label data-i18n="native_name">Native's Name</label>
            <input type="text" id="name" placeholder="Name" value="Pramod">
            <label data-i18n="dob">Date of Birth</label>
            <input type="date" id="date" value="1982-02-11">
            <label data-i18n="tob">Time of Birth</label>
            <input type="time" id="time" step="1" value="11:51:00">
            <label data-i18n="pob">Place of Birth</label>
            <input type="text" id="placeSearch" placeholder="City..." autocomplete="off">
            <ul id="suggestions"></ul>
            <div class="hidden-coords">
                <div><label>Lat</label><input type="text" id="lat" value="19.3654" readonly></div>
                <div><label>Lon</label><input type="text" id="lon" value="73.3685" readonly></div>
            </div>
            <button class="btn-calc" onclick="generateChart()" data-i18n="btn_calc">Calculate Cosmic Map</button>
            <p id="error-msg" style="color: red; font-size: 13px; text-align: center; margin-top: 10px;"></p>
        </div>

        <div class="panel chart-panel">
            <h3 data-i18n="kundali_title">Spashtha Lagna Kundali</h3>
            <canvas id="kundaliCanvas" width="550" height="550"></canvas>
        </div>

        <div class="panel chart-panel" style="background-color: #090c11; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box;">
            
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
                <h3 class="sky-title" style="margin:0; text-align: left;" data-i18n="map_title">Khagol Mandal (Interactive 3D Engine)</h3>
                <select class="lang-select" id="langToggle" onchange="changeLanguage()">
                    <option value="en">English</option>
                    <option value="sa">संस्कृतम्</option>
                    <option value="hi">हिन्दी</option>
                    <option value="mr">मराठी</option>
                </select>
            </div>
            
            <div class="sky-wrapper">
                <div class="filter-panel">
                    <div>
                        <h4 data-i18n="f_vis">Visibility Filters</h4>
                        <label><input type="checkbox" id="cbPlanets" checked onchange="updateView()"> <span data-i18n="f_grahas">1. Grahas (Inner)</span></label>
                        <label><input type="checkbox" id="cbOuter" checked onchange="updateView()"> <span data-i18n="f_outer">2. Arun, Varun, Yama</span></label>
                        <label><input type="checkbox" id="cbNodes" checked onchange="updateView()"> <span data-i18n="f_nodes">3. Rahu & Ketu</span></label>
                        <label><input type="checkbox" id="cbUpagrahas" checked onchange="updateView()"> <span data-i18n="f_upagrahas">4. Upagrahas</span></label>
                        <label><input type="checkbox" id="cbPlanetOrbits" checked onchange="updateView()"> <span data-i18n="f_orbits">5. Planet Orbits</span></label>
                        <label><input type="checkbox" id="cbMoonOrbit" checked onchange="updateView()"> <span data-i18n="f_moon_orbit">6. Moon's Orbit</span></label>
                        <label><input type="checkbox" id="cbRashis" checked onchange="updateView()"> <span data-i18n="f_rashis">7. Rashis (Signs)</span></label>
                        <label><input type="checkbox" id="cbNakshatras" checked onchange="updateView()"> <span data-i18n="f_nakshatras">8. Nakshatras</span></label>
                        <label><input type="checkbox" id="cbVedicStars" checked onchange="updateView()"> <span data-i18n="f_stars">9. Sacred Stars (Puranic)</span></label>
                    </div>
                    <div>
                        <hr>
                        <h4 data-i18n="f_center">Cosmic Center</h4>
                        <label><input type="radio" name="focus" value="Earth" checked onchange="updateView()"> 🌍 <span data-i18n="f_bhu">Bhu (Geocentric)</span></label>
                        <label><input type="radio" name="focus" value="Sun" onchange="updateView()"> ☀️ <span data-i18n="f_surya">Surya (Heliocentric)</span></label>
                    </div>
                </div>

                <div id="skyContainer">
                    <div class="controls-overlay">
                        <button class="ctrl-btn" onclick="toggleMobileView()" title="Mobile/Desktop" id="btnMobile">📱</button>
                        <button class="ctrl-btn" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
                        <button class="ctrl-btn" onclick="resetCamera()" title="Top-Down">⌂</button>
                    </div>
                    <canvas id="skyCanvas3D"></canvas>
                    <canvas id="skyCanvas2D"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Sacred Language Dictionary (Localization) ---
        const i18n = {

                kundali_title: "Spashtha Lagna Kundali", map_title: "Khagol Mandal (Interactive 3D Engine)",
                f_vis: "Visibility Filters", f_grahas: "1. Grahas (Inner)", f_outer: "2. Arun, Varun, Yama", f_nodes: "3. Rahu & Ketu", f_upagrahas: "4. Upagrahas", f_orbits: "5. Planet Orbits", f_moon_orbit: "6. Moon's Orbit", f_rashis: "7. Rashis (Signs)", f_nakshatras: "8. Nakshatras", f_stars: "9. Sacred Stars (Puranic)",
                f_center: "Cosmic Center", f_bhu: "Bhu (Geocentric)", f_surya: "Surya (Heliocentric)",
                names: { 'Surya':'Surya', 'Chandra':'Chandra', 'Mangal':'Mangal', 'Budh':'Budh', 'Guru':'Guru', 'Shukra':'Shukra', 'Shani':'Shani', 'Rahu':'Rahu', 'Ketu':'Ketu', 'Earth':'Bhu', 'Arun':'Arun (Uranus)', 'Varun':'Varun (Neptune)', 'Yama':'Yama (Pluto)' }
            },
            sa: {
                jataka_details: "जातक विवरणम्", native_name: "जातकस्य नाम", dob: "जन्मदिनांकः", tob: "जन्मसमयः", pob: "जन्मस्थानम्", btn_calc: "खगोलचित्रं रचयतु",
                kundali_title: "स्पष्ट लग्न कुण्डली", map_title: "खगोल मण्डलम् (त्रि-आयामी यन्त्रम्)",
                f_vis: "दृश्यता नियन्त्रणम्", f_grahas: "१. ग्रहाः", f_outer: "२. अरुण, वरुण, यम", f_nodes: "३. राहु-केतू", f_upagrahas: "४. उपग्रहाः", f_orbits: "५. ग्रहमार्गाः", f_moon_orbit: "६. चन्द्रमार्गः", f_rashis: "७. राशयः", f_nakshatras: "८. नक्षत्राणि", f_stars: "९. पौराणिक ताराः",
                f_center: "केन्द्र बिन्दुः", f_bhu: "भू (भूमिकेन्द्रित)", f_surya: "सूर्य (सूर्यकेन्द्रित)",
                names: { 'Surya':'सूर्यः', 'Chandra':'चन्द्रः', 'Mangal':'मङ्गलः', 'Budh':'बुधः', 'Guru':'गुरुः', 'Shukra':'शुक्रः', 'Shani':'शनिः', 'Rahu':'राहुः', 'Ketu':'केतुः', 'Earth':'भू', 'Arun':'अरुणः', 'Varun':'वरुणः', 'Yama':'यमः' }
            },
            hi: {
                jataka_details: "जातक विवरण", native_name: "जातक का नाम", dob: "जन्म तिथि", tob: "जन्म समय", pob: "जन्म स्थान", btn_calc: "खगोल चित्र बनाएं",
                kundali_title: "स्पष्ट लग्न कुंडली", map_title: "खगोल मंडल (3D इंजन)",
                f_vis: "दृश्यता फिल्टर", f_grahas: "1. ग्रह", f_outer: "2. अरुण, वरुण, यम", f_nodes: "3. राहु-केतु", f_upagrahas: "4. उपग्रह", f_orbits: "5. ग्रहों की कक्षाएं", f_moon_orbit: "6. चंद्र कक्षा", f_rashis: "7. राशियाँ", f_nakshatras: "8. नक्षत्र", f_stars: "9. पौराणिक तारे",
                f_center: "ब्रह्मांड का केंद्र", f_bhu: "पृथ्वी (भूमिका-केंद्रित)", f_surya: "सूर्य (सूर्य-केंद्रित)",
                names: { 'Surya':'सूर्य', 'Chandra':'चंद्र', 'Mangal':'मंगल', 'Budh':'बुध', 'Guru':'गुरु', 'Shukra':'शुक्र', 'Shani':'शनि', 'Rahu':'राहु', 'Ketu':'केतु', 'Earth':'पृथ्वी', 'Arun':'अरुण', 'Varun':'वरुण', 'Yama':'यम' }
            },
            mr: {
                jataka_details: "जातक तपशील", native_name: "जातकाचे नाव", dob: "जन्म तारीख", tob: "जन्म वेळ", pob: "जन्म ठिकाण", btn_calc: "खगोल नकाशा तयार करा",
                kundali_title: "स्पष्ट लग्न कुंडली", map_title: "खगोल मंडळ (3D इंजिन)",
                f_vis: "दृश्यता फिल्टर", f_grahas: "1. ग्रह", f_outer: "2. अरुण, वरुण, यम", f_nodes: "3. राहु-केतू", f_upagrahas: "4. उपग्रह", f_orbits: "5. ग्रहांच्या कक्षा", f_moon_orbit: "6. चंद्राची कक्षा", f_rashis: "7. राशी", f_nakshatras: "8. नक्षत्रे", f_stars: "9. पौराणिक तारे",
                f_center: "विश्वाचे केंद्र", f_bhu: "पृथ्वी (भूकेंद्रित)", f_surya: "सूर्य (सूर्यकेंद्रित)",
                names: { 'Surya':'सूर्य', 'Chandra':'चंद्र', 'Mangal':'मंगळ', 'Budh':'बुध', 'Guru':'गुरु', 'Shukra':'शुक्र', 'Shani':'शनी', 'Rahu':'राहु', 'Ketu':'केतू', 'Earth':'पृथ्वी', 'Arun':'अरुण', 'Varun':'वरुण', 'Yama':'यम' }
            }
        };

        let currentLang = 'en';
        function changeLanguage() {
            currentLang = document.getElementById('langToggle').value;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
            if(skyData.length > 0) { populateKundali(skyData, asc_sign_global); updateView(); }
        }

        // --- Mobile Logic ---
        let isMobileMode = localStorage.getItem('mobileView') === 'true';
        function applyMobileState() {
            if (isMobileMode) { document.body.classList.add('mobile-mode'); document.getElementById('btnMobile').innerText = '💻'; } 
            else { document.body.classList.remove('mobile-mode'); document.getElementById('btnMobile').innerText = '📱'; }
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 350);
        }
        function toggleMobileView() { isMobileMode = !isMobileMode; localStorage.setItem('mobileView', isMobileMode); applyMobileState(); }
        applyMobileState();

        // --- Core Setup ---
        const kCanvas = document.getElementById('kundaliCanvas'); const kCtx = kCanvas.getContext('2d');
        const container = document.getElementById('skyContainer'); const canvas2D = document.getElementById('skyCanvas2D'); const ctx2D = canvas2D.getContext('2d');

        let skyData = []; let asc_sign_global = 1;
        let scene, camera, renderer, controls;
        let planetMeshes = {}; let dynamicOrbits = []; let sacredStarsGroup; let sunLight;

        const aprakasha = ['Dhuma', 'Vyatipata', 'Parivesha', 'Indrachap', 'Upaketu']; 
        const kalavelas = ['Kaal', 'Mrityu', 'Ardhaprahar', 'Yaamgandak', 'Gulika', 'Mandi']; 

        // Extended Radii for Outer Planets
        const geoRadii = { 'Chandra':80, 'Budh':150, 'Shukra':210, 'Surya':290, 'Mangal':370, 'Guru':450, 'Shani':530, 'Arun': 620, 'Varun': 700, 'Yama': 780 };
        const helioRadii = { 'Budh':90, 'Shukra':160, 'Earth':240, 'Mangal':320, 'Guru':410, 'Shani':500, 'Arun': 590, 'Varun': 680, 'Yama': 770 };
        const temporalRadius = 170; 

        const sizes = { 'Earth':18, 'Chandra':5, 'Surya':28, 'Budh':7, 'Shukra':10, 'Mangal':9, 'Guru':17, 'Shani':15, 'Node':6, 'Arun':12, 'Varun':12, 'Yama':4 };
        const symbols = { 'Surya':'☉', 'Chandra':'☽', 'Mangal':'♂', 'Budh':'☿', 'Guru':'♃', 'Shukra':'♀', 'Shani':'♄', 'Rahu':'☊', 'Ketu':'☋', 'Earth':'⊕', 'Arun':'♅', 'Varun':'♆', 'Yama':'♇' };
        const pColors = { 'Surya':'#f1c40f', 'Chandra':'#ffffff', 'Mangal':'#ff4d4d', 'Budh':'#2ecc71', 'Guru':'#f39c12', 'Shukra':'#ffb6c1', 'Shani':'#1a252f', 'Rahu':'#7f8c8d', 'Ketu':'#8d6e63', 'Earth':'#3498db', 'Arun':'#88ccff', 'Varun':'#3366ff', 'Yama':'#ddddcc' };
        
        const rashiSymbols = ['♈ Mesh', '♉ Vrish', '♊ Mithun', '♋ Karka', '♌ Simha', '♍ Kanya', '♎ Tula', '♏ Vrishchik', '♐ Dhanu', '♑ Makar', '♒ Kumbha', '♓ Meen'];
        const nakshatrasList = ['🐴 Ashwini', '▽ Bharani', '🔥 Krittika', '🐂 Rohini', '🦌 Mrigashira', '💧 Ardra', '🏹 Punarvasu', '🌸 Pushya', '🐍 Ashlesha', '👑 Magha', '🛏️ P.Phalguni', '🛌 U.Phalguni', '✋ Hasta', '💎 Chitra', '🌾 Swati', '⛩️ Vishakha', '🪷 Anuradha', '☂️ Jyeshtha', '🪴 Mula', '🪭 P.Ashadha', '⛺ U.Ashadha', '👂 Shravana', '🥁 Dhanishta', '⭕ Shatabhisha', '⚔️ P.Bhadrapada', '🌊 U.Bhadrapada', '🐟 Revati'];

        function getNakshatra(deg) { return nakshatrasList[Math.floor(deg / 13.333333)]; }
        function formatDegree(decimalDeg) { if (decimalDeg === undefined) return ""; const deg = Math.floor(decimalDeg); const mins = Math.floor((decimalDeg % 1) * 60); return `${deg}°${mins.toString().padStart(2, '0')}'`; }

        // --- Sacred Stars Coordinates (Approximate 3D Spherical) ---
        const sacredStarsList = [
            { id: 'Dhruva', name: 'Dhruva Tara (Polaris)', lon: 0, lat: 89, col: 0xffffff },
            { id: 'Agastya', name: 'Agastya (Canopus)', lon: 105, lat: -75, col: 0xffddaa },
            { id: 'Abhijit', name: 'Abhijit (Vega)', lon: 284, lat: 61, col: 0xaaddff },
            { id: 'Lubdhaka', name: 'Lubdhaka (Sirius)', lon: 104, lat: -39, col: 0xffffff },
            { id: 'Saptarishi', name: 'Saptarishi (Ursa Major)', lon: 150, lat: 55, col: 0xffffff, cluster: 7 },
            { id: 'Arundhati', name: 'Arundhati & Vashistha', lon: 160, lat: 56, col: 0xffaaaa },
            { id: 'Trisanku', name: 'Trisanku (Crux)', lon: 180, lat: -60, col: 0xffffff, cluster: 4 },
            { id: 'ApamVatsa', name: 'Apam Vatsa', lon: 200, lat: -45, col: 0xccccff },
            { id: 'Shishumara', name: 'Shishumara Chakra', lon: 250, lat: 70, col: 0xaaaaff, cluster: 5 },
            { id: 'Shyama', name: 'Shyama & Sabala', lon: 110, lat: -20, col: 0xffccaa },
            { id: 'Suniti', name: 'Suniti', lon: 10, lat: 85, col: 0xffffff },
            { id: 'Ishu', name: 'Ishu Trikanda (Orion Belt)', lon: 85, lat: -5, col: 0xaaaaff, cluster: 3 },
            { id: 'Ashvins', name: 'The Ashvins', lon: 25, lat: 20, col: 0xffffaa, cluster: 2 }
        ];

        function init3D() {
            const width = container.clientWidth; const height = container.clientHeight;
            canvas2D.width = width; canvas2D.height = height;

            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(45, width / height, 1, 8000);
            resetCamera();

            const canvas3D = document.getElementById('skyCanvas3D');
            renderer = new THREE.WebGLRenderer({ canvas: canvas3D, antialias: true, alpha: true });
            renderer.setSize(width, height); renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;

            scene.add(new THREE.AmbientLight(0x404040, 0.4));

            // Deep Space Stars
            const starGeo = new THREE.BufferGeometry(); const starVertices = [];
            for(let i=0; i<4000; i++) starVertices.push((Math.random()-0.5)*7000, (Math.random()-0.5)*7000, (Math.random()-0.5)*7000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.5, transparent: true, opacity: 0.5})));

            buildSacredStars();

            createPlanet('Earth', sizes.Earth, 0x156289, false);
            createPlanet('Surya', sizes.Surya, 0xffaa00, true);
            createPlanet('Chandra', sizes.Chandra, 0xdddddd, false);
            createPlanet('Mangal', sizes.Mangal, 0xc1440e, false);
            createPlanet('Budh', sizes.Budh, 0x888888, false);
            createPlanet('Guru', sizes.Guru, 0xd39c14, false);
            createPlanet('Shukra', sizes.Shukra, 0xffd1dc, false);
            createPlanet('Shani', sizes.Shani, 0x333344, false);
            createPlanet('Arun', sizes.Arun, 0x88ccff, false);
            createPlanet('Varun', sizes.Varun, 0x3366ff, false);
            createPlanet('Yama', sizes.Yama, 0xddddcc, false);
            
            const saturnRingGeo = new THREE.RingGeometry(sizes.Shani + 4, sizes.Shani + 12, 32);
            const saturnRing = new THREE.Mesh(saturnRingGeo, new THREE.MeshBasicMaterial({ color: 0xaaaaaa, side: THREE.DoubleSide, transparent: true, opacity: 0.7 }));
            saturnRing.rotation.x = Math.PI / 2; planetMeshes['Shani'].add(saturnRing);

            createNode('Rahu', 0x555555); createNode('Ketu', 0x8d6e63);

            animate();
        }

        function buildSacredStars() {
            sacredStarsGroup = new THREE.Group();
            scene.add(sacredStarsGroup);
            const starRadius = 2500; // Deepest background
            
            sacredStarsList.forEach(s => {
                const radLon = (s.lon - 90) * (Math.PI / 180);
                const radLat = s.lat * (Math.PI / 180);
                
                // Convert Spherical to Cartesian (Y is Up)
                const x = starRadius * Math.cos(radLat) * Math.cos(radLon);
                const y = starRadius * Math.sin(radLat);
                const z = starRadius * Math.cos(radLat) * Math.sin(radLon);

                let points = [new THREE.Vector3(x, y, z)];
                
                // Procedural Clusters
                if(s.cluster) {
                    for(let i=1; i<s.cluster; i++) {
                        points.push(new THREE.Vector3(x + (Math.random()-0.5)*150, y + (Math.random()-0.5)*150, z + (Math.random()-0.5)*150));
                    }
                    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({color: s.col, transparent:true, opacity:0.3}));
                    sacredStarsGroup.add(line);
                }

                const pts = new THREE.Points(new THREE.BufferGeometry().setFromPoints(points), new THREE.PointsMaterial({color: s.col, size: 8}));
                s.meshPos = new THREE.Vector3(x, y, z); // Save for 2D label mapping
                sacredStarsGroup.add(pts);
            });
        }

        function createPlanet(name, size, colorHex, isSun) {
            let mat = isSun ? new THREE.MeshBasicMaterial({ color: 0xffcc00 }) : (name === 'Earth' ? new THREE.MeshPhongMaterial({ color: colorHex, emissive: 0x072534 }) : new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.7 }));
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 32, 32), mat);
            if (isSun) { sunLight = new THREE.PointLight(0xffffff, 2.5, 6000); scene.add(sunLight); }
            scene.add(mesh); planetMeshes[name] = mesh;
        }

        function createNode(name, colorHex) {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(sizes.Node, 16, 16), new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6 }));
            scene.add(mesh); planetMeshes[name] = mesh;
        }

        function resetCamera() { camera.position.set(0, 2200, 0); camera.lookAt(0, 0, 0); }

        async function generateChart() {
            const btn = document.querySelector('.btn-calc'); btn.innerText = "Aligning Cosmos...";
            let timeStr = document.getElementById('time').value; if (timeStr.split(':').length === 2) timeStr += ":00";
            const payload = { date: document.getElementById('date').value, time: timeStr, lat: document.getElementById('lat').value, lon: document.getElementById('lon').value };

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('error-msg').innerText = "";
                    skyData = data.houses; asc_sign_global = data.asc_sign;
                    populateKundali(data.houses, data.asc_sign);
                    updateView();
                } else document.getElementById('error-msg').innerText = data.message;
            } catch (err) { document.getElementById('error-msg').innerText = "Python server error. Ensure it is running."; } 
            finally { btn.innerText = i18n[currentLang].btn_calc; }
        }

        // Generate approximate ephemeris for Outer Planets
        function injectOuterPlanets(flatBodies) {
            const epoch2026 = { 'Arun': 56, 'Varun': 358, 'Yama': 301 }; // Approximation
            Object.keys(epoch2026).forEach(p => {
                flatBodies.push({ name: p, type: 'graha', abs_deg: epoch2026[p], deg: epoch2026[p] % 30 });
            });
            return flatBodies;
        }

        let renderBodies = []; 

        function updateView() {
            if (!skyData || skyData.length === 0) return;

            const showGrahas = document.getElementById('cbPlanets').checked;
            const showOuter = document.getElementById('cbOuter').checked;
            const showNodes = document.getElementById('cbNodes').checked;
            const showVedicStars = document.getElementById('cbVedicStars').checked;
            const isHelio = document.querySelector('input[name="focus"]:checked').value === 'Sun';

            sacredStarsGroup.visible = showVedicStars;

            let flatBodies = [];
            skyData.forEach(h => { h.forEach(b => { if(b.abs_deg !== undefined) flatBodies.push(b); }); });
            
            flatBodies = injectOuterPlanets(flatBodies); // Add Uranus, Neptune, Pluto dynamically
            
            renderBodies = [...flatBodies];
            let sun = flatBodies.find(b => b.name === 'Surya');
            if (sun) renderBodies.push({ name: 'Earth', type: 'graha', abs_deg: (sun.abs_deg + 180) % 360, deg: (sun.abs_deg + 180) % 30 });

            let offsetX = 0, offsetZ = 0;
            if (isHelio && sun) {
                const sRad = (sun.abs_deg - 90) * (Math.PI / 180);
                offsetX = -(helioRadii['Earth'] * Math.cos(sRad));
                offsetZ = -(helioRadii['Earth'] * Math.sin(sRad));
            }

            renderBodies.forEach(b => {
                const rad = (b.abs_deg - 90) * (Math.PI / 180);
                const isOuter = ['Arun', 'Varun', 'Yama'].includes(b.name);
                
                if (isHelio) {
                    if (b.name === 'Surya') { b.x = 0; b.z = 0; }
                    else if (b.name === 'Earth') { b.x = -offsetX; b.z = -offsetZ; }
                    else if (b.name === 'Chandra' || b.name === 'Rahu' || b.name === 'Ketu') {
                        b.x = -offsetX + 65 * Math.cos(rad); b.z = -offsetZ + 65 * Math.sin(rad);
                    }
                    else if (b.type === 'graha') {
                        let radius = helioRadii[b.name];
                        b.x = radius * Math.cos(rad); b.z = radius * Math.sin(rad);
                    }
                    else { 
                        let radius = aprakasha.includes(b.name) ? helioRadii['Earth'] : temporalRadius;
                        b.x = aprakasha.includes(b.name) ? radius * Math.cos(rad) : -offsetX + radius * Math.cos(rad);
                        b.z = aprakasha.includes(b.name) ? radius * Math.sin(rad) : -offsetZ + radius * Math.sin(rad);
                    }
                } else { 
                    if (b.name === 'Earth') { b.x = 0; b.z = 0; }
                    else {
                        let radius = (b.name === 'Rahu' || b.name === 'Ketu') ? geoRadii['Surya'] : (b.type === 'graha' ? geoRadii[b.name] : (aprakasha.includes(b.name) ? geoRadii['Surya'] : temporalRadius));
                        b.x = radius * Math.cos(rad); b.z = radius * Math.sin(rad);
                    }
                }
            });

            Object.keys(planetMeshes).forEach(key => {
                const mesh = planetMeshes[key]; const body = renderBodies.find(b => b.name === key);
                if (body) {
                    const isNode = key === 'Rahu' || key === 'Ketu';
                    const isOuter = ['Arun', 'Varun', 'Yama'].includes(key);
                    if ((isNode && !showNodes) || (isOuter && !showOuter) || (!isNode && !isOuter && !showGrahas && key !== 'Surya' && key !== 'Earth')) {
                        mesh.visible = false;
                    } else {
                        mesh.visible = true; mesh.position.set(body.x, 0, body.z);
                        if (key === 'Surya') sunLight.position.copy(mesh.position);
                    }
                } else mesh.visible = false;
            });

            dynamicOrbits.forEach(r => scene.remove(r)); dynamicOrbits = [];
            const ringMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });

            if (document.getElementById('cbPlanetOrbits').checked) {
                const radiiMap = isHelio ? helioRadii : geoRadii;
                const centerNode = isHelio ? {x:0, z:0} : {x:0, z:0};
                Object.keys(radiiMap).forEach(key => {
                    if (key === 'Chandra' || key === 'Earth') return; 
                    if (['Arun', 'Varun', 'Yama'].includes(key) && !showOuter) return;
                    const ring = new THREE.LineLoop(new THREE.EdgesGeometry(new THREE.RingGeometry(radiiMap[key], radiiMap[key]+0.5, 96)), ringMat);
                    ring.rotation.x = Math.PI / 2; ring.position.set(centerNode.x, 0, centerNode.z);
                    scene.add(ring); dynamicOrbits.push(ring);
                });
            }

            if (document.getElementById('cbMoonOrbit').checked) {
                const earth = renderBodies.find(b => b.name === 'Earth');
                const mRadius = isHelio ? 65 : geoRadii['Chandra'];
                const ring = new THREE.LineLoop(new THREE.EdgesGeometry(new THREE.RingGeometry(mRadius, mRadius+0.5, 64)), new THREE.LineBasicMaterial({ color: 0x3498db, transparent: true, opacity: 0.4, dashSize: 5, gapSize: 3 }));
                ring.computeLineDistances(); ring.rotation.x = Math.PI / 2; ring.position.set(earth.x, 0, earth.z);
                scene.add(ring); dynamicOrbits.push(ring);
            }
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); render2DOverlay(); }

        function toScreenXY(pos3D) {
            const pos = pos3D.clone(); pos.project(camera);
            return { x: (pos.x * canvas2D.width/2) + canvas2D.width/2, y: -(pos.y * canvas2D.height/2) + canvas2D.height/2, z: pos.z };
        }

        function checkOverlap(rect, drawnRects) {
            for (let r of drawnRects) { if (rect.x < r.x + r.w + 6 && rect.x + rect.w + 6 > r.x && rect.y < r.y + r.h + 6 && rect.y + rect.h + 6 > r.y) return true; }
            return false;
        }

        function render2DOverlay() {
            ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
            if (!renderBodies || renderBodies.length === 0) return;

            const showRashis = document.getElementById('cbRashis').checked;
            const showNakshatras = document.getElementById('cbNakshatras').checked;
            const showUpagrahas = document.getElementById('cbUpagrahas').checked;
            const showGrahas = document.getElementById('cbPlanets').checked;
            const showOuter = document.getElementById('cbOuter').checked;
            const showNodes = document.getElementById('cbNodes').checked;
            const showVedicStars = document.getElementById('cbVedicStars').checked;
            const isHelio = document.querySelector('input[name="focus"]:checked').value === 'Sun';

            const centerBody = isHelio ? renderBodies.find(b => b.name === 'Surya') : renderBodies.find(b => b.name === 'Earth');
            const centerX = centerBody ? centerBody.x : 0; const centerZ = centerBody ? centerBody.z : 0;
            const pCenter = toScreenXY(new THREE.Vector3(centerX, 0, centerZ));

            let drawnLabels = []; 

            const tRadius = 1000; const nRadius = 1300; 

            if (showRashis) {
                ctx2D.lineWidth = 1; ctx2D.strokeStyle = "rgba(255, 255, 255, 0.1)";
                for (let i = 0; i < 12; i++) {
                    const sRad = (i * 30 - 90) * (Math.PI / 180);
                    const p1 = toScreenXY(new THREE.Vector3(150 * Math.cos(sRad) + centerX, 0, 150 * Math.sin(sRad) + centerZ));
                    const p2 = toScreenXY(new THREE.Vector3(tRadius * Math.cos(sRad) + centerX, 0, tRadius * Math.sin(sRad) + centerZ));
                    if(p1.z < 1 && p2.z < 1) { ctx2D.beginPath(); ctx2D.moveTo(p1.x, p1.y); ctx2D.lineTo(p2.x, p2.y); ctx2D.stroke(); }

                    const mRad = (i * 30 + 15 - 90) * (Math.PI / 180);
                    const pt = toScreenXY(new THREE.Vector3((tRadius - 80) * Math.cos(mRad) + centerX, 0, (tRadius - 80) * Math.sin(mRad) + centerZ));
                    if(pt.z < 1) {
                        ctx2D.fillStyle = "rgba(241, 196, 15, 0.5)"; ctx2D.font = "bold 16px Arial"; ctx2D.textAlign = "center";
                        ctx2D.fillText(rashiSymbols[i], pt.x, pt.y); drawnLabels.push({ x: pt.x - 40, y: pt.y - 12, w: 80, h: 16 }); 
                    }
                }
            }

            if (showNakshatras) {
                ctx2D.lineWidth = 0.5; ctx2D.strokeStyle = "rgba(155, 89, 182, 0.2)";
                for (let i = 0; i < 27; i++) {
                    const sRad = (i * 13.333333 - 90) * (Math.PI / 180);
                    const p1 = toScreenXY(new THREE.Vector3(tRadius * Math.cos(sRad) + centerX, 0, tRadius * Math.sin(sRad) + centerZ));
                    const p2 = toScreenXY(new THREE.Vector3(nRadius * Math.cos(sRad) + centerX, 0, nRadius * Math.sin(sRad) + centerZ));
                    
                    if(pCenter.z < 1 && p1.z < 1) {
                        ctx2D.beginPath(); ctx2D.moveTo(pCenter.x, pCenter.y); ctx2D.lineTo(p1.x, p1.y);
                        ctx2D.strokeStyle = "rgba(255, 255, 255, 0.05)"; ctx2D.lineWidth = 0.5; ctx2D.stroke();
                    }
                    if(p1.z < 1 && p2.z < 1) {
                        ctx2D.beginPath(); ctx2D.moveTo(p1.x, p1.y); ctx2D.lineTo(p2.x, p2.y);
                        ctx2D.strokeStyle = "rgba(155, 89, 182, 0.3)"; ctx2D.lineWidth = 1; ctx2D.stroke();
                    }

                    const mRad = (i * 13.333333 + 6.666666 - 90) * (Math.PI / 180);
                    const pt = toScreenXY(new THREE.Vector3((nRadius - 40) * Math.cos(mRad) + centerX, 0, (nRadius - 40) * Math.sin(mRad) + centerZ));
                    if(pt.z < 1) {
                        ctx2D.fillStyle = "rgba(155, 89, 182, 0.9)"; ctx2D.font = "14px Arial"; ctx2D.textAlign = "center";
                        ctx2D.fillText(nakshatrasList[i], pt.x, pt.y); drawnLabels.push({ x: pt.x - 50, y: pt.y - 10, w: 100, h: 14 }); 
                    }
                }
            }

            if (showVedicStars) {
                sacredStarsList.forEach(s => {
                    const pt = toScreenXY(s.meshPos);
                    if(pt.z < 1) {
                        ctx2D.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx2D.font = "italic 12px Arial"; ctx2D.textAlign = "left";
                        ctx2D.fillText("✦ " + s.name, pt.x + 8, pt.y + 4); drawnLabels.push({ x: pt.x, y: pt.y - 8, w: 100, h: 14 }); 
                    }
                });
            }

            renderBodies.forEach(b => {
                const isGraha = b.type === 'graha'; const isNode = b.name === 'Rahu' || b.name === 'Ketu'; const isOuter = ['Arun', 'Varun', 'Yama'].includes(b.name);
                if ((!showGrahas && isGraha && !isNode && !isOuter && b.name !== 'Surya' && b.name !== 'Earth') || (!showOuter && isOuter) || (!showNodes && isNode) || (!showUpagrahas && !isGraha)) return;

                const pos2D = toScreenXY(new THREE.Vector3(b.x, 0, b.z));
                if(pos2D.z > 1) return; // Behind camera
                const rad = (b.abs_deg - 90) * (Math.PI / 180);

                if (!isGraha) {
                    ctx2D.fillStyle = aprakasha.includes(b.name) ? "rgba(241, 196, 15, 0.8)" : "rgba(155, 89, 182, 0.8)"; 
                    ctx2D.fillRect(pos2D.x - 3, pos2D.y - 3, 6, 6);
                }

                const degTxt = formatDegree(b.deg);
                const localName = i18n[currentLang].names[b.name] || b.name;
                const labelText = `${symbols[b.name] || ''} ${localName} ${degTxt}`;
                
                ctx2D.font = isGraha ? "bold 13px Arial" : "italic 11px Arial";
                const textW = ctx2D.measureText(labelText).width + 10; const textH = (showNakshatras && b.name !== 'Earth' && b.name !== 'Surya') ? 28 : 16; 
                
                let textRadiusOffset = 25; let isRightSide = Math.cos(rad) >= 0;
                let textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset); let rectX = isRightSide ? textX : textX - textW; let rectY = pos2D.y - textH/2;
                
                let rect = { x: rectX, y: rectY, w: textW, h: textH };
                while (checkOverlap(rect, drawnLabels)) {
                    textRadiusOffset += 20; textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset);
                    rectX = isRightSide ? textX : textX - textW; rect.x = rectX;
                }
                drawnLabels.push(rect); 

                if (textRadiusOffset > 25) {
                    ctx2D.beginPath(); ctx2D.moveTo(pos2D.x, pos2D.y); ctx2D.lineTo(textX, pos2D.y);
                    ctx2D.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx2D.lineWidth = 1; ctx2D.stroke();
                }

                ctx2D.fillStyle = pColors[b.name] || "#ffffff"; ctx2D.textAlign = isRightSide ? "left" : "right"; ctx2D.shadowBlur = 5; ctx2D.shadowColor = "black";
                ctx2D.fillText(labelText, textX, pos2D.y + 4);
                if(showNakshatras && b.name !== 'Earth' && b.name !== 'Surya') {
                    ctx2D.font = "11px Arial"; ctx2D.fillStyle = "#bbbbbb";
                    ctx2D.fillText(`(${getNakshatra(b.abs_deg)})`, textX, pos2D.y + 18);
                }
                ctx2D.shadowBlur = 0;
            });
        }

        function populateKundali(houses, ascSign) {
            const w = kCanvas.width; const pad = 30;
            kCtx.clearRect(0, 0, w, w); kCtx.strokeStyle = '#e67e22'; kCtx.lineWidth = 2.5;
            kCtx.beginPath(); kCtx.rect(pad, pad, w - 2*pad, w - 2*pad);
            kCtx.moveTo(pad, pad); kCtx.lineTo(w - pad, w - pad); kCtx.moveTo(w - pad, pad); kCtx.lineTo(pad, w - pad);
            kCtx.moveTo(w/2, pad); kCtx.lineTo(w - pad, w/2); kCtx.lineTo(w/2, w - pad); kCtx.lineTo(pad, w/2);
            kCtx.closePath(); kCtx.stroke();

            const coords = [{x: w/2, y: w*0.18}, {x: w*0.25, y: w*0.12}, {x: w*0.12, y: w*0.25}, {x: w*0.25, y: w*0.5}, {x: w*0.12, y: w*0.75}, {x: w*0.25, y: w*0.88}, {x: w/2, y: w*0.82}, {x: w*0.75, y: w*0.88}, {x: w*0.88, y: w*0.75}, {x: w*0.75, y: w*0.5}, {x: w*0.88, y: w*0.25}, {x: w*0.75, y: w*0.12}];

            kCtx.textAlign = "center";
            
            let flatHouses = [[],[],[],[],[],[],[],[],[],[],[],[]];
            houses.forEach((h, i) => flatHouses[i] = [...h]);
            let outer = injectOuterPlanets([]);
            outer.forEach(b => {
                const house_idx = (Math.floor(b.abs_deg / 30) + 1 - ascSign) % 12;
                flatHouses[house_idx >= 0 ? house_idx : house_idx+12].push(b);
            });

            flatHouses.forEach((bodies, idx) => {
                const cx = coords[idx].x; const cy = coords[idx].y;
                kCtx.fillStyle = "#95a5a6"; kCtx.font = "bold 14px Arial"; kCtx.fillText(((ascSign + idx - 1) % 12) + 1, cx, cy + 40);

                const sortedBodies = bodies.sort((a, b) => { if (a.type === 'graha' && b.type !== 'graha') return -1; if (a.type !== 'graha' && b.type === 'graha') return 1; return 0; });
                let startY = cy - ((sortedBodies.length * 15) / 2) + 5;
                
                sortedBodies.forEach((b, i) => {
                    if (b.name === 'Earth') return;
                    const localName = i18n[currentLang].names[b.name] || b.name;
                    const textY = startY + (i * 15);
                    if (b.type === 'graha') {
                        kCtx.fillStyle = "#c0392b"; kCtx.font = "bold 11px Arial";
                        kCtx.fillText(`${symbols[b.name]||''} ${localName} ${formatDegree(b.deg)} (${getNakshatra(b.abs_deg).split(' ')[1]})`, cx, textY);
                    } else {
                        kCtx.fillStyle = "#8e44ad"; kCtx.font = "italic 9px Arial";
                        kCtx.fillText(`•${localName} ${formatDegree(b.deg)}`, cx, textY);
                    }
                });
            });
        }

        function toggleFullScreen() { if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
        window.addEventListener('resize', () => { const width = container.clientWidth; const height = container.clientHeight; camera.aspect = width / height; camera.updateProjectionMatrix(); renderer.setSize(width, height); canvas2D.width = width; canvas2D.height = height; });
        window.onload = () => { changeLanguage(); populateKundali([[],[],[],[],[],[],[],[],[],[],[],[]], 1); init3D(); };
    </script>
