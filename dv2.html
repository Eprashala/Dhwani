<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhwani - Ancient Wisdom AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .listening-pulse { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 10px; }
        .book-checkbox { @apply w-4 h-4 text-amber-600 bg-gray-700 border-gray-600 rounded focus:ring-amber-600 focus:ring-2 ring-offset-gray-800; }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-2 md:p-4">

    <div class="bg-gray-800 rounded-2xl shadow-2xl p-4 md:p-6 w-full max-w-5xl flex flex-col h-[95vh] border-t-4 border-amber-500">
        
        <div class="flex items-center justify-between mb-4 shrink-0">
            <h1 class="text-2xl font-bold text-white">
                <span class="text-amber-500">Dhwani</span> - Wisdom Explorer
            </h1>
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-gray-500 transition-colors" title="Idle"></div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 flex-grow overflow-hidden">
            
            <div class="w-full md:w-1/3 flex flex-col gap-4 overflow-hidden">
                
                <div class="bg-gray-900 rounded-lg p-4 border border-gray-700 shrink-0">
                    <h2 class="text-sm font-semibold text-amber-400 mb-2">⚙️ System Setup</h2>
                    
                    <input type="password" id="api-key-input" class="w-full bg-black border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-amber-500 text-white placeholder-gray-500 mb-3" placeholder="Paste Groq API Key (gsk_...)">
                    
                    <label class="text-xs text-gray-400 mb-1 block">🌐 Preferred Language</label>
                    <select id="language-select" class="w-full bg-black border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-amber-500 text-white">
                        <option value="en-IN">English</option>
                        <option value="hi-IN">Hindi (हिन्दी)</option>
                        <option value="mr-IN">Marathi (मराठी)</option>
                        <option value="sa-IN">Sanskrit (संस्कृतम्)</option>
                        <option value="gu-IN">Gujarati (ગુજરાતી)</option>
                        <option value="ta-IN">Tamil (தமிழ்)</option>
                    </select>

                    <div class="flex justify-between items-center mt-3">
                        <span id="key-saved-msg" class="text-xs text-green-400 hidden">Settings Saved!</span>
                    </div>
                </div>

                <div class="bg-gray-900 rounded-lg p-4 flex flex-col border border-gray-700 overflow-y-auto custom-scrollbar flex-grow">
                    <h2 class="text-sm font-semibold text-amber-400 mb-3 border-b border-gray-700 pb-2">📚 Reference Library</h2>
                    <p class="text-xs text-gray-400 mb-3">Select books for Dhwani to reference. If none selected, general wisdom is used.</p>
                    
                    <div id="library-container" class="space-y-4 text-sm text-gray-300">
                        </div>
                </div>
            </div>

            <div class="w-full md:w-2/3 flex flex-col gap-3 h-full">
                
                <div class="flex gap-2 shrink-0 bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <input type="text" id="user-name" class="w-2/3 bg-black border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-amber-500" placeholder="Your Name">
                    <input type="number" id="user-age" class="w-1/3 bg-black border border-gray-600 rounded px-3 py-2 text-sm outline-none focus:border-amber-500" placeholder="Age (e.g. 25)">
                </div>

                <div id="conversation-log" class="flex-grow overflow-y-auto bg-black rounded-lg p-4 border border-gray-700 space-y-4 shadow-inner custom-scrollbar">
                    <div class="text-gray-500 text-center mt-10 text-sm">
                        Enter your setup details, select your texts, and begin the conversation.<br>
                        <span class="text-amber-600/70">"I am Dhwani. Let us explore the ancient sciences."</span>
                    </div>
                </div>

                <div class="flex gap-2 shrink-0">
                    <input type="text" id="text-input" class="flex-grow bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 outline-none focus:border-amber-500 transition-colors" placeholder="Type your question here...">
                    
                    <button id="mute-btn" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-all focus:outline-none" title="Toggle Voice Output">
                        <svg id="icon-vol-on" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
                        </svg>
                        <svg id="icon-vol-off" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 hidden text-red-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
                        </svg>
                    </button>

                    <button id="voice-btn" class="bg-gray-700 hover:bg-amber-600 text-white p-3 rounded-lg transition-all focus:outline-none" title="Hold to Speak">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z" />
                        </svg>
                    </button>

                    <button id="send-text-btn" class="bg-amber-600 hover:bg-amber-500 text-white px-5 rounded-lg font-bold transition-colors">
                        Send
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // API CONFIGURATION (Matched to Sanjeevani)
        // ==========================================
        const API_URL = "https://api.groq.com/openai/v1/chat/completions"; 
        const MODEL_NAME = "meta-llama/llama-4-scout-17b-16e-instruct"; 

        // Language Mapping for System Prompt
        const languageMap = {
            "en-IN": "English",
            "hi-IN": "Hindi",
            "mr-IN": "Marathi",
            "sa-IN": "Sanskrit",
            "gu-IN": "Gujarati",
            "ta-IN": "Tamil"
        };

        // Library Data Structure
        const library = {
            "The Four Vedas": ["Rigveda", "Yajurveda", "Samaveda", "Atharvaveda"],
            "Upanishads": ["Isha", "Kena", "Katha", "Prashna", "Mundaka", "Mandukya", "Taittiriya", "Aitareya", "Chandogya", "Brihadaranyaka"],
            "Mahapuranas": ["Brahma Purana", "Padma Purana", "Vishnu Purana", "Shiva Purana", "Bhagavata Purana", "Narada Purana", "Markandeya Purana", "Agni Purana", "Bhavishya Purana", "Brahmavaivarta Purana", "Linga Purana", "Varaha Purana", "Skanda Purana", "Vamana Purana", "Kurma Purana", "Matsya Purana", "Garuda Purana", "Brahmanda Purana"],
            "Upapuranas": ["Sanatkumara", "Narasimha", "Brihannaradiya", "Sivarahasya", "Durvasa", "Kapila", "Bhargava", "Varuna", "Kalika", "Samba", "Nandi", "Surya", "Parasara", "Vasishtha", "Devi-Bhagavata", "Ganesa", "Hamsa"],
            "Samhitas": ["Sushruta Samhita", "Charaka Samhita", "Kashyap Samhita", "Shiva Samhita", "Gheranda Samhita", "Yoga Yajnavalkya Samhita", "Brihat Samhita", "Garga Samhita", "Bhrigu Samhita", "Satvata Samhita", "Shandilya Samhita", "Agastya Samhita"],
            "Itihasa (Epics)": ["Ramayana", "Mahabharata", "Bhagavad Gita"]
        };

        // Render Library UI
        const libraryContainer = document.getElementById('library-container');
        for (const [category, books] of Object.entries(library)) {
            let html = `
                <div class="mb-2">
                    <div class="font-bold text-amber-500 mb-1 border-b border-gray-700/50">${category}</div>
                    <div class="pl-2 space-y-1">
            `;
            books.forEach(book => {
                html += `
                    <label class="flex items-center gap-2 cursor-pointer hover:text-white">
                        <input type="checkbox" value="${book}" class="book-checkbox select-book">
                        <span>${book}</span>
                    </label>
                `;
            });
            html += `</div></div>`;
            libraryContainer.innerHTML += html;
        }

        // UI State Management
        const ui = {
            log: document.getElementById('conversation-log'),
            textInput: document.getElementById('text-input'),
            sendBtn: document.getElementById('send-text-btn'),
            voiceBtn: document.getElementById('voice-btn'),
            muteBtn: document.getElementById('mute-btn'),
            iconVolOn: document.getElementById('icon-vol-on'),
            iconVolOff: document.getElementById('icon-vol-off'),
            status: document.getElementById('status-indicator'),
            name: document.getElementById('user-name'),
            age: document.getElementById('user-age'),
            apiKey: document.getElementById('api-key-input'),
            language: document.getElementById('language-select'),
            keyMsg: document.getElementById('key-saved-msg')
        };

        let chatHistory = [];
        let systemInstruction = "";
        let recognition;
        let isMuted = false;

        // --- LOCAL STORAGE LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('dhwani_api_key');
            const savedName = localStorage.getItem('dhwani_user_name');
            const savedAge = localStorage.getItem('dhwani_user_age');
            const savedLang = localStorage.getItem('dhwani_language');
            const savedMute = localStorage.getItem('dhwani_mute_state');

            if (savedKey) ui.apiKey.value = savedKey;
            if (savedName) ui.name.value = savedName;
            if (savedAge) ui.age.value = savedAge;
            if (savedLang) ui.language.value = savedLang;
            if (savedMute === 'true') {
                isMuted = true;
                updateMuteUI();
            }
        });

        function saveSettings() {
            localStorage.setItem('dhwani_api_key', ui.apiKey.value.trim());
            localStorage.setItem('dhwani_user_name', ui.name.value.trim());
            localStorage.setItem('dhwani_user_age', ui.age.value.trim());
            localStorage.setItem('dhwani_language', ui.language.value);
            localStorage.setItem('dhwani_mute_state', isMuted);
            
            ui.keyMsg.classList.remove('hidden');
            setTimeout(() => ui.keyMsg.classList.add('hidden'), 2000);
        }

        ui.apiKey.addEventListener('input', saveSettings);
        ui.name.addEventListener('input', saveSettings);
        ui.age.addEventListener('input', saveSettings);
        ui.language.addEventListener('change', saveSettings);

        // --- MUTE TOGGLE LOGIC ---
        function updateMuteUI() {
            if (isMuted) {
                ui.iconVolOn.classList.add('hidden');
                ui.iconVolOff.classList.remove('hidden');
                ui.muteBtn.classList.replace('bg-gray-700', 'bg-red-900/50');
            } else {
                ui.iconVolOn.classList.remove('hidden');
                ui.iconVolOff.classList.add('hidden');
                ui.muteBtn.classList.replace('bg-red-900/50', 'bg-gray-700');
            }
        }

        ui.muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            updateMuteUI();
            saveSettings();
            if (isMuted && window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
        });

        // --- SPEECH RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                ui.voiceBtn.classList.add('listening-pulse', 'bg-amber-600');
                ui.voiceBtn.classList.remove('bg-gray-700');
                ui.textInput.placeholder = "Listening...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                processInput(transcript);
            };

            recognition.onend = () => {
                ui.voiceBtn.classList.remove('listening-pulse', 'bg-amber-600');
                ui.voiceBtn.classList.add('bg-gray-700');
                ui.textInput.placeholder = "Type your question here...";
            };
        } else {
            ui.voiceBtn.style.display = 'none';
        }

        // --- EVENT LISTENERS ---
        ui.voiceBtn.addEventListener('click', () => {
            if (recognition) {
                recognition.lang = ui.language.value;
                recognition.start();
            }
        });

        ui.sendBtn.addEventListener('click', () => {
            const text = ui.textInput.value.trim();
            if (text) {
                ui.textInput.value = '';
                processInput(text);
            }
        });

        ui.textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ui.sendBtn.click();
        });

        // --- CORE LOGIC ---
        function getSelectedBooks() {
            const checkboxes = document.querySelectorAll('.select-book:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function buildPrompt() {
            const userName = ui.name.value.trim() || "Seeker";
            const userAge = parseInt(ui.age.value) || 25;
            const selectedLanguageName = languageMap[ui.language.value] || "English";
            const selectedBooks = getSelectedBooks();
            
            let ageDirectives = "";
            if (userAge <= 12) {
                ageDirectives = `The user is a child (${userAge} years old). Explain concepts using extremely simple analogies, nature, and storytelling. Keep sentences short.`;
            } else if (userAge <= 18) {
                ageDirectives = `The user is a teenager (${userAge} years old). Bridge ancient wisdom with basic physics, biology, or psychology.`;
            } else {
                ageDirectives = `The user is an adult (${userAge} years old). Provide in-depth scientific reasoning, exploring quantum correlations and deep metaphysical theories.`;
            }

            let bookDirectives = "You may draw upon general ancient Indian wisdom.";
            if (selectedBooks.length > 0) {
                bookDirectives = `CRITICAL RULE: You MUST use ONLY the following texts as your reference: ${selectedBooks.join(', ')}. Base your answers entirely on the most ancient and original copies of these texts.`;
            }

            systemInstruction = `
                You are Dhwani, an AI guide dedicated to making ancient Indian wisdom accessible and scientifically grounded.
                User: ${userName}, Age: ${userAge}.
                
                ${ageDirectives}
                
                ${bookDirectives}
                
                OUTPUT LANGUAGE: You MUST respond entirely in ${selectedLanguageName}. Do not translate Sanskrit verses, but explain them in ${selectedLanguageName}.
                
                FORMATTING RULES:
                1. Acknowledge the user by name.
                2. Provide the ancient verse/reference.
                3. Provide the literal translation.
                4. Provide the "Deeper Scientific Reasoning".
                5. Do NOT use markdown brackets like [ ] or < >.
            `;
        }

        async function processInput(text) {
            const apiKey = ui.apiKey.value.trim();
            
            if (!apiKey) {
                logMessage('System', 'Please enter your API key in the System Setup panel to continue.', 'ai');
                return;
            }

            logMessage(ui.name.value || 'You', text, 'user');
            ui.status.className = 'w-3 h-3 rounded-full bg-yellow-400'; 
            
            buildPrompt();
            
            chatHistory.push({ role: 'user', content: text });

            const responseText = await fetchLlamaResponse(apiKey);
            
            if (responseText) {
                chatHistory.push({ role: 'assistant', content: responseText });
                logMessage('Dhwani', responseText, 'ai');
                speakText(responseText);
            }
            
            ui.status.className = 'w-3 h-3 rounded-full bg-gray-500'; 
        }

        // Exact match to Sanjeevani Groq Fetch Logic
        async function fetchLlamaResponse(apiKey) {
            try {
                // Clean key just in case spaces were copied
                const cleanKey = apiKey.replace(/^Bearer\s+/i, '').trim();
                
                const messages = [
                    { role: "system", content: systemInstruction },
                    ...chatHistory
                ];

                const response = await fetch(API_URL, {
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${cleanKey}` 
                    },
                    body: JSON.stringify({ 
                        model: MODEL_NAME, 
                        messages: messages,
                        temperature: 0.6,
                        max_tokens: 1500
                    })
                });

                const data = await response.json(); 
                
                if (data.error) {
                    throw new Error(data.error.message || "Unknown API Error");
                }

                return data.choices[0].message.content.trim();
                
            } catch (error) {
                console.error("API Error:", error);
                logMessage('System Error', `Error: ${error.message}. Please check your API key.`, 'ai');
                return null;
            }
        }

        function logMessage(sender, text, type) {
            const div = document.createElement('div');
            const isUser = type === 'user';
            
            div.innerHTML = `
                <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'}">
                    <span class="text-xs ${isUser ? 'text-gray-400' : 'text-amber-500'} mb-1">${sender}</span>
                    <div class="px-4 py-2 rounded-lg max-w-[85%] ${isUser ? 'bg-gray-700 text-white' : 'bg-gray-800 text-amber-50 border border-amber-900/50'}">
                        ${text.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
            ui.log.appendChild(div);
            ui.log.scrollTop = ui.log.scrollHeight;
        }

        function speakText(text) {
            if (isMuted) return;

            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();
            
            const cleanText = text.replace(/[*_#]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = ui.language.value; 
            utterance.rate = 0.9;
            
            synth.speak(utterance);
        }
    </script>
</body>
</html>
