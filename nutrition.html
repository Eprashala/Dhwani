<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eprashala Nutrition Calculator — AI Meal Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0c;
    --surface: #161810;
    --card: #1c1e18;
    --border: #2a2d24;
    --accent: #c8f060;
    --accent2: #f0a830;
    --accent3: #60d4f0;
    --muted: #5a5f4e;
    --text: #e8ead8;
    --text2: #9aa08a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 56px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 16px;
  }

  /* Upload Zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 20px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200, 240, 96, 0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: #1a1c16;
  }

  .upload-zone:hover::before {
    background: radial-gradient(ellipse at 50% 0%, rgba(200, 240, 96, 0.1) 0%, transparent 70%);
  }

  .upload-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: var(--card);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .upload-zone:hover .upload-icon {
    border-color: var(--accent);
    background: rgba(200, 240, 96, 0.08);
  }

  .upload-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    transition: transform 0.3s ease;
  }

  .upload-zone:hover .upload-icon svg {
    transform: translateY(-3px);
  }

  .upload-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  .upload-sub {
    font-size: 0.85rem;
    color: var(--text2);
    font-weight: 300;
  }

  .upload-btn {
    margin-top: 24px;
    display: inline-block;
    background: var(--accent);
    color: #0e0f0c;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }

  .upload-btn:hover {
    background: #d4f570;
    transform: translateY(-1px);
  }

  #fileInput { display: none; }

  /* Preview */
  .preview-wrap {
    display: none;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .preview-wrap.visible { display: block; }

  .preview-wrap img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
  }

  .preview-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 24px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .preview-filename {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
  }

  .change-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: none;
    border: 1px solid rgba(200,240,96,0.3);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }

  .change-btn:hover { background: rgba(200,240,96,0.1); }

  /* Analyze Button */
  .analyze-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0e0f0c;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
    margin-bottom: 40px;
  }

  .analyze-btn.visible { display: block; }
  .analyze-btn:hover { background: #d4f570; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px;
  }

  .loading.visible { display: block; }

  .loading-ring {
    width: 56px;
    height: 56px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .meal-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .meal-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .meal-desc {
    font-size: 0.9rem;
    color: var(--text2);
    line-height: 1.6;
    font-weight: 300;
    max-width: 620px;
  }

  /* Calorie Hero */
  .calorie-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .calorie-hero::before {
    content: '';
    position: absolute;
    right: -40px;
    top: -40px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(200,240,96,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .calorie-info { flex: 1; }

  .calorie-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .calorie-value {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
  }

  .calorie-unit {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .calorie-breakdown {
    display: flex;
    gap: 20px;
  }

  .cal-badge {
    text-align: center;
    padding: 14px 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .cal-badge-val {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .cal-badge-lbl {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  /* Macro Grid */
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 32px;
  }

  .macro-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .macro-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s;
  }

  .macro-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent2);
  }

  .macro-card .accent-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .macro-card.protein .accent-line { background: #60d4f0; }
  .macro-card.fat .accent-line { background: #f0a830; }
  .macro-card.carbs .accent-line { background: #c8f060; }

  .macro-icon {
    font-size: 1.4rem;
    margin-bottom: 10px;
  }

  .macro-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .macro-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .macro-card.protein .macro-val { color: #60d4f0; }
  .macro-card.fat .macro-val { color: #f0a830; }
  .macro-card.carbs .macro-val { color: #c8f060; }

  .macro-sub {
    font-size: 0.75rem;
    color: var(--text2);
    font-weight: 300;
    line-height: 1.5;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* Bar for macro */
  .macro-bar-wrap {
    margin-top: 8px;
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .macro-bar {
    height: 100%;
    border-radius: 100px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .macro-card.protein .macro-bar { background: #60d4f0; }
  .macro-card.fat .macro-bar { background: #f0a830; }
  .macro-card.carbs .macro-bar { background: #c8f060; }

  /* Micros Grid */
  .micros-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .micro-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s;
  }

  .micro-card:hover { border-color: var(--border); }

  .micro-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .micro-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .micro-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .micro-items {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .micro-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
  }

  .micro-item-name {
    color: var(--text2);
    font-weight: 300;
  }

  .micro-item-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text);
    font-weight: 500;
  }

  .micro-item-bar {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 100px;
    margin: 0 12px;
    overflow: hidden;
  }

  .micro-item-fill {
    height: 100%;
    border-radius: 100px;
  }

  /* Ingredients */
  .ingredients-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .ingredient-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .ingredient-row:last-child { border-bottom: none; }
  .ingredient-row:hover { background: var(--surface); }

  .ing-name {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 400;
  }

  .ing-amount {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .ing-cal {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
    background: rgba(200,240,96,0.08);
    padding: 3px 10px;
    border-radius: 100px;
  }

  /* Health Notes */
  .health-notes {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .health-note {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.6;
    font-weight: 300;
  }

  .health-note:last-child { margin-bottom: 0; }

  .note-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* Disclaimer */
  .disclaimer {
    margin-top: 40px;
    padding: 16px 20px;
    background: rgba(240,168,48,0.06);
    border: 1px solid rgba(240,168,48,0.2);
    border-radius: 12px;
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.6;
    font-weight: 300;
  }

  .disclaimer strong {
    color: var(--accent2);
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(240,96,96,0.06);
    border: 1px solid rgba(240,96,96,0.25);
    border-radius: 14px;
    padding: 20px 24px;
    font-size: 0.85rem;
    color: #f07060;
    font-weight: 300;
    margin-bottom: 24px;
  }

  .error-box.visible { display: block; }

  /* Scan Again */
  .scan-again-btn {
    margin-top: 32px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .scan-again-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 600px) {
    .macro-grid { grid-template-columns: 1fr; }
    .micros-grid { grid-template-columns: 1fr; }
    .calorie-hero { flex-direction: column; gap: 24px; align-items: flex-start; }
    .calorie-breakdown { flex-wrap: wrap; }
    .meal-name { font-size: 1.5rem; }
    .calorie-value { font-size: 3rem; }
    header { flex-direction: column; gap: 8px; }
    .tagline { border-left: none; padding-left: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Eprashala <span>Nutrition Calculator</span></div>
    <div class="tagline">AI-Powered Meal Analysis</div>
  </header>

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-title">Drop your meal photo here</div>
    <div class="upload-sub">Snap a photo or upload from your gallery — we'll do the rest</div>
    <label class="upload-btn" for="fileInput">Choose Photo</label>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </div>

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="Meal preview">
    <div class="preview-overlay">
      <span class="preview-filename" id="previewName"></span>
      <button class="change-btn" onclick="resetUpload()">Change Photo</button>
    </div>
  </div>

  <!-- Analyze Button -->
  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeMeal()">
    ⚡ Analyze Nutrition
  </button>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text" id="loadingText">Identifying meal components...</div>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>
</div>

<script>
let currentFile = null;
let currentBase64 = null;

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const previewName = document.getElementById('previewName');
const analyzeBtn = document.getElementById('analyzeBtn');
const loading = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');
const results = document.getElementById('results');
const errorBox = document.getElementById('errorBox');

// Drag & drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  currentFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentBase64 = dataUrl.split(',')[1];
    previewImg.src = dataUrl;
    previewName.textContent = file.name;
    uploadZone.style.display = 'none';
    previewWrap.classList.add('visible');
    analyzeBtn.classList.add('visible');
    errorBox.classList.remove('visible');
    results.classList.remove('visible');
    results.innerHTML = '';
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  currentFile = null;
  currentBase64 = null;
  fileInput.value = '';
  uploadZone.style.display = 'block';
  previewWrap.classList.remove('visible');
  analyzeBtn.classList.remove('visible');
  loading.classList.remove('visible');
  results.classList.remove('visible');
  results.innerHTML = '';
  errorBox.classList.remove('visible');
}

const loadingMessages = [
  'Identifying meal components...',
  'Estimating portion sizes...',
  'Calculating macronutrients...',
  'Analyzing vitamins & minerals...',
  'Compiling nutrition report...'
];
let msgIdx = 0;
let msgInterval = null;

function startLoadingMessages() {
  msgIdx = 0;
  loadingText.textContent = loadingMessages[0];
  msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    loadingText.textContent = loadingMessages[msgIdx];
  }, 1800);
}

function stopLoadingMessages() {
  if (msgInterval) { clearInterval(msgInterval); msgInterval = null; }
}

async function analyzeMeal() {
  if (!currentBase64) return;

  analyzeBtn.disabled = true;
  loading.classList.add('visible');
  results.classList.remove('visible');
  errorBox.classList.remove('visible');
  startLoadingMessages();

  const prompt = `You are a professional nutritionist and dietitian. Analyze this meal photo with high accuracy.

Respond ONLY with a valid JSON object (no markdown, no backticks, no explanation outside JSON).

JSON format:
{
  "meal_name": "Name of the meal",
  "description": "Brief description of what you see",
  "total_calories": 520,
  "serving_note": "Estimated portion size",
  "macronutrients": {
    "protein": { "grams": 28, "calories": 112, "notes": "Sources and details" },

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: currentFile.type || "image/jpeg", data: currentBase64 } },
            { type: "text", text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const nutrition = JSON.parse(clean);
    renderResults(nutrition);
  } catch (err) {
    errorBox.textContent = '⚠ ' + (err.message || 'Failed to analyze. Please try again.');
    errorBox.classList.add('visible');
  } finally {
    stopLoadingMessages();
    loading.classList.remove('visible');
    analyzeBtn.disabled = false;

function pct(value, total) {
  return Math.min(100, Math.round((value / total) * 100));
}

function dvColor(pct) {
  if (pct >= 40) return '#c8f060';
  if (pct >= 20) return '#f0a830';
  return '#60d4f0';
}

function renderResults(n) {
  const macro = n.macronutrients;
  const totalMacroG = macro.protein.grams + macro.fat.grams + macro.carbohydrates.grams;

  const vitHtml = n.vitamins.map(v => `
    <div class="micro-item">
      <span class="micro-item-name">${v.name}</span>
      <div class="micro-item-bar"><div class="micro-item-fill" style="width:${v.dv_percent}%;background:${dvColor(v.dv_percent)}"></div></div>
      <span class="micro-item-val">${v.amount} <span style="color:var(--muted);font-size:0.65rem">${v.dv_percent}%DV</span></span>
    </div>
  `).join('');

  const minHtml = n.minerals.map(m => `
    <div class="micro-item">
      <span class="micro-item-name">${m.name}</span>
      <div class="micro-item-bar"><div class="micro-item-fill" style="width:${m.dv_percent}%;background:${dvColor(m.dv_percent)}"></div></div>
      <span class="micro-item-val">${m.amount} <span style="color:var(--muted);font-size:0.65rem">${m.dv_percent}%DV</span></span>
    </div>
  `).join('');

  const ingHtml = n.ingredients.map(i => `
    <div class="ingredient-row">
      <span class="ing-name">${i.name}</span>
      <span class="ing-amount">${i.amount}</span>
      <span class="ing-cal">${i.calories} kcal</span>
    </div>
  `).join('');

  const notesHtml = n.health_notes.map(note => `
    <div class="health-note"><div class="note-dot"></div><span>${note}</span></div>
  `).join('');

  results.innerHTML = `
    <div class="meal-header">
      <div class="meal-label">✦ Identified Meal</div>
      <div class="meal-name">${n.meal_name}</div>
      <div class="meal-desc">${n.description}</div>
    </div>

    <div class="calorie-hero">
      <div class="calorie-info">
        <div class="calorie-label">Total Energy</div>
        <div class="calorie-value">${n.total_calories}</div>
        <div class="calorie-unit">kcal · ${n.serving_note}</div>
      </div>
      <div class="calorie-breakdown">
        <div class="cal-badge">
          <div class="cal-badge-val" style="color:#60d4f0">${macro.protein.calories}</div>
          <div class="cal-badge-lbl">Protein kcal</div>
        </div>
        <div class="cal-badge">
          <div class="cal-badge-val" style="color:#f0a830">${macro.fat.calories}</div>
          <div class="cal-badge-lbl">Fat kcal</div>
        </div>
        <div class="cal-badge">
          <div class="cal-badge-val" style="color:#c8f060">${macro.carbohydrates.calories}</div>
          <div class="cal-badge-lbl">Carb kcal</div>
        </div>
      </div>
    </div>

    <div class="section-title">Macronutrients</div>
    <div class="macro-grid">
      <div class="macro-card protein">
        <div class="accent-line"></div>
        <div class="macro-icon">🥩</div>
        <div class="macro-name">Protein</div>
        <div class="macro-val">${macro.protein.grams}g</div>
        <div class="macro-bar-wrap"><div class="macro-bar" style="width:${pct(macro.protein.grams, totalMacroG)}%"></div></div>
        <div class="macro-sub">${macro.protein.notes}</div>
      </div>
      <div class="macro-card fat">
        <div class="accent-line"></div>
        <div class="macro-icon">🧈</div>
        <div class="macro-name">Total Fat</div>
        <div class="macro-val">${macro.fat.grams}g</div>
        <div class="macro-bar-wrap"><div class="macro-bar" style="width:${pct(macro.fat.grams, totalMacroG)}%"></div></div>
        <div class="macro-sub">Saturated: ${macro.fat.saturated}g · Unsaturated: ${macro.fat.unsaturated}g · Trans: ${macro.fat.trans}g<br>${macro.fat.notes}</div>
      </div>
      <div class="macro-card carbs">
        <div class="accent-line"></div>
        <div class="macro-icon">🌾</div>
        <div class="macro-name">Carbohydrates</div>
        <div class="macro-val">${macro.carbohydrates.grams}g</div>
        <div class="macro-bar-wrap"><div class="macro-bar" style="width:${pct(macro.carbohydrates.grams, totalMacroG)}%"></div></div>
        <div class="macro-sub">Fiber: ${macro.carbohydrates.fiber}g · Sugar: ${macro.carbohydrates.sugar}g · Starch: ${macro.carbohydrates.starch}g<br>${macro.carbohydrates.notes}</div>
      </div>
    </div>

    <div class="section-title">Micronutrients — Vitamins & Minerals</div>
    <div class="micros-grid">
      <div class="micro-card">
        <div class="micro-header">
          <div class="micro-title"><div class="micro-dot" style="background:#f0a830"></div>Vitamins</div>
        </div>
        <div class="micro-items">${vitHtml}</div>
      </div>
      <div class="micro-card">
        <div class="micro-header">
          <div class="micro-title"><div class="micro-dot" style="background:#60d4f0"></div>Minerals</div>
        </div>
        <div class="micro-items">${minHtml}</div>
      </div>
    </div>

    <div class="section-title">Ingredients Breakdown</div>
    <div class="ingredients-list">${ingHtml}</div>

    <div class="section-title">Health Insights</div>
    <div class="health-notes">${notesHtml}</div>

    <div class="disclaimer">
      <strong>⚠ Accuracy Note</strong>
      Values are AI estimates based on visual analysis and USDA nutritional data. Actual nutrition may vary by ±15–25% depending on exact ingredients, cooking methods, and portion sizes. For medical or dietary planning, consult a registered dietitian.
    </div>

    <button class="scan-again-btn" onclick="resetUpload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
      Scan Another Meal
    </button>
  `;

  results.classList.add('visible');

  // Animate bars after render
  setTimeout(() => {
    results.querySelectorAll('.macro-bar').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      requestAnimationFrame(() => { bar.style.width = w; });
    });
  }, 100);
}
</script>
