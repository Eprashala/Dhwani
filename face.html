<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samudrika Shastra & Astrological Profiling Engine</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        header h1 {
            color: var(--accent-gold);
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 968px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        /* Camera & Upload Styles */
        .media-container {
            position: relative;
            width: 100%;
            height: 320px;
            background-color: var(--bg-primary);
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        #video-preview, #image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #image-preview {
            display: none;
        }

        .media-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #475569;
        }

        .btn-primary {
            background-color: var(--accent-gold);
            color: var(--bg-primary);
            grid-column: span 2;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: #f59e0b;
            opacity: 0.9;
        }

        /* Report / Output Styles */
        .report-section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: var(--bg-primary);
            border-left: 4px solid var(--accent-gold);
            border-radius: 0 8px 8px 0;
        }

        .report-section h3 {
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .citation {
            font-size: 0.8rem;
            background-color: var(--border-color);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: #e2e8f0;
            font-style: italic;
        }

        .verse-text {
            font-family: 'Georgia', serif;
            font-size: 0.95rem;
            color: #cbd5e1;
            margin: 0.5rem 0;
            padding-left: 0.5rem;
            border-left: 2px solid #475569;
        }

        .analysis-text {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .status-message {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 4rem 0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Physical & Astrological Evaluation Engine</h1>
        <p>Integrative Synchronization of Deep Facial Metrics with Canonical Vedic Treatises</p>
    </header>

    <div class="grid-layout">
        <!-- Input & Capture Panel -->
        <div class="panel">
            <h2>Data Acquisition Pipeline</h2>
            <form id="analysisForm" onsubmit="executeAnalysis(event)">
                
                <label>High-Resolution Target Capture</label>
                <div class="media-container">
                    <video id="video-preview" autoplay playsinline></video>
                    <img id="image-preview" alt="Captured target template">
                </div>

                <div class="media-controls">
                    <button type="button" class="btn-secondary" onclick="initializeCamera()">Start Camera</button>
                    <button type="button" class="btn-secondary" onclick="captureSnapshot()">Capture Frame</button>
                    <input type="file" id="file-upload" accept="image/*" onchange="handleImageUpload(event)" style="display: no
