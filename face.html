<script>
    let streamReference = null;

    async function initializeCamera() {
        const video = document.getElementById('video-preview');
        const img = document.getElementById('image-preview');
        
        // Reset display states
        img.style.display = 'none';
        video.style.display = 'block';

        try {
            // Stop any existing stream before starting a new one
            if (streamReference) {
                streamReference.getTracks().forEach(track => track.stop());
            }

            // Use 'ideal' so it doesn't fail if exact 720p isn't supported by the webcam
            streamReference = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 }, 
                    facingMode: "user" 
                } 
            });
            
            video.srcObject = streamReference;
            
            // Explicitly call play() to bypass strict browser autoplay policies
            await video.play();
            
        } catch (err) {
            alert("Camera access denied or unavailable. Please check browser permissions.");
            console.error("Camera Init Error:", err);
        }
    }

    function captureSnapshot() {
        const video = document.getElementById('video-preview');
        const img = document.getElementById('image-preview');
        
        // 1. Check if the camera was actually started
        if (!streamReference) {
            alert("Please start the camera first.");
            return;
        }

        // 2. Ensure video metadata has loaded so we don't draw a 0x0 canvas
        if (video.videoWidth === 0 || video.videoHeight === 0) {
            alert("Camera hardware is still initializing. Please wait one second and try again.");
            return;
        }

        try {
            // Create canvas matching actual video feed dimensions
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            // Draw the current video frame onto the canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Extract the image data
            const imageDataUrl = canvas.toDataURL('image/png');

            // Failsafe: check if canvas returned an empty string
            if (imageDataUrl === 'data:,') {
                alert("Failed to capture image. Canvas data is empty.");
                return;
            }

            // Apply to image tag and swap visibility
            img.src = imageDataUrl;
            video.style.display = 'none';
            img.style.display = 'block';
            
            // 3. Stop the camera stream to free up system memory/battery
            streamReference.getTracks().forEach(track => track.stop());
            streamReference = null; // Clear reference so the app knows the camera is off

        } catch (error) {
            console.error("Snapshot Error:", error);
            alert("An error occurred while processing the image frame.");
        }
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('image-preview');
            const video = document.getElementById('video-preview');
            
            // If camera is running, shut it down when user uploads a file instead
            if (streamReference) {
                streamReference.getTracks().forEach(track => track.stop());
                streamReference = null;
            }
            
            video.style.display = 'none';
            img.style.display = 'block';
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function executeAnalysis(event) {
        event.preventDefault();
        
        // Basic validation to ensure an image is actually present before analyzing
        const img = document.getElementById('image-preview');
        if (img.style.display === 'none' || !img.src || img.src === '') {
            alert("Please capture a photo or upload an image before executing the analysis.");
            return;
        }
        
        document.getElementById('status-placeholder').classList.add('hidden');
        const results = document.getElementById('results-container');
        results.classList.remove('hidden');
        
        // The mock results injection remains the same
        results.innerHTML = `
            <div class="report-section">
                <h3>
                    <span>1. Craniofacial Symmetry & Forehead Geometry</span>
                    <span class="citation">Brihat Samhita, Ch. 68, Verse 12</span>
                </h3>
                <div class="verse-text">
                    "अन्विद्धा विपुलाः शङ्खास्त्र्यश्राश्च सुकुमारकाः। अर्धेन्दुसदृशाश्चैव ललाटा मानवाधिपान्॥"
                </div>
                <div class="analysis-text">
                    <strong>Metric Extraction:</strong> Broad, smooth, semi-circular forehead boundary curve (2.4:1 ratio). Horizontal rekhās scanning reveals two clearly defined, deep uninterrupted lines corresponding to standard Jupiter and Sun markers. Indicative of highly structured analytical capacity, robust logical processing, and baseline administrative stability.
                </div>
            </div>

            <!-- Remaining mock sections... -->
            <div class="report-section">
                <h3>
                    <span>2. Ocular Proportions & Gaze Stability</span>
                    <span class="citation">Garuda Purana, Vol 1, Ch. 65, p. 192</span>
                </h3>
                <div class="verse-text">
                    "स्निग्धाः समाः समायूता विपुलाः कृष्णतारकाः। नयनाः स्युः सुखावह नराणां न च संशयाः॥"
                </div>
                <div class="analysis-text">
                    <strong>Metric Extraction:</strong> Clear iris boundaries with normal sclera visibility. High structural fixity and blink-rate moderation during recording indicate high sustained focus, baseline emotional resiliency, and a high processing capacity for intricate patterns—excellent indicators for specialized analytical engineering roles.
                </div>
            </div>
        `;
    }
</script>
