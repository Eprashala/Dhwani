<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Cryptographic Tarot Oracle</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="card.js"></script> 
    
    <style>
        :root { --gold: #d4af37; --dark: #12121a; --surface: #1e1e28; --light: #e0e0e5; }
        body { background-color: var(--dark); color: var(--light); font-family: 'Georgia', serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: var(--gold); letter-spacing: 2px; font-weight: normal; margin-bottom: 5px; }
        
        .top-bar { display: flex; justify-content: flex-end; padding: 10px; max-width: 800px; margin: 0 auto; }
        select { background: var(--surface); color: var(--light); border: 1px solid var(--gold); padding: 8px; border-radius: 5px; font-family: 'Georgia', serif; cursor: pointer; }

        .ritual-box { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; max-width: 600px; margin: 20px auto 30px auto; padding: 20px; font-style: italic; color: #aaa; line-height: 1.6; }

        .intention-wrapper { max-width: 600px; margin: 0 auto 30px auto; display: flex; align-items: flex-start; gap: 10px; }
        textarea { flex-grow: 1; height: 80px; background: var(--surface); color: var(--light); border: 1px solid #333; border-radius: 8px; padding: 15px; font-family: 'Arial', sans-serif; font-size: 1rem; resize: none; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--gold); }
        
        .mic-btn { background: #333; border: 1px solid var(--gold); color: var(--gold); border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .mic-btn:hover { background: var(--gold); color: var(--dark); }
        .recording { background: red !important; color: white !important; border-color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        button { background-color: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px 24px; font-size: 1rem; font-family: 'Georgia', serif; cursor: pointer; transition: all 0.3s ease; border-radius: 5px; margin: 5px; }
        button:hover:not(:disabled) { background-color: var(--gold); color: var(--dark); }
        button:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #555; background: transparent; }
        .btn-primary { border: 2px solid var(--gold); font-weight: bold; }

        #controlsArea { margin-bottom: 20px; }
        #shuffleArea { margin: 10px auto 30px auto; height: 130px; display: flex; justify-content: center; align-items: center; position: relative; }
        .card-back { width: 80px; height: 120px; background: repeating-linear-gradient(45deg, #1e1e28, #1e1e28 10px, #333 10px, #333 20px); border: 2px solid var(--gold); border-radius: 8px; position: absolute; box-shadow: 0 4px 8px rgba(0,0,0,0.5); transition: transform 0.3s; }
        .shuffle-anim .card-back:nth-child(1) { animation: slideLeft 0.4s infinite alternate; }
        .shuffle-anim .card-back:nth-child(2) { z-index: 2; }
        .shuffle-anim .card-back:nth-child(3) { animation: slideRight 0.4s infinite alternate; }

        @keyframes slideLeft { from { transform: translateX(0) rotate(0deg); } to { transform: translateX(-40px) rotate(-10deg); } }
        @keyframes slideRight { from { transform: translateX(0) rotate(0deg); } to { transform: translateX(40px) rotate(10deg); } }

        .tarot-spread { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin-top: 20px; min-height: 450px; }
        
        .card-container { width: 260px; background: var(--surface); padding: 15px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); opacity: 0; transform: translateY(30px); animation: riseUp 0.8s forwards; display: flex; flex-direction: column; }
        @keyframes riseUp { to { opacity: 1; transform: translateY(0); } }

        .card-image { width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: block; }
        .reversed { transform: rotate(180deg); }
        .card-title { color: var(--gold); font-size: 1.1rem; margin: 15px 0 5px 0; }
        .position-label { color: var(--gold); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;}
        
        .deep-meaning { font-size: 0.85rem; color: #ccc; margin-top: 10px; line-height: 1.5; border-top: 1px solid #333; padding-top: 10px; text-align: left; flex-grow: 1; overflow-y: auto; max-height: 200px; padding-right: 5px; }
        .deep-meaning::-webkit-scrollbar { width: 5px; }
        .deep-meaning::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 5px; }
        .deep-meaning::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px; }

        #analysisSection { margin-top: 50px; display: none; opacity: 0; transition: opacity 1s; }
        .report-card { background: var(--surface); border-top: 4px solid var(--gold); max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 8px; text-align: left; line-height: 1.6; font-family: 'Arial', sans-serif; display: none; position: relative; }
        .report-card h2, .report-card h3 { color: var(--gold); font-family: 'Georgia', serif; }
        .loader { display: none; margin: 20px auto; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        
        .action-bar-top { display: flex; justify-content: flex-end; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .action-bar-bottom { display: flex; justify-content: flex-end; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-action { font-size: 0.9rem; padding: 8px 16px; border-color: #888; color: #ddd; }
    </style>
</head>
<body>

    <div class="top-bar">
        <select id="langSelect">
            <option value="en-IN">English (India)</option>
            <option value="as-IN">অসমীয়া (Assamese)</option>
            <option value="bn-IN">বাংলা (Bengali)</option>
            <option value="brx-IN">बड़ो (Bodo)</option>
            <option value="doi-IN">डोगरी (Dogri)</option>
            <option value="gu-IN">ગુજરાતી (Gujarati)</option>
            <option value="hi-IN">हिंदी (Hindi)</option>
            <option value="kn-IN">ಕನ್ನಡ (Kannada)</option>
            <option value="ks-IN">کأشُر / कॉशुर (Kashmiri)</option>
            <option value="kok-IN">कोंकणी (Konkani)</option>
            <option value="mai-IN">मैथिली (Maithili)</option>
            <option value="ml-IN">മലയാളം (Malayalam)</option>
            <option value="mni-IN">মৈতৈলোন্ (Manipuri/Meitei)</option>
            <option value="mr-IN">मराठी (Marathi)</option>
            <option value="ne-IN">नेपाली (Nepali)</option>
            <option value="or-IN">ଓଡ଼ିଆ (Odia)</option>
            <option value="pa-IN">ਪੰਜਾਬੀ (Punjabi)</option>
            <option value="sa-IN">संस्कृतम् (Sanskrit)</option>
            <option value="sat-IN">ᱥᱟᱱᱛᱟᱲᱤ (Santali)</option>
            <option value="sd-IN">سنڌي / सिंधी (Sindhi)</option>
            <option value="ta-IN">தமிழ் (Tamil)</option>
            <option value="te-IN">తెలుగు (Telugu)</option>
            <option value="ur-IN">اردو (Urdu)</option>
        </select>
    </div>

    <h1>True Tarot Oracle</h1>
    
    <div class="ritual-box">
        "Before parting the veil, close your eyes. Take a deep, cleansing breath. 
        Hold your question in your conscious mind, and when ready, speak or type your intention."
    </div>

    <div class="intention-wrapper">
        <textarea id="userQuestion" placeholder="Enter your focused question here..."></textarea>
        <button id="micBtn" class="mic-btn" title="Speak your question">🎤</button>
    </div>

    <div id="controlsArea">
        <button id="shuffleBtn" class="btn-primary">Shuffle the Deck</button>
        <button id="drawBtn" class="btn-primary" style="display:none;"></button>
    </div>

    <div id="shuffleArea" style="display:none;">
        <div id="deckVisual" style="position: relative; width: 100px; height: 120px;">
            <div class="card-back"></div>
            <div class="card-back"></div>
            <div class="card-back"></div>
        </div>
    </div>
    
    <div class="tarot-spread" id="spreadContainer"></div>

    <div id="analysisSection">
        <button id="analyzeBtn" class="btn-primary" style="padding: 15px 30px; font-size: 1.2rem;">👁️ Show Deep Analysis</button>
        <div class="loader" id="loadingSpinner"></div>
        
        <div id="pdfExportArea">
            <div class="report-card" id="reportCard">
                <div class="action-bar-top" data-html2canvas-ignore="true">
                    <button id="readAloudBtn" class="btn-action">🔊 Listen to Reading</button>
                </div>
                <div id="reportContent"></div>
                <div class="action-bar-bottom" data-html2canvas-ignore="true">
                    <button id="exportPdfBtn" class="btn-action">📄 Export to PDF</button>
                </div>
            </div>
        </div>
    </div>

	<script>
        const PROXY_BASE_URL = "https://eprashala.pythonanywhere.com";

        async function fetchGeminiChat(payloadObject) {
            const userKey = localStorage.getItem('tarot_api_key') || '';

            // TIER 1: User has their own key -> Direct browser handoff to Google
            if (userKey && userKey.trim().length > 10) {
                try {
                    console.log("Direct Route Active: Targeting gemini-flash-latest...");
                    const primaryUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${userKey.trim()}`;
                    const response = await fetch(primaryUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadObject)
                    });
                    
                    if (!response.ok) throw new Error(`Primary model status: ${response.status}`);
                    return response;

                } catch (error) {
                    console.warn("Primary channel busy/unavailable. Re-routing to fallback...", error);
                    const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${userKey.trim()}`;
                    return await fetch(fallbackUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payloadObject)
                    });
                }
            } 
            
            // TIER 2: No personal key provided -> Route to your centralized Mumbai server
            else {
                console.log("Proxy Route Active: Routing through centralized server...");
                return await fetch(`${PROXY_BASE_URL}/api/chat`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadObject)
                });
            }
        }
        
        let customApiKey = localStorage.getItem('tarot_api_key') || ""; 

        let currentSpread = [];
        let activeDeck = [];
        let currentDrawStep = 1;
        const positions = ["Past", "Present", "Future"];
        let synth = window.speechSynthesis;

        function getSecureRandomInt(min, max) {
            const buffer = new Uint32Array(1);
            window.crypto.getRandomValues(buffer);
            return Math.floor((buffer[0] / (0xffffffff + 1)) * (max - min + 1)) + min;
        }

        // --- SPEECH RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const micBtn = document.getElementById('micBtn');
        const userQuestion = document.getElementById('userQuestion');
        const langSelect = document.getElementById('langSelect');

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            micBtn.addEventListener('click', () => { recognition.lang = langSelect.value; recognition.start(); micBtn.classList.add('recording'); });
            recognition.onresult = (e) => { userQuestion.value = e.results[0][0].transcript; micBtn.classList.remove('recording'); };
            recognition.onerror = () => micBtn.classList.remove('recording');
            recognition.onend = () => micBtn.classList.remove('recording');
        } else {
            micBtn.style.display = 'none'; 
        }

        // --- CONTINUOUS SHUFFLE LOGIC ---
        document.getElementById('shuffleBtn').addEventListener('click', () => {
            if (typeof window.tarotDatabase === 'undefined' || window.tarotDatabase.length === 0) {
                alert("ERROR: The card database 'card.js' could not be found."); return; 
            }

            // If starting fresh or restarting after a reading
            if (activeDeck.length === 0 || currentDrawStep > 3) {
                activeDeck = [...window.tarotDatabase];
                currentDrawStep = 1;
                currentSpread = [];
                document.getElementById('spreadContainer').innerHTML = '';
                document.getElementById('analysisSection').style.display = 'none';
                document.getElementById('reportCard').style.display = 'none';
            }

            // Cryptographic Shuffle of ONLY the remaining cards in the deck
            for (let i = activeDeck.length - 1; i > 0; i--) {
                const j = getSecureRandomInt(0, i);
                [activeDeck[i], activeDeck[j]] = [activeDeck[j], activeDeck[i]];
            }

            // UI Animations
            const shuffleBtn = document.getElementById('shuffleBtn');
            const drawBtn = document.getElementById('drawBtn');
            const shuffleArea = document.getElementById('shuffleArea');
            const deckVisual = document.getElementById('deckVisual');

            shuffleBtn.disabled = true;
            shuffleBtn.innerText = "Infusing Energy...";
            drawBtn.style.display = 'none'; 
            shuffleArea.style.display = 'flex';
            deckVisual.classList.add('shuffle-anim');

            // Resolve animation quickly (1.5 seconds)
            setTimeout(() => {
                deckVisual.classList.remove('shuffle-anim');
                shuffleBtn.disabled = false;
                
                // Keep the option available
                shuffleBtn.innerText = currentDrawStep === 1 ? "Shuffle Again" : "Shuffle Remaining Deck"; 
                
                if (currentDrawStep <= 3) {
                    drawBtn.style.display = 'inline-block';
                    drawBtn.innerText = `Draw Card ${currentDrawStep} (${positions[currentDrawStep - 1]})`;
                }
            }, 1500); 
        });

        // --- DRAWING LOGIC ---
        document.getElementById('drawBtn').addEventListener('click', () => {
            const drawBtn = document.getElementById('drawBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const container = document.getElementById('spreadContainer');

            let isReversed = getSecureRandomInt(0, 1) === 1;
            let drawnCard = activeDeck.pop(); // Remove the drawn card from the active deck
            
            let meaning = isReversed ? drawnCard.reversed : drawnCard.upright;
            let orientationTxt = isReversed ? "(Reversed)" : "(Upright)";
            let rotationClass = isReversed ? 'reversed' : '';

            currentSpread.push({ ...drawnCard, position: positions[currentDrawStep - 1], isReversed: isReversed, activeMeaning: meaning });

            container.innerHTML += `
                <div class="card-container">
                    <div class="position-label">${positions[currentDrawStep - 1]}</div>
                    <img src="${drawnCard.img}" class="card-image ${rotationClass}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'200\\' height=\\'300\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23333\\'/></svg>'">
                    <h3 class="card-title">${drawnCard.name} <br><span style="font-size:0.8rem; color:#888;">${orientationTxt}</span></h3>
                    <div class="deep-meaning">
                        <strong style="color: var(--gold);">The Imagery:</strong><br>${drawnCard.description}<br><br>
                        <strong style="color: var(--gold);">The Energy:</strong><br>${meaning}
                    </div>
                </div>
            `;

            currentDrawStep++;
            
            if (currentDrawStep <= 3) {
                drawBtn.innerText = `Draw Card ${currentDrawStep} (${positions[currentDrawStep - 1]})`;
                shuffleBtn.innerText = "Shuffle Remaining Deck"; 
            } else {
                // All 3 drawn
                drawBtn.style.display = 'none';
                shuffleBtn.style.display = 'none'; // Hide shuffle until reading is done
                document.getElementById('shuffleArea').style.display = 'none';
                
                const analysisSection = document.getElementById('analysisSection');
                analysisSection.style.display = 'block';
                setTimeout(() => analysisSection.style.opacity = '1', 50);
                
                shuffleBtn.innerText = "Start a New Reading (Reshuffle All)";
                shuffleBtn.style.display = 'inline-block';
            }
        });

        // --- ORACLE AI INTEGRATION ---
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const question = document.getElementById('userQuestion').value.trim() || "A general reading for the current path.";
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('loadingSpinner');
            const reportCard = document.getElementById('reportCard');
            const reportContent = document.getElementById('reportContent');
            const selectedLangName = langSelect.options[langSelect.selectedIndex].text;

            btn.disabled = true; spinner.style.display = 'block'; reportCard.style.display = 'none';

            let promptText = `You are an ancient, esoteric, and strictly gender-neutral Tarot Oracle. You exist as pure cosmic consciousness, transcending human binaries. You speak with poetic, mystical, and profound empathy. The seeker has approached the veil with this intention: "${question}"

The cryptographic cosmic engine has drawn:
1. Past: ${currentSpread[0].name} (${currentSpread[0].isReversed ? 'Reversed' : 'Upright'}) - ${currentSpread[0].activeMeaning}
2. Present: ${currentSpread[1].name} (${currentSpread[1].isReversed ? 'Reversed' : 'Upright'}) - ${currentSpread[1].activeMeaning}
3. Future: ${currentSpread[2].name} (${currentSpread[2].isReversed ? 'Reversed' : 'Upright'}) - ${currentSpread[2].activeMeaning}

Speak directly to the seeker's soul. Use strictly gender-neutral language ("you"). Weave the specific visual imagery of the cards into a rich, symbolic narrative that gracefully answers their intention. Do not just list definitions; channel a true, cohesive reading. Structure the response cleanly with elegant headings.

CRITICAL INSTRUCTION: You MUST translate and write this entire reading natively in the following language: ${selectedLangName}. Ensure that the translated language also adheres to gender-neutral phrasing as much as the grammar allows.`;

		try {
                const payloadObject = { contents: [{ parts: [{ text: promptText }] }] };
                const response = await fetchGeminiChat(payloadObject);
                
                const data = await response.json();
                let readingText = data.candidates?.[0]?.content?.parts?.[0]?.text || "The Oracle is silent.";
                if (data.error) throw new Error(data.error.message);

                reportContent.innerHTML = marked.parse(readingText);
                reportContent.dataset.rawtext = readingText; 
                spinner.style.display = 'none'; reportCard.style.display = 'block'; btn.disabled = false;
            } catch (error) {
                spinner.style.display = 'none'; reportContent.innerHTML = `<p style='color:red;'>Connection disrupted. (${error.message})</p>`; reportCard.style.display = 'block'; btn.disabled = false;
            }
        });

        // --- READ ALOUD (TTS) ---
        document.getElementById('readAloudBtn').addEventListener('click', () => {
            const btn = document.getElementById('readAloudBtn');
            if (synth.speaking) { synth.cancel(); btn.innerText = "🔊 Listen to Reading"; return; }
            
            const textToSpeak = document.getElementById('reportContent').dataset.rawtext;
            if (!textToSpeak) return;
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak.replace(/[*#]/g, ''));
            const chosenLangCode = langSelect.value;
            utterance.lang = chosenLangCode;
            
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith(chosenLangCode.split('-')[0]) && v.name.includes('Female'));
            if (preferredVoice) utterance.voice = preferredVoice;
            
            utterance.rate = 0.9;
            utterance.onend = () => btn.innerText = "🔊 Listen to Reading";
            btn.innerText = "🔇 Stop Reading";
            synth.speak(utterance);
        });
        window.speechSynthesis.onvoiceschanged = () => synth.getVoices();

        // --- PDF EXPORT ---
        document.getElementById('exportPdfBtn').addEventListener('click', () => {
            html2pdf().set({ margin: 0.5, filename: 'Mystical_Tarot_Reading.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true, backgroundColor: '#1e1e28' }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } }).from(document.getElementById('pdfExportArea')).save();
        });
    </script>
</body>
</html>
