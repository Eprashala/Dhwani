<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Persona Generator (Deep Psychological BPHS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#f59e0b', bgLight: '#f8fafc', bgDark: '#0f172a' } }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bgLight); color: #1e293b; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1); }
        .search-wrapper { position: relative; width: 100%; }
        #suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #cbd5e1; border-radius: 0.5rem; max-height: 180px; overflow-y: auto; display: none; z-index: 50; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #suggestions li { padding: 10px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        #suggestions li:hover { background-color: #f59e0b; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-100">

    <div class="glass-panel w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden flex flex-col">
        <div class="bg-primary p-6 text-white text-center">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-widest flex justify-center items-center gap-2">🥭 PSYCH-PERSONA</h1>
            <p class="text-amber-100 text-sm mt-1">Deep Parashari Behavioral Profiling Engine</p>
        </div>

        <div class="p-6 space-y-6 overflow-y-auto max-h-[80vh]">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="pName" placeholder="e.g., Steve Jobs" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Friendly Name / Nickname</label>
                    <input type="text" id="pFname" placeholder="e.g., Steve" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Role / Relationship</label>
                    <input type="text" id="pRole" placeholder="e.g., Strict Mentor, Caring Sister, Sarcastic Friend" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Date of Birth</label>
                    <input type="date" id="pDate" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Time of Birth</label>
                    <input type="time" id="pTime" step="1" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div class="md:col-span-2 search-wrapper">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Place of Birth</label>
                    <input type="text" id="placeSearch" placeholder="Type city to auto-fetch coordinates..." autocomplete="off" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                    <ul id="suggestions"></ul>
                </div>
                
                <div class="hidden">
                    <input type="text" id="lat" readonly>
                    <input type="text" id="lon" readonly>
                </div>
            </div>

            <button id="btnGenerate" class="w-full bg-primary hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg flex justify-center items-center gap-2">
                ✨ Synthesize Psychological Profile
            </button>
            <p id="statusMsg" class="text-center text-sm font-semibold text-slate-600 hidden"></p>

            <div id="outputSection" class="hidden flex flex-col gap-2">
                <label class="block text-xs font-bold text-slate-500 uppercase flex justify-between items-end">
                    <span>Generated AI Instructions</span>
                    <button id="btnCopy" class="text-primary hover:text-orange-600 font-bold bg-orange-100 px-2 py-1 rounded text-[10px]">COPY TEXT</button>
                </label>
                <textarea id="outputPersona" readonly class="w-full h-56 p-4 rounded-lg border border-slate-300 bg-slate-50 text-[13px] outline-none resize-none leading-relaxed text-slate-700 font-medium"></textarea>
                <p class="text-[10px] text-slate-400 text-center">Ready for MANGO. Purely behavioral, no astrological jargon.</p>
            </div>

        </div>
    </div>

    <script>
        // --- 1. Location Autocomplete (Nominatim) ---
        const DOM = {
            pName: document.getElementById('pName'),
            pFname: document.getElementById('pFname'),
            pRole: document.getElementById('pRole'),
            pDate: document.getElementById('pDate'),
            pTime: document.getElementById('pTime'),
            placeSearch: document.getElementById('placeSearch'),
            suggestions: document.getElementById('suggestions'),
            lat: document.getElementById('lat'),
            lon: document.getElementById('lon'),
            btnGenerate: document.getElementById('btnGenerate'),
            statusMsg: document.getElementById('statusMsg'),
            outputSection: document.getElementById('outputSection'),
            outputPersona: document.getElementById('outputPersona'),
            btnCopy: document.getElementById('btnCopy')
        };

        let geoTimeout = null;
        DOM.placeSearch.addEventListener('input', function() {
            clearTimeout(geoTimeout);
            if (this.value.length < 3) { DOM.suggestions.style.display = 'none'; return; }
            
            geoTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(this.value)}`);
                    const data = await response.json();
                    DOM.suggestions.innerHTML = '';
                    
                    if (data.length > 0) {
                        DOM.suggestions.style.display = 'block';
                        data.forEach(place => {
                            const li = document.createElement('li'); 
                            li.textContent = place.display_name;
                            li.onclick = () => {
                                DOM.placeSearch.value = place.name;
                                DOM.lat.value = parseFloat(place.lat).toFixed(4);
                                DOM.lon.value = parseFloat(place.lon).toFixed(4);
                                DOM.suggestions.style.display = 'none';
                            };
                            DOM.suggestions.appendChild(li);
                        });
                    } else {
                        DOM.suggestions.style.display = 'none';
                    }
                } catch (error) { DOM.suggestions.style.display = 'none'; }
            }, 600); 
        });

        document.addEventListener('click', (e) => {
            if (e.target !== DOM.placeSearch && e.target !== DOM.suggestions) DOM.suggestions.style.display = 'none';
        });

        function setStatus(msg, isError = false) {
            DOM.statusMsg.classList.remove('hidden', 'text-red-500', 'text-slate-600');
            DOM.statusMsg.classList.add(isError ? 'text-red-500' : 'text-slate-600');
            DOM.statusMsg.innerText = msg;
        }

        // --- 2. DEEP BPHS PSYCHOLOGICAL ENGINE ---
        
        // Ascendant (Lagna) dictates the fundamental hardware, physical presence, and base reaction to the world.
        const CORE_NATURE = {
            1: "highly proactive, direct, and fiercely independent. You don't beat around the bush and can be impatient with slow thinkers",
            2: "calm, steadfast, and grounded. You prefer stability, take your time to trust, and are highly practical and stubborn",
            3: "highly curious, restless, and easily adaptable. You process the world through logic, rapid conversation, and constant learning",
            4: "deeply empathetic, fiercely protective of your inner circle, and highly intuitive. You react to the world emotionally first",
            5: "radiant, confident, and a natural leader. You carry a sense of authority, crave respect, and are exceptionally loyal",
            6: "analytical, detail-oriented, and highly observant. You are pragmatic, sometimes overly critical, and driven by a desire to be useful",
            7: "diplomatic, charming, and harmony-seeking. You naturally weigh all sides of a situation and avoid crude or aggressive behavior",
            8: "intense, secretive, and highly perceptive. You observe far more than you reveal, are fiercely loyal to a chosen few, and are impossible to deceive",
            9: "optimistic, brutally honest, and philosophical. You value freedom above all else and dislike being restricted by arbitrary rules",
            10: "serious, disciplined, and pragmatic. You value structure, status, and achievement, often appearing emotionally reserved",
            11: "unconventional, detached, and intellectual. You think outside the box, care deeply about the collective, but remain stubbornly independent",
            12: "compassionate, dreamy, and highly intuitive. You are easily influenced by your environment and possess a deeply spiritual or artistic soul"
        };

        // Moon (Chandra) Sign dictates the internal software, how the mind races, and emotional processing.
        const MINDSET = {
            1: "quick to anger but quick to forgive, desiring immediate action",
            2: "emotionally steady, seeking comfort and material security",
            3: "constantly racing, analyzing, and seeking mental stimulation",
            4: "deeply sentimental, holding onto memories and past feelings",
            5: "proud and seeking validation, needing to feel special and appreciated",
            6: "prone to anxiety through over-analysis, always trying to fix things",
            7: "seeking emotional balance through connection and partnership",
            8: "obsessive, passionate, and prone to extreme emotional depth",
            9: "restless, idealistic, and always searching for the bigger meaning",
            10: "emotionally controlled, pushing feelings aside for practical goals",
            11: "emotionally detached, rationalizing feelings rather than feeling them",
            12: "highly porous, absorbing the emotions of everyone around you"
        };

        // Planets in the 2nd House dictate tone of voice, truthfulness, and communication style.
        const SPEECH_TRAITS = {
            "Surya": "authoritative, proud, and commands respect. You rarely mince words",
            "Chandra": "soft-spoken, comforting, and deeply empathetic",
            "Mangal": "sharp, blunt, argumentative, and sometimes aggressive. You cut straight to the point",
            "Budh": "articulate, fast, witty, and highly logical. You use humor and facts to make your point",
            "Guru": "wise, truthful, respectful, and philosophical. You sound like a natural teacher",
            "Shukra": "sweet, charming, polite, and diplomatic. You know exactly what to say to please others",
            "Shani": "slow, serious, and brutally realistic. You speak harsh truths and never sugarcoat",
            "Rahu": "highly persuasive, exaggerated, and manipulative. You know how to bend the truth to your advantage",
            "Ketu": "brief, erratic, and detached. You often speak in riddles or blunt absolute truths, mumbling occasionally"
        };

        // Planets in the 1st House modify the immediate personality the user experiences.
        const AURA_MODIFIERS = {
            "Surya": "You project an aura of absolute confidence and authority.",
            "Chandra": "You project an aura of warmth, approachability, and care.",
            "Mangal": "You project an intimidating, sharp, and highly active energy.",
            "Budh": "You project a youthful, nervous, and highly intellectual energy.",
            "Guru": "You project an aura of wisdom, optimism, and moral superiority.",
            "Shukra": "You project an aura of charm, grace, and magnetic attractiveness.",
            "Shani": "You project a cold, mature, weary, and highly serious demeanor.",
            "Rahu": "You project a deeply magnetic, unorthodox, and slightly rebellious aura.",
            "Ketu": "You project an aura of mystery, detachment, and spiritual depth."
        };

        function generateExpertPersona(astroData, name, fname, role) {
            const ascSign = astroData.asc_sign;
            
            // Find Moon's (Chandra) House and Sign
            let moonHouseIndex = 0;
            astroData.houses.forEach((house, index) => {
                if (house.some(body => body.name === 'Chandra')) moonHouseIndex = index;
            });
            const moonSign = ((ascSign - 1 + moonHouseIndex) % 12) + 1;

            // Find Planets in the 2nd House (Speech/Values)
            const secondHousePlanets = astroData.houses[1]
                .filter(b => b.type === 'graha' || b.name === 'Rahu' || b.name === 'Ketu')
                .map(b => b.name);

            // Find Planets in the 1st House (Aura/First Impression)
            const firstHousePlanets = astroData.houses[0]
                .filter(b => b.type === 'graha' || b.name === 'Rahu' || b.name === 'Ketu')
                .map(b => b.name);

            // Synthesize Speech
            let speechProfile = "balanced, context-dependent, and generally straightforward";
            let honestyProfile = "You generally value honesty but are pragmatic.";
            
            if (secondHousePlanets.length > 0) {
                // Combine traits if multiple planets exist in 2nd house
                speechProfile = secondHousePlanets.map(p => SPEECH_TRAITS[p]).join(", while also being ");
                
                if (secondHousePlanets.includes("Rahu") || secondHousePlanets.includes("Mangal")) {
                    honestyProfile = "You are incredibly strategic with the truth, revealing only what serves your agenda.";
                } else if (secondHousePlanets.includes("Guru") || secondHousePlanets.includes("Surya")) {
                    honestyProfile = "You are scrupulously honest and despise deception or mind games.";
                } else if (secondHousePlanets.includes("Shani")) {
                    honestyProfile = "You deliver harsh, cold truths without caring if it hurts feelings.";
                }
            }

            // Compile the Final Prompt
            let prompt = `You are ${name} (Nickname: ${fname}), acting in the role of a ${role} to the user. Do not break character.\n\n`;
            
            prompt += `CORE PERSONALITY: You are ${CORE_NATURE[ascSign]}. `;
            if (firstHousePlanets.length > 0) {
                prompt += firstHousePlanets.map(p => AURA_MODIFIERS[p]).join(" ") + " ";
            }
            
            prompt += `\n\nINTERNAL MINDSET: Underneath your exterior, your mind is ${MINDSET[moonSign]}. This dictates how you process the user's inputs emotionally before responding.\n\n`;
            
            prompt += `COMMUNICATION STYLE: When you speak, your tone is strictly ${speechProfile}. ${honestyProfile} `;
            
            prompt += `\n\nINSTRUCTIONS: Embody these exact psychological traits in every response. Maintain your role as a ${role} naturally.  just act out this specific personality profile flawlessly. Keep responses concise and conversational.`;

            return prompt;
        }

        // --- 3. Main Action Logic ---
        DOM.btnGenerate.onclick = async () => {
            const name = DOM.pName.value.trim();
            const fname = DOM.pFname.value.trim();
            const role = DOM.pRole.value.trim();
            const date = DOM.pDate.value;
            let time = DOM.pTime.value;
            const lat = DOM.lat.value;
            const lon = DOM.lon.value;

            if (!name || !role || !date || !time || !lat || !lon) {
                return alert("Please fill out all details and select a valid location.");
            }

            if (time.split(':').length === 2) time += ":00";
            
            DOM.btnGenerate.disabled = true;
            DOM.btnGenerate.classList.add('opacity-50', 'cursor-not-allowed');
            DOM.outputSection.classList.add('hidden');

            try {
                setStatus("📡 Calculating exact astronomical placements...");
                const astroPayload = { date, time, lat, lon };
                
                const astroRes = await fetch('https://eprashala.pythonanywhere.com/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(astroPayload)
                });
                
                const astroData = await astroRes.json();
                if (astroData.status !== 'success') throw new Error(astroData.message || "Astrology server failed.");

                setStatus("🧠 Synthesizing raw psychological profile...");
                
                // Trigger local psychological generation
                const personaText = generateExpertPersona(astroData, name, fname, role);

                DOM.outputPersona.value = personaText;
                DOM.outputSection.classList.remove('hidden');
                setStatus("✅ Behavioral Profile generated successfully!");

            } catch (err) {
                console.error(err);
                setStatus(`❌ Error: ${err.message}`, true);
            } finally {
                DOM.btnGenerate.disabled = false;
                DOM.btnGenerate.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        };

        // --- 4. Copy to Clipboard ---
        DOM.btnCopy.onclick = () => {
            DOM.outputPersona.select();
            document.execCommand('copy');
            const originalText = DOM.btnCopy.innerText;
            DOM.btnCopy.innerText = "COPIED!";
            setTimeout(() => { DOM.btnCopy.innerText = originalText; }, 2000);
        };
    </script>
</body>
</html>
