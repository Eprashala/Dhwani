<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Persona Generator (Pure BPHS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#f59e0b', bgLight: '#f8fafc', bgDark: '#0f172a' } }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bgLight); color: #1e293b; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1); }
        .search-wrapper { position: relative; width: 100%; }
        #suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #cbd5e1; border-radius: 0.5rem; max-height: 180px; overflow-y: auto; display: none; z-index: 50; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #suggestions li { padding: 10px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        #suggestions li:hover { background-color: #f59e0b; color: white; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-100">

    <div class="glass-panel w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden flex flex-col">
        <div class="bg-primary p-6 text-white text-center">
            <h1 class="text-3xl font-bold tracking-widest flex justify-center items-center gap-2">🥭 ASTRO-PERSONA</h1>
            <p class="text-amber-100 text-sm mt-1">100% Local BPHS Engine. No AI API Required.</p>
        </div>

        <div class="p-6 space-y-6 overflow-y-auto max-h-[80vh]">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                    <input type="text" id="pName" placeholder="e.g., Steve Jobs" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Friendly Name / Nickname</label>
                    <input type="text" id="pFname" placeholder="e.g., Steve" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Role / Relationship</label>
                    <input type="text" id="pRole" placeholder="e.g., Visionary Mentor, Strict Teacher, Caring Sister" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Date of Birth</label>
                    <input type="date" id="pDate" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Time of Birth</label>
                    <input type="time" id="pTime" step="1" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                </div>
                <div class="md:col-span-2 search-wrapper">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Place of Birth</label>
                    <input type="text" id="placeSearch" placeholder="Type city to auto-fetch coordinates..." autocomplete="off" class="w-full p-2 rounded-lg border border-slate-300 outline-none focus:border-primary text-sm">
                    <ul id="suggestions"></ul>
                </div>
                
                <div class="hidden">
                    <input type="text" id="lat" readonly>
                    <input type="text" id="lon" readonly>
                </div>
            </div>

            <button id="btnGenerate" class="w-full bg-primary hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg flex justify-center items-center gap-2">
                ✨ Generate Persona from Stars
            </button>
            <p id="statusMsg" class="text-center text-sm font-semibold text-slate-600 hidden"></p>

            <div id="outputSection" class="hidden">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 flex justify-between items-end">
                    <span>Generated Parashari Profile</span>
                    <button id="btnCopy" class="text-primary hover:text-orange-600 font-bold bg-orange-100 px-2 py-1 rounded text-[10px]">COPY TEXT</button>
                </label>
                <textarea id="outputPersona" readonly class="w-full h-48 p-3 rounded-lg border border-slate-300 bg-slate-50 text-sm outline-none resize-none leading-relaxed"></textarea>
                <p class="text-[10px] text-slate-400 mt-1 text-center">Paste this directly into the <strong>Detailed Personality</strong> field in MANGO settings.</p>
            </div>

        </div>
    </div>

    <script>
        // --- 1. Location Autocomplete (Nominatim) ---
        const DOM = {
            pName: document.getElementById('pName'),
            pFname: document.getElementById('pFname'),
            pRole: document.getElementById('pRole'),
            pDate: document.getElementById('pDate'),
            pTime: document.getElementById('pTime'),
            placeSearch: document.getElementById('placeSearch'),
            suggestions: document.getElementById('suggestions'),
            lat: document.getElementById('lat'),
            lon: document.getElementById('lon'),
            btnGenerate: document.getElementById('btnGenerate'),
            statusMsg: document.getElementById('statusMsg'),
            outputSection: document.getElementById('outputSection'),
            outputPersona: document.getElementById('outputPersona'),
            btnCopy: document.getElementById('btnCopy')
        };

        let geoTimeout = null;
        DOM.placeSearch.addEventListener('input', function() {
            clearTimeout(geoTimeout);
            if (this.value.length < 3) { DOM.suggestions.style.display = 'none'; return; }
            
            geoTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(this.value)}`);
                    const data = await response.json();
                    DOM.suggestions.innerHTML = '';
                    
                    if (data.length > 0) {
                        DOM.suggestions.style.display = 'block';
                        data.forEach(place => {
                            const li = document.createElement('li'); 
                            li.textContent = place.display_name;
                            li.onclick = () => {
                                DOM.placeSearch.value = place.name;
                                DOM.lat.value = parseFloat(place.lat).toFixed(4);
                                DOM.lon.value = parseFloat(place.lon).toFixed(4);
                                DOM.suggestions.style.display = 'none';
                            };
                            DOM.suggestions.appendChild(li);
                        });
                    } else {
                        DOM.suggestions.style.display = 'none';
                    }
                } catch (error) { DOM.suggestions.style.display = 'none'; }
            }, 600); 
        });

        document.addEventListener('click', (e) => {
            if (e.target !== DOM.placeSearch && e.target !== DOM.suggestions) DOM.suggestions.style.display = 'none';
        });

        function setStatus(msg, isError = false) {
            DOM.statusMsg.classList.remove('hidden', 'text-red-500', 'text-slate-600');
            DOM.statusMsg.classList.add(isError ? 'text-red-500' : 'text-slate-600');
            DOM.statusMsg.innerText = msg;
        }

        // --- 2. BPHS Rule-Based Engine ---
        const BPHS_DB = {
            signs: {
                1: { name: "Aries", element: "Fire", trait: "dynamic, pioneering, fiercely independent, and quick to take action" },
                2: { name: "Taurus", element: "Earth", trait: "grounded, reliable, value-driven, and highly resilient" },
                3: { name: "Gemini", element: "Air", trait: "adaptable, highly communicative, intellectual, and curious" },
                4: { name: "Cancer", element: "Water", trait: "deeply empathetic, protective, intuitive, and emotionally nurturing" },
                5: { name: "Leo", element: "Fire", trait: "radiant, authoritative, confident, and natural leaders" },
                6: { name: "Virgo", element: "Earth", trait: "analytical, detail-oriented, service-driven, and pragmatic" },
                7: { name: "Libra", element: "Air", trait: "diplomatic, harmony-seeking, fair, and relationship-oriented" },
                8: { name: "Scorpio", element: "Water", trait: "intense, strategic, deeply investigative, and emotionally powerful" },
                9: { name: "Sagittarius", element: "Fire", trait: "philosophical, optimistic, freedom-loving, and honest" },
                10: { name: "Capricorn", element: "Earth", trait: "disciplined, ambitious, structured, and highly responsible" },
                11: { name: "Aquarius", element: "Air", trait: "innovative, unconventional, community-focused, and intellectual" },
                12: { name: "Pisces", element: "Water", trait: "compassionate, imaginative, deeply spiritual, and accepting" }
            },
            signLords: {
                1: "Mangal (Mars)", 2: "Shukra (Venus)", 3: "Budh (Mercury)", 4: "Chandra (Moon)", 
                5: "Surya (Sun)", 6: "Budh (Mercury)", 7: "Shukra (Venus)", 8: "Mangal (Mars)", 
                9: "Guru (Jupiter)", 10: "Shani (Saturn)", 11: "Shani (Saturn)", 12: "Guru (Jupiter)"
            },
            grahas: {
                "Surya": "radiates authority, pride, and unwavering confidence",
                "Chandra": "brings emotional depth, empathy, and intuitive responses",
                "Mangal": "adds assertiveness, courage, and a protective, sometimes aggressive edge",
                "Budh": "ensures sharp wit, analytical communication, and logical reasoning",
                "Guru": "provides profound wisdom, moral guidance, and an optimistic outlook",
                "Shukra": "brings charm, grace, a love for aesthetics, and diplomatic tact",
                "Shani": "adds maturity, realism, strict boundaries, and disciplined patience",
                "Rahu": "introduces unconventional thinking, intense desires, and rule-breaking tendencies",
                "Ketu": "brings detachment, mystical insights, and a highly introspective nature"
            },
            houses: {
                1: "self-development, personal identity, and physical vitality",
                2: "family values, accumulated wealth, and truthful speech",
                3: "courage, self-effort, short journeys, and communication",
                4: "inner peace, emotional security, roots, and the concept of home",
                5: "creative intelligence, progeny, learning, and future planning",
                6: "overcoming obstacles, healing, daily routines, and managing conflicts",
                7: "partnerships, dealing with the public, and harmonizing with others",
                8: "hidden knowledge, profound transformations, and managing sudden changes",
                9: "dharma, higher beliefs, mentorship, and philosophical pursuits",
                10: "career excellence, public standing, and taking on massive responsibilities",
                11: "networking, fulfilling high ambitions, and managing large communities",
                12: "spiritual liberation, foreign lands, letting go, and solitude"
            }
        };

        function generateBPHSPersona(astroData, name, fname, role) {
            const ascSign = astroData.asc_sign;
            const ascData = BPHS_DB.signs[ascSign];
            const lagnesh = BPHS_DB.signLords[ascSign];
            const pureLagneshName = lagnesh.split(' ')[0]; // e.g., "Mangal"

            // Find where the Lagna Lord is placed
            let lagneshHouse = 1;
            let planetsInLagna = [];

            astroData.houses.forEach((house, index) => {
                const houseNum = index + 1;
                house.forEach(body => {
                    if (body.name === pureLagneshName) lagneshHouse = houseNum;
                    if (houseNum === 1 && (body.type === 'graha' || body.name === 'Rahu' || body.name === 'Ketu')) {
                        planetsInLagna.push(body.name);
                    }
                });
            });

            // Build the Persona String
            let prompt = `You are assuming the exact persona of ${name} (Nickname: ${fname}). Your core role in this conversation is a ${role}.\n\n`;
            
            prompt += `CORE NATURE: Your astrological Ascendant is ${ascData.name} (${ascData.element}). Because of this, your foundational personality is ${ascData.trait}. You approach problems and conversations with this underlying energy.\n`;
            
            prompt += `LIFE FOCUS (LAGNESH): Your chart is ruled by ${lagnesh}. This planet is placed in your ${lagneshHouse}th house, meaning your primary life focus and psychological drive is oriented around ${BPHS_DB.houses[lagneshHouse]}.\n`;

            if (planetsInLagna.length > 0) {
                prompt += `IMMEDIATE IMPRESSION: You have ${planetsInLagna.join(", ")} sitting in your 1st house (Lagna). This means your immediate outward behavior ${planetsInLagna.map(p => BPHS_DB.grahas[p]).join(" AND ")}.\n`;
            }

            prompt += `\nCOMMUNICATION STYLE: Always speak as ${fname}, maintaining your role as a ${role}. Blend the astrological traits described above into your tone naturally. Never break character. Never explicitly state your astrological placements to the user; just embody the psychology they dictate.`;

            return prompt;
        }

        // --- 3. Main Action Logic ---
        DOM.btnGenerate.onclick = async () => {
            const name = DOM.pName.value.trim();
            const fname = DOM.pFname.value.trim();
            const role = DOM.pRole.value.trim();
            const date = DOM.pDate.value;
            let time = DOM.pTime.value;
            const lat = DOM.lat.value;
            const lon = DOM.lon.value;

            if (!name || !role || !date || !time || !lat || !lon) {
                return alert("Please fill out all details and select a valid location from the dropdown.");
            }

            if (time.split(':').length === 2) time += ":00";
            
            DOM.btnGenerate.disabled = true;
            DOM.btnGenerate.classList.add('opacity-50', 'cursor-not-allowed');
            DOM.outputSection.classList.add('hidden');

            try {
                setStatus("📡 Aligning coordinates and fetching planetary data...");
                const astroPayload = { date, time, lat, lon };
                
                const astroRes = await fetch('https://eprashala.pythonanywhere.com/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(astroPayload)
                });
                
                const astroData = await astroRes.json();
                if (astroData.status !== 'success') throw new Error(astroData.message || "Astrology server failed.");

                setStatus("🧠 Weaving Parashari logic into character prompt...");
                
                // Trigger local generation
                const personaText = generateBPHSPersona(astroData, name, fname, role);

                DOM.outputPersona.value = personaText;
                DOM.outputSection.classList.remove('hidden');
                setStatus("✅ Parashari Persona generated successfully!");

            } catch (err) {
                console.error(err);
                setStatus(`❌ Error: ${err.message}`, true);
            } finally {
                DOM.btnGenerate.disabled = false;
                DOM.btnGenerate.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        };

        // --- 4. Copy to Clipboard ---
        DOM.btnCopy.onclick = () => {
            DOM.outputPersona.select();
            document.execCommand('copy');
            const originalText = DOM.btnCopy.innerText;
            DOM.btnCopy.innerText = "COPIED!";
            setTimeout(() => { DOM.btnCopy.innerText = originalText; }, 2000);
        };
    </script>
</body>
</html>
