<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massive Missive Reader & AI Optimizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        @keyframes pulse-light {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-status { animation: pulse-light 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* Word hover effect in teleprompter */
        .word-node:hover {
            background-color: rgba(6, 182, 212, 0.2);
            color: #67e8f9;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col antialiased selection:bg-cyan-500/30 selection:text-cyan-200">

    <!-- Top Navigation Header Bar -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-40 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.5)]"></div>
            <h1 class="text-lg font-bold tracking-wide text-slate-200 uppercase text-xs">Massive Missive Reader <span class="text-yellow-500 ml-2">⚡ AI Powered</span></h1>
        </div>
        <div class="flex items-center gap-2 bg-slate-950/60 border border-slate-800 rounded-lg px-3 py-1 text-xs text-slate-400">
            <span id="status-indicator" class="h-2 w-2 rounded-full bg-slate-500"></span>
            <span id="status-text" class="font-medium">Engine Stopped</span>
        </div>
    </header>

    <main class="flex-1 max-w-[1400px] w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6 relative">
        
        <!-- Sidebar Control Panel -->
        <section class="lg:col-span-1 flex flex-col gap-6">
            
            <!-- AI Optimization Module -->
            <div class="bg-slate-900/60 border border-yellow-500/30 rounded-2xl p-5 flex flex-col gap-4 backdrop-blur-md shadow-xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-500 to-amber-600"></div>
                <h2 class="text-sm font-semibold text-yellow-500 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L9 9H2l5.5 4.5L5 22l7-5 7 5-2.5-8.5L22 9h-7z"/></svg>
                    AI Text Optimizer
                </h2>
                
                <div class="flex flex-col gap-2">
                    <input type="password" id="ai-api-key" placeholder="Google Gemini API Key..." class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-yellow-500 transition-colors">
                </div>
                <div class="flex flex-col gap-2">
                    <textarea id="ai-prompt" placeholder="e.g., Summarize this text, fix grammar, translate to Hindi..." class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-yellow-500 transition-colors resize-none h-20"></textarea>
                </div>
                <button id="btn-optimize" class="w-full bg-yellow-600 hover:bg-yellow-500 text-slate-950 font-bold uppercase text-xs tracking-wider py-2.5 rounded-lg transition-all shadow-[0_0_10px_rgba(234,179,8,0.2)] focus:outline-none">
                    ✨ Run AI Optimization
                </button>
            </div>

            <!-- TTS Configuration Module -->
            <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-5 flex flex-col gap-5 backdrop-blur-md shadow-xl">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider pb-2 border-b border-slate-800">TTS Configurations</h2>
                
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-400 uppercase">Playback Engine</label>
                    <select id="tts-engine-selector" class="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 outline-none focus:border-cyan-500 transition-colors cursor-pointer">
                        <option value="native">Native OS Engine (WebSpeech)</option>
                        <option value="cloud" selected>Google Cloud Translate API</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-slate-400 uppercase">Target Language</label>
                    <select id="language-selector" class="bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 outline-none focus:border-cyan-500 transition-colors cursor-pointer">
                        <option value="auto" selected>✨ Auto Detect Language</option>
                        <option value="en-US">English (US)</option>
                        <option value="hi-IN">Hindi (हिंदी)</option>
                        <option value="mr-IN">Marathi (मराठी)</option>
                        <option value="bn-IN">Bengali (বাংলা)</option>
                        <option value="te-IN">Telugu (తెలుగు)</option>
                        <option value="ta-IN">Tamil (தமிழ்)</option>
                        <option value="gu-IN">Gujarati (ગુજરાતી)</option>
                    </select>
                </div>

                <hr class="border-slate-800">

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-400 uppercase">
                        <span>Playback Speed</span>
                        <span id="speed-val" class="text-cyan-400 font-mono">1.0x</span>
                    </div>
                    <input type="range" id="tts-speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-cyan-500 bg-slate-950 cursor-pointer rounded-lg h-2 appearance-none border border-slate-800">
                </div>

                <div id="pitch-container" class="flex flex-col gap-2">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-400 uppercase">
                        <span>Voice Pitch <span class="text-[10px] text-slate-600 font-normal">(Native)</span></span>
                        <span id="pitch-val" class="text-cyan-400 font-mono">1.0</span>
                    </div>
                    <input type="range" id="tts-pitch-slider" min="0.5" max="1.5" step="0.1" value="1.0" class="w-full accent-cyan-500 bg-slate-950 cursor-pointer rounded-lg h-2 appearance-none border border-slate-800">
                </div>

                <div class="flex items-center justify-between border-t border-slate-800 pt-3 text-xs">
                    <span class="font-bold text-slate-400 uppercase">Dynamic Tracker</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="highlight-checkbox" checked class="sr-only peer">
                        <div class="w-9 h-5 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-slate-400 after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-cyan-600 peer-checked:after:bg-slate-100"></div>
                    </label>
                </div>
            </div>
        </section>

        <!-- Main Workspace -->
        <section class="lg:col-span-3 flex flex-col gap-4 relative">
            
            <div class="flex items-center justify-between bg-slate-900/40 p-1.5 border border-slate-800 rounded-xl">
                <div class="flex gap-1 w-full sm:w-auto">
                    <button id="tab-edit" class="flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg bg-slate-800 text-cyan-400 border border-slate-700 transition-all cursor-pointer shadow-sm">
                        📝 Edit Text Area
                    </button>
                    <button id="tab-read" class="flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer">
                        📖 Teleprompter Tracking View
                    </button>
                </div>
                <button id="btn-clear" class="hidden sm:block text-xs uppercase font-bold px-3 py-2 text-rose-400 hover:bg-rose-950/30 rounded-lg transition-colors cursor-pointer">
                    Clear Text
                </button>
            </div>

            <div id="panel-edit" class="flex-1 flex flex-col min-h-[500px]">
                <textarea id="text-input" placeholder="Paste your massive document here..." class="w-full flex-1 min-h-[500px] bg-slate-900/40 border border-slate-800 focus:border-cyan-500/80 rounded-2xl p-5 text-slate-200 placeholder:text-slate-600 outline-none text-base leading-relaxed resize-none transition-all shadow-inner"></textarea>
            </div>

            <!-- The Teleprompter Panel: Clickable spans will be generated here -->
            <div id="panel-read" class="hidden flex-1 bg-slate-900/20 border border-slate-800 rounded-2xl p-6 text-base leading-loose text-slate-400 overflow-y-auto max-h-[600px] whitespace-pre-wrap select-text" style="--chat-font-size: 16px; font-size: var(--chat-font-size);">
                <span class="italic text-slate-600 pointer-events-none">No text compiled. Type or paste your document and switch to this view.</span>
            </div>

            <!-- Floating Global Control Widget -->
            <div class="fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-slate-900/90 border border-slate-700/80 rounded-full px-4 py-3 shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-blur-md transition-transform hover:scale-105">
                <button id="btn-stop-global" disabled class="p-2.5 rounded-full bg-slate-950 hover:bg-rose-950 border border-slate-800 text-slate-500 hover:text-rose-400 transition-all cursor-not-allowed opacity-40 focus:outline-none" title="Stop & Reset Engine">
                    <svg class="w-4 h-4 fill-currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                </button>
                <button id="btn-play-global" class="flex items-center gap-2 px-6 py-2.5 rounded-full bg-cyan-600 hover:bg-cyan-500 border border-cyan-500/40 text-slate-950 font-bold uppercase text-xs tracking-wider transition-all cursor-pointer shadow-[0_0_15px_rgba(6,182,212,0.3)] focus:outline-none" title="Play/Pause Teleprompter">
                    <svg id="global-play-icon" class="w-4 h-4 fill-currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="global-pause-icon" class="w-4 h-4 fill-currentColor hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    <span id="global-play-text">Begin Reading</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        // --- GLOBAL SYSTEM STATE & VARIABLES ---
        let ttsStatus = 'STOPPED'; // STOPPED, PLAYING, PAUSED
        let isManuallyPaused = false;
        let wordsArray = [];
        let globalWordIndex = 0;
        let audioChunks = [];
        let currentChunkIndex = 0;
        let highlightTimer = null;
        let lastHighlightedSpan = null;
        
        const currentAudio = new Audio(); 
        
        // NEW FIX: Global assignment to prevent Windows Chrome garbage collection of the utterance
        let currentNativeUtterance = null; 

        const UI = {
            textIn: document.getElementById('text-input'),
            btnPlay: document.getElementById('btn-play-global'),
            btnStop: document.getElementById('btn-stop-global'),
            iconPlay: document.getElementById('global-play-icon'),
            iconPause: document.getElementById('global-pause-icon'),
            txtPlay: document.getElementById('global-play-text'),
            engineSelect: document.getElementById('tts-engine-selector'),
            langSelect: document.getElementById('language-selector'),
            speedSlider: document.getElementById('tts-speed-slider'),
            speedVal: document.getElementById('speed-val'),
            pitchSlider: document.getElementById('tts-pitch-slider'),
            pitchVal: document.getElementById('pitch-val'),
            pitchContainer: document.getElementById('pitch-container'),
            highlightCheck: document.getElementById('highlight-checkbox'),
            statusText: document.getElementById('status-text'),
            statusIndicator: document.getElementById('status-indicator'),
            tabEdit: document.getElementById('tab-edit'),
            tabRead: document.getElementById('tab-read'),
            panelEdit: document.getElementById('panel-edit'),
            panelRead: document.getElementById('panel-read'),
            btnClear: document.getElementById('btn-clear'),
            
            aiApiKey: document.getElementById('ai-api-key'),
            aiPrompt: document.getElementById('ai-prompt'),
            btnOptimize: document.getElementById('btn-optimize')
        };

        document.addEventListener("DOMContentLoaded", () => {
            // Restore saved API Key
            const savedKey = localStorage.getItem('massive_ai_key');
            if (savedKey) UI.aiApiKey.value = savedKey;

            setupEventListeners();
            syncEngineUIState();
        });

        function setupEventListeners() {
            UI.btnPlay.addEventListener('click', togglePlaybackState);
            UI.btnStop.addEventListener('click', resetCurrentTTS);
            UI.btnClear.addEventListener('click', () => { resetCurrentTTS(); UI.textIn.value = ''; compileTextToSpans(); });
            
            UI.speedSlider.addEventListener('input', (e) => {
                UI.speedVal.innerText = `${parseFloat(e.target.value).toFixed(1)}x`;
                if (ttsStatus === 'PLAYING') {
                    if (UI.engineSelect.value === 'cloud') {
                        currentAudio.playbackRate = parseFloat(e.target.value);
                    }
                }
            });

            UI.pitchSlider.addEventListener('input', (e) => { UI.pitchVal.innerText = parseFloat(e.target.value).toFixed(1); });

            UI.engineSelect.addEventListener('change', () => {
                syncEngineUIState();
                if (ttsStatus !== 'STOPPED') resetCurrentTTS();
            });

            UI.tabEdit.addEventListener('click', () => toggleTabPanel('edit'));
            UI.tabRead.addEventListener('click', () => toggleTabPanel('read'));
            
            UI.btnOptimize.addEventListener('click', optimizeTextWithAI);

            // Cursor-based seeking listener
            UI.panelRead.addEventListener('click', (e) => {
                const target = e.target;
                if (target.tagName === 'SPAN' && target.id.startsWith('word-node-')) {
                    const newIndex = parseInt(target.id.replace('word-node-', ''));
                    jumpToWordAndPlay(newIndex);
                }
            });
        }

        function toggleTabPanel(target) {
            if (target === 'edit') {
                UI.panelEdit.classList.remove('hidden');
                UI.panelRead.classList.add('hidden');
                UI.tabEdit.className = "flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg bg-slate-800 text-cyan-400 border border-slate-700 transition-all cursor-pointer shadow-sm";
                UI.tabRead.className = "flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
            } else {
                UI.panelEdit.classList.add('hidden');
                UI.panelRead.classList.remove('hidden');
                UI.tabRead.className = "flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg bg-slate-800 text-cyan-400 border border-slate-700 transition-all cursor-pointer shadow-sm";
                UI.tabEdit.className = "flex-1 sm:flex-initial text-xs uppercase tracking-wider font-bold px-4 py-2 rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
                compileTextToSpans();
            }
        }

        function syncEngineUIState() {
            if (UI.engineSelect.value === 'cloud') {
                UI.pitchContainer.style.opacity = '0.4';
                UI.pitchSlider.disabled = true;
            } else {
                UI.pitchContainer.style.opacity = '1';
                UI.pitchSlider.disabled = false;
            }
        }

        // --- AI OPTIMIZATION LOGIC ---
        async function optimizeTextWithAI() {
            const apiKey = UI.aiApiKey.value.trim();
            const prompt = UI.aiPrompt.value.trim();
            const text = UI.textIn.value.trim();

            if (!apiKey) return alert("Please enter your Google Gemini API Key.");
            if (!prompt) return alert("Please enter an AI prompt instruction.");
            if (!text) return alert("Please paste some text into the editor first.");

            localStorage.setItem('massive_ai_key', apiKey);
            
            UI.btnOptimize.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-slate-900 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
            UI.btnOptimize.disabled = true;
            UI.btnOptimize.classList.replace('bg-yellow-600', 'bg-yellow-700');

            resetCurrentTTS(); // Halt audio if running

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: "You are an expert text editor. Follow the user's prompt exactly. Output ONLY the finalized text without conversational filler or markdown formatting blocks." }] },
                        contents: [{ parts: [{ text: `Instruction: ${prompt}\n\nSource Text:\n${text}` }] }]
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const resultText = data.candidates[0].content.parts[0].text.trim();
                UI.textIn.value = resultText;
                
                toggleTabPanel('edit'); // Bring them back to the editor to see the result
                
            } catch (err) {
                alert("AI Error: " + err.message);
            } finally {
                UI.btnOptimize.innerHTML = "✨ Run AI Optimization";
                UI.btnOptimize.disabled = false;
                UI.btnOptimize.classList.replace('bg-yellow-700', 'bg-yellow-600');
            }
        }

        // --- AUTOMATIC LANGUAGE DETECTION ---
        function detectTextLanguage(sampleText) {
            if (UI.langSelect.value !== 'auto') return UI.langSelect.value;
            const devanagariPattern = /[\u0900-\u097F]/;
            const bengaliPattern = /[\u0980-\u09FF]/;
            const teluguPattern = /[\u0C00-\u0C7F]/;
            const tamilPattern = /[\u0C80-\u0CFF]/;
            const gujaratiPattern = /[\u0A80-\u0AFF]/;

            if (devanagariPattern.test(sampleText)) return /ा|ै|ो|ू/.test(sampleText) ? 'hi-IN' : 'mr-IN';
            if (bengaliPattern.test(sampleText)) return 'bn-IN';
            if (teluguPattern.test(sampleText)) return 'te-IN';
            if (tamilPattern.test(sampleText)) return 'ta-IN';
            if (gujaratiPattern.test(sampleText)) return 'gu-IN';
            return 'en-US'; 
        }

        // --- COMPILER ---
        function compileTextToSpans() {
            const rawText = UI.textIn.value.trim();
            if (!rawText) {
                UI.panelRead.innerHTML = `<span class="italic text-slate-600 pointer-events-none">No textual data compiled. Type or paste your document text into the editor console and click play.</span>`;
                wordsArray = [];
                return;
            }

            UI.panelRead.innerHTML = '';
            wordsArray = rawText.match(/\S+/g) || [];

            let wordCounter = 0;
            const textLines = rawText.split('\n');

            textLines.forEach((line, lineIdx) => {
                if (line.trim() === '') {
                    UI.panelRead.appendChild(document.createElement('br'));
                    return;
                }

                const segmentBlock = document.createElement('div');
                segmentBlock.className = 'inline';
                const parts = line.split(/(\s+)/);

                parts.forEach(part => {
                    if (part.trim().length > 0) {
                        const span = document.createElement('span');
                        span.id = `word-node-${wordCounter}`;
                        // Added word-node class for hover states
                        span.className = 'word-node transition-all duration-150 inline-block mr-1 rounded-[3px] px-[2px]';
                        span.textContent = part;
                        span.title = "Click to play from here";
                        segmentBlock.appendChild(span);
                        wordCounter++;
                    } else {
                        segmentBlock.appendChild(document.createTextNode(part));
                    }
                });

                UI.panelRead.appendChild(segmentBlock);
                if (lineIdx < textLines.length - 1) {
                    UI.panelRead.appendChild(document.createElement('br'));
                }
            });
            
            // Highlight the initial starting point
            applyNodeHighlightStyling(globalWordIndex);
        }

        // --- COMMON UTILITY FOR CHUNKING TEXT ---
        function chunkText(text, maxLength = 180) {
            const regex = /[^.?!।,\n]+[.?!।,\n]*/g;
            let chunks = [];
            let currentChunk = "";
            let match;
            
            while ((match = regex.exec(text)) !== null) {
                let sentence = match[0];
                if (currentChunk.length + sentence.length > maxLength) {
                    if (currentChunk) chunks.push(currentChunk.trim());
                    currentChunk = sentence;
                } else {
                    currentChunk += sentence;
                }
            }
            if (currentChunk) chunks.push(currentChunk.trim());
            if (chunks.length === 0 && text.trim().length > 0) chunks.push(text.trim());
            return chunks;
        }

        // --- CURSOR SEEK CONTROL (Deep Jump) ---
        function jumpToWordAndPlay(index) {
            globalWordIndex = index;
            
            if (ttsStatus === 'PLAYING') {
                // Hard halt engines immediately
                isManuallyPaused = true; 
                if (UI.engineSelect.value === 'cloud') {
                    currentAudio.pause();
                } else {
                    window.speechSynthesis.cancel();
                }
                if (highlightTimer) clearTimeout(highlightTimer);
                
                // Allow engine buffers to clear before aggressively restarting
                setTimeout(() => {
                    isManuallyPaused = false;
                    const documentContent = wordsArray.slice(globalWordIndex).join(" ");
                    const assignedLang = detectTextLanguage(documentContent);
                    
                    if (UI.engineSelect.value === 'cloud') {
                        executeCloudTTSPipeline(documentContent, assignedLang);
                    } else {
                        executeNativeTTSPipeline(documentContent, assignedLang);
                    }
                }, 150);
            } else {
                // If stopped/paused, just update the visual cursor so they know it moved
                applyNodeHighlightStyling(globalWordIndex);
                if (ttsStatus === 'STOPPED') {
                    // Pre-warm the pause state so pressing play resumes from here
                    ttsStatus = 'PAUSED';
                    updateControlUIState();
                }
            }
        }

        // --- MASTER STATE SYSTEM ---
        function togglePlaybackState() {
            const rawText = UI.textIn.value.trim();
            
            if (!rawText) {
                alert("Please drop or paste text into the field to initiate reading.");
                return;
            }

            if (ttsStatus === 'STOPPED') {
                ttsStatus = 'PLAYING';
                isManuallyPaused = false;
                globalWordIndex = 0;
                
                compileTextToSpans();
                
                if (UI.panelRead.classList.contains('hidden')) toggleTabPanel('read');
                updateControlUIState();

                const documentContent = wordsArray.join(" ");
                const assignedLang = detectTextLanguage(documentContent);
                if (UI.engineSelect.value === 'cloud') {
                    executeCloudTTSPipeline(documentContent, assignedLang);
                } else {
                    executeNativeTTSPipeline(documentContent, assignedLang);
                }
            } 
            else if (ttsStatus === 'PLAYING') {
                ttsStatus = 'PAUSED';
                isManuallyPaused = true;
                updateControlUIState();

                if (UI.engineSelect.value === 'cloud') {
                    currentAudio.pause();
                } else {
                    window.speechSynthesis.pause(); 
                    window.speechSynthesis.cancel(); 
                }
                if (highlightTimer) clearTimeout(highlightTimer);
            } 
            else if (ttsStatus === 'PAUSED') {
                ttsStatus = 'PLAYING';
                isManuallyPaused = false;
                updateControlUIState();

                const remainingTextWords = wordsArray.slice(globalWordIndex).join(" ");
                const assignedLang = detectTextLanguage(remainingTextWords);
                
                if (UI.engineSelect.value === 'cloud') {
                    executeCloudTTSPipeline(remainingTextWords, assignedLang);
                } else {
                    window.speechSynthesis.cancel();
                    setTimeout(() => {
                        if (remainingTextWords.trim()) {
                            executeNativeTTSPipeline(remainingTextWords, assignedLang);
                        } else {
                            resetCurrentTTS();
                        }
                    }, 60);
                }
            }
        }

        // --- NATIVE OS TTS (UPDATED FIX) ---
        function executeNativeTTSPipeline(text, langCode) {
            if (!text.trim() || ttsStatus !== 'PLAYING') return;

            // FIX: We now chunk the native text just like the cloud text. 
            // This prevents Android and Windows native limits from crashing the API.
            const nativeAudioChunks = chunkText(text, 200);
            let nativeChunkIndex = 0;

            function speakNextNativeChunk() {
                if (nativeChunkIndex >= nativeAudioChunks.length || ttsStatus !== 'PLAYING') {
                    if (nativeChunkIndex >= nativeAudioChunks.length && !isManuallyPaused) {
                        // Let the highlighting finish up
                        setTimeout(() => resetCurrentTTS(), 200);
                    }
                    return;
                }

                // FIX: Store the utterance globally so Windows Chrome Garbage Collector doesn't delete it mid-sentence.
                currentNativeUtterance = new SpeechSynthesisUtterance(nativeAudioChunks[nativeChunkIndex]);
                currentNativeUtterance.lang = langCode;
                currentNativeUtterance.rate = parseFloat(UI.speedSlider.value);
                currentNativeUtterance.pitch = parseFloat(UI.pitchSlider.value);

                currentNativeUtterance.onstart = () => {
                    // Only start the dynamic highlighter once the very first chunk begins
                    if (nativeChunkIndex === 0 && !highlightTimer) initiateDynamicHighlighterTracking();
                };

                currentNativeUtterance.onend = () => {
                    if (isManuallyPaused) return; // Prevent Android API overrides[cite: 1]
                    nativeChunkIndex++;
                    speakNextNativeChunk();
                };

                currentNativeUtterance.onerror = (e) => {
                    if (isManuallyPaused) return;
                    if (!['canceled', 'interrupted'].includes(e.error)) {
                        console.warn("Native TTS Error:", e);
                        // Skip problematic chunk and move to the next to prevent stalling
                        nativeChunkIndex++;
                        speakNextNativeChunk();
                    }
                };

                window.speechSynthesis.speak(currentNativeUtterance);
            }

            speakNextNativeChunk();
        }

        // --- GOOGLE CLOUD TTS ---
        function executeCloudTTSPipeline(text, langCode) {
            const foundationalLang = langCode.split('-')[0];
            audioChunks = chunkText(text, 180); 
            currentChunkIndex = 0;
            processCloudAudioQueues(foundationalLang);
        }

        function processCloudAudioQueues(langKey) {
            if (currentChunkIndex >= audioChunks.length || ttsStatus !== 'PLAYING') {
                if (currentChunkIndex >= audioChunks.length) resetCurrentTTS();
                return;
            }

            const targetSegmentString = audioChunks[currentChunkIndex];
            if (!targetSegmentString || targetSegmentString.trim() === '') {
                currentChunkIndex++;
                processCloudAudioQueues(langKey);
                return;
            }

            const requestGatewayEndpointUrl = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=${langKey}&q=${encodeURIComponent(targetSegmentString)}`;
            
            currentAudio.src = requestGatewayEndpointUrl;
            currentAudio.playbackRate = parseFloat(UI.speedSlider.value);
            currentAudio.preservesPitch = true;

            currentAudio.play().then(() => {
                if (currentChunkIndex === 0 && !highlightTimer) initiateDynamicHighlighterTracking();
            }).catch(err => {
                setTimeout(() => {
                    currentChunkIndex++;
                    processCloudAudioQueues(langKey);
                }, 200);
            });

            currentAudio.onended = () => {
                currentChunkIndex++;
                processCloudAudioQueues(langKey);
            };

            currentAudio.onerror = () => {
                currentChunkIndex++;
                processCloudAudioQueues(langKey);
            };
        }

        // --- WORD HIGHLIGHTING & TRACKING ---
        function initiateDynamicHighlighterTracking() {
            if (highlightTimer) clearTimeout(highlightTimer);

            const BASE_DELAY = 140; 
            const CHAR_DELAY = 50;  
            const MAX_DELAY = 750;  

            const advanceHighlightNode = () => {
                if (ttsStatus !== 'PLAYING' || globalWordIndex >= wordsArray.length) return;

                applyNodeHighlightStyling(globalWordIndex);

                const isolatedWordString = wordsArray[globalWordIndex] || "";
                const dynamicPlaybackSpeedRate = parseFloat(UI.speedSlider.value);

                let operationalIntervalDuration = (BASE_DELAY + (isolatedWordString.length * CHAR_DELAY)) / dynamicPlaybackSpeedRate;
                if (operationalIntervalDuration > (MAX_DELAY / dynamicPlaybackSpeedRate)) {
                    operationalIntervalDuration = (MAX_DELAY / dynamicPlaybackSpeedRate);
                }

                globalWordIndex++;
                highlightTimer = setTimeout(advanceHighlightNode, operationalIntervalDuration);
            };

            advanceHighlightNode();
        }

        function applyNodeHighlightStyling(targetIndex) {
            clearActiveHighlightStyling();

            const wordSpanNode = document.getElementById(`word-node-${targetIndex}`);
            if (wordSpanNode) {
                if (UI.highlightCheck.checked) {
                    wordSpanNode.classList.add('bg-cyan-500/30', 'text-cyan-200', 'font-bold', 'shadow-[0_0_8px_rgba(6,182,212,0.4)]');
                    lastHighlightedSpan = wordSpanNode;
                }

                const viewBoundariesRect = UI.panelRead.getBoundingClientRect();
                const nodeBoundariesRect = wordSpanNode.getBoundingClientRect();

                if (nodeBoundariesRect.bottom > viewBoundariesRect.bottom - 50 || nodeBoundariesRect.top < viewBoundariesRect.top + 50) {
                    wordSpanNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function clearActiveHighlightStyling() {
            if (lastHighlightedSpan) {
                lastHighlightedSpan.classList.remove('bg-cyan-500/30', 'text-cyan-200', 'font-bold', 'shadow-[0_0_8px_rgba(6,182,212,0.4)]');
                lastHighlightedSpan = null;
            }
        }

        // --- RESET PIPELINE ---
        function resetCurrentTTS() {
            if (highlightTimer) clearTimeout(highlightTimer);
            
            currentAudio.pause();
            currentAudio.src = "";
            window.speechSynthesis.cancel();
            
            // Release memory to avoid leaks
            currentNativeUtterance = null; 

            clearActiveHighlightStyling();

            ttsStatus = 'STOPPED';
            isManuallyPaused = false;
            globalWordIndex = 0;
            audioChunks = [];
            currentChunkIndex = 0;

            updateControlUIState();
            
            // Return visual cursor to the top on full stop
            if(wordsArray.length > 0) {
                applyNodeHighlightStyling(0);
                if (lastHighlightedSpan) {
                    lastHighlightedSpan.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        // --- UI UPDATER ---
        function updateControlUIState() {
            if (ttsStatus === 'STOPPED') {
                UI.iconPlay.classList.remove('hidden');
                UI.iconPause.classList.add('hidden');
                UI.txtPlay.innerText = "Begin Reading";
                UI.btnPlay.className = "flex items-center gap-2 px-6 py-2.5 rounded-full bg-cyan-600 hover:bg-cyan-500 border border-cyan-500/40 text-slate-950 font-bold uppercase text-xs tracking-wider transition-all cursor-pointer shadow-[0_0_15px_rgba(6,182,212,0.3)] focus:outline-none";
                
                UI.btnStop.disabled = true;
                UI.btnStop.classList.replace('hover:bg-rose-950', 'bg-slate-950');
                UI.btnStop.classList.replace('text-slate-500', 'text-slate-800');
                UI.btnStop.classList.replace('cursor-pointer', 'cursor-not-allowed');
                UI.btnStop.classList.add('opacity-40');
                
                UI.statusText.innerText = "Engine Stopped";
                UI.statusIndicator.className = "h-2 w-2 rounded-full bg-slate-500";
            } 
            else if (ttsStatus === 'PLAYING') {
                UI.iconPlay.classList.add('hidden');
                UI.iconPause.classList.remove('hidden');
                UI.txtPlay.innerText = "Pause Tracking";
                UI.btnPlay.className = "flex items-center gap-2 px-6 py-2.5 rounded-full bg-amber-600 hover:bg-amber-500 border border-amber-500/40 text-slate-950 font-bold uppercase text-xs tracking-wider transition-all cursor-pointer shadow-[0_0_15px_rgba(217,119,6,0.3)] focus:outline-none";
                
                UI.btnStop.disabled = false;
                UI.btnStop.classList.replace('bg-slate-950', 'hover:bg-rose-950');
                UI.btnStop.classList.replace('text-slate-800', 'text-slate-400');
                UI.btnStop.classList.replace('cursor-not-allowed', 'cursor-pointer');
                UI.btnStop.classList.remove('opacity-40');

                UI.statusText.innerText = "Streaming Speech";
                UI.statusIndicator.className = "h-2 w-2 rounded-full bg-cyan-500 pulse-status";
            } 
            else if (ttsStatus === 'PAUSED') {
                UI.iconPlay.classList.remove('hidden');
                UI.iconPause.classList.add('hidden');
                UI.txtPlay.innerText = "Resume Flow";
                UI.btnPlay.className = "flex items-center gap-2 px-6 py-2.5 rounded-full bg-emerald-600 hover:bg-emerald-500 border border-emerald-500/40 text-slate-950 font-bold uppercase text-xs tracking-wider transition-all cursor-pointer shadow-[0_0_15px_rgba(5,150,105,0.3)] focus:outline-none";
                
                UI.statusText.innerText = "Session Paused";
                UI.statusIndicator.className = "h-2 w-2 rounded-full bg-amber-500";
            }
        }
    </script>
