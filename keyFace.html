<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eprashala Key Generator</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #121214; color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e24; padding: 2rem; border-radius: 8px; border: 1px solid #374151; width: 100%; max-width: 400px; }
        h2 { color: #f59e0b; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #374151; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f59e0b; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #d97706; }
        .result { margin-top: 15px; padding: 10px; background: #2a2a32; border: 1px dashed #f59e0b; word-break: break-all; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generate Personalized Key</h2>
    <label>Enter Google API Key:</label>
    <input type="text" id="rawKey" placeholder="AIzaSy...">
    <button onclick="generateKey()">Generate "ep" Key</button>
    
    <div id="resultBox" class="result">
        <strong>Personalized Key:</strong><br>
        <span id="outputKey"></span>
    </div>
</div>

<script>
    // This salt must match the one in your app.js
    const SECRET_SALT = "samudrika2026"; 

    function generateKey() {
        const realKey = document.getElementById('rawKey').value.trim();
        if (!realKey) return alert("Please enter a key.");

        let xorStr = "";
        for (let i = 0; i < realKey.length; i++) {
            // XOR each character with the salt
            xorStr += String.fromCharCode(realKey.charCodeAt(i) ^ SECRET_SALT.charCodeAt(i % SECRET_SALT.length));
        }
        
        // Convert to Base64 and add the "ep" prefix
        const personalizedKey = "ep" + btoa(xorStr);
        
        document.getElementById('outputKey').innerText = personalizedKey;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>
</body>
</html>
