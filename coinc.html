<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhwani Acoustic Detector v3</title>

<style>
body {
    font-family: sans-serif;
    background: #111;
    color: white;
    padding: 20px;
    max-width: 500px;
    margin: auto;
}
.card {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}
.green { background: #28a745; }
.red { background: #dc3545; }
.blue { background: #007bff; }
#status { margin-bottom: 10px; font-weight: bold; }
#result { font-size: 24px; text-align: center; margin-top: 15px; }
</style>
</head>

<body>

<h2>Dhwani Acoustic Detector (v3)</h2>
<div id="status">Ready</div>

<div class="card">
    <button class="red" onclick="initAudio()">🎤 Init Audio</button>
</div>

<div class="card">
    <input id="coinName" placeholder="Enter coin name" style="width:100%; padding:10px;">
    <button class="blue" onclick="learn()">🎓 Learn Coin</button>
</div>

<div class="card">
    <button class="green" onclick="detect()">🔍 Detect</button>
    <div id="result">--</div>
</div>

<script>
let audioCtx;
let processor;
let recordedData = [];
let database = {};
let chirpSignal = [];

// 🎤 INIT AUDIO
async function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
        }
    });

    const source = audioCtx.createMediaStreamSource(stream);

    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    source.connect(processor);
    processor.connect(audioCtx.destination);

    processor.onaudioprocess = (e) => {
        let input = e.inputBuffer.getChannelData(0);
        recordedData.push(...input);
    };

    setStatus("Audio Initialized ✅");
}

// 📢 STATUS
function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

// 🔊 GENERATE CHIRP
function generateChirp() {
    const duration = 0.2;
    const sampleRate = audioCtx.sampleRate;
    const length = sampleRate * duration;

    chirpSignal = new Float32Array(length);

    for (let i = 0; i < length; i++) {
        let t = i / sampleRate;
        let freq = 2000 + (4000 * t / duration);
        chirpSignal[i] = Math.sin(2 * Math.PI * freq * t);
    }

    return chirpSignal;
}

// 🔊 PLAY CHIRP
function playChirp() {
    let data = generateChirp();

    let buffer = audioCtx.createBuffer(1, data.length, audioCtx.sampleRate);
    buffer.copyToChannel(data, 0);

    let src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    src.start();
}

// 🎯 CAPTURE + PROCESS
async function captureFeature() {
    recordedData = [];

    playChirp();

    await new Promise(r => setTimeout(r, 500));

    let signal = recordedData.slice();

    let corr = crossCorrelate(signal, chirpSignal);

    return extractPeaks(corr);
}

// 🔁 CROSS CORRELATION
function crossCorrelate(signal, pattern) {
    let len = signal.length - pattern.length;
    let result = new Float32Array(len);

    for (let i = 0; i < len; i++) {
        let sum = 0;

        for (let j = 0; j < pattern.length; j++) {
            sum += signal[i + j] * pattern[j];
        }

        result[i] = sum;
    }

    return result;
}

// 📊 EXTRACT PEAKS
function extractPeaks(corr) {
    let peaks = [];

    for (let i = 1; i < corr.length - 1; i++) {
        if (corr[i] > corr[i-1] && corr[i] > corr[i+1]) {
            peaks.push(corr[i]);
        }
    }

    peaks.sort((a,b) => b-a);

    return peaks.slice(0, 10);
}

// 🔍 COMPARE
function comparePeaks(a, b) {
    let len = Math.min(a.length, b.length);
    let diff = 0;

    for (let i = 0; i < len; i++) {
        diff += Math.abs(a[i] - b[i]);
    }

    return 1 / (1 + diff);
}

// 🎓 LEARN
async function learn() {
    let name = document.getElementById("coinName").value.trim();
    if (!name) return alert("Enter coin name");

    setStatus("Learning... keep phone still");

    let feature = await captureFeature();

    if (!database[name]) database[name] = [];
    database[name].push(feature);

    setStatus(name + " learned (" + database[name].length + ")");
}

// 🔍 DETECT
async function detect() {
    if (Object.keys(database).length === 0) {
        alert("Train first!");
        return;
    }

    setStatus("Detecting...");

    let feature = await captureFeature();

    let best = "Unknown";
    let bestScore = 0;

    for (let coin in database) {
        for (let sample of database[coin]) {
            let score = comparePeaks(feature, sample);

            if (score > bestScore) {
                bestScore = score;
                best = coin;
            }
        }
    }

    if (bestScore > 0.7) {
        document.getElementById("result").innerText = best;
        setStatus("Match: " + (bestScore * 100).toFixed(1) + "%");
    } else {
        document.getElementById("result").innerText = "Not Recognized";
        setStatus("Weak signal (" + (bestScore*100).toFixed(1) + "%)");
    }
}
</script>

</body>
</html>
