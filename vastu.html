<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vastu Architecture & AI Analysis Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #1e272e; color: #dcdde1; overflow-x: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; background-color: #2f3640; padding: 20px; display: flex; flex-direction: column; gap: 12px; border-right: 2px solid #3d3d3d; box-shadow: 4px 0 15px rgba(0,0,0,0.3); overflow-y: auto; z-index: 10; }
        .sidebar h3 { margin-top: 0; color: #fbc531; border-bottom: 2px solid #e1b12c; padding-bottom: 8px; font-size: 1.1em; letter-spacing: 0.5px; }
        .section-label { font-size: 0.85em; text-transform: uppercase; color: #718093; margin-top: 10px; font-weight: bold; }
        
        /* Interactive Buttons */
        .btn { background-color: #353b48; color: #f5f6fa; border: 1px solid #718093; padding: 12px 14px; cursor: pointer; border-radius: 6px; text-align: left; font-weight: 500; transition: all 0.2s ease; display: flex; justify-content: space-between; align-items: center; touch-action: manipulation; }
        .btn:hover { background-color: #718093; color: #fff; transform: translateY(-1px); }
        .btn-room { border-left: 4px solid #fbc531; }
        .btn-fixture { border-left: 4px solid #00a8ff; }
        .btn-danger { background-color: #c23616; border: none; color: white; text-align: center; justify-content: center; font-weight: bold; }
        .btn-danger:hover { background-color: #ea2027; }
        .btn-action { background-color: #e1b12c; color: #2f3640; border: none; font-weight: bold; font-size: 1.05em; text-align: center; justify-content: center; padding: 14px; margin-top: 10px; box-shadow: 0 4px 10px rgba(225,177,44,0.3); }
        .btn-action:hover { background-color: #fbc531; color: #000; transform: translateY(-2px); }
        .btn-align { background-color: #0097e6; color: white; border: none; text-align: center; justify-content: center; font-weight: bold; margin-top: 5px; }
        .btn-align:hover { background-color: #00a8ff; }

        /* Canvas Workspace Workspace */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; background-color: #1e272e; min-width: 0; }
        .controls { display: flex; gap: 15px; margin-bottom: 15px; background: #2f3640; padding: 12px 20px; border-radius: 8px; align-items: center; border: 1px solid #3d3d3d; flex-wrap: wrap; }
        .controls label { font-size: 0.9em; color: #fbc531; font-weight: 600; white-space: nowrap; }
        .controls input { background: #1e272e; border: 1px solid #718093; padding: 10px; color: #fff; border-radius: 4px; width: 70px; text-align: center; font-size: 16px; /* 16px prevents iOS/Android auto-zoom */ }
        .controls-row { display: flex; align-items: center; gap: 10px; }
        
        .canvas-container-wrapper { flex: 1; background: #252c34; border: 2px dashed #485460; border-radius: 8px; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.4); overflow: hidden; touch-action: none; /* Prevents page scrolling when dragging canvas elements */ }
        
        /* Inspection Panel */
        .settings-panel { width: 320px; background-color: #2f3640; border-left: 2px solid #3d3d3d; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 10; }
        .settings-panel label { font-size: 0.9em; font-weight: bold; color: #fbc531; }
        .settings-panel input[type="text"], .settings-panel textarea { background: #1e272e; border: 1px solid #718093; padding: 12px; color: white; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        .settings-panel textarea { height: 120px; resize: vertical; line-height: 1.4; }
        
        #ai-response { flex: 1; background: #1e272e; border: 1px solid #485460; border-radius: 6px; padding: 12px; overflow-y: auto; font-size: 0.9em; white-space: pre-wrap; color: #f5f6fa; line-height: 1.5; border-left: 4px solid #4cd137; min-height: 150px; }
        .loading { display: none; color: #4cd137; font-weight: bold; text-align: center; animation: pulse 1.5s infinite; margin: 10px 0; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* TTS Header */
        .report-header { display: flex; justify-content: space-between; align-items: center; }
        .tts-btn { background-color: #00a8ff; color: white; border: none; padding: 8px 14px; border-radius: 4px; font-size: 0.85em; font-weight: bold; cursor: pointer; display: none; transition: background 0.2s; }
        .tts-btn:hover { background-color: #0097e6; }

        /* =========================================
           MOBILE / ANDROID RESPONSIVE OVERRIDES
           ========================================= */
        @media screen and (max-width: 850px) {
            body { 
                flex-direction: column; 
                height: auto; 
                min-height: 100vh;
                overflow-y: auto; 
            }
            .sidebar { 
                width: 100%; 
                border-right: none; 
                border-bottom: 2px solid #3d3d3d; 
                padding: 15px; 
                box-sizing: border-box;
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 8px; 
            }
            .sidebar h3, .sidebar .section-label, .sidebar .btn-danger, .sidebar .btn-align {
                grid-column: 1 / -1; 
                text-align: center;
                justify-content: center;
            }
            .main-content { 
                padding: 10px; 
                height: 65vh; /* Locks canvas to a solid block on mobile */
                min-height: 450px;
                box-sizing: border-box;
            }
            .controls {
                flex-direction: column;
                align-items: flex-start;
                padding: 10px;
            }
            .controls-row {
                width: 100%;
                justify-content: space-between;
            }
            .canvas-container-wrapper {
                height: 100%;
                width: 100%;
            }
            .settings-panel { 
                width: 100%; 
                border-left: none; 
                border-top: 2px solid #3d3d3d; 
                box-sizing: border-box;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Architectural Elements</h3>
        
        <div class="section-label">Habitable Spaces</div>
        <button class="btn btn-room" onclick="addRoom('Master Bedroom', '#ff7675')"><span>Master Bed</span> 🛋️</button>
        <button class="btn btn-room" onclick="addRoom('Living Room', '#74b9ff')"><span>Living</span> 📺</button>
        <button class="btn btn-room" onclick="addRoom('Kitchen', '#ffeaa7')"><span>Kitchen</span> 🍳</button>
        <button class="btn btn-room" onclick="addRoom('Pooja Room', '#fdcb6e')"><span>Pooja</span> 🛕</button>
        <button class="btn btn-room" onclick="addRoom('Dining Room', '#55efc4')"><span>Dining</span> 🍽️</button>
        
        <div class="section-label">Utilities & Structural</div>
        <button class="btn btn-fixture" onclick="addRoom('Toilet/Bath', '#a29bfe')"><span>Toilet</span> 🚽</button>
        <button class="btn btn-fixture" onclick="addFixture('Main Door', '#e17055', 45, 12)"><span>Entrance</span> 🚪</button>
        <button class="btn btn-fixture" onclick="addFixture('Window', '#0984e3', 60, 8)"><span>Window</span> 🪟</button>
        
        <div class="section-label">Grid Operations</div>
        <button class="btn btn-align" onclick="alignHouseToCenter()">🎯 Align House to Center</button>
        <button class="btn btn-danger" onclick="deleteSelected()" style="margin-top: 5px;">Remove Selected</button>
    </div>

    <div class="main-content">
        <div class="controls">
            <div class="controls-row">
                <label>Dimensions:</label>
                <input type="number" id="obj-width" placeholder="W" onchange="updateDimensions()">
                <span style="color: #718093; font-weight: bold;">×</span>
                <input type="number" id="obj-height" placeholder="L" onchange="updateDimensions()">
                <button class="btn" onclick="updateDimensions()" style="padding: 10px 14px; background: #e1b12c; color: #000; font-weight: bold; border: none;">Apply</button>
            </div>
            <span style="color: #718093; font-size: 0.8em; margin-top: 5px; text-align: center; width: 100%;">💡 Tap & rotate the Compass Edge to orient Magnetic North</span>
        </div>
        <div class="canvas-container-wrapper" id="canvas-wrapper">
            <canvas id="floorplan"></canvas>
        </div>
    </div>

    <div class="settings-panel">
        <h3>Vastu Shastra Engine</h3>
        
        <label for="api-key">Developer / Personal API Key</label>
        <input type="text" id="api-key" placeholder="Enter Gemini API key (optional)...">
        
        <label for="custom-prompt">Vastu Consultation Directive</label>
        <textarea id="custom-prompt">You are an elite Vastu Shastra expert and senior architectural consultant. Inspect the attached layout image. Cross-verify the graphical floor plan layout with the spatial coordinates provided in the manifest text below. Identify exact location entries for rooms relative to the dynamic North pointer, highlight critical Vastu Doshas, outline downstream effects on inhabitants, and prescribe structural or placement remedies.</textarea>

        <button class="btn btn-action" onclick="analyzeVastuPlan()">Run Vastu Consultation</button>
        <div id="loading-indicator" class="loading">⚡ Aligning cosmic elements & consulting AI...</div>
        
        <div class="report-header">
            <label>Vastu Evaluation Document:</label>
            <button id="tts-btn" class="tts-btn" onclick="toggleSpeech()">🔊 Read Aloud</button>
        </div>
        <div id="ai-response">Awaiting blueprint analysis layout submission...</div>
    </div>

    <script>
        // Global Fabric Configurations for Mobile Touch Targets
        fabric.Object.prototype.cornerSize = 18; // Larger hitboxes for thick fingers
        fabric.Object.prototype.touchCornerSize = 24; 
        fabric.Object.prototype.transparentCorners = false;
        fabric.Object.prototype.cornerColor = '#00a8ff';
        fabric.Object.prototype.borderColor = '#00a8ff';

        let canvas;
        let vastuCompassGroup;
        let speechSynth = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeakingPaused = false;

        // Initialize Workspace Canvas
        window.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.getElementById('canvas-wrapper');
            canvas = new fabric.Canvas('floorplan', {
                width: wrapper.clientWidth,
                height: wrapper.clientHeight,
                backgroundColor: '#252c34',
                preserveObjectStacking: true,
                selection: true
            });

            initVastuCompassGrid(wrapper.clientWidth / 2, wrapper.clientHeight / 2, wrapper.clientWidth, wrapper.clientHeight);

            canvas.on('selection:created', handleAssetSelection);
            canvas.on('selection:updated', handleAssetSelection);
            canvas.on('selection:cleared', () => {
                document.getElementById('obj-width').value = '';
                document.getElementById('obj-height').value = '';
            });

            // Keep Compass perfectly centered and resized on window adjustment/mobile orientation change
            window.addEventListener('resize', debounce(() => {
                const newWidth = wrapper.clientWidth;
                const newHeight = wrapper.clientHeight;
                canvas.setWidth(newWidth);
                canvas.setHeight(newHeight);
                
                if (vastuCompassGroup) {
                    // Update scale dynamically based on mobile constraints
                    const radius = Math.min(newWidth, newHeight) / 2.2;
                    vastuCompassGroup.set({ 
                        left: newWidth / 2, 
                        top: newHeight / 2,
                        scaleX: radius / (vastuCompassGroup.width / 2),
                        scaleY: radius / (vastuCompassGroup.height / 2)
                    });
                    vastuCompassGroup.setCoords();
                }
                canvas.renderAll();
            }, 200));
        });

        // Debounce utility to prevent extreme lag during Android screen rotation
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => { clearTimeout(timeout); func(...args); };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Generate Full-Screen Locked Compass Grid
        function initVastuCompassGrid(centerX, centerY, width, height) {
            const isMobile = window.innerWidth < 800;
            const radius = Math.min(width, height) / 2.2;
            const elements = [];

            const outerCircle = new fabric.Circle({
                radius: radius, fill: 'transparent', stroke: '#e1b12c', strokeWidth: 1.5, strokeDashArray: [6, 6], originX: 'center', originY: 'center', selectable: false
            });
            elements.push(outerCircle);

            const innerCenter = new fabric.Circle({
                radius: 6, fill: '#e1b12c', originX: 'center', originY: 'center', selectable: false
            });
            elements.push(innerCenter);

            const directions = [
                { name: 'N', angle: 0, color: '#e84118', isMajor: true },
                { name: 'NE', angle: 45, color: '#fbc531', isMajor: false },
                { name: 'E', angle: 90, color: '#fbc531', isMajor: true },
                { name: 'SE', angle: 135, color: '#fbc531', isMajor: false },
                { name: 'S', angle: 180, color: '#fbc531', isMajor: true },
                { name: 'SW', angle: 225, color: '#fbc531', isMajor: false },
                { name: 'W', angle: 270, color: '#fbc531', isMajor: true },
                { name: 'NW', angle: 315, color: '#fbc531', isMajor: false }
            ];

            // Adjust spacing tighter for mobile to prevent clipping
            const textOffset = isMobile ? 18 : 25;
            const arrowOffset = isMobile ? 35 : 50;

            directions.forEach(dir => {
                const rad = (dir.angle - 90) * (Math.PI / 180);
                const lineX = Math.cos(rad) * radius;
                const lineY = Math.sin(rad) * radius;

                const ray = new fabric.Line([0, 0, lineX, lineY], {
                    stroke: dir.isMajor ? '#e1b12c' : '#718093', strokeWidth: dir.isMajor ? 1.5 : 1, strokeDashArray: dir.isMajor ? null : [4, 4], selectable: false, originX: 'center', originY: 'center'
                });
                elements.push(ray);

                const textX = Math.cos(rad) * (radius - textOffset);
                const textY = Math.sin(rad) * (radius - textOffset);
                const label = new fabric.Text(dir.name, {
                    fontSize: dir.isMajor ? (isMobile ? 16 : 20) : (isMobile ? 12 : 16), fontWeight: 'bold', fill: dir.color, fontFamily: 'Arial', originX: 'center', originY: 'center', left: textX, top: textY, selectable: false
                });
                elements.push(label);

                if (dir.name === 'N') {
                    const pointer = new fabric.Triangle({
                        width: isMobile ? 16 : 20, height: isMobile ? 20 : 26, fill: '#e84118', originX: 'center', originY: 'center', left: Math.cos(rad) * (radius - arrowOffset), top: Math.sin(rad) * (radius - arrowOffset), angle: dir.angle, selectable: false
                    });
                    elements.push(pointer);
                }
            });

            vastuCompassGroup = new fabric.Group(elements, {
                left: centerX, top: centerY, originX: 'center', originY: 'center',
                hasControls: true, hasBorders: true, borderColor: '#e1b12c', cornerColor: '#e1b12c', cornerSize: 20, touchCornerSize: 30, transparentCorners: false,
                lockMovementX: true, lockMovementY: true, lockScalingX: true, lockScalingY: true, lockSkewingX: true, lockSkewingY: true, lockScalingFlip: true,
                hoverCursor: 'grab', moveCursor: 'grabbing'
            });

            vastuCompassGroup.setControlsVisibility({
                mt: false, mb: false, ml: false, mr: false,
                tl: false, tr: false, bl: false, br: false,
                mtr: true
            });

            vastuCompassGroup.set('isVastuCompass', true);
            canvas.add(vastuCompassGroup);
            vastuCompassGroup.sendToBack(); 
            canvas.renderAll();
        }

        function alignHouseToCenter() {
            const allHouseElements = canvas.getObjects().filter(obj => !obj.isVastuCompass);
            
            if (allHouseElements.length === 0) {
                alert("Draw some rooms first to align them!");
                return;
            }

            const boundingGroup = new fabric.Group(allHouseElements);
            const structureCenter = boundingGroup.getCenterPoint();
            const trueCanvasCenter = vastuCompassGroup.getCenterPoint();

            const offsetX = trueCanvasCenter.x - structureCenter.x;
            const offsetY = trueCanvasCenter.y - structureCenter.y;

            allHouseElements.forEach(obj => {
                obj.set({
                    left: obj.left + offsetX,
                    top: obj.top + offsetY
                });
                obj.setCoords();
            });

            canvas.discardActiveObject();
            canvas.renderAll();
        }

        function handleAssetSelection(e) {
            const selectedItem = e.selected[0];
            if (selectedItem && !selectedItem.isVastuCompass) {
                document.getElementById('obj-width').value = Math.round(selectedItem.width * selectedItem.scaleX);
                document.getElementById('obj-height').value = Math.round(selectedItem.height * selectedItem.scaleY);
            }
        }

        function addRoom(name, backgroundColor) {
            const isMobile = window.innerWidth < 800;
            const baseW = isMobile ? 100 : 140;
            const baseH = isMobile ? 80 : 120;

            const rect = new fabric.Rect({ width: baseW, height: baseH, fill: backgroundColor, opacity: 0.85, stroke: '#2f3640', strokeWidth: 2, rx: 4, ry: 4 });
            const title = new fabric.Text(name, { fontSize: isMobile ? 11 : 13, fontWeight: 'bold', fontFamily: 'Segoe UI', originX: 'center', originY: 'center', left: baseW/2, top: baseH/2, fill: '#1e272e' });
            
            const roomGroup = new fabric.Group([rect, title], { 
                left: canvas.width / 2 - baseW / 2, top: canvas.width / 2 - baseH / 2, // Drop directly in center
                transparentCorners: false 
            });
            
            roomGroup.set('customMetadata', { assetName: name, type: 'room' });
            canvas.add(roomGroup);
            canvas.setActiveObject(roomGroup);
        }

        function addFixture(name, hexColor, w, h) {
            const isMobile = window.innerWidth < 800;
            const fixture = new fabric.Rect({
                width: isMobile ? w * 0.8 : w, height: isMobile ? h * 0.8 : h, fill: hexColor, 
                left: canvas.width / 2, top: canvas.width / 2, 
                transparentCorners: false, stroke: '#fff', strokeWidth: 1
            });
            fixture.set('customMetadata', { assetName: name, type: 'fixture' });
            canvas.add(fixture);
            canvas.setActiveObject(fixture);
        }

        function updateDimensions() {
            const activeAsset = canvas.getActiveObject();
            if (!activeAsset || activeAsset.isVastuCompass) return;
            
            const w = parseInt(document.getElementById('obj-width').value);
            const h = parseInt(document.getElementById('obj-height').value);
            
            if (w && h) {
                activeAsset.set({ width: w, height: h, scaleX: 1, scaleY: 1 });
                if (activeAsset.type === 'group' && activeAsset.getObjects().length >= 2) {
                    activeAsset.item(0).set({ width: w, height: h });
                    activeAsset.item(1).set({ left: w / 2, top: h / 2 });
                    activeAsset.addWithUpdate();
                }
                canvas.renderAll();
            }
        }

        function deleteSelected() {
            const elementsToRemove = canvas.getActiveObjects();
            if (elementsToRemove.length) {
                elementsToRemove.forEach((item) => {
                    if (!item.isVastuCompass) canvas.remove(item);
                });
                canvas.discardActiveObject();
                canvas.renderAll();
            }
        }

        function calculateSpatialVastuManifest() {
            const compassCenter = vastuCompassGroup.getCenterPoint();
            const compassRotation = vastuCompassGroup.angle; 

            let manifestOutputText = "\n\n=========================================\n";
            manifestOutputText += "CRITICAL GEOMETRIC METADATA (AUTOMATED ARCHITECT MANIFEST):\n";
            manifestOutputText += `- Compass Alignment Orientation Reference: Center=(${Math.round(compassCenter.x)}, ${Math.round(compassCenter.y)}), Dynamic North Angle=${Math.round(compassRotation)}°\n`;

            let detectedAssetsCount = 0;

            canvas.getObjects().forEach(item => {
                if (item.isVastuCompass) return;

                const metadata = item.customMetadata;
                if (metadata) {
                    detectedAssetsCount++;
                    const itemCenter = item.getCenterPoint();
                    const deltaX = itemCenter.x - compassCenter.x;
                    const deltaY = itemCenter.y - compassCenter.y;

                    let baseScreenAngle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
                    if (baseScreenAngle < 0) baseScreenAngle += 360;

                    let adjustedVastuAngle = baseScreenAngle - (compassRotation - 90);
                    adjustedVastuAngle = (adjustedVastuAngle % 360 + 360) % 360;

                    let assignedZone = "";
                    if (adjustedVastuAngle >= 337.5 || adjustedVastuAngle < 22.5) assignedZone = "North (N) - Kubera Zone";
                    else if (adjustedVastuAngle >= 22.5 && adjustedVastuAngle < 67.5) assignedZone = "North-East (NE) - Ishanya Zone";
                    else if (adjustedVastuAngle >= 67.5 && adjustedVastuAngle < 112.5) assignedZone = "East (E) - Indra Zone";
                    else if (adjustedVastuAngle >= 112.5 && adjustedVastuAngle < 157.5) assignedZone = "South-East (SE) - Agneya Zone";
                    else if (adjustedVastuAngle >= 157.5 && adjustedVastuAngle < 202.5) assignedZone = "South (S) - Yama Zone";
                    else if (adjustedVastuAngle >= 202.5 && adjustedVastuAngle < 247.5) assignedZone = "South-West (SW) - Nairutya Zone";
                    else if (adjustedVastuAngle >= 247.5 && adjustedVastuAngle < 292.5) assignedZone = "West (W) - Varuna Zone";
                    else if (adjustedVastuAngle >= 292.5 && adjustedVastuAngle < 337.5) assignedZone = "North-West (NW) - Vayu Zone";

                    manifestOutputText += `- Asset: [${metadata.assetName}] | Exact Vastu Angle: ${Math.round(adjustedVastuAngle)}° -> Placed in Zone: ${assignedZone}\n`;
                }
            });

            return detectedAssetsCount === 0 ? null : manifestOutputText + "=========================================";
        }

        // TTS Engine Controller
        function toggleSpeech() {
            const btn = document.getElementById('tts-btn');
            const outputText = document.getElementById('ai-response').innerText;
            
            if (!outputText || outputText.includes("Awaiting blueprint")) return;

            if (speechSynth.speaking) {
                if (isSpeakingPaused) {
                    speechSynth.resume();
                    isSpeakingPaused = false;
                    btn.innerText = "⏸️ Pause Audio";
                } else {
                    speechSynth.pause();
                    isSpeakingPaused = true;
                    btn.innerText = "▶️ Resume Audio";
                }
            } else {
                currentUtterance = new SpeechSynthesisUtterance(outputText);
                currentUtterance.rate = 1.0;
                currentUtterance.pitch = 1.0;
                
                currentUtterance.onend = () => {
                    isSpeakingPaused = false;
                    btn.innerText = "🔊 Read Aloud";
                };
                
                speechSynth.speak(currentUtterance);
                isSpeakingPaused = false;
                btn.innerText = "⏸️ Pause Audio";
            }
        }

        function resetAudioEngine() {
            speechSynth.cancel();
            isSpeakingPaused = false;
            document.getElementById('tts-btn').style.display = 'none';
            document.getElementById('tts-btn').innerText = "🔊 Read Aloud";
        }

        async function analyzeVastuPlan() {
            resetAudioEngine(); 
            
            const apiKey = document.getElementById('api-key').value.trim();
            const baseDirectivePrompt = document.getElementById('custom-prompt').value;
            const outputReportView = document.getElementById('ai-response');
            const visualLoader = document.getElementById('loading-indicator');

            const coordinateManifest = calculateSpatialVastuManifest();
            
            if (!coordinateManifest) {
                alert("Please add structural elements to the grid first.");
                return;
            }

            const strictFormattingRule = "\n\nCRITICAL FORMATTING INSTRUCTION: Do NOT use markdown symbols. Do NOT use asterisks, bold marks, or angle brackets. Output clean, plain text only so the TTS engine can read it perfectly.";
            
            const fullEnginePrompt = baseDirectivePrompt + strictFormattingRule + coordinateManifest;

            canvas.discardActiveObject();
            canvas.renderAll();

            const canvasSnapshotBase64 = canvas.toDataURL({ format: 'jpeg', quality: 0.95 }).split(',')[1];

            const payloadStructure = {
                contents: [{
                    parts: [
                        { text: fullEnginePrompt },
                        { inlineData: { mimeType: "image/jpeg", data: canvasSnapshotBase64 } }
                    ]
                }]
            };

            outputReportView.innerText = "";
            visualLoader.style.display = "block";
            
            // Scroll to the loader on mobile
            if (window.innerWidth < 800) {
                outputReportView.scrollIntoView({ behavior: "smooth", block: "start" });
            }

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Custom-Api-Key': apiKey },
                    body: JSON.stringify(payloadStructure)
                });

                const data = await response.json();
                visualLoader.style.display = "none";

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    outputReportView.innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('tts-btn').style.display = 'block'; 
                } else if (data.error) {
                    outputReportView.innerText = "Execution Exception:\n" + JSON.stringify(data.error, null, 2);
                } else {
                    outputReportView.innerText = "Error parsing server data packet stream.";
                }

            } catch (err) {
                visualLoader.style.display = "none";
                outputReportView.innerText = "Network Communication Failed.\n\nError Vector Tracing: " + err.message;
            }
        }
    </script>
</body>
</html>
