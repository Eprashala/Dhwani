<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhwani - AI Sanskar Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .pulse-bg { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .app-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .app-section.active { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <nav class="w-full max-w-3xl flex justify-between bg-gray-800 p-3 rounded-xl mb-4 shadow-lg shrink-0">
        <button onclick="switchTab('chat-section')" class="px-4 py-2 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition">💬 Chat Mode</button>
        <button onclick="switchTab('enroll-section')" class="px-4 py-2 bg-purple-600 rounded-lg font-bold hover:bg-purple-500 transition">👨‍👩‍👧‍👦 Family Setup</button>
        <button onclick="switchTab('parent-section')" class="px-4 py-2 bg-teal-600 rounded-lg font-bold hover:bg-teal-500 transition">⚙️ Controls</button>
    </nav>

    <div class="w-full max-w-3xl flex-grow flex flex-col relative h-[85vh]">

        <div id="enroll-section" class="app-section flex-col gap-4 bg-gray-800 p-6 rounded-2xl h-full overflow-y-auto">
            <h2 class="text-2xl font-bold text-purple-400 border-b border-gray-700 pb-2">Family Voice Enrollment</h2>
            
            <div class="bg-gray-700 p-4 rounded-xl flex flex-col gap-3">
                <input type="hidden" id="edit-id" value="">
                
                <div class="flex gap-2">
                    <select id="enroll-role" class="p-2 rounded bg-gray-900 text-white border border-gray-600 w-1/2">
                        <option value="Child">Child (बाळा)</option>
                        <option value="Mother">Mother (आई)</option>
                        <option value="Father">Father (बाबा)</option>
                        <option value="Sibling">Sibling (भाऊ/बहीण)</option>
                        <option value="Maid">Maid (मावशी)</option>
                        <option value="Guest">Guest (पाहुणे)</option>
                    </select>

                    <select id="enroll-gender" class="p-2 rounded bg-gray-900 text-white border border-gray-600 w-1/2">
                        <option value="Female">Female (स्त्री)</option>
                        <option value="Male">Male (पुरुष)</option>
                    </select>
                </div>

                <input type="text" id="enroll-name" placeholder="Name (e.g., Arnav)" class="p-2 rounded bg-gray-900 text-white border border-gray-600">
                <input type="number" id="enroll-age" placeholder="Age (e.g., 8)" class="p-2 rounded bg-gray-900 text-white border border-gray-600">
                <input type="text" id="enroll-callsign" placeholder="Child calls them (e.g., Aai, Dada)" class="p-2 rounded bg-gray-900 text-white border border-gray-600">
                
                <div class="flex items-center gap-2 mt-2">
                    <button id="save-member-btn" onclick="saveFamilyMember()" class="bg-green-600 hover:bg-green-500 px-4 py-3 rounded font-bold transition w-full shadow-lg">Save Profile</button>
                    <button id="cancel-edit-btn" onclick="clearForm()" class="hidden bg-gray-500 hover:bg-gray-400 px-4 py-3 rounded font-bold transition">Cancel</button>
                </div>
            </div>

            <div id="family-list" class="mt-4 flex flex-col gap-2"></div>
        </div>

        <div id="chat-section" class="app-section active flex-col h-full">
            <div class="bg-gray-800 p-6 rounded-2xl flex flex-col flex-grow shadow-2xl border border-gray-700">
                
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h1 class="text-3xl font-bold"><span class="text-blue-400">ध्वनी</span> Companion</h1>
                    <div id="status-indicator" class="px-3 py-1 bg-gray-600 rounded-full text-xs font-bold transition-colors">STANDBY</div>
                </div>

                <div class="mb-4 shrink-0 bg-gray-900 p-2 rounded-xl border border-gray-700">
                    <p class="text-xs text-gray-400 text-center mb-2">Simulate Speaker Recognition:</p>
                    <div id="active-speaker-buttons" class="flex flex-wrap justify-center gap-2"></div>
                </div>

                <div id="chat-log" class="flex-grow bg-black/60 rounded-xl p-4 overflow-y-auto space-y-3 mb-2 font-medium text-lg border border-gray-800">
                    <div class="text-center text-gray-500 text-sm mt-10">Press 'Start System' to begin...</div>
                </div>

                <div id="debug-console" class="h-16 bg-gray-900 border border-red-900 text-red-400 text-xs p-2 overflow-y-auto mb-4 rounded font-mono hidden">
                    --- System Diagnostics ---<br>
                </div>

                <button id="main-listen-btn" class="w-full py-5 rounded-xl font-bold text-xl transition-all shadow-xl bg-blue-600 hover:bg-blue-500 text-white shrink-0">
                    Start System
                </button>
            </div>
        </div>

        <div id="parent-section" class="app-section flex-col gap-4 bg-gray-800 p-6 rounded-2xl h-full overflow-y-auto">
            <h2 class="text-2xl font-bold text-teal-400 border-b border-gray-700 pb-2">Parent Controls</h2>
            
            <div class="bg-gray-700 p-4 rounded-xl">
                <label class="text-sm text-gray-300 block mb-1">Google Gemini API Key</label>
                <input type="password" id="api-key-input" class="w-full p-2 rounded bg-gray-900 text-white border border-gray-600 mb-2">
                <button onclick="saveSettings()" class="bg-teal-600 px-3 py-1 rounded text-sm hover:bg-teal-500">Save Key</button>
            </div>

            <div class="bg-gray-700 p-4 rounded-xl flex flex-col gap-3">
                <h3 class="font-bold text-orange-300">Daily Routines & Alarms</h3>
                <div class="flex gap-2">
                    <input type="time" id="routine-time" class="p-2 rounded bg-gray-900 text-white border border-gray-600 w-1/3">
                    <input type="text" id="routine-name" placeholder="e.g., Morning Wakeup" class="p-2 rounded bg-gray-900 text-white border border-gray-600 w-2/3">
                </div>
                <textarea id="routine-prompt" rows="2" placeholder="Dhwani says: [Name] chal lavkar uth... (Wait for response, ensure polite)" class="w-full p-2 rounded bg-gray-900 text-white border border-gray-600"></textarea>
                <button onclick="saveRoutine()" class="bg-orange-600 hover:bg-orange-500 py-2 rounded font-bold">Add Routine</button>
                <div id="routines-list" class="mt-2 text-sm bg-gray-800 p-2 rounded flex flex-col gap-1"></div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           1. DATABASE INITIALIZATION
           ========================================================================== */
        const db = new Dexie("DhwaniDB");
        db.version(2).stores({
            family: '++id, role, name, age, callsign, gender', 
            schedules: '++id, time, name, prompt',
            settings: 'key, value',
            chatHistory: '++id, role, text, timestamp'
        });

        /* ==========================================================================
           2. STATE & GLOBAL VARIABLES
           ========================================================================== */
        let activeSpeaker = { role: 'Guest', name: 'Guest', callsign: 'दादा', gender: 'Male' }; 
        let wakeLock = null;
        let isListening = false;
        let recognition = null;
        let isRecognizing = false; // NEW: Critical safety lock for microphone
        let appState = 'STANDBY'; 
        const synth = window.speechSynthesis;
        const wakeWords = /ध्वनी|ध्वनि|धोनू|धोनुला|धोनी|dhwani|dhoni|dhonu|dhonulya|dhvani|dhaavni/i;
        let activeRoutineContext = null; 

        // Debug Logger
        function debugLog(msg) {
            console.log("[DEBUG]", msg);
            const consoleDiv = document.getElementById('debug-console');
            consoleDiv.classList.remove('hidden');
            consoleDiv.innerHTML += `> ${msg}<br>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        /* ==========================================================================
           3. UI NAVIGATION & SETUP
           ========================================================================== */
        function switchTab(tabId) {
            document.querySelectorAll('.app-section').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        window.onload = async () => {
            await loadFamilyUI();
            await loadSettings();
            await loadRoutinesUI();
            setupSpeechRecognition();
            startRoutineClock(); 
            
            // Warning if running via file://
            if(window.location.protocol === 'file:') {
                debugLog("WARNING: Running via file:// protocol. The microphone will likely break. Please run on localhost.");
            }
        };

        /* ==========================================================================
           4. FAMILY ENROLLMENT (CRUD)
           ========================================================================== */
        async function saveFamilyMember() {
            const id = document.getElementById('edit-id').value;
            const role = document.getElementById('enroll-role').value;
            const gender = document.getElementById('enroll-gender').value;
            const name = document.getElementById('enroll-name').value.trim();
            const age = parseInt(document.getElementById('enroll-age').value) || 30;
            const callsign = document.getElementById('enroll-callsign').value.trim() || role;

            if(!name) return alert("Please enter a name");
            const memberData = { role, gender, name, age, callsign };

            if (id) await db.family.update(parseInt(id), memberData);
            else await db.family.put(memberData);
            
            clearForm();
            loadFamilyUI();
        }

        function clearForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('enroll-name').value = '';
            document.getElementById('enroll-age').value = '';
            document.getElementById('enroll-callsign').value = '';
            document.getElementById('save-member-btn').textContent = "Save Profile";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        async function editFamilyMember(id) {
            const member = await db.family.get(id);
            if(member) {
                document.getElementById('edit-id').value = member.id;
                document.getElementById('enroll-role').value = member.role;
                document.getElementById('enroll-gender').value = member.gender || 'Female';
                document.getElementById('enroll-name').value = member.name;
                document.getElementById('enroll-age').value = member.age;
                document.getElementById('enroll-callsign').value = member.callsign;
                document.getElementById('save-member-btn').textContent = "Update Profile";
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                switchTab('enroll-section');
            }
        }

        async function deleteFamilyMember(id) {
            if(confirm("Are you sure?")) { await db.family.delete(id); loadFamilyUI(); }
        }

        async function loadFamilyUI() {
            const members = await db.family.toArray();
            const listDiv = document.getElementById('family-list');
            const btnsDiv = document.getElementById('active-speaker-buttons');
            
            listDiv.innerHTML = ''; btnsDiv.innerHTML = '';

            const guestMale = { role: 'Guest', name: 'Guest', callsign: 'दादा', gender: 'Male' };
            const guestFemale = { role: 'Guest', name: 'Guest', callsign: 'ताई', gender: 'Female' };
            
            btnsDiv.innerHTML += `<button onclick='setActiveSpeaker(${JSON.stringify(guestMale)})' class="px-3 py-1 bg-gray-600 rounded-full text-xs font-bold shadow hover:scale-105 transition">Guest (Dada)</button>`;
            btnsDiv.innerHTML += `<button onclick='setActiveSpeaker(${JSON.stringify(guestFemale)})' class="px-3 py-1 bg-gray-600 rounded-full text-xs font-bold shadow hover:scale-105 transition">Guest (Tai)</button>`;

            let childFound = false;

            members.forEach(m => {
                if(m.role === 'Child') childFound = m;
                listDiv.innerHTML += `
                    <div class="bg-gray-700 p-3 rounded-xl flex justify-between items-center shadow">
                        <div>
                            <span class="font-bold text-white">${m.name}</span> <span class="text-xs text-gray-400">(${m.role} - ${m.gender})</span>
                            <div class="text-sm text-blue-300">Called: ${m.callsign}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editFamilyMember(${m.id})" class="text-xs bg-blue-600 hover:bg-blue-500 px-2 py-1 rounded">Edit</button>
                            <button onclick="deleteFamilyMember(${m.id})" class="text-xs bg-red-600 hover:bg-red-500 px-2 py-1 rounded">Del</button>
                        </div>
                    </div>`;
                
                let color = m.role === 'Child' ? 'bg-blue-600' : 'bg-purple-600';
                btnsDiv.innerHTML += `<button onclick='setActiveSpeaker(${JSON.stringify(m)})' class="px-3 py-1 ${color} rounded-full text-xs font-bold shadow-lg transition hover:scale-105">${m.name} (${m.callsign})</button>`;
            });

            if(childFound) setActiveSpeaker(childFound);
        }

        function setActiveSpeaker(memberObj) {
            activeSpeaker = memberObj;
            logUI('System', `Active Speaker: ${memberObj.name}`);
        }

        /* ==========================================================================
           5. CORE AUDIO & WAKE WORD LOGIC (FORTIFIED WITH SAFETY LOCKS)
           ========================================================================== */
        function safeStartRecognition() {
            if(!recognition || !isListening || isRecognizing) return;
            try { 
                recognition.start(); 
            } catch (e) { 
                debugLog("Start Mic Error: " + e.message); 
            }
        }

        function safeStopRecognition() {
            if(!recognition || !isRecognizing) return;
            try { 
                recognition.stop(); 
            } catch (e) { 
                debugLog("Stop Mic Error: " + e.message); 
            }
        }

        function updateUIState(state) {
            const ind = document.getElementById('status-indicator');
            ind.className = 'px-3 py-1 rounded-full text-xs font-bold text-white transition-colors ';
            if(state === 'WAKE_WORD_SEARCH') { ind.classList.add('bg-blue-500', 'animate-pulse'); ind.textContent = 'LISTENING FOR WAKE WORD'; }
            else if(state === 'CONVERSATION') { ind.classList.add('bg-green-500', 'animate-pulse'); ind.textContent = 'LISTENING (CHAT)'; }
            else if(state === 'BUSY') { ind.classList.add('bg-yellow-500'); ind.textContent = 'THINKING/SPEAKING...'; }
            else { ind.classList.add('bg-gray-600'); ind.textContent = 'STANDBY'; }
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Speech Recognition not supported in this browser. Use Chrome.");
                return;
            }
            
            recognition = new SpeechRecognition();
            recognition.continuous = false; // Changed to false to force clean restarts
            recognition.interimResults = false;
            recognition.lang = 'mr-IN'; 

            recognition.onstart = () => { isRecognizing = true; };

            recognition.onresult = async (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
                debugLog("Heard: " + transcript);
                
                if (appState === 'WAKE_WORD_SEARCH') {
                    if (wakeWords.test(transcript)) {
                        appState = 'BUSY'; updateUIState('BUSY'); safeStopRecognition();
                        
                        let greeting = activeSpeaker.role === 'Child' 
                            ? (activeSpeaker.gender === 'Female' ? `काय ग ${activeSpeaker.name}? बोल ना.` : `काय रे ${activeSpeaker.name}? बोल ना.`)
                            : `नमस्कार ${activeSpeaker.callsign}, बोला. मी ऐकत आहे.`;

                        logUI('Dhwani', greeting);
                        await speakText(greeting);
                        
                        appState = 'CONVERSATION'; updateUIState('CONVERSATION'); safeStartRecognition();
                    }
                } 
                else if (appState === 'CONVERSATION') {
                    logUI(activeSpeaker.name, transcript);
                    appState = 'BUSY'; updateUIState('BUSY'); safeStopRecognition();
                    
                    await handleAIResponse(transcript);
                    
                    appState = 'CONVERSATION'; updateUIState('CONVERSATION'); safeStartRecognition();
                }
            };

            recognition.onend = () => {
                isRecognizing = false;
                // Auto-restart if we are supposed to be listening and not speaking/thinking
                if (isListening && appState !== 'BUSY') {
                    setTimeout(safeStartRecognition, 300);
                }
            };
            
            recognition.onerror = (e) => {
                debugLog("Mic Error: " + e.error);
                isRecognizing = false;
                if(e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    toggleListening(); // Force shut down
                    alert("Microphone access denied or blocked by browser.");
                }
            };
        }

        document.getElementById('main-listen-btn').addEventListener('click', toggleListening);

        async function toggleListening() {
            const btn = document.getElementById('main-listen-btn');
            if (isListening) { 
                isListening = false;
                appState = 'STANDBY';
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                safeStopRecognition();
                if (synth.speaking) synth.cancel();
                
                btn.textContent = "Start System";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                updateUIState('STANDBY');
            } else {
                try {
                    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
                    isListening = true;
                    appState = 'WAKE_WORD_SEARCH';
                    
                    btn.textContent = "⏹️ Stop System";
                    btn.classList.replace('bg-blue-600', 'bg-red-600');
                    updateUIState('WAKE_WORD_SEARCH');
                    safeStartRecognition();
                } catch (e) { debugLog("WakeLock Error: " + e.message); }
            }
        }

        /* ==========================================================================
           6. SCHEDULING & ALARMS
           ========================================================================== */
        async function saveRoutine() {
            const time = document.getElementById('routine-time').value;
            const name = document.getElementById('routine-name').value;
            const prompt = document.getElementById('routine-prompt').value;
            if(!time || !prompt) return alert("Please fill time and prompt!");
            await db.schedules.put({ time, name, prompt });
            document.getElementById('routine-time').value = '';
            document.getElementById('routine-name').value = '';
            document.getElementById('routine-prompt').value = '';
            loadRoutinesUI();
        }

        async function loadRoutinesUI() {
            const routines = await db.schedules.toArray();
            const list = document.getElementById('routines-list');
            list.innerHTML = routines.map(r => `
                <div class="border-b border-gray-600 py-2 flex justify-between items-center">
                    <div><b>${r.time}</b>: ${r.name}</div>
                    <button onclick="deleteRoutine(${r.id})" class="text-xs bg-red-600 hover:bg-red-500 px-2 py-1 rounded">Del</button>
                </div>`).join('');
        }

        async function deleteRoutine(id) { await db.schedules.delete(id); loadRoutinesUI(); }

        function startRoutineClock() {
            setInterval(async () => {
                if (!isListening) return; 
                const now = new Date();
                const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                if (now.getSeconds() !== 0) return; 

                const routines = await db.schedules.toArray();
                const matchingRoutine = routines.find(r => r.time === currentTimeStr);
                
                if (matchingRoutine) {
                    debugLog("Routine Triggered: " + matchingRoutine.name);
                    triggerRoutine(matchingRoutine);
                }
            }, 1000);
        }

        async function triggerRoutine(routine) {
            appState = 'BUSY'; updateUIState('BUSY'); safeStopRecognition();
            logUI('System', `Alarm Triggered: ${routine.name}`);
            activeRoutineContext = routine.prompt;
            await handleAIResponse(`[SYSTEM INTERNAL COMMAND: Trigger the routine defined as: "${routine.prompt}". Speak the initial greeting to the child now.]`);
            appState = 'CONVERSATION'; updateUIState('CONVERSATION'); safeStartRecognition();
        }

        /* ==========================================================================
           7. THE BRAIN (Gemini Integration with Error Recovery)
           ========================================================================== */
        function logUI(sender, message) {
            const div = document.createElement('div');
            const color = sender === 'Dhwani' ? 'text-cyan-400' : (sender === 'System' ? 'text-gray-500' : 'text-green-400');
            div.innerHTML = `<span class="${color} font-bold">${sender}:</span> ${message}`;
            const log = document.getElementById('chat-log');
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function handleAIResponse(userText) {
            const childContext = await db.family.where('role').equals('Child').first();
            const childName = childContext ? childContext.name : 'बाळा';

            let systemPrompt = `
                You are Dhwani, a friendly, highly cultured AI companion doll in Maharashtra.
                Target Child: ${childName}.
                Language: Marathi (Devanagari script). 
                Format: Max 2-3 short sentences. Conversational.

                CURRENT SPEAKER DETAILS: Name: ${activeSpeaker.name}, Role: ${activeSpeaker.role}, Gender: ${activeSpeaker.gender}, Callsign: ${activeSpeaker.callsign}.
            `;

            if (activeSpeaker.role === 'Child') {
                systemPrompt += ` Address child affectionately. Match Marathi verbs to gender (${activeSpeaker.gender}). Gently correct rude behavior. End with an engaging question.`;
            } else {
                systemPrompt += ` CRITICAL: Use 'Aadararthi Bahuvachan' (Respectful Plural). Address them as '${activeSpeaker.callsign}'.`;
            }

            if (activeRoutineContext) {
                systemPrompt += ` IMMEDIATE CONTEXT: Trigger routine "${activeRoutineContext}".`;
            }

            await db.chatHistory.add({ role: 'user', text: userText, timestamp: Date.now() });
            const rawHistory = await db.chatHistory.orderBy('timestamp').reverse().limit(6).toArray();
            const formattedHistory = rawHistory.reverse().map(msg => ({ role: msg.role, parts: [{ text: msg.text }] }));

            const apiKey = await getApiKey();
            if (!apiKey) {
                logUI('System', 'API Key Missing. Set in Parent Controls.');
                debugLog("API Key missing.");
                return;
            }

            try {
                // FIXED: Changed model to the universally stable gemini-1.5-flash
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: formattedHistory, systemInstruction: { parts: [{ text: systemPrompt }] } })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const result = await response.json();
                let aiText = result.candidates[0].content.parts[0].text.trim().replace(/[\*#`]/g, '');
                
                await db.chatHistory.add({ role: 'model', text: aiText, timestamp: Date.now() });
                logUI('Dhwani', aiText);
                await speakText(aiText);
                
                activeRoutineContext = null; 
            } catch (error) { 
                logUI('System', 'Failed to reach AI. Check internet and API key.'); 
                debugLog("Gemini API Error: " + error.message);
            }
        }

        /* ==========================================================================
           8. THE MOUTH (TTS Engine)
           ========================================================================== */
        async function speakText(text) {
            if (synth.speaking) synth.cancel();
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'mr-IN';
                
                let voices = synth.getVoices();
                let selectedVoice = null;
                const marathiVoices = voices.filter(v => v.lang.includes('mr'));
                
                selectedVoice = marathiVoices.find(v => v.name.toLowerCase().includes('female')) || 
                                marathiVoices.find(v => !v.name.toLowerCase().includes('male')) || 
                                marathiVoices[0];

                if (!selectedVoice) {
                    const hiVoices = voices.filter(v => v.lang.includes('hi'));
                    selectedVoice = hiVoices.find(v => v.name.toLowerCase().includes('female')) || hiVoices[0];
                }

                if (selectedVoice) utterance.voice = selectedVoice;
                utterance.pitch = 1.6; 
                utterance.rate = 1.05; 
                
                utterance.onend = resolve;
                utterance.onerror = resolve;
                
                if (voices.length === 0) {
                    window.speechSynthesis.onvoiceschanged = () => {
                        utterance.voice = synth.getVoices().find(v => v.lang.includes('mr')) || utterance.voice;
                        synth.speak(utterance);
                    };
                } else {
                    synth.speak(utterance);
                }
            });
        }

        // Settings Helpers
        async function saveSettings() {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) { await db.settings.put({ key: 'gemini_api', value: key }); alert("API Key Saved"); }
        }
        async function loadSettings() {
            const keyObj = await db.settings.get('gemini_api');
            if(keyObj) document.getElementById('api-key-input').value = keyObj.value;
        }
        async function getApiKey() {
            const keyObj = await db.settings.get('gemini_api');
            return keyObj ? keyObj.value : null;
        }
    </script>
</body>
</html>
