<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khagol Mandal | Master 3D Astronomical Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { 
            --bg-dark: #000000; 
            --panel-dark: rgba(5, 8, 12, 0.95);
            --accent-gold: #f1c40f;
            --text-light: #e2e8f0;
            --border-color: #1e293b;
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text-light); overflow: hidden; touch-action: none;}

        header {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
            background: var(--panel-dark); padding: 12px 20px; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(15px); z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        .header-title { display: flex; align-items: center; gap: 15px; font-weight: 800; color: var(--accent-gold); font-size: 20px; letter-spacing: 1px;}
        
        .controls-row { display: flex; gap: 12px; align-items: center; flex-wrap: nowrap;}
        .input-group { display: flex; align-items: center; gap: 6px; position: relative;}
        .input-group label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: bold; white-space: nowrap;}
        
        input[type="text"], input[type="date"], input[type="time"], select {
            background: #0f172a; border: 1px solid var(--border-color); color: white; padding: 7px 10px; border-radius: 4px; outline: none; font-size: 13px; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent-gold); }

        .btn-calc {
            background: #b91c1c; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
        }
        .btn-calc:hover { background: #dc2626; box-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }

        .btn-gps { background: #0f172a; border: 1px solid var(--border-color); color: white; padding: 7px; border-radius: 4px; cursor: pointer; }
        .btn-gps:hover { border-color: var(--accent-gold); }

        .mobile-toggle-btn { display: none; background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap;}

        #suggestions { position: absolute; top: 100%; left: 40px; background: #0f172a; width: 220px; list-style: none; padding: 0; margin: 4px 0 0 0; border: 1px solid var(--border-color); border-radius: 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000;}
        #suggestions li { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #suggestions li:hover { background: #2563eb; }

        .action-group { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border-color);}
        
        main { position: relative; width: 100vw; height: calc(100vh - 60px); display: flex;}
        
        .filter-panel {
            width: 330px; background: var(--panel-dark); padding: 15px 20px; border-right: 1px solid var(--border-color); 
            overflow-y: auto; z-index: 50; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 25px rgba(0,0,0,0.9);
            transition: left 0.3s ease;
        }
        .filter-panel::-webkit-scrollbar { width: 4px; }
        .filter-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .filter-panel h4 { margin: 0 0 10px 0; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 0; width: 100%;}

        /* BULLETPROOF UI ISOLATION */
        .filter-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); padding: 6px 10px; margin-bottom: 5px;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
        }
        .filter-item:hover { border-color: rgba(255,255,255,0.15); }
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; }
        .checkbox-wrapper label { margin: 0; font-size: 12.5px; cursor: pointer; color: #cbd5e1; white-space: nowrap; transition: 0.2s;}
        .checkbox-wrapper label:hover { color: #ffffff; }
        
        .lbl-container { background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 4px; border: 1px solid #334155; gap: 5px; cursor: pointer;}
        .lbl-container label { font-size: 11px; color: #f1c40f; cursor: pointer;}

        .house-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .house-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 0; text-align: center; border-radius: 4px; cursor: pointer; font-size: 13px;}
        .house-btn.active { background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: #10b981; font-weight: bold; }
        .house-all-btn { width: 100%; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 0; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .house-all-btn.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: #3b82f6; font-weight: bold; }

        #skyContainer { flex-grow: 1; position: relative; background: radial-gradient(circle at center, #060b14 0%, #000000 100%); width: 100%;}
        #skyCanvas3D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; outline: none; }
        #skyCanvas2D { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .controls-overlay { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 10; pointer-events: auto;}
        .ctrl-btn { background: rgba(15, 23, 42, 0.85); color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center;}
        .ctrl-btn:hover { border-color: var(--accent-gold); color: white; transform: scale(1.05);}
        
        #error-msg { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); color: #f1c40f; font-size: 13px; z-index: 100; font-weight: bold; padding: 10px 20px; background: rgba(0,0,0,0.85); border-radius: 8px; border: 1px solid #b91c1c; display: none; text-align: center;}

        /* RESPONSIVE MOBILE CSS */
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; padding: 10px; gap: 10px;}
            .header-title { width: 100%; display: flex; justify-content: space-between; margin-bottom: 5px;}
            .controls-row { width: 100%; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; justify-content: flex-start;}
            .mobile-toggle-btn { display: block; }
            main { height: calc(100vh - 100px); overflow: hidden;}
            .filter-panel {
                position: absolute; top: 0; left: -360px;
                height: 100%; width: 320px; background: rgba(5, 8, 12, 0.98);
            }
            .filter-panel.open { left: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">
        KHAGOL 3D
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="langToggle" onchange="changeLanguage()" style="font-weight: normal; font-size: 12px; height: 26px; padding: 0 5px;">
                <option value="en">English</option>
                <option value="sa">संस्कृतम्</option>
                <option value="hi">हिन्दी</option>
                <option value="mr">मराठी</option>
            </select>
            <button class="mobile-toggle-btn" onclick="toggleMobileFilters()">⚙️ Filters</button>
        </div>
    </div>
    
    <div class="controls-row">
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label>Time</label>
            <input type="time" id="time" step="1">
        </div>
        <div class="input-group">
            <button class="btn-gps" onclick="fetchBrowserLocation()" title="Detect Location">📍</button>
            <input type="text" id="placeSearch" placeholder="City..." autocomplete="off" style="width: 100px;">
            <ul id="suggestions"></ul>
            <input type="hidden" id="lat">
            <input type="hidden" id="lon">
        </div>
        
        <div class="action-group">
            <div class="checkbox-wrapper" style="margin-right: 5px;">
                <input type="checkbox" id="cbShowLabels" checked onchange="render2DOverlay()">
                <label for="cbShowLabels" style="color: var(--accent-gold); font-weight: bold; text-transform: uppercase;">Labels</label>
            </div>
            <button class="btn-calc" onclick="generateMap()">Align Cosmos</button>
        </div>
    </div>
</header>

<main>
    <div class="filter-panel" id="filterDrawer">
        <div>
            <h4>Reference Frame</h4>
            <div style="display: flex; gap: 12px; margin-bottom: 10px; padding: 0 5px; flex-wrap: wrap;">
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radBhu" value="Earth" onchange="updateView()"> 
                    <label for="radBhu"><span style="color:#3b82f6;">🌍</span> Bhu</label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radSurya" value="Sun" checked onchange="updateView()"> 
                    <label for="radSurya"><span style="color:#f1c40f;">☀️</span> Surya</label>
                </div>
                <div class="checkbox-wrapper">
                    <input type="radio" name="focus" id="radLocal" value="Local" onchange="updateView()"> 
                    <label for="radLocal"><span style="color:#2ecc71;">🧍</span> My View</label>
                </div>
            </div>
        </div>
        <hr>
        <div>
            <h4>Individual Grahas</h4>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Surya" checked onchange="updateView()"><label for="cb_Surya">☀️ Surya</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Surya Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Surya" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Chandra" checked onchange="updateView()"><label for="cb_Chandra">☽ Chandra</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Chandra Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Chandra" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Mangal" checked onchange="updateView()"><label for="cb_Mangal">♂ Mangal</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Mangal Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Mangal" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Budh" checked onchange="updateView()"><label for="cb_Budh">☿ Budh</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Budh Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Budh" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Guru" checked onchange="updateView()"><label for="cb_Guru">♃ Guru</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Guru Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Guru" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Shukra" checked onchange="updateView()"><label for="cb_Shukra">♀ Shukra</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Shukra Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Shukra" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Shani" checked onchange="updateView()"><label for="cb_Shani">♄ Shani</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Shani Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Shani" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cb_Earth" checked onchange="updateView()"><label for="cb_Earth">⊕ Earth</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Earth Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Earth" checked onchange="render2DOverlay()">
                </label>
            </div>
        </div>
        <hr>
        <div>
            <h4>Cosmic Architecture</h4>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbPlanetOrbits" checked onchange="updateView()"><label for="cbPlanetOrbits">Orbital Paths</label></div>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbMoonOrbit" checked onchange="updateView()"><label for="cbMoonOrbit">Lunar Orbit</label></div>
            </div>
            
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbRashis" checked onchange="updateView()"><label for="cbRashis">Rashis (30°)</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Rashi Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Rashis" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbNakshatras" checked onchange="updateView()"><label for="cbNakshatras">Nakshatras (13°20')</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Nakshatra Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Nakshatras" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbVedicStars" checked onchange="updateView()"><label for="cbVedicStars">Sacred Stars</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Stars Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_VedicStars" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbOuter" checked onchange="updateView()"><label for="cbOuter">Arun, Varun, Yama</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Outer Planets Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Outer" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbNodes" checked onchange="updateView()"><label for="cbNodes">Rahu & Ketu</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Nodes Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Nodes" checked onchange="render2DOverlay()">
                </label>
            </div>
            <div class="filter-item">
                <div class="checkbox-wrapper"><input type="checkbox" id="cbUpagrahas" checked onchange="updateView()"><label for="cbUpagrahas">Upagrahas</label></div>
                <label class="checkbox-wrapper lbl-container" title="Toggle Upagrahas Text">
                    <span style="font-size:11px;">📝</span><input type="checkbox" id="lbl_Upagrahas" checked onchange="render2DOverlay()">
                </label>
            </div>
        </div>
        <hr>
        <div>
            <h4>Bhava View (Houses)</h4>
            <button class="house-all-btn active" id="btnHouseAll" onclick="toggleAllHouses()">Observe All Bhavas</button>
            <div class="house-grid" id="houseGrid">
                <div class="house-btn active" onclick="toggleHouse(1)">1</div><div class="house-btn active" onclick="toggleHouse(2)">2</div>
                <div class="house-btn active" onclick="toggleHouse(3)">3</div><div class="house-btn active" onclick="toggleHouse(4)">4</div>
                <div class="house-btn active" onclick="toggleHouse(5)">5</div><div class="house-btn active" onclick="toggleHouse(6)">6</div>
                <div class="house-btn active" onclick="toggleHouse(7)">7</div><div class="house-btn active" onclick="toggleHouse(8)">8</div>
                <div class="house-btn active" onclick="toggleHouse(9)">9</div><div class="house-btn active" onclick="toggleHouse(10)">10</div>
                <div class="house-btn active" onclick="toggleHouse(11)">11</div><div class="house-btn active" onclick="toggleHouse(12)">12</div>
            </div>
        </div>
    </div>

    <div id="skyContainer">
        <div class="controls-overlay">
            <button class="ctrl-btn" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
            <button class="ctrl-btn" onclick="resetCamera()" title="Reset Origin">⌂</button>
        </div>
        <div id="error-msg"></div>
        <canvas id="skyCanvas3D"></canvas>
        <canvas id="skyCanvas2D"></canvas>
    </div>
</main>

<script>
    const i18n = {

    function get3DVector(radius, lonDeg, latDeg = 0) {

        return new THREE.Vector3(

            radius * Math.sin(lat), 
            -radius * Math.cos(lat) * Math.sin(lon) 
        );
    }

    // High Precision Astronomical Sidereal Time
    function getLST(dateStr, timeStr, lonDeg) {
        const localDate = new Date(`${dateStr}T${timeStr}`);
        const y = localDate.getUTCFullYear();
        const m = localDate.getUTCMonth() + 1;
        const d = localDate.getUTCDate();
        const h = localDate.getUTCHours() + localDate.getUTCMinutes()/60 + localDate.getUTCSeconds()/3600;
        
        let a = Math.floor((14 - m) / 12);
        let y1 = y + 4800 - a;
        let m1 = m + 12 * a - 3;
        let jd = d + Math.floor((153 * m1 + 2) / 5) + 365 * y1 + Math.floor(y1 / 4) - Math.floor(y1 / 100) + Math.floor(y1 / 400) - 32045 - 0.5;
        jd += h / 24;

        const t = (jd - 2451545.0) / 36525.0;
        let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * t * t;
        
        let lst = (gmst + lonDeg) % 360;
        if (lst < 0) lst += 360;
        return lst;
    }

    function buildSacredStars() {
        sacredStarsGroup = new THREE.Group(); celestialGroup.add(sacredStarsGroup);

        sacredStarsList.forEach(s => {

            let points = [pos];
            if(s.cluster) {
                for(let i=1; i<s.cluster; i++) {
                    let offset = new THREE.Vector3((Math.random()-0.5)*180, (Math.random()-0.5)*180, (Math.random()-0.5)*180);
                    points.push(pos.clone().add(offset));
                }
                sacredStarsGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({color: s.col, transparent:true, opacity:0.15})));
            }
            sacredStarsGroup.add(new THREE.Points(new THREE.BufferGeometry().setFromPoints(points), new THREE.PointsMaterial({color: s.col, size: s.size || 8})));
            s.meshPos = pos; 
        });
    }

        const rMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
        const nMat = new THREE.LineBasicMaterial({ color: 0xa855f7, transparent: true, opacity: 0.15 });
        
        const isMobile = window.innerWidth <= 900;
        const innerR = isMobile ? 800 : 1100; 
        const midR = isMobile ? 2000 : 2800; 
        const outerR = isMobile ? 2600 : 3600;
        const center = new THREE.Vector3(centerX, 0, centerZ);

        if(showRashis) {
            for(let i=0; i<12; i++) {
                let p1 = get3DVector(innerR, i * 30).add(center); let p2 = get3DVector(midR, i * 30).add(center);
                boundariesGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), rMat));
            }
        }
        if(showNakshatras) {
            for(let i=0; i<27; i++) {
                let p1 = get3DVector(midR, i * NAKSHATRA_DEG).add(center); let p2 = get3DVector(outerR, i * NAKSHATRA_DEG).add(center);

            }
        }
    }

    function getOfflineEphemeris() {
        return [
            [{name: "Surya", type: "graha", abs_deg: 9, deg: 9}], 
            [{name: "Budh", type: "graha", abs_deg: 45, deg: 15}, {name: "Shukra", type: "graha", abs_deg: 50, deg: 20}], 
            [], 
            [{name: "Chandra", type: "graha", abs_deg: 110, deg: 20}], 
            [], 
            [{name: "Mangal", type: "graha", abs_deg: 165, deg: 15}], 
            [], 
            [{name: "Guru", type: "graha", abs_deg: 230, deg: 20}], 
            [{name: "Ketu", type: "node", abs_deg: 260, deg: 20}, {name: "Mandi", type: "upagraha", abs_deg: 265, deg: 25}], 
            [], 
            [{name: "Shani", type: "graha", abs_deg: 320, deg: 20}], 
            [{name: "Rahu", type: "node", abs_deg: 80, deg: 20}] 
        ];
    }

    async function generateMap() {
        const btn = document.querySelector('.btn-calc'); const originalText = btn.innerText;
        btn.innerText = "Aligning..."; showError("");
        let timeStr = document.getElementById('time').value; if (timeStr.split(':').length === 2) timeStr += ":00";
        const payload = { date: document.getElementById('date').value, time: timeStr, lat: document.getElementById('lat').value, lon: document.getElementById('lon').value };
        
        try {
            const response = await fetch('https://eprashala.pythonanywhere.com/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await response.json();
            if (data.status === 'success') { skyData = data.houses; asc_sign_global = data.asc_sign; } 
            else { throw new Error(data.message); }
        } catch (err) { 
            showError("Network Unreachable. Using Offline Fallback Simulator."); 
            skyData = getOfflineEphemeris(); 
            asc_sign_global = 1; 
        } finally { 
            btn.innerText = originalText;
            updateView();
            if(window.innerWidth <= 900) { document.getElementById('filterDrawer').classList.remove('open'); }
        }
    }

    function injectOuterPlanets(flatBodies) {
        const epoch2026 = { 'Arun': 56.4, 'Varun': 358.1, 'Yama': 301.2 }; 
        Object.keys(epoch2026).forEach(p => { 
            let abs_deg = epoch2026[p]; let house_idx = (Math.floor(abs_deg / 30) + 1 - asc_sign_global) % 12;
            if(house_idx < 0) house_idx += 12;
            flatBodies.push({ name: p, type: 'graha', abs_deg: abs_deg, deg: abs_deg % 30, house: house_idx + 1 }); 
        });
        return flatBodies;
    }

    let renderBodies = []; 
    
    function updateView() {
        if (!skyData || skyData.length === 0) return;

        const focus = document.querySelector('input[name="focus"]:checked').value;
        const isHelio = focus === 'Sun';
        const isLocal = focus === 'Local';

        let flatBodies = [];
        skyData.forEach((h, idx) => { h.forEach(b => { if(b.abs_deg !== undefined) flatBodies.push({...b, house: idx + 1}); }); });
        flatBodies = injectOuterPlanets(flatBodies); 
        
        renderBodies = [...flatBodies];
        let sun = flatBodies.find(b => b.name === 'Surya');
        if (sun) {
            let eDeg = (sun.abs_deg + 180) % 360; let eHouse = (Math.floor(eDeg / 30) + 1 - asc_sign_global) % 12;
            if(eHouse < 0) eHouse += 12; 
            renderBodies.push({ name: 'Earth', type: 'graha', abs_deg: eDeg, deg: eDeg % 30, house: eHouse + 1 });
        }

        let originOffset = new THREE.Vector3(0,0,0);
        if (isHelio && sun) {
            originOffset = get3DVector(helioRadii['Earth'], sun.abs_deg + 180); 
        }

        buildBoundaries(originOffset.x, originOffset.z);

        // MATHEMATICALLY PRECISE PLANET PLACEMENT
        renderBodies.forEach(b => {
            let lat = b.lat || 0; 
            if(!b.lat && orbitalParams[b.name]) {
                const p = orbitalParams[b.name];
                lat = p.inc * Math.sin((b.abs_deg - p.lan) * Math.PI / 180);
            }

            let pos = new THREE.Vector3();

            if (isHelio) {
                if (b.name === 'Surya') { pos.set(0,0,0); }
                else if (b.name === 'Earth') { pos.copy(originOffset); }
                else if (b.name === 'Chandra' || b.name === 'Rahu' || b.name === 'Ketu') { 
                    pos = get3DVector(MOON_ORBIT_RADIUS, b.abs_deg, lat).add(originOffset); 
                }
                else if (b.type === 'graha') { 
                    let r = ['Arun', 'Varun', 'Yama'].includes(b.name) ? geoRadii[b.name] : helioRadii[b.name]; 
                    pos = get3DVector(r, b.abs_deg, lat); 
                }
                else { 
                    let r = aprakasha.includes(b.name) ? helioRadii['Earth'] : temporalRadius; 
                    pos = get3DVector(r, b.abs_deg, lat);
                    if(!aprakasha.includes(b.name)) pos.add(originOffset); 
                }
            } else { 
                if (b.name === 'Earth') { pos.set(0,0,0); }
                else { 
                    let r = (b.name === 'Rahu' || b.name === 'Ketu') ? geoRadii['Surya'] : (b.type === 'graha' ? geoRadii[b.name] : (aprakasha.includes(b.name) ? geoRadii['Surya'] : temporalRadius)); 
                    pos = get3DVector(r, b.abs_deg, lat); 
                }
            }
            b.pos3D = pos; 
        });

        const showOuter = document.getElementById('cbOuter').checked;
        const showNodes = document.getElementById('cbNodes').checked;
        const showUpagrahas = document.getElementById('cbUpagrahas').checked;

        Object.keys(planetMeshes).forEach(key => {
            const mesh = planetMeshes[key]; const body = renderBodies.find(b => b.name === key);
            
            let cbPlanet = document.getElementById('cb_' + key);
            let isIndividuallyEnabled = cbPlanet ? cbPlanet.checked : true;

            if (body && isIndividuallyEnabled) {
                const isNode = key === 'Rahu' || key === 'Ketu'; const isOuter = ['Arun', 'Varun', 'Yama'].includes(key);
                const isCenterAnchor = key === 'Earth' || (isHelio && key === 'Surya');
                const isHouseActive = activeHouses.has(body.house) || isCenterAnchor;

                if (!isHouseActive || (isNode && !showNodes) || (isOuter && !showOuter) || (!isNode && !isOuter && !isCenterAnchor && !body.type)) {
                    mesh.visible = false;
                } else {
                    mesh.visible = true; mesh.position.copy(body.pos3D);
                    if (key === 'Surya') sunLight.position.copy(mesh.position);
                }
            } else mesh.visible = false;
        });

        // MATHEMATICALLY PRECISE ORBITS
        dynamicOrbits.forEach(r => celestialGroup.remove(r)); dynamicOrbits = [];
        const ringMat = new THREE.LineBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.35 });

        if (document.getElementById('cbPlanetOrbits').checked) {
            const radiiMap = isHelio ? helioRadii : geoRadii; const centerNode = new THREE.Vector3(0,0,0);
            
            Object.keys(radiiMap).forEach(key => {
                if (key === 'Chandra') return; 
                if (key === 'Earth' && !isHelio) return; 
                if (['Arun', 'Varun', 'Yama'].includes(key) && !showOuter) return;
                
                let cbPlanet = document.getElementById('cb_' + key);
                if (cbPlanet && !cbPlanet.checked) return;

                let drawRadius = isHelio && ['Arun', 'Varun', 'Yama'].includes(key) ? geoRadii[key] : radiiMap[key];
                let inc = orbitalParams[key] ? orbitalParams[key].inc : 0;
                let lan = orbitalParams[key] ? orbitalParams[key].lan : 0;
                
                const points = [];
                for(let deg=0; deg<=360; deg+=1) { 
                    let pathLat = inc * Math.sin((deg - lan) * Math.PI / 180);
                    points.push(get3DVector(drawRadius, deg, pathLat));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const ring = new THREE.Line(geometry, ringMat);
                ring.position.copy(centerNode);
                celestialGroup.add(ring); dynamicOrbits.push(ring);
            });
        }

        if (document.getElementById('cbMoonOrbit') && document.getElementById('cbMoonOrbit').checked) {
            let cbChandra = document.getElementById('cb_Chandra');
            if (!cbChandra || cbChandra.checked) {
                const earth = renderBodies.find(b => b.name === 'Earth'); const mRadius = isHelio ? MOON_ORBIT_RADIUS : geoRadii['Chandra'];
                let inc = orbitalParams['Chandra'].inc; let lan = orbitalParams['Chandra'].lan;
                const points = [];
                for(let deg=0; deg<=360; deg+=2) {
                    let pathLat = inc * Math.sin((deg - lan) * Math.PI / 180);
                    points.push(get3DVector(mRadius, deg, pathLat));
                }
                const ring = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.5 }));
                ring.position.copy(earth.pos3D); 
                celestialGroup.add(ring); dynamicOrbits.push(ring);
            }
        }

        // TRUE TOPOCENTRIC ROTATION ENGINE
        if (isLocal) {
            let latDeg = parseFloat(document.getElementById('lat').value) || 0;
            let lonDeg = parseFloat(document.getElementById('lon').value) || 0;
            let lstDeg = getLST(document.getElementById('date').value, document.getElementById('time').value, lonDeg);
            
            celestialGroup.rotation.set(0, 0, 0);
            celestialGroup.rotateX(23.439 * Math.PI / 180); // Ecliptic to Equatorial
            celestialGroup.rotateY(-(lstDeg + 90) * Math.PI / 180); // To Local Hour Angle
            celestialGroup.rotateX(-(90 - latDeg) * Math.PI / 180); // Align Zenith
            
            horizonGroup.visible = true;
        } else {
            celestialGroup.rotation.set(0, 0, 0);
            horizonGroup.visible = false;
        }
        celestialGroup.updateMatrixWorld(true);
        
        render2DOverlay();
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); render2DOverlay(); }

    function toScreenXY(pos3D) {
        const pos = pos3D.clone(); pos.project(camera);
        return { x: (pos.x * canvas2D.width/2) + canvas2D.width/2, y: -(pos.y * canvas2D.height/2) + canvas2D.height/2, z: pos.z };
    }

    function checkOverlap(rect, drawnRects) {
        for (let r of drawnRects) { if (rect.x < r.x + r.w + 6 && rect.x + rect.w + 6 > r.x && rect.y < r.y + r.h + 6 && rect.y + rect.h + 6 > r.y) return true; }
        return false;
    }

    function render2DOverlay() {
        ctx2D.clearRect(0, 0, canvas2D.width, canvas2D.height);
        if (!renderBodies || renderBodies.length === 0) return;

        // MASTER LABEL TOGGLE
        const showLabels = document.getElementById('cbShowLabels').checked;

        const showRashis = document.getElementById('cbRashis').checked; const showNakshatras = document.getElementById('cbNakshatras').checked;
        const showUpagrahas = document.getElementById('cbUpagrahas').checked; 
        const showOuter = document.getElementById('cbOuter').checked; const showNodes = document.getElementById('cbNodes').checked;
        const showVedicStars = document.getElementById('cbVedicStars').checked;
        const focus = document.querySelector('input[name="focus"]:checked').value;
        const isHelio = focus === 'Sun';
        const isLocal = focus === 'Local';

        const centerBody = isHelio ? renderBodies.find(b => b.name === 'Surya') : renderBodies.find(b => b.name === 'Earth');
        const centerPos = centerBody ? centerBody.pos3D : new THREE.Vector3(0,0,0);

        let drawnLabels = []; 
        const isMobile = window.innerWidth <= 900;
        const midR = isMobile ? 2000 : 2800; 
        const outerR = isMobile ? 2600 : 3600;

        // HORIZON CARDINALS FOR "MY VIEW"
        if (isLocal && showLabels) {
            const cardinals = [
                {l:'N', p:new THREE.Vector3(0,0,-4000), c:"#3498db"}, 
                {l:'S', p:new THREE.Vector3(0,0,4000), c:"#e74c3c"}, 
                {l:'E', p:new THREE.Vector3(4000,0,0), c:"#f1c40f"}, 
                {l:'W', p:new THREE.Vector3(-4000,0,0), c:"#f1c40f"}
            ];
            cardinals.forEach(card => {
                const pt = toScreenXY(card.p);
                if (pt.z < 1) {
                    ctx2D.fillStyle = card.c; ctx2D.font = "bold 20px Arial"; ctx2D.textAlign = "center";
                    ctx2D.fillText(card.l, pt.x, pt.y); drawnLabels.push({ x: pt.x - 15, y: pt.y - 15, w: 30, h: 30 }); 
                }
            });
        }

        let lblRashisChecked = document.getElementById('lbl_Rashis') ? document.getElementById('lbl_Rashis').checked : true;
        if (showLabels && showRashis && lblRashisChecked) {
            for (let i = 0; i < 12; i++) {
                let worldPos = get3DVector(midR - 200, i * 30 + 15).add(centerPos).applyMatrix4(celestialGroup.matrixWorld);
                const pt = toScreenXY(worldPos);
                if(pt.z < 1) {
                    let houseNum = (i - (asc_sign_global - 1) + 12) % 12 + 1;
                    ctx2D.fillStyle = "rgba(241, 196, 15, 0.9)"; ctx2D.font = "bold 14px 'Segoe UI', sans-serif"; ctx2D.textAlign = "center";
                    ctx2D.fillText(i18n[currentLang].rashis[i], pt.x, pt.y); 
                    ctx2D.fillStyle = "rgba(16, 185, 129, 0.9)"; ctx2D.font = "italic 11px Arial";
                    ctx2D.fillText("Bhava " + houseNum, pt.x, pt.y + 14);
                    drawnLabels.push({ x: pt.x - 30, y: pt.y - 12, w: 60, h: 28 }); 
                }
            }
        }

        let lblNakshatrasChecked = document.getElementById('lbl_Nakshatras') ? document.getElementById('lbl_Nakshatras').checked : true;
        if (showLabels && showNakshatras && lblNakshatrasChecked) {
            for (let i = 0; i < 27; i++) {
                let worldPos = get3DVector(outerR - 150, i * NAKSHATRA_DEG + (NAKSHATRA_DEG / 2)).add(centerPos).applyMatrix4(celestialGroup.matrixWorld);
                const pt = toScreenXY(worldPos);
                if(pt.z < 1) {
                    ctx2D.fillStyle = "rgba(168, 85, 247, 0.9)"; ctx2D.font = "12px Arial"; ctx2D.textAlign = "center";
                    ctx2D.fillText(i18n[currentLang].nakshatras[i], pt.x, pt.y); 
                    drawnLabels.push({ x: pt.x - 40, y: pt.y - 10, w: 80, h: 14 }); 
                }
            }
        }

        let lblVedicStarsChecked = document.getElementById('lbl_VedicStars') ? document.getElementById('lbl_VedicStars').checked : true;
        if (showLabels && showVedicStars && lblVedicStarsChecked) {
            sacredStarsList.forEach(s => {
                let worldPos = s.meshPos.clone().applyMatrix4(celestialGroup.matrixWorld);
                const pt = toScreenXY(worldPos);
                if(pt.z < 1) {
                    ctx2D.fillStyle = "rgba(255, 255, 255, 0.85)"; ctx2D.font = "italic 11px Arial"; ctx2D.textAlign = "left";
                    ctx2D.fillText("✦ " + (i18n[currentLang].stars[s.id] || s.id), pt.x + 6, pt.y + 4); 
                    drawnLabels.push({ x: pt.x, y: pt.y - 8, w: 80, h: 14 }); 
                }
            });
        }

        renderBodies.forEach(b => {
            const isCenterAnchor = b.name === 'Earth' || (isHelio && b.name === 'Surya');
            if (!activeHouses.has(b.house) && !isCenterAnchor) return; 

            let cbPlanet = document.getElementById('cb_' + b.name);
            let isIndividuallyEnabled = cbPlanet ? cbPlanet.checked : true;
            if (!isIndividuallyEnabled) return;

            const isGraha = b.type === 'graha'; const isNode = b.name === 'Rahu' || b.name === 'Ketu'; const isOuter = ['Arun', 'Varun', 'Yama'].includes(b.name);
            if ((!showOuter && isOuter) || (!showNodes && isNode) || (!showUpagrahas && !isGraha && !isNode)) return;

            let worldPos = b.pos3D.clone().applyMatrix4(celestialGroup.matrixWorld);
            const pos2D = toScreenXY(worldPos); if(pos2D.z > 1) return; 

            // ALWAYS draw dots for non-grahas
            if (!isGraha) {
                ctx2D.fillStyle = aprakasha.includes(b.name) ? "rgba(241, 196, 15, 0.8)" : "rgba(168, 85, 247, 0.8)"; 
                ctx2D.fillRect(pos2D.x - 2, pos2D.y - 2, 4, 4);
            }

            // INDIVIDUAL LABEL CHECK
            let drawText = false;
            if (showLabels) { 
                if (isOuter) { drawText = document.getElementById('lbl_Outer') ? document.getElementById('lbl_Outer').checked : true; } 
                else if (isNode) { drawText = document.getElementById('lbl_Nodes') ? document.getElementById('lbl_Nodes').checked : true; } 
                else if (!isGraha) { drawText = document.getElementById('lbl_Upagrahas') ? document.getElementById('lbl_Upagrahas').checked : true; } 
                else { let lblCb = document.getElementById('lbl_' + b.name); drawText = lblCb ? lblCb.checked : true; }
            }

            if (!drawText) return; 

            const degTxt = formatDegree(b.deg); const localName = i18n[currentLang].names[b.name] || b.name;
            const labelText = `${symbols[b.name] || ''} ${localName} ${degTxt}`;
            ctx2D.font = isGraha ? "bold 12px 'Segoe UI', sans-serif" : "italic 10px Arial";
            
            const textW = ctx2D.measureText(labelText).width + 6; 
            const textH = (showNakshatras && b.name !== 'Earth' && b.name !== 'Surya') ? 28 : 14; 
            
            let textRadiusOffset = isMobile ? 20 : 30; let isRightSide = Math.cos(b.abs_deg * Math.PI/180) >= 0; 
            
            let textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset); 
            let rectX = isRightSide ? textX : textX - textW; 
            let rectY = pos2D.y - textH/2;
            let rect = { x: rectX, y: rectY, w: textW, h: textH };
            
            while (checkOverlap(rect, drawnLabels)) {
                textRadiusOffset += 15; 
                textX = pos2D.x + (isRightSide ? textRadiusOffset : -textRadiusOffset);
                rectX = isRightSide ? textX : textX - textW; rect.x = rectX;
            }
            drawnLabels.push(rect); 

            if (textRadiusOffset > (isMobile ? 20 : 30)) {
                ctx2D.beginPath(); ctx2D.moveTo(pos2D.x, pos2D.y); ctx2D.lineTo(textX, pos2D.y);
                ctx2D.strokeStyle = "rgba(255, 255, 255, 0.2)"; ctx2D.lineWidth = 1; ctx2D.stroke();
            }

            ctx2D.fillStyle = pColors[b.name] || "#ffffff"; ctx2D.textAlign = isRightSide ? "left" : "right"; ctx2D.shadowBlur = 6; ctx2D.shadowColor = "rgba(0,0,0,0.9)";
            ctx2D.fillText(labelText, textX, pos2D.y + 4);
            if(showNakshatras && b.name !== 'Earth' && b.name !== 'Surya') {
                ctx2D.font = "10px Arial"; ctx2D.fillStyle = "#94a3b8";
                ctx2D.fillText(`(${getNakshatraLocal(b.abs_deg)})`, textX, pos2D.y + 16);
            }
            ctx2D.shadowBlur = 0;
        });
    }

    function toggleFullScreen() { if (!document.fullscreenElement) container.requestFullscreen(); else document.exitFullscreen(); }
    window.addEventListener('resize', () => { const width = container.clientWidth; const height = container.clientHeight; camera.aspect = width / height; camera.updateProjectionMatrix(); renderer.setSize(width, height); canvas2D.width = width; canvas2D.height = height; });
    window.onload = () => { initDefaults(); changeLanguage(); init3D(); };
</script>
