<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dhwani - Book Reader</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 
    
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            touch-action: manipulation; 
            user-select: none; 
            -webkit-user-select: none;
            background-color: #020617; 
            overflow: hidden;
        }

        input, select, textarea {
            user-select: auto !important;
            -webkit-user-select: auto !important;
        }
        
        h1, .cinzel { font-family: 'Cinzel', serif; }

        .big-mic {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            box-shadow: 0 10px 25px rgba(234, 88, 12, 0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .big-mic:active { transform: scale(0.92); }

        .mic-pulse { 
            animation: ripple 1.5s infinite; 
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important;
        }

        .mic-thinking {
            background: linear-gradient(135deg, #ca8a04 0%, #854d0e 100%) !important;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.6), inset 0 2px 5px rgba(255,255,255,0.2) !important;
            animation: pulse-think 1.5s infinite;
            pointer-events: none;
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes pulse-think {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .custom-input {
            @apply block w-full border border-slate-600 rounded-xl p-3 outline-none transition-all shadow-inner;
            background-color: rgba(2, 6, 23, 0.8) !important; 
            color: #fb923c !important;             
        }
        .custom-input:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.2); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .audio-btn {
            @apply p-2 rounded-full text-gray-400 hover:text-white hover:bg-slate-700/50 transition-all focus:outline-none;
        }

        @keyframes divine-sparkle {
            0%, 100% { text-shadow: 0 0 10px #fb923c, 0 0 20px #f97316, 0 0 30px #ea580c; transform: scale(1); }
            50% { text-shadow: 0 0 20px #fdba74, 0 0 40px #fb923c, 0 0 60px #f97316; transform: scale(1.05); }
        }
        .golden-om {
            font-size: 6rem;
            color: #fb923c;
            animation: divine-sparkle 3s infinite ease-in-out;
            line-height: 1;
            margin-top: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body strong { color: #fdba74; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body li { margin-bottom: 0.35rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; color: #fb923c; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        
        .external-link-btn {
            @apply inline-flex items-center gap-2 px-3 py-2 rounded-md text-xs font-bold cursor-pointer transition-colors mt-2 mb-1 mr-2 shadow-md no-underline border border-transparent;
        }
        .yt-btn { @apply bg-red-900/40 text-red-300 border-red-800 hover:bg-red-800 hover:text-white; }
        .img-btn { @apply bg-blue-900/40 text-blue-300 border-blue-800 hover:bg-blue-800 hover:text-white; }
    </style>
</head>

<body class="text-white flex flex-col items-center h-screen overflow-hidden" ondragstart="return false;" ondrop="return false;">

    <input type="file" id="file-upload" accept="image/*,application/pdf" class="hidden">

    <div id="start-overlay" class="cursor-pointer text-center px-4 absolute inset-0 z-[100] bg-[radial-gradient(circle_at_center,#431407_0%,#020617_100%)] flex flex-col items-center justify-center">
        <div class="text-xl text-orange-500 font-bold mb-2 uppercase tracking-widest">ज्ञानम् परमम् बलम्</div>
        <div class="golden-om">॥</div>
        <h1 class="text-3xl cinzel text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-orange-600 mb-4 mt-4">Tap to Enter Library</h1>
        <p class="text-slate-300 text-sm mb-4">Dhwani - Your AI Reading Companion</p>
        <p class="text-xs text-slate-400 bg-slate-900/50 px-3 py-1 rounded-full border border-orange-900/50">Requires Full Screen Mode</p>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 z-[150] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
            <button id="btn-close-settings" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl outline-none">✕</button>
            <h2 class="text-xl font-bold text-orange-400 mb-5 cinzel">Reader Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase tracking-wider">Name</label>
                    <input type="text" id="manual-name" class="custom-input !p-2 text-sm" placeholder="e.g. Arjun">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase tracking-wider">Age (Optional)</label>
                    <input type="number" id="manual-age" class="custom-input !p-2 text-sm" placeholder="Used to adjust tone & depth">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 ml-1 uppercase tracking-wider">Custom API Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="custom-api-key-input" class="custom-input !p-2 text-sm flex-1" placeholder="Proxy Key (Optional)">
                        <button id="btn-paste-key" class="bg-slate-700 hover:bg-slate-600 text-white text-xs px-4 rounded-xl transition-colors font-semibold shadow-inner border border-slate-600">Paste</button>
                    </div>
                </div>
                <div class="flex items-center gap-3 pt-2 pl-1">
                    <input type="checkbox" id="remember-checkbox" checked class="w-5 h-5 accent-orange-500 rounded cursor-pointer">
                    <label for="remember-checkbox" class="text-sm text-gray-300 cursor-pointer">Remember Chat History</label>
                </div>
            </div>
            <button id="btn-save-settings" class="w-full mt-6 bg-orange-700 hover:bg-orange-600 text-white font-bold py-2.5 rounded-xl transition-colors shadow-lg outline-none">Save & Close</button>
        </div>
    </div>

    <div class="flex flex-col w-full h-full max-w-2xl relative shadow-2xl bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        
        <header class="flex-shrink-0 pt-4 pb-4 px-4 glass-panel z-20 rounded-b-3xl relative border-b-2 border-orange-900/50">
            <button id="adv-toggle" class="absolute top-5 right-5 z-50 text-slate-400 hover:text-white transition-colors outline-none" title="Settings">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <div class="flex flex-col items-center justify-center mb-4 relative mt-2">
                <div id="status-indicator" class="absolute left-0 top-0 w-2.5 h-2.5 rounded-full bg-gray-600 shadow-[0_0_8px_rgba(75,85,99,0.8)]" title="Idle"></div>
                <h1 class="text-xl md:text-2xl font-bold tracking-widest text-center uppercase mb-1">
                    <span class="text-orange-500">Dhwani</span> 
                </h1>
                <p class="text-xs text-slate-400 cinzel">Your Book Companion</p>
            </div>
            
            <div class="space-y-2">
                <select id="lang-selector" class="custom-input !py-2 text-sm font-bold cursor-pointer">
                    <option value="Marathi">Marathi (मराठी)</option>
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="English">English</option>
                    <option value="Sanskrit">Sanskrit (संस्कृतम्)</option>
                    <option value="Gujarati">Gujarati (ગુજરાતી)</option>
                    <option value="Bengali">Bengali (বাংলা)</option>
                    <option value="Tamil">Tamil (தமிழ்)</option>
                    <option value="Telugu">Telugu (తెలుగు)</option>
                    <option value="Kannada">Kannada (ಕನ್ನಡ)</option>
                    <option value="Malayalam">Malayalam (മലയാളം)</option>
                </select>
                <input type="text" id="book-input" class="custom-input !py-2 text-sm font-bold" placeholder="Enter Book Name & Details (e.g., Bhagavad Gita, Chapter 2)">
            </div>
        </header>

        <main id="conversation-log" class="flex-1 overflow-y-auto p-4 space-y-5 pb-12 scroll-smooth">
            <div class="text-gray-400 text-center mt-12 cinzel" id="welcome-msg">
                <p class="text-orange-500 text-2xl mb-3 font-bold">Namaste!</p>
                Enter the book details above. Tap the microphone or type to explore the text.
            </div>
        </main>

        <footer class="w-full glass-panel rounded-t-3xl p-3 pb-safe flex flex-col flex-shrink-0 relative z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-2 border-orange-900/50">
            <div class="w-full flex gap-2 items-center mb-3">
                <input type="text" id="text-input" class="custom-input flex-1 text-sm rounded-full px-5 py-3 placeholder-slate-500 focus:bg-slate-900 border-slate-700" placeholder="Ask about a chapter, quote, or summary...">
                <button id="btn-send" class="p-3.5 bg-orange-700 hover:bg-orange-600 rounded-full transition-colors shadow-lg outline-none">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>

            <div class="w-full flex items-center px-1 relative mt-1">
                <div class="flex-1 flex justify-start items-center pl-2">
                    <button id="btn-share-pdf" class="text-slate-400 hover:text-orange-400 transition-colors outline-none p-1" title="Download Entire Chat as PDF">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    </button>
                </div>
                
                <div class="flex items-center bg-black/60 p-1.5 rounded-full border border-white/10 shadow-inner flex-shrink-0">
                    
                    <button id="btn-attach" class="audio-btn p-1.5 mr-1" title="Attach Image/PDF">
                        <svg class="w-5 h-5 text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                    </button>

                    <button id="btn-mic" class="big-mic w-12 h-12 rounded-full flex items-center justify-center mx-1 outline-none select-none transition-all shadow-[0_0_15px_rgba(234,88,12,0.5)]">
                        <svg id="icon-mic-default" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
                        <svg id="icon-mic-thinking" class="w-5 h-5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                    
                    <button id="btn-mute" class="audio-btn p-1.5 ml-1" title="Mute TTS">
                        <svg class="w-5 h-5" id="icon-vol" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                        <svg class="w-5 h-5 hidden text-red-400" id="icon-mute" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/></svg>
                    </button>
                </div>
                
                <div class="flex-1 flex justify-end items-center pr-2">
                    <button id="btn-restart" class="text-slate-400 hover:text-white transition-colors outline-none p-1" title="Clear Chat">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // --- 0. SECURITY, WAKE LOCK, VISIBILITY & FULLSCREEN ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
            if (e.ctrlKey && ['U', 'S', 'P'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
        });

        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } 
            catch (err) { console.log('Wake Lock Error:', err.message); }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
            else { if (ttsStatus === 'PLAYING') { ttsStatus = 'PAUSED'; synth.cancel(); resetAllPlayButtons(); } }
        });

        function enforceFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) docElm.requestFullscreen().catch(() => {});
                else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen().catch(() => {});
            }
        }

        ['click', 'touchstart'].forEach(evt => {
            window.addEventListener(evt, enforceFullscreen, { capture: true, passive: true });
        });

        function unlockAudio() {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0;
            synth.speak(silent);
        }

        // --- 1. CONFIG & STATE ---
        const PROXY_URL = "https://eprashala.pythonanywhere.com/api/chat"; 
        
        let chatHistory = [];
        let recognition = null;
        let synth = window.speechSynthesis;
        let isListening = false; 
        let state = { isProcessing: false, isMuted: false };
        let ttsStatus = 'STOPPED'; 
        let lastSpokenIndex = 0;   
        window.currentPlayingText = "";

        // File Attachment States
        let pendingAttachmentData = null;
        let pendingMimeType = null;
        let pendingFileName = "";

        // --- 2. DOM ELEMENTS ---
        const UI = {
            overlay: document.getElementById('start-overlay'),
            log: document.getElementById('conversation-log'),
            status: document.getElementById('status-indicator'),
            textIn: document.getElementById('text-input'),
            btnSend: document.getElementById('btn-send'),
            btnMic: document.getElementById('btn-mic'),
            iconMicDefault: document.getElementById('icon-mic-default'),
            iconMicThinking: document.getElementById('icon-mic-thinking'),
            btnMute: document.getElementById('btn-mute'),
            btnRestart: document.getElementById('btn-restart'),
            btnSharePdf: document.getElementById('btn-share-pdf'),
            btnAttach: document.getElementById('btn-attach'),
            fileUpload: document.getElementById('file-upload'),
            iconVol: document.getElementById('icon-vol'),
            iconMute: document.getElementById('icon-mute'),
            
            advToggle: document.getElementById('adv-toggle'),
            settingsModal: document.getElementById('settings-modal'),
            btnCloseSet: document.getElementById('btn-close-settings'),
            btnSaveSet: document.getElementById('btn-save-settings'),
            name: document.getElementById('manual-name'),
            age: document.getElementById('manual-age'),
            keyIn: document.getElementById('custom-api-key-input'),
            btnPasteKey: document.getElementById('btn-paste-key'),
            remember: document.getElementById('remember-checkbox'),
            welcome: document.getElementById('welcome-msg'),
            
            selLang: document.getElementById('lang-selector'),
            inBook: document.getElementById('book-input')
        };

        // --- 3. INITIALIZATION & DATA ---
        window.onload = () => {
            loadData();
            initSpeechRecognition(); 
        };

        UI.overlay.addEventListener('click', () => {
            enforceFullscreen();
            requestWakeLock();
            unlockAudio(); 
            UI.overlay.style.display = 'none';
            setupEventListeners(); 
        });

        function loadData() {
            UI.name.value = localStorage.getItem('dhwani_name') || "";
            UI.age.value = localStorage.getItem('dhwani_age') || "";
            UI.keyIn.value = localStorage.getItem('dhwani_api_key') || "";
            UI.inBook.value = localStorage.getItem('dhwani_book') || "";
            
            const savedLang = localStorage.getItem('dhwani_lang');
            if (savedLang) UI.selLang.value = savedLang;
            
            UI.remember.checked = localStorage.getItem('dhwani_remember') !== 'false';

            if (UI.remember.checked) {
                const savedHistory = localStorage.getItem('dhwani_history');
                if (savedHistory) {
                    try {
                        chatHistory = JSON.parse(savedHistory);
                        if (chatHistory.length > 0) {
                            UI.welcome.style.display = 'none';
                            chatHistory.forEach(msg => {
                                const textPart = msg.parts.find(p => p.text)?.text || "📎 [File Attached]";
                                renderMessage(msg.role === 'user' ? (UI.name.value || 'User') : "Dhwani", textPart, msg.role === 'model', false); 
                            });
                        }
                    } catch (e) {}
                }
            }
        }

        function saveData() {
            localStorage.setItem('dhwani_name', UI.name.value);
            localStorage.setItem('dhwani_age', UI.age.value);
            localStorage.setItem('dhwani_api_key', UI.keyIn.value);
            localStorage.setItem('dhwani_lang', UI.selLang.value);
            localStorage.setItem('dhwani_book', UI.inBook.value);
            localStorage.setItem('dhwani_remember', UI.remember.checked);
            
            if (UI.remember.checked && chatHistory.length > 0) {
                localStorage.setItem('dhwani_history', JSON.stringify(chatHistory));
            } else {
                localStorage.removeItem('dhwani_history');
            }
        }

        function clearData() {
            chatHistory = []; 
            localStorage.removeItem('dhwani_history');
            UI.log.innerHTML = `<div class="text-gray-400 text-center mt-12 cinzel"><p class="text-orange-500 text-xl mb-2 font-bold">🧹 History Cleared</p>Let's open a new chapter.</div>`;
            synth.cancel();
            resetAllPlayButtons();
            ttsStatus = 'STOPPED';
            window.currentPlayingText = "";
            clearAttachment();
        }

        // --- 4. SPEECH RECOGNITION ---
        function initSpeechRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) return;
            recognition = new SpeechRec();
            recognition.continuous = false; 
            recognition.interimResults = false; 
            
            recognition.onstart = () => {
                isListening = true;
                UI.btnMic.classList.add('mic-pulse');
                UI.status.style.backgroundColor = '#ef4444'; 
                UI.textIn.value = '';
                UI.textIn.placeholder = "Listening... Speak now.";
            };
            recognition.onresult = (e) => {
                const transcript = e.results[e.results.length - 1][0].transcript.trim();
                if (transcript) { UI.textIn.value = transcript; processInput(transcript); }
            };
            recognition.onend = () => {
                isListening = false;
                if (!state.isProcessing) resetMicUI();
            };
            recognition.onerror = () => {
                isListening = false; 
                resetMicUI();
            };
        }

        function resetMicUI() {
            UI.btnMic.classList.remove('mic-pulse');
            UI.status.style.backgroundColor = '#4b5563'; 
            UI.textIn.placeholder = pendingAttachmentData ? `📎 ${pendingFileName} attached! Ask a question...` : "Ask about a chapter, quote, or summary...";
            setMicThinkingState(false);
        }

        function setMicThinkingState(isThinking) {
            if (isThinking) {
                UI.btnMic.classList.add('mic-thinking');
                UI.btnMic.classList.remove('mic-pulse');
                UI.iconMicDefault.classList.add('hidden');
                UI.iconMicThinking.classList.remove('hidden');
            } else {
                UI.btnMic.classList.remove('mic-thinking');
                UI.iconMicDefault.classList.remove('hidden');
                UI.iconMicThinking.classList.add('hidden');
            }
        }

        // --- 5. EVENT LISTENERS ---
        function setupEventListeners() {
            UI.selLang.addEventListener('change', saveData);
            UI.inBook.addEventListener('input', saveData);

            UI.advToggle.onclick = (e) => { e.stopPropagation(); UI.settingsModal.classList.remove('hidden'); };
            UI.btnCloseSet.onclick = (e) => { e.stopPropagation(); UI.settingsModal.classList.add('hidden'); };
            UI.btnSaveSet.onclick = (e) => { e.stopPropagation(); saveData(); UI.settingsModal.classList.add('hidden'); };
            
            // ATTACHMENT LOGIC
            UI.btnAttach.onclick = (e) => {
                e.stopPropagation();
                UI.fileUpload.click();
            };

            UI.fileUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    pendingAttachmentData = evt.target.result.split(',')[1];
                    pendingMimeType = file.type;
                    pendingFileName = file.name;
                    
                    UI.textIn.placeholder = `📎 ${pendingFileName} attached! Ask a question...`;
                    UI.btnAttach.classList.add('text-orange-400');
                    UI.btnAttach.classList.remove('text-gray-400');
                };
                reader.readAsDataURL(file);
            });

            UI.btnPasteKey.addEventListener('click', async (e) => {
                e.stopPropagation(); 
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        UI.keyIn.value = text;
                        UI.btnPasteKey.innerText = "Pasted!";
                        setTimeout(() => { UI.btnPasteKey.innerText = "Paste"; }, 1500);
                    }
                } catch (err) {}
            });

            UI.btnMute.onclick = (e) => { 
                e.stopPropagation(); state.isMuted = !state.isMuted; 
                if(state.isMuted) { 
                    synth.cancel(); ttsStatus = 'STOPPED'; resetAllPlayButtons(); window.currentPlayingText = "";
                    UI.iconVol.classList.add('hidden'); UI.iconMute.classList.remove('hidden'); 
                } else { 
                    UI.iconVol.classList.remove('hidden'); UI.iconMute.classList.add('hidden'); 
                } 
            };
            
            UI.btnSharePdf.onclick = (e) => { e.stopPropagation(); exportChatToPDF(); };
            UI.btnRestart.onclick = (e) => { e.stopPropagation(); clearData(); };
            UI.btnSend.onclick = (e) => { e.stopPropagation(); processInput(UI.textIn.value); };
            
            UI.textIn.onkeypress = (e) => { 
                if(e.key === 'Enter') { e.stopPropagation(); processInput(UI.textIn.value); } 
            };

            UI.btnMic.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (state.isProcessing || !recognition) return;
                if (isListening) recognition.stop(); 
                else { 
                    const langMap = { 'Marathi':'mr-IN', 'Hindi':'hi-IN', 'English':'en-IN', 'Sanskrit':'hi-IN', 'Gujarati':'gu-IN', 'Bengali':'bn-IN', 'Tamil':'ta-IN', 'Telugu':'te-IN', 'Kannada':'kn-IN', 'Malayalam':'ml-IN' };
                    recognition.lang = langMap[UI.selLang.value] || 'en-IN'; 
                    try { recognition.start(); } catch(err) {} 
                }
            });
        }

        function clearAttachment() {
            pendingAttachmentData = null;
            pendingMimeType = null;
            pendingFileName = "";
            UI.fileUpload.value = '';
            UI.btnAttach.classList.remove('text-orange-400');
            UI.btnAttach.classList.add('text-gray-400');
            UI.textIn.placeholder = "Ask about a chapter, quote, or summary...";
        }

        // --- 6. AI LOGIC & PROCESSING ---
        async function processInput(userText) {
            userText = userText.trim();
            if (!userText && !pendingAttachmentData) return; 
            
            if (!UI.inBook.value.trim()) {
                alert("Please enter a book name in the top input box first.");
                return;
            }

            UI.textIn.value = '';
            UI.textIn.placeholder = "Dhwani is thinking...";
            if (UI.welcome) UI.welcome.style.display = 'none';
            
            state.isProcessing = true;
            UI.status.style.backgroundColor = '#facc15'; 
            setMicThinkingState(true);

            const userName = UI.name.value || "Reader";
            const displayMessage = userText || `📎 [${pendingFileName} attached for analysis]`;
            renderMessage(userName, displayMessage, false);
            
            let messageParts = [];
            if (userText) messageParts.push({ text: userText });
            if (!userText && pendingAttachmentData) messageParts.push({ text: "Please analyze this attached file." });
            
            if (pendingAttachmentData) {
                messageParts.push({
                    inlineData: { mimeType: pendingMimeType, data: pendingAttachmentData }
                });
            }

            chatHistory.push({ role: 'user', parts: messageParts });
            clearAttachment(); 
            saveData();

            try {
                const aiResRaw = await getAIResponse(chatHistory);
                
                state.lastAIMessage = aiResRaw;
                chatHistory.push({ role: 'model', parts: [{ text: aiResRaw }] });
                
                const playBtn = renderMessage("Dhwani", aiResRaw, true, true);
                saveData();
                
                if (!state.isMuted && playBtn) handleIndividualPlayPause(sanitizeForTTS(aiResRaw), playBtn);
            } catch (err) {
                renderMessage("System", "⚠️ Network interrupted. Please check your key or internet.", true);
            }

            state.isProcessing = false;
            resetMicUI();
        }

        async function getAIResponse(history) {
            const name = UI.name.value || "Seeker";
            const age = parseInt(UI.age.value) || 25;
            const lang = UI.selLang.value;
            const book = UI.inBook.value;
            const customKey = (UI.keyIn.value.trim().length > 10) ? UI.keyIn.value.trim() : null;
            
            const headers = { 'Content-Type': 'application/json' };
            if (customKey) headers['X-Custom-Api-Key'] = customKey;

            let tone = age < 15 ? "Simple, Storytelling, Kind" : "Philosophical, Deep, Mature";

            const prompt = `Act as 'Dhwani', an expert book and scripture explainer.
            User: ${name} (${age} years old). Book/Topic: ${book}.
            
            STRICT RULES:
            1. EXACT QUOTE: First, output the exact verse/quote/excerpt from the book in the ORIGINAL language of the book if applicable. If evaluating an attached file/image, extract and explain its contents thoroughly.
            2. CITATION: Explicitly state the Chapter and Page/Verse Number in brackets [ ] if applicable.
            3. EXPLANATION: Translate the quote and explain its deep meaning.
               - Mandatory Language: ${lang}. All explanations MUST be in ${lang}.
            4. FORMATTING: Use Markdown (**bold**, bullet points). Do NOT use complex LaTeX.
            5. MEDIA LINKS: At the very end of your response, provide EXACTLY two lines formatted like this for further exploration (translate the descriptive text to ${lang}):
               YT_SEARCH: relevant_topic_keywords
               IMG_SEARCH: relevant_topic_keywords
            6. Tone: ${tone}.`;

            const payload = { 
                model: "gemini-3.1-flash", 
                contents: history.slice(-10), 
                systemInstruction: { parts: [{ text: prompt }] } 
            };

            const response = await fetch(PROXY_URL, { method: 'POST', headers: headers, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // --- 7. MEDIA PARSERS & TTS ---
        function sanitizeForTTS(text) {
            return text
                .replace(/YT_SEARCH:.*$/gm, '')
                .replace(/IMG_SEARCH:.*$/gm, '')
                .replace(/[*_#`~]/g, '') 
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') 
                .replace(/<[^>]+>/g, '') 
                .replace(/^[-*+]\s+/gm, '') 
                .trim();
        }

        function resetAllPlayButtons() {
            document.querySelectorAll('.msg-play-btn').forEach(b => {
                b.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            });
        }

        function handleIndividualPlayPause(text, btnElement) {
            if (state.isMuted) return;

            const playIcon = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            const pauseIcon = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

            if (window.currentPlayingText === text) {
                if (ttsStatus === 'PAUSED') {
                    ttsStatus = 'PLAYING';
                    btnElement.innerHTML = pauseIcon; 
                    synth.resume();
                    return;
                } else if (ttsStatus === 'PLAYING') {
                    ttsStatus = 'PAUSED';
                    btnElement.innerHTML = playIcon; 
                    synth.pause(); 
                    return;
                }
            }

            synth.cancel(); 
            resetAllPlayButtons();
            window.currentPlayingText = text;
            ttsStatus = 'PLAYING';
            btnElement.innerHTML = pauseIcon; 

            setTimeout(() => { 
                const utterance = new SpeechSynthesisUtterance(text);
                const langMap = { 'Marathi':'mr-IN', 'Hindi':'hi-IN', 'English':'en-IN', 'Sanskrit':'hi-IN', 'Gujarati':'gu-IN', 'Bengali':'bn-IN', 'Tamil':'ta-IN', 'Telugu':'te-IN', 'Kannada':'kn-IN', 'Malayalam':'ml-IN' };
                utterance.lang = langMap[UI.selLang.value] || 'en-IN';
                
                const age = parseInt(UI.age.value) || 25;
                utterance.rate = age < 12 ? 0.85 : 1.0;
                
                utterance.onend = () => {
                    btnElement.innerHTML = playIcon;
                    ttsStatus = 'STOPPED'; 
                    window.currentPlayingText = ""; 
                };
                utterance.onerror = (e) => {
                    if (e.error !== 'canceled') btnElement.innerHTML = playIcon;
                };

                synth.speak(utterance);
            }, 50);
        }

        // --- 8. RENDER UI ---
        function renderMessage(sender, text, isModel, isNewMessage = true) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl ${isModel ? 'bg-[#0f172a]/90 border border-slate-700/50 shadow-lg ml-2 mr-8' : 'bg-orange-900/40 text-right mr-2 ml-8'} mb-4`;
            
            let displayHtml = "";
            if (isModel) {
                let parsedText = text;
                let mediaLinks = "";
                
                parsedText = parsedText.replace(/YT_SEARCH:\s*(.*)/g, (match, keyword) => {
                    const q = encodeURIComponent(keyword.trim());
                    mediaLinks += `<a href="https://www.youtube.com/results?search_query=${q}" target="_blank" class="external-link-btn yt-btn">🎥 Watch Video</a>`;
                    return ""; 
                });
                parsedText = parsedText.replace(/IMG_SEARCH:\s*(.*)/g, (match, keyword) => {
                    const q = encodeURIComponent(keyword.trim());
                    mediaLinks += `<a href="https://www.google.com/search?tbm=isch&q=${q}" target="_blank" class="external-link-btn img-btn">🖼️ See Images</a>`;
                    return "";
                });

                displayHtml = marked.parse(parsedText);
                if (mediaLinks) displayHtml += `<div class="mt-3 block border-t border-slate-700/50 pt-2">${mediaLinks}</div>`;
            } else {
                displayHtml = text;
            }
            
            let htmlContent = `<div class="text-[10px] uppercase font-bold tracking-wider ${isModel ? 'text-orange-400 cinzel' : 'text-slate-300'} mb-1">${sender}</div>
                               <div class="text-sm leading-relaxed text-gray-100 markdown-body">${displayHtml}</div>`;
            
            let playBtnElement = null;

            if (isModel) {
                htmlContent += `
                    <div class="mt-3 flex justify-end gap-2">
                        <button class="msg-pdf-btn p-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-full text-slate-400 hover:text-blue-400 transition-colors shadow-sm focus:outline-none" title="Download Answer as PDF">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        </button>
                        <button class="msg-copy-btn p-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-full text-slate-400 hover:text-green-400 transition-colors shadow-sm focus:outline-none" title="Copy Answer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        </button>
                        <button class="msg-play-btn p-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-full text-orange-400 transition-colors shadow-sm focus:outline-none" title="Play/Pause Audio">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>`;
            }

            div.innerHTML = htmlContent;

            if (isModel) {
                playBtnElement = div.querySelector('.msg-play-btn');
                
                div.querySelector('.msg-pdf-btn').addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    exportSingleMessageToPDF(text); 
                });

                playBtnElement.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    handleIndividualPlayPause(sanitizeForTTS(text), playBtnElement); 
                });
                
                div.querySelector('.msg-copy-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(text).then(() => {
                        e.currentTarget.classList.replace('text-slate-400', 'text-green-400');
                        setTimeout(() => { e.currentTarget.classList.replace('text-green-400', 'text-slate-400'); }, 1500);
                    });
                });
            }

            UI.log.appendChild(div);
            setTimeout(() => { UI.log.scrollTop = UI.log.scrollHeight; }, 50);

            return playBtnElement;
        }

        // --- 9. PDF EXPORT ---

        // Universal Header setup
        function addPDFHeader(container) {
            const header = document.createElement('div');
            header.innerText = 'ai.eprashala.com';
            header.style.fontSize = '18px';
            header.style.fontWeight = 'bold';
            header.style.textAlign = 'center';
            header.style.marginBottom = '20px';
            header.style.paddingBottom = '10px';
            header.style.borderBottom = '1px solid #ddd';
            header.style.color = '#000000'; 
            container.appendChild(header);
        }

        // Export Entire Chat
        function exportChatToPDF() {
            if (chatHistory.length === 0) return alert("No chat history to export.");
            
            const container = document.createElement('div');
            container.style.padding = '30px';
            container.style.fontFamily = 'Arial, sans-serif';
            container.style.backgroundColor = '#FFFFFF'; 
            container.style.color = '#000000'; 

            addPDFHeader(container);

            const title = document.createElement('h2');
            title.innerText = `Dhwani Notes: ${UI.inBook.value}`;
            title.style.borderBottom = '2px solid #ccc';
            title.style.paddingBottom = '15px';
            title.style.marginBottom = '20px';
            title.style.color = '#000000';
            container.appendChild(title);

            chatHistory.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.style.marginBottom = '20px';
                
                const sender = document.createElement('div');
                sender.innerText = msg.role === 'user' ? (UI.name.value || "User") : "Dhwani";
                sender.style.fontWeight = 'bold';
                sender.style.color = msg.role === 'user' ? '#ea580c' : '#0369a1'; 
                
                const textPart = msg.parts.find(p => p.text)?.text || "[File analyzed]";
                const cleanText = textPart.replace(/YT_SEARCH:.*$/gm, '').replace(/IMG_SEARCH:.*$/gm, '');
                
                const content = document.createElement('div');
                content.innerHTML = msg.role === 'model' ? marked.parse(cleanText) : cleanText;
                content.style.marginTop = '5px';
                content.style.lineHeight = '1.5';
                content.style.color = '#000000'; 
                
                msgDiv.appendChild(sender);
                msgDiv.appendChild(content);
                container.appendChild(msgDiv);
            });

            const opt = {
                margin: 0.5,
                filename: `Dhwani_Session_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(container).save();
        }

        // Export Single Message
        function exportSingleMessageToPDF(text) {
            const container = document.createElement('div');
            container.style.padding = '30px';
            container.style.fontFamily = 'Arial, sans-serif';
            container.style.backgroundColor = '#FFFFFF'; 
            container.style.color = '#000000'; 

            addPDFHeader(container);
            
            const content = document.createElement('div');
            const cleanText = text.replace(/YT_SEARCH:.*$/gm, '').replace(/IMG_SEARCH:.*$/gm, '');
            content.innerHTML = marked.parse(cleanText);
            content.style.lineHeight = '1.6';
            content.style.color = '#000000'; 
            
            container.appendChild(content);

            const opt = {
                margin: 0.5,
                filename: `Dhwani_Answer_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(container).save();
        }
    </script>
</body>
