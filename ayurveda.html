<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaidyaji AI - Ayurveda Clinic</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 
    
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            touch-action: manipulation; 
            user-select: none; 
            -webkit-user-select: none;
            background-color: #022c22; /* Deep Emerald Background */
            overflow: hidden;
        }

        input, select, textarea {
            user-select: auto !important;
            -webkit-user-select: auto !important;
        }
        
        h1, .cinzel { font-family: 'Cinzel', serif; }

        .big-mic {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .big-mic:active { transform: scale(0.92); }

        .mic-pulse { 
            animation: ripple 1.5s infinite; 
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%) !important;
        }

        .mic-thinking {
            background: linear-gradient(135deg, #ca8a04 0%, #854d0e 100%) !important;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.6), inset 0 2px 5px rgba(255,255,255,0.2) !important;
            animation: pulse-think 1.5s infinite;
            pointer-events: none;
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes pulse-think {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }

        .glass-panel {
            background: rgba(2, 44, 34, 0.85); /* Emerald 950 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .custom-input {
            @apply block w-full border border-emerald-700/50 rounded-xl p-3 outline-none transition-all shadow-inner;
            background-color: rgba(6, 78, 59, 0.6) !important; /* Emerald 900 */
            color: #34d399 !important; /* Emerald 400 */            
        }
        .custom-input:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #047857; border-radius: 4px; }

        .audio-btn {
            @apply p-2 rounded-full text-gray-400 hover:text-white hover:bg-emerald-800/50 transition-all focus:outline-none;
        }

        @keyframes divine-sparkle {
            0%, 100% { text-shadow: 0 0 10px #34d399, 0 0 20px #10b981, 0 0 30px #059669; transform: scale(1); }
            50% { text-shadow: 0 0 20px #6ee7b7, 0 0 40px #34d399, 0 0 60px #10b981; transform: scale(1.05); }
        }
        .golden-om {
            font-size: 6rem;
            color: #34d399;
            animation: divine-sparkle 3s infinite ease-in-out;
            line-height: 1;
            margin-top: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body strong { color: #6ee7b7; font-weight: 600; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body li { margin-bottom: 0.35rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; color: #34d399; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        
    </style>
</head>

<body class="text-white flex flex-col items-center h-screen overflow-hidden" ondragstart="return false;" ondrop="return false;">

    <input type="file" id="file-upload" accept="image/*,application/pdf" class="hidden">

    <div id="start-overlay" class="cursor-pointer text-center px-4 absolute inset-0 z-[100] bg-[radial-gradient(circle_at_center,#064e3b_0%,#022c22_100%)] flex flex-col items-center justify-center">
        <div class="text-xl text-emerald-500 font-bold mb-2 uppercase tracking-widest">|| सर्वे सन्तु निरामयाः ||</div>
        <div class="golden-om">🌿</div>
        <h1 class="text-3xl cinzel text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-emerald-600 mb-4 mt-4">Tap to Enter Clinic</h1>
        <p class="text-emerald-100/70 text-sm mb-4">Vaidyaji AI - Ayurvedic Healing & Wisdom</p>
        <p class="text-xs text-emerald-500/80 bg-emerald-950/50 px-3 py-1 rounded-full border border-emerald-900/50">Requires Full Screen Mode</p>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 z-[150] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-emerald-950 border border-emerald-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
            <button id="btn-close-settings" class="absolute top-4 right-4 text-emerald-500 hover:text-white text-xl outline-none">✕</button>
            <h2 class="text-xl font-bold text-emerald-400 mb-5 cinzel">Patient Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-emerald-500/80 mb-1 ml-1 uppercase tracking-wider">Name</label>
                    <input type="text" id="manual-name" class="custom-input !p-2 text-sm text-emerald-100" placeholder="e.g. Arjun">
                </div>
                <div>
                    <label class="block text-xs text-emerald-500/80 mb-1 ml-1 uppercase tracking-wider">Age (Optional)</label>
                    <input type="number" id="manual-age" class="custom-input !p-2 text-sm text-emerald-100" placeholder="Used to adjust Dosha analysis">
                </div>
                <div>
                    <label class="block text-xs text-emerald-500/80 mb-1 ml-1 uppercase tracking-wider">Custom API Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="custom-api-key-input" class="custom-input !p-2 text-sm flex-1 text-emerald-100" placeholder="Proxy Key (Optional)">
                        <button id="btn-paste-key" class="bg-emerald-800 hover:bg-emerald-700 text-white text-xs px-4 rounded-xl transition-colors font-semibold shadow-inner border border-emerald-700">Paste</button>
                    </div>
                </div>
                <div class="flex items-center gap-3 pt-2 pl-1">
                    <input type="checkbox" id="remember-checkbox" checked class="w-5 h-5 accent-emerald-500 rounded cursor-pointer">
                    <label for="remember-checkbox" class="text-sm text-emerald-200/80 cursor-pointer">Remember Chat History</label>
                </div>
            </div>
            <button id="btn-save-settings" class="w-full mt-6 bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-2.5 rounded-xl transition-colors shadow-lg outline-none">Save & Close</button>
        </div>
    </div>

    <div class="flex flex-col w-full h-full max-w-2xl relative shadow-2xl bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]">
        
        <header class="flex-shrink-0 pt-4 pb-4 px-4 glass-panel z-20 rounded-b-3xl relative border-b-2 border-emerald-900/50">
            <button id="adv-toggle" class="absolute top-5 right-5 z-50 text-emerald-500/70 hover:text-white transition-colors outline-none" title="Settings">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
            <div class="flex flex-col items-center justify-center mb-4 relative mt-2">
                <div id="status-indicator" class="absolute left-0 top-0 w-2.5 h-2.5 rounded-full bg-emerald-800 shadow-[0_0_8px_rgba(4,120,87,0.8)]" title="Idle"></div>
                <h1 class="text-xl md:text-2xl font-bold tracking-widest text-center uppercase mb-1">
                    <span class="text-emerald-400">Vaidyaji AI</span> 
                </h1>
                <p class="text-xs text-emerald-200/60 cinzel">Shree Dhanvantari Kripa</p>
            </div>
            
            <div class="space-y-2">
                <select id="lang-selector" class="custom-input !py-2 text-sm font-bold cursor-pointer">
                    <option value="Marathi">Marathi (मराठी)</option>
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="English">English</option>
                    <option value="Sanskrit">Sanskrit (संस्कृतम्)</option>
                    <option value="Gujarati">Gujarati (ગુજરાતી)</option>
                    <option value="Bengali">Bengali (বাংলা)</option>
                    <option value="Tamil">Tamil (தமிழ்)</option>
                    <option value="Telugu">Telugu (తెలుగు)</option>
                    <option value="Kannada">Kannada (ಕನ್ನಡ)</option>
                    <option value="Malayalam">Malayalam (മലയാളം)</option>
                </select>
                <input type="text" id="ailment-input" class="custom-input !py-2 text-sm font-bold" placeholder="Chief Complaint (e.g., Joint Pain, Indigestion)">
            </div>
        </header>

        <main id="conversation-log" class="flex-1 overflow-y-auto p-4 space-y-5 pb-12 scroll-smooth">
            <div class="text-emerald-200/60 text-center mt-12 cinzel" id="welcome-msg">
                <p class="text-emerald-400 text-2xl mb-3 font-bold">Namo Dhanvantaraye!</p>
                Enter your chief complaint above. Tap the microphone or type to seek guidance.
            </div>
        </main>

        <footer class="w-full glass-panel rounded-t-3xl p-3 pb-safe flex flex-col flex-shrink-0 relative z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-2 border-emerald-900/50">
            <div class="w-full flex gap-2 items-center mb-3">
                <input type="text" id="text-input" class="custom-input flex-1 text-sm rounded-full px-5 py-3 placeholder-emerald-700/80 focus:bg-emerald-950 border-emerald-800" placeholder="Describe your symptoms...">
                <button id="btn-send" class="p-3.5 bg-emerald-700 hover:bg-emerald-600 rounded-full transition-colors shadow-lg outline-none">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>

            <div class="w-full flex items-center px-1 relative mt-1">
                <div class="flex-1 flex justify-start items-center pl-2">
                    <button id="btn-share-pdf" class="text-emerald-600 hover:text-emerald-400 transition-colors outline-none p-1" title="Download Consultation as PDF">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    </button>
                </div>
                
                <div class="flex items-center bg-black/40 p-1.5 rounded-full border border-emerald-900/50 shadow-inner flex-shrink-0">
                    
                    <button id="btn-attach" class="audio-btn p-1.5 mr-1" title="Attach Image/PDF">
                        <svg class="w-5 h-5 text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                    </button>

                    <button id="btn-mic" class="big-mic w-12 h-12 rounded-full flex items-center justify-center mx-1 outline-none select-none transition-all shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                        <svg id="icon-mic-default" class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
                        <svg id="icon-mic-thinking" class="w-5 h-5 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>

                    <button id="btn-stop" class="audio-btn p-1.5 mx-0.5 text-red-500 hover:text-red-400" title="Stop AI & Audio">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    </button>

                    <button id="btn-mute" class="audio-btn p-1.5 ml-0.5" title="Mute TTS">
                        <svg class="w-5 h-5" id="icon-vol" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
                        <svg class="w-5 h-5 hidden text-red-400" id="icon-mute" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/></svg>
                    </button>
                </div>
                
                <div class="flex-1 flex justify-end items-center pr-2">
                    <button id="btn-restart" class="text-emerald-600 hover:text-emerald-400 transition-colors outline-none p-1" title="Clear Chat">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // --- 0. SECURITY, WAKE LOCK, VISIBILITY & FULLSCREEN ---
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
            if (e.ctrlKey && ['U', 'S', 'P'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
        });

        let wakeLock = null;
        async function requestWakeLock() {
            try { 
                if ('wakeLock' in navigator) { 
                    if (wakeLock !== null) return; 
                    wakeLock = await navigator.wakeLock.request('screen'); 
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                } 
            } catch (err) { console.log('Wake Lock Error:', err.message); }
        }

        function enforceFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) docElm.requestFullscreen().catch(() => {});
                else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen().catch(() => {});
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                requestWakeLock();
                enforceFullscreen();
            } else { 
                if (ttsStatus === 'PLAYING') resetCurrentTTS(); 
            }
        });

        ['click', 'touchstart'].forEach(evt => {
            window.addEventListener(evt, () => {
                enforceFullscreen();
                requestWakeLock();
            }, { capture: true, passive: true });
        });

        function unlockAudio() {
            try {
                if (typeof SpeechSynthesisUtterance !== 'undefined' && synth) {
                    const silent = new SpeechSynthesisUtterance('');
                    silent.volume = 0;
                    synth.speak(silent);
                }
            } catch (err) { console.warn('Audio unlock skipped:', err.message); }
        }

        // --- 1. CONFIG & STATE ---
        const PROXY_URL = "https://eprashala.pythonanywhere.com/api/chat"; 
        
        let chatHistory = [];
        let recognition = null;
        let synth = window.speechSynthesis;
        let isListening = false; 
        let state = { isProcessing: false, isMuted: false };
        
        // HIGHLIGHTER & TTS STATE
        let ttsStatus = 'STOPPED'; 
        let lastSpokenIndex = 0;   
        let currentActiveBtn = null;
        let lastHighlightedSpan = null;
        const speechDataMap = {}; // Maps msgId to clean TTS string
        const rawTextMap = {}; // Maps msgId to raw input text

        let currentAbortController = null;

        // File Attachment States
        let pendingAttachmentData = null;
        let pendingMimeType = null;
        let pendingFileName = "";

        // --- 2. DOM ELEMENTS ---
        const UI = {
            overlay: document.getElementById('start-overlay'),
            log: document.getElementById('conversation-log'),
            status: document.getElementById('status-indicator'),
            textIn: document.getElementById('text-input'),
            btnSend: document.getElementById('btn-send'),
            btnMic: document.getElementById('btn-mic'),
            btnStop: document.getElementById('btn-stop'),
            iconMicDefault: document.getElementById('icon-mic-default'),
            iconMicThinking: document.getElementById('icon-mic-thinking'),
            btnMute: document.getElementById('btn-mute'),
            btnRestart: document.getElementById('btn-restart'),
            btnSharePdf: document.getElementById('btn-share-pdf'),
            btnAttach: document.getElementById('btn-attach'),
            fileUpload: document.getElementById('file-upload'),
            iconVol: document.getElementById('icon-vol'),
            iconMute: document.getElementById('icon-mute'),
            
            advToggle: document.getElementById('adv-toggle'),
            settingsModal: document.getElementById('settings-modal'),
            btnCloseSet: document.getElementById('btn-close-settings'),
            btnSaveSet: document.getElementById('btn-save-settings'),
            name: document.getElementById('manual-name'),
            age: document.getElementById('manual-age'),
            keyIn: document.getElementById('custom-api-key-input'),
            btnPasteKey: document.getElementById('btn-paste-key'),
            remember: document.getElementById('remember-checkbox'),
            welcome: document.getElementById('welcome-msg'),
            
            selLang: document.getElementById('lang-selector'),
            inAilment: document.getElementById('ailment-input')
        };

        // --- 3. INITIALIZATION & DATA ---
        window.onload = () => {
            loadData();
            initSpeechRecognition(); 
        };

        UI.overlay.addEventListener('click', () => {
            enforceFullscreen();
            requestWakeLock();
            unlockAudio(); 
            UI.overlay.style.display = 'none';
            setupEventListeners(); 
        });

        function loadData() {
            UI.name.value = localStorage.getItem('vaidya_name') || "";
            UI.age.value = localStorage.getItem('vaidya_age') || "";
            UI.keyIn.value = localStorage.getItem('vaidya_api_key') || "";
            UI.inAilment.value = localStorage.getItem('vaidya_ailment') || "";
            
            const savedLang = localStorage.getItem('vaidya_lang');
            if (savedLang) UI.selLang.value = savedLang;
            
            UI.remember.checked = localStorage.getItem('vaidya_remember') !== 'false';

            if (UI.remember.checked) {
                const savedHistory = localStorage.getItem('vaidya_history');
                if (savedHistory) {
                    try {
                        chatHistory = JSON.parse(savedHistory);
                        if (chatHistory.length > 0) {
                            UI.welcome.style.display = 'none';
                            chatHistory.forEach(msg => {
                                const textPart = msg.parts.find(p => p.text)?.text || "📎 [File Attached]";
                                renderMessage(msg.role === 'user' ? (UI.name.value || 'Patient') : "Vaidyaji", textPart, msg.role === 'model', false, textPart); 
                            });
                        }
                    } catch (e) {}
                }
            }
        }

        function saveData() {
            localStorage.setItem('vaidya_name', UI.name.value);
            localStorage.setItem('vaidya_age', UI.age.value);
            localStorage.setItem('vaidya_api_key', UI.keyIn.value);
            localStorage.setItem('vaidya_lang', UI.selLang.value);
            localStorage.setItem('vaidya_ailment', UI.inAilment.value);
            localStorage.setItem('vaidya_remember', UI.remember.checked);
            
            if (UI.remember.checked && chatHistory.length > 0) {
                localStorage.setItem('vaidya_history', JSON.stringify(chatHistory));
            } else {
                localStorage.removeItem('vaidya_history');
            }
        }

        function clearData() {
            chatHistory = []; 
            localStorage.removeItem('vaidya_history');
            UI.log.innerHTML = `<div class="text-emerald-700/80 text-center mt-12 cinzel"><p class="text-emerald-500 text-xl mb-2 font-bold">🌿 History Cleared</p>Let us begin a new consultation.</div>`;
            resetCurrentTTS();
            clearAttachment();
        }

        // --- 4. SPEECH RECOGNITION ---
        function initSpeechRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) return;
            recognition = new SpeechRec();
            recognition.continuous = false; 
            recognition.interimResults = false; 
            
            recognition.onstart = () => {
                isListening = true;
                UI.btnMic.classList.add('mic-pulse');
                UI.status.style.backgroundColor = '#ef4444'; 
                UI.textIn.value = '';
                UI.textIn.placeholder = "Listening... Speak your symptoms.";
            };

                resetMicUI();
            };
        }

        // --- 6. AI LOGIC & PROCESSING ---
        async function processInput(userText) {
            userText = userText.trim();
            if (!userText && !pendingAttachmentData) return; 
            
            if (!UI.inAilment.value.trim()) {
                alert("Please enter a Chief Complaint in the top input box first (e.g., Fever, Knee Pain).");
                return;
            }

            const rawUserText = userText; 
            UI.textIn.value = '';
            UI.textIn.placeholder = "Vaidyaji is analyzing...";
            if (UI.welcome) UI.welcome.style.display = 'none';
            
            state.isProcessing = true;
            UI.status.style.backgroundColor = '#facc15'; 
            setMicThinkingState(true);

            const userName = UI.name.value || "Patient";
            const displayMessage = userText || `📎 [${pendingFileName} attached for analysis]`;
            
            renderMessage(userName, displayMessage, false, true, rawUserText);
            
            let messageParts = [];
            if (userText) messageParts.push({ text: userText });
            if (!userText && pendingAttachmentData) messageParts.push({ text: "Please analyze this attached report." });
            
            if (pendingAttachmentData) {
                messageParts.push({
                    inlineData: { mimeType: pendingMimeType, data: pendingAttachmentData }
                });
            }

            chatHistory.push({ role: 'user', parts: messageParts });
            clearAttachment(); 
            saveData();

            try {
                const aiResRaw = await getAIResponse(chatHistory);
                
                chatHistory.push({ role: 'model', parts: [{ text: aiResRaw }] });
                const newMsgId = renderMessage("Vaidyaji", aiResRaw, true, true);
                saveData();
                
                if (!state.isMuted && newMsgId) {
                    const playBtn = document.getElementById(`play-btn-${newMsgId}`);
                    if (playBtn) toggleSingleMessagePlay(playBtn);
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    renderMessage("System", "🛑 Analysis stopped by user.", true);
                } else {
                    renderMessage("System", "⚠️ Network interrupted. Please check your key or internet.", true);
                }
            } finally {
                state.isProcessing = false;
                currentAbortController = null;
                resetMicUI();
            }
        }

        async function getAIResponse(history) {
            const name = UI.name.value || "Seeker";
            const age = parseInt(UI.age.value) || 30;
            const lang = UI.selLang.value;
            const ailment = UI.inAilment.value;
            const customKey = (UI.keyIn.value.trim().length > 10) ? UI.keyIn.value.trim() : null;
            
            const headers = { 'Content-Type': 'application/json' };
            if (customKey) headers['X-Custom-Api-Key'] = customKey;

            const prompt = `You are "Vaidyaji" (वैद्यजी), an expert in Ayurveda and ancient Indian medicine.
            Patient: ${name}, Age: ${age}. Chief Complaint / Topic: ${ailment}.
            
            YOUR EXPERTISE & REFERENCES:
            Base all your advice on these ancient texts:
            1. Brihat Trayi (Charaka Samhita, Sushruta Samhita, Ashtanga Hridaya).
            2. Sharangadhara Samhita, Madhava Nidana, or Bhava Prakash.

            STRICT RULES:
            1. Mandatory Language: ${lang}. All explanations MUST be in ${lang}.
            2. RESPONSE STRUCTURE (Follow this pattern):
               - Direct Diagnosis/Observation based on Tridosha (Vata, Pitta, Kapha).
               - Exact Sanskrit Verse from one of the above books relevant to the ailment. State the book name.
               - Exact translation of the verse in ${lang}.
               - In-depth Expert Advice: Detailed remedy, diet (Pathya-Apathya), and lifestyle changes.
               - If an image/report is provided, deeply analyze it using Ayurvedic principles.
            3. FORMATTING: Use Markdown (**bold**, bullet points). Do NOT use complex LaTeX.
            4. TONE: Calm, Healing, Authoritative, Expert, Compassionate.`;

            const payload = { 
                model: "gemini-3.1-flash", 
                contents: history.slice(-10), 
                systemInstruction: { parts: [{ text: prompt }] } 
            };

            currentAbortController = new AbortController();

            const response = await fetch(PROXY_URL, { 
                method: 'POST', 
                headers: headers, 
                body: JSON.stringify(payload),
                signal: currentAbortController.signal 
            });
            
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // --- 7. TTS HIGHLIGHTER & ENGINE ---
        function prepareTextForTTSAndHighlighting(container, msgId) {
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            
            const textNodes = [];
            let node;
            
            while (node = walker.nextNode()) {
                if (node.nodeValue.trim() !== '') {
                    textNodes.push(node);
                }
            }

            let wordCounter = 0;
            let finalSpeechText = [];

            textNodes.forEach(textNode => {
                const parts = textNode.nodeValue.split(/(\s+)/); 
                const fragment = document.createDocumentFragment();
                
                parts.forEach(part => {
                    if (part.trim().length > 0) {
                        const span = document.createElement('span');
                        span.id = `tts-${msgId}-${wordCounter}`;
                        span.className = 'transition-all duration-150'; 
                        span.textContent = part;
                        fragment.appendChild(span);
                        
                        finalSpeechText.push(part);
                        wordCounter++;
                    } else {
                        fragment.appendChild(document.createTextNode(part));
                    }
                });
                textNode.parentNode.replaceChild(fragment, textNode);
            });

            return finalSpeechText.join(' ');
        }

        function highlightTTSWord(msgId, wordIndex) {
            clearTTSHighlight(); 
            const span = document.getElementById(`tts-${msgId}-${wordIndex}`);
            if (span) {
                // Emerald theme matching Vaidyaji
                span.classList.add('bg-emerald-500/30', 'text-emerald-300', 'font-bold', 'rounded-[3px]', 'px-[2px]', 'shadow-[0_0_8px_rgba(16,185,129,0.4)]');
                lastHighlightedSpan = span;

                const logContainer = document.getElementById('conversation-log');
                const spanRect = span.getBoundingClientRect();
                const logRect = logContainer.getBoundingClientRect();
                
                if (spanRect.bottom > logRect.bottom - 40 || spanRect.top < logRect.top + 40) {
                    span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function clearTTSHighlight() {
            if (lastHighlightedSpan) {
                lastHighlightedSpan.classList.remove('bg-emerald-500/30', 'text-emerald-300', 'font-bold', 'rounded-[3px]', 'px-[2px]', 'shadow-[0_0_8px_rgba(16,185,129,0.4)]');
                lastHighlightedSpan = null;
            }
        }

        function updatePlayBtnUI(btn, isPlaying) {
            if (!btn) return;
            const playIcon = btn.querySelector('.play-icon');
            const pauseIcon = btn.querySelector('.pause-icon');
            
            if (isPlaying) {
                if (playIcon) playIcon.classList.add('hidden');
                if (pauseIcon) pauseIcon.classList.remove('hidden');
            } else {
                if (playIcon) playIcon.classList.remove('hidden');
                if (pauseIcon) pauseIcon.classList.add('hidden');
            }
        }

        function resetCurrentTTS() {
            if (currentActiveBtn) {
                updatePlayBtnUI(currentActiveBtn, false);
                currentActiveBtn = null;
            }
            synth.cancel();
            clearTTSHighlight(); 
            ttsStatus = 'STOPPED';
            lastSpokenIndex = 0;
            window.currentPlayingText = "";
        }

        function toggleSingleMessagePlay(btnElem) {
            if (state.isMuted) return;

            const msgId = btnElem.getAttribute('data-msg-id');
            const plainText = speechDataMap[msgId] || "";

            if (currentActiveBtn === btnElem && window.currentPlayingText === plainText) {
                if (ttsStatus === 'PAUSED') {
                    ttsStatus = 'PLAYING';
                    updatePlayBtnUI(btnElem, true);
                    synth.cancel();
                    
                    const remainingText = plainText.substring(lastSpokenIndex);
                    startNewUtterance(remainingText, plainText, btnElem, lastSpokenIndex);
                    return;
                } else if (ttsStatus === 'PLAYING') {
                    ttsStatus = 'PAUSED';
                    updatePlayBtnUI(btnElem, false);
                    synth.cancel();
                    return;
                }
            }

            resetCurrentTTS();
            currentActiveBtn = btnElem;
            window.currentPlayingText = plainText;
            ttsStatus = 'PLAYING';
            lastSpokenIndex = 0;
            updatePlayBtnUI(btnElem, true);

            startNewUtterance(plainText, plainText, btnElem, 0); 
        }

        function startNewUtterance(textToSpeak, fullOriginalText, btnElement, offsetIndex) {
            if (!textToSpeak.trim()) {
                resetCurrentTTS();
                return;
            }

            const msgId = btnElement.getAttribute('data-msg-id'); 
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            window.__activeUtterance = utterance; // GC prevention

            const langMap = { 'Marathi':'mr-IN', 'Hindi':'hi-IN', 'English':'en-IN', 'Sanskrit':'hi-IN', 'Gujarati':'gu-IN', 'Bengali':'bn-IN', 'Tamil':'ta-IN', 'Telugu':'te-IN', 'Kannada':'kn-IN', 'Malayalam':'ml-IN' };
            utterance.lang = langMap[UI.selLang.value] || 'en-IN';
            
            // Vaidyaji voice is slightly slower and lower pitch
            utterance.rate = 0.85; 
            utterance.pitch = 0.9;
            
            let hasBoundaryFired = false;
            let fallbackTimer = null;
            
            const spokenSoFar = fullOriginalText.substring(0, offsetIndex);
            const match = spokenSoFar.match(/\S+/g);
            let estimatedWordIndex = match ? match.length : 0;
            const wordsArray = fullOriginalText.match(/\S+/g) || [];
            
            const cleanup = () => {
                if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
                clearTTSHighlight();
                if (ttsStatus === 'PLAYING') resetCurrentTTS(); 
            };

            // Dynamic Android Fallback Engine (prevents stuck highlights if native boundary fails)
            utterance.onstart = () => {
                setTimeout(() => {
                    if (!hasBoundaryFired && ttsStatus === 'PLAYING') {
                        const BASE_DELAY = 150; 
                        const CHAR_DELAY = 30;   
                        const MAX_DELAY = 850;   

                        const highlightNextWord = () => {
                            if (hasBoundaryFired || ttsStatus !== 'PLAYING' || estimatedWordIndex >= wordsArray.length) return;
                            
                            highlightTTSWord(msgId, estimatedWordIndex);
                            
                            const currentWord = wordsArray[estimatedWordIndex] || "";
                            const charCount = currentWord.length;
                            
                            let wordDuration = (BASE_DELAY + (charCount * CHAR_DELAY)) / 0.85; 
                            if (wordDuration > MAX_DELAY) wordDuration = MAX_DELAY;
                            
                            estimatedWordIndex++;
                            fallbackTimer = setTimeout(highlightNextWord, wordDuration);
                        };
                        highlightNextWord(); 
                    }
                }, 100);
            };

            utterance.onboundary = (event) => { 
                hasBoundaryFired = true; 
                if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }

                lastSpokenIndex = offsetIndex + event.charIndex; 
                
                const currentSpoken = fullOriginalText.substring(0, lastSpokenIndex);
                const currentMatch = currentSpoken.match(/\S+/g);
                const currentWordIndex = currentMatch ? currentMatch.length : 0;
                
                highlightTTSWord(msgId, currentWordIndex);
            };
            
            utterance.onend = cleanup;
            
            utterance.onerror = (e) => {
                if (e.error !== 'canceled' && e.error !== 'interrupted') cleanup();
            };
            
            synth.speak(utterance);
            synth.resume(); 
        }

                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(container).save();
        }
    </script>
</body>
