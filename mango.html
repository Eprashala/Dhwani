<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANGO - Your Virtual Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        bgLight: '#f8fafc',
                        bgDark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --color-primary: #f59e0b; }
        body { font-family: 'Inter', system-ui, sans-serif; touch-action: manipulation; user-select: none; }
        
        #splash-screen { transition: opacity 1s ease-out, transform 1s ease-out; z-index: 9999; }
        .mango-bounce { animation: bounce-mango 2s infinite; }
        @keyframes bounce-mango {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .mic-active {
            background: #ef4444 !important;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-mic 1.5s infinite;
        }
        .mic-thinking {
            background: #eab308 !important;
            animation: spin-slow 2s linear infinite;
            pointer-events: none;
        }
        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 4px; }

        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--color-primary);
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #475569;
        }
    </style>
</head>
<body class="bg-bgLight dark:bg-bgDark text-slate-800 dark:text-slate-200 h-screen flex flex-col overflow-hidden transition-colors duration-300">

    <div id="splash-screen" class="fixed inset-0 bg-yellow-400 dark:bg-yellow-600 flex flex-col items-center justify-center">
        <div class="text-9xl mango-bounce">🥭</div>
        <h1 class="text-4xl font-bold mt-4 text-white tracking-widest">MANGO</h1>
        <p class="text-yellow-100 mt-2">Loading your virtual friend...</p>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-md shadow-2xl relative my-auto">
            <button id="btn-close-settings" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 text-xl font-bold">✕</button>
            <h2 class="text-2xl font-bold text-primary mb-4 flex items-center gap-2">🥭 MANGO Settings</h2>
            
            <div class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                <div class="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl border dark:border-slate-600">
                    <h3 class="font-semibold mb-2 text-sm uppercase text-slate-500">Your Profile (User)</h3>
                    <input type="text" id="set-name" placeholder="Your Full Name" class="w-full mb-2 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm">
                    <input type="text" id="set-fname" placeholder="Your Nickname" class="w-full mb-2 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm">
                    <input type="number" id="set-age" placeholder="Your Age" class="w-full p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm">
                </div>

                <div class="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl border dark:border-slate-600">
                    <h3 class="font-semibold mb-2 text-sm uppercase text-slate-500">AI Engine & Keys</h3>
                    <select id="set-provider" class="w-full mb-2 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none font-semibold text-sm">
                        <option value="gemini">Google Gemini</option>
                        <option value="openai">OpenAI (ChatGPT)</option>
                        <option value="groq">Groq (Llama/Mixtral)</option>
                        <option value="claude">Anthropic (Claude)</option>
                    </select>
                    <select id="set-model" class="w-full mb-2 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm"></select>
                    
                    <div class="flex gap-2 w-full mt-2">
                        <input type="password" id="set-apikey" placeholder="API Key" class="flex-1 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm">
                        <button id="btn-paste-key" class="bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 dark:hover:bg-slate-500 px-4 rounded-lg text-sm font-semibold transition-colors shadow-inner border border-slate-300 dark:border-slate-500">Paste</button>
                    </div>
                </div>

                <div class="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl border dark:border-slate-600">
                    <h3 class="font-semibold mb-2 text-sm uppercase text-slate-500">Manage AI Personas</h3>
                    
                    <div class="bg-white dark:bg-slate-900 p-3 rounded-lg border dark:border-slate-600 mb-3">
                        <h4 id="persona-form-title" class="text-xs font-bold text-primary mb-2">Create New Persona</h4>
                        <input type="text" id="p-name" placeholder="Name (e.g. Mrs. Smith)" class="w-full mb-2 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-sm">
                        <input type="text" id="p-fname" placeholder="Role (e.g. Math Teacher)" class="w-full mb-2 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-sm">
                        <input type="number" id="p-age" placeholder="Age of Persona" class="w-full mb-2 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-sm">
                        
                        <div class="flex gap-2 w-full mb-2">
                            <select id="p-lang" class="flex-1 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-xs"><option value="">Any Language</option></select>
                            
                            <button id="btn-add-voices" class="bg-slate-200 dark:bg-slate-700 px-2 rounded text-xs font-semibold hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300" title="Download more voices via Android Settings">⚙️ Add</button>
                            
                            <select id="p-voice" class="flex-1 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-xs"></select>
                        </div>

                        <div class="flex gap-2 w-full mb-2 items-center bg-slate-50 dark:bg-slate-800 p-2 rounded border dark:border-slate-700">
                            <div class="flex-1 flex flex-col gap-1">
                                <div class="flex justify-between text-[10px] text-slate-500"><span>Pitch</span><span id="val-pitch">1.0</span></div>
                                <input type="range" id="p-pitch" min="0" max="2" step="0.1" value="1">
                            </div>
                            <div class="flex-1 flex flex-col gap-1">
                                <div class="flex justify-between text-[10px] text-slate-500"><span>Speed</span><span id="val-rate">1.0</span></div>
                                <input type="range" id="p-rate" min="0.5" max="2" step="0.1" value="1">
                            </div>
                            <button id="btn-preview-voice" class="ml-1 bg-slate-200 dark:bg-slate-700 h-8 w-8 flex items-center justify-center rounded-full text-sm hover:bg-slate-300 dark:hover:bg-slate-600" title="Preview Voice">▶️</button>
                        </div>
                        
                        <textarea id="p-personality" placeholder="Detailed Personality (e.g. Strict but caring sister...)" class="w-full mb-2 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-sm h-16"></textarea>
                        <textarea id="p-books" placeholder="Reference Books (Comma separated)" class="w-full mb-2 p-2 rounded bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 outline-none text-sm h-12"></textarea>
                        
                        <div class="flex gap-2 w-full">
                            <button id="btn-add-persona" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded transition-colors text-sm">Add Persona</button>
                            <button id="btn-cancel-edit" class="hidden bg-slate-500 hover:bg-slate-400 text-white font-bold py-2 px-3 rounded transition-colors text-sm">Cancel</button>
                        </div>
                    </div>

                    <h4 class="text-xs font-bold text-slate-500 mb-2">Existing Personas</h4>
                    <div id="persona-list" class="space-y-2 max-h-32 overflow-y-auto"></div>
                </div>

                <div class="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl border dark:border-slate-600">
                    <textarea id="set-custom-prompt" placeholder="Global AI Instructions (Applies to all personas)" class="w-full mb-3 p-2 rounded-lg bg-white dark:bg-slate-900 border dark:border-slate-600 outline-none text-sm h-16"></textarea>
                    
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-semibold text-sm uppercase text-slate-500">Dark Mode</h3>
                        <input type="checkbox" id="set-darkmode" class="w-5 h-5 accent-primary cursor-pointer">
                    </div>
                    <div>
                        <h3 class="font-semibold mb-2 text-sm uppercase text-slate-500">Theme Color</h3>
                        <input type="color" id="set-color" value="#f59e0b" class="w-full h-10 cursor-pointer rounded">
                    </div>
                </div>
            </div>
            
            <button id="btn-save-settings" class="w-full mt-4 bg-primary hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg">Save & Close</button>
        </div>
    </div>

    <div class="flex flex-col w-full h-full max-w-3xl mx-auto relative shadow-2xl">
        
        <header class="flex-shrink-0 p-3 sm:p-4 bg-white/80 dark:bg-slate-900/80 glass-panel z-20 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <div class="text-2xl sm:text-3xl flex-shrink-0">🥭</div>
                <div class="flex flex-col min-w-0">
                    <div class="flex items-center gap-1 sm:gap-2">
                        <h1 class="text-lg sm:text-xl font-bold tracking-wider text-primary hidden sm:block">MANGO</h1>
                        <select id="header-persona-select" class="text-xs sm:text-sm font-semibold bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded py-1 px-1 sm:px-2 outline-none cursor-pointer border border-slate-300 dark:border-slate-600 shadow-sm max-w-[120px] sm:max-w-xs truncate"></select>
                    </div>
                    <div id="status-indicator" class="text-[10px] sm:text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate">Online & Ready</div>
                </div>
            </div>
            <div class="flex gap-1 sm:gap-2 flex-shrink-0">
                <button id="btn-share" class="text-slate-400 hover:text-green-500 p-2 outline-none transition-colors" title="Share Chat">📤</button>
                <button id="btn-clear" class="text-slate-400 hover:text-red-500 p-2 outline-none transition-colors" title="Clear Chat">🗑️</button>
                <button id="btn-settings" class="text-slate-400 hover:text-primary p-2 outline-none transition-colors" title="Settings">⚙️</button>
            </div>
        </header>

        <main id="chat-log" class="flex-1 overflow-y-auto p-3 sm:p-4 space-y-4 scroll-smooth pb-20"></main>

        <div id="image-preview-container" class="hidden px-4 py-2 bg-slate-100 dark:bg-slate-800 flex items-center gap-2">
            <span class="text-xs text-slate-500">Attached:</span>
            <img id="image-preview" class="h-10 rounded border border-slate-300 object-cover hidden" src="" alt="preview">
            <div id="pdf-preview" class="h-10 px-3 bg-red-100 text-red-600 rounded border border-red-300 flex items-center font-bold text-xs hidden">PDF</div>
            <button id="btn-remove-image" class="text-red-500 text-sm ml-2 font-bold outline-none">✕</button>
        </div>

        <footer class="w-full bg-white/90 dark:bg-slate-900/90 glass-panel p-2 sm:p-3 pb-safe flex items-center gap-1 sm:gap-2 relative z-20">
            <label for="file-upload" class="p-2 sm:p-3 text-xl text-slate-500 hover:text-primary cursor-pointer transition-colors outline-none flex-shrink-0">📎</label>
            <input id="file-upload" type="file" accept="image/*, application/pdf" class="hidden">

            <input type="text" id="text-input" class="flex-1 min-w-0 bg-slate-100 dark:bg-slate-800 dark:text-white border border-transparent focus:border-primary rounded-full px-4 py-2 sm:px-5 sm:py-3 outline-none transition-colors text-sm sm:text-base" placeholder="Message...">
            
            <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
                <button id="btn-tts-toggle" class="w-10 h-10 sm:w-12 sm:h-12 hidden bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-800 rounded-full flex items-center justify-center transition-all outline-none text-xl shadow-inner" title="Pause/Play Audio">⏸️</button>
                <button id="btn-send" class="w-10 h-10 sm:w-12 sm:h-12 bg-primary hover:bg-orange-500 text-white rounded-full transition-colors shadow-lg outline-none hidden flex items-center justify-center text-lg sm:text-xl">➤</button>
                <button id="btn-mic" class="w-10 h-10 sm:w-12 sm:h-12 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded-full flex items-center justify-center transition-all outline-none text-lg sm:text-xl">🎤</button>
            </div>
        </footer>
    </div>

    <script>
        // --- 1. FULLSCREEN, WAKE LOCK, GLOBAL VARIABLES ---
        let wakeLock = null;
        window.currentUtterance = null; 

        async function acquireWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
        document.addEventListener('click', () => {
            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            acquireWakeLock();
        });
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') acquireWakeLock();
        });

        // --- 2. CONFIGURATION & STATE ---
        const MODELS = {
            gemini: ["gemini-3.5-flash", "gemini-3.1-pro-preview", "gemini-3.1-flash-lite"],
            openai: ["o3", "gpt-4.1", "gpt-4o"], 
            groq: ["llama-4-scout-17b", "llama-4-maverick-17b", "mixtral-8x7b-32768"], 
            claude: ["claude-opus-4.7", "claude-sonnet-4.6", "claude-haiku-4.5"]
        };

        const defaultPersona = {
            id: 'default', name: 'Mango', fname: 'Virtual Friend', age: 25, 
            lang: 'en-US', voiceURI: '', pitch: 1.0, rate: 1.0,
            personality: 'Highly conversational, helpful, and humorous virtual friend.',
            referenceBooks: ''
        };

        let state = {
            isProcessing: false,
            isListening: false,
            editingPersonaId: null, 
            ttsPaused: false,
            chatHistory: [], 
            currentBase64File: null,
            currentFileType: null,
            apiKeys: JSON.parse(localStorage.getItem('mango_keys')) || {},
            personas: JSON.parse(localStorage.getItem('mango_personas')) || [defaultPersona],
            activePersonaId: localStorage.getItem('mango_active_persona') || 'default',
            settings: JSON.parse(localStorage.getItem('mango_settings')) || {
                name: "User", fname: "Buddy", age: 25, provider: "gemini", 
                model: "gemini-3.5-flash", customPrompt: "",
                darkmode: false, color: "#f59e0b"
            }
        };

        let recognition = null;
        let synth = window.speechSynthesis;

        // --- 3. DOM ELEMENTS ---
        const DOM = {
            splash: document.getElementById('splash-screen'),
            log: document.getElementById('chat-log'),
            textIn: document.getElementById('text-input'),
            btnSend: document.getElementById('btn-send'),
            btnMic: document.getElementById('btn-mic'),
            btnTtsToggle: document.getElementById('btn-tts-toggle'), 
            btnSettings: document.getElementById('btn-settings'),
            btnClear: document.getElementById('btn-clear'),
            btnShare: document.getElementById('btn-share'),
            modalSettings: document.getElementById('settings-modal'),
            btnCloseSettings: document.getElementById('btn-close-settings'),
            btnSaveSettings: document.getElementById('btn-save-settings'),
            btnPasteKey: document.getElementById('btn-paste-key'),
            status: document.getElementById('status-indicator'),
            fileInput: document.getElementById('file-upload'),
            imgPreviewCont: document.getElementById('image-preview-container'),
            imgPreview: document.getElementById('image-preview'),
            pdfPreview: document.getElementById('pdf-preview'),
            btnRemoveImg: document.getElementById('btn-remove-image'),
            
            headerPersonaSelect: document.getElementById('header-persona-select'),

            sName: document.getElementById('set-name'),
            sFname: document.getElementById('set-fname'),
            sAge: document.getElementById('set-age'),
            sProv: document.getElementById('set-provider'),
            sModel: document.getElementById('set-model'),
            sKey: document.getElementById('set-apikey'),
            sCust: document.getElementById('set-custom-prompt'),
            sDark: document.getElementById('set-darkmode'),
            sColor: document.getElementById('set-color'),

            personaFormTitle: document.getElementById('persona-form-title'),
            pName: document.getElementById('p-name'),
            pFname: document.getElementById('p-fname'),
            pAge: document.getElementById('p-age'),
            pLang: document.getElementById('p-lang'),
            pVoice: document.getElementById('p-voice'),
            pPitch: document.getElementById('p-pitch'),
            pRate: document.getElementById('p-rate'),
            valPitch: document.getElementById('val-pitch'),
            valRate: document.getElementById('val-rate'),
            pPersonality: document.getElementById('p-personality'),
            pBooks: document.getElementById('p-books'),
            btnAddPersona: document.getElementById('btn-add-persona'),
            btnCancelEdit: document.getElementById('btn-cancel-edit'), 
            btnPreviewVoice: document.getElementById('btn-preview-voice'),
            btnAddVoices: document.getElementById('btn-add-voices'), 
            personaList: document.getElementById('persona-list')
        };

        // --- 4. INITIALIZATION ---
        window.onload = () => {
            setTimeout(() => {
                DOM.splash.style.opacity = '0';
                DOM.splash.style.transform = 'scale(1.1)';
                setTimeout(() => DOM.splash.style.display = 'none', 1000);
                acquireWakeLock();
            }, 1500);

            applySettingsToUI();
            populateModels(state.settings.provider);
            DOM.sModel.value = state.settings.model;
            
            const loadVoices = () => {
                const voices = synth.getVoices();
                DOM.pVoice.innerHTML = '';
                const langs = new Set();
                
                const currentVoice = DOM.pVoice.value;

                voices.forEach(v => {
                    if (!DOM.pLang.value || v.lang === DOM.pLang.value) {
                        DOM.pVoice.add(new Option(`${v.name} (${v.lang})`, v.voiceURI));
                    }
                    langs.add(v.lang);
                });

                if (DOM.pLang.options.length <= 1) {
                    Array.from(langs).sort().forEach(l => DOM.pLang.add(new Option(l, l)));
                }

                if(currentVoice) DOM.pVoice.value = currentVoice;
            };

            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
            loadVoices();
            DOM.pLang.addEventListener('change', loadVoices);

            DOM.pPitch.addEventListener('input', (e) => DOM.valPitch.innerText = parseFloat(e.target.value).toFixed(1));
            DOM.pRate.addEventListener('input', (e) => DOM.valRate.innerText = parseFloat(e.target.value).toFixed(1));

            renderPersonas();
            loadHistory();
            initSpeechRecognition();
            setupEventListeners();
        };

        // --- 5. AUDIO HELPER ---
        function stopTTS() {
            // CRITICAL FIX: Wake up the engine before canceling, 
            // otherwise Chrome gets permanently stuck in a paused state.
            synth.resume(); 
            synth.cancel();
            state.ttsPaused = false;
            DOM.btnTtsToggle.classList.add('hidden');
        }

        // --- 6. PERSONA & SETTINGS LOGIC ---
        function getActivePersona() {
            return state.personas.find(p => p.id === state.activePersonaId) || state.personas[0];
        }

        function renderPersonas() {
            DOM.headerPersonaSelect.innerHTML = '';
            state.personas.forEach(p => {
                DOM.headerPersonaSelect.add(new Option(`${p.name} (${p.fname})`, p.id));
            });
            DOM.headerPersonaSelect.value = state.activePersonaId;

            DOM.personaList.innerHTML = '';
            state.personas.forEach(p => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white dark:bg-slate-800 p-2 rounded border dark:border-slate-700 text-sm gap-2";
                
                div.innerHTML = `
                    <div class="flex-1 min-w-0"><span class="font-bold text-primary truncate block">${p.name} <span class="text-xs text-slate-500 font-normal">(${p.fname})</span></span></div>
                    <div class="flex items-center gap-1 flex-shrink-0">
                        <button class="text-blue-500 hover:text-blue-700 font-bold px-2" onclick="editPersona('${p.id}')" title="Edit">✏️</button>
                        ${p.id !== 'default' ? `<button class="text-red-500 hover:text-red-700 font-bold px-2" onclick="deletePersona('${p.id}')" title="Delete">✕</button>` : '<span class="text-xs text-slate-400 px-2 w-7 text-center"></span>'}
                    </div>
                `;
                DOM.personaList.appendChild(div);
            });
        }

        window.editPersona = function(id) {
            const p = state.personas.find(per => per.id === id);
            if(!p) return;
            
            state.editingPersonaId = id;
            DOM.personaFormTitle.innerText = "Edit Persona";
            DOM.btnAddPersona.innerText = "Update Persona";
            DOM.btnCancelEdit.classList.remove('hidden');

            DOM.pName.value = p.name || '';
            DOM.pFname.value = p.fname || '';
            DOM.pAge.value = p.age || '';
            
            DOM.pLang.value = p.lang || 'en-US';
            DOM.pLang.dispatchEvent(new Event('change')); 
            
            setTimeout(() => { DOM.pVoice.value = p.voiceURI || ''; }, 50);

            DOM.pPitch.value = p.pitch !== undefined ? p.pitch : 1.0;
            DOM.pRate.value = p.rate !== undefined ? p.rate : 1.0;
            DOM.valPitch.innerText = parseFloat(DOM.pPitch.value).toFixed(1);
            DOM.valRate.innerText = parseFloat(DOM.pRate.value).toFixed(1);

            DOM.pPersonality.value = p.personality || '';
            DOM.pBooks.value = p.referenceBooks || '';
            
            DOM.personaFormTitle.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        function cancelEdit() {
            state.editingPersonaId = null;
            DOM.personaFormTitle.innerText = "Create New Persona";
            DOM.btnAddPersona.innerText = "Add Persona";
            DOM.btnCancelEdit.classList.add('hidden');

            DOM.pName.value = ''; DOM.pFname.value = ''; DOM.pAge.value = ''; 
            DOM.pPersonality.value = ''; DOM.pBooks.value = '';
            DOM.pPitch.value = 1.0; DOM.pRate.value = 1.0;
            DOM.valPitch.innerText = '1.0'; DOM.valRate.innerText = '1.0';
        }

        function addPersona() {
            if(!DOM.pName.value || !DOM.pPersonality.value) { alert("Name and Detailed Personality are required."); return; }
            
            const personaData = {
                id: state.editingPersonaId || 'p_' + Date.now(),
                name: DOM.pName.value,
                fname: DOM.pFname.value || DOM.pName.value,
                age: parseInt(DOM.pAge.value) || 30,
                lang: DOM.pLang.value || 'en-US',
                voiceURI: DOM.pVoice.value,
                pitch: parseFloat(DOM.pPitch.value) || 1.0,
                rate: parseFloat(DOM.pRate.value) || 1.0,
                personality: DOM.pPersonality.value,
                referenceBooks: DOM.pBooks.value
            };

            if (state.editingPersonaId) {
                const index = state.personas.findIndex(p => p.id === state.editingPersonaId);
                if(index !== -1) state.personas[index] = personaData;
            } else {
                state.personas.push(personaData);
            }

            localStorage.setItem('mango_personas', JSON.stringify(state.personas));
            
            cancelEdit();
            renderPersonas();
            
            if (state.activePersonaId === personaData.id) {
                 loadHistory(); 
            }
        }

        window.deletePersona = function(id) {
            state.personas = state.personas.filter(p => p.id !== id);
            localStorage.removeItem(`mango_history_${id}`); 
            
            if (state.editingPersonaId === id) cancelEdit();
            if (state.activePersonaId === id) state.activePersonaId = 'default';
            
            localStorage.setItem('mango_personas', JSON.stringify(state.personas));
            localStorage.setItem('mango_active_persona', state.activePersonaId);
            renderPersonas();
            loadHistory(); 
        };

        DOM.headerPersonaSelect.addEventListener('change', (e) => {
            stopTTS(); 
            state.activePersonaId = e.target.value;
            localStorage.setItem('mango_active_persona', state.activePersonaId);
            loadHistory(); 
        });

        function applySettingsToUI() {
            if (state.settings.darkmode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            document.documentElement.style.setProperty('--color-primary', state.settings.color);
            
            DOM.sName.value = state.settings.name;
            DOM.sFname.value = state.settings.fname;
            DOM.sAge.value = state.settings.age;
            DOM.sProv.value = state.settings.provider;
            DOM.sCust.value = state.settings.customPrompt;
            DOM.sDark.checked = state.settings.darkmode;
            DOM.sColor.value = state.settings.color;
            DOM.sKey.value = state.apiKeys[state.settings.provider] || '';
        }

        function populateModels(provider) {
            DOM.sModel.innerHTML = '';
            MODELS[provider].forEach(m => DOM.sModel.add(new Option(m, m)));
        }

        DOM.sProv.addEventListener('change', (e) => {
            populateModels(e.target.value);
            DOM.sKey.value = state.apiKeys[e.target.value] || '';
        });

        function saveSettings() {
            state.settings = {
                name: DOM.sName.value, fname: DOM.sFname.value, age: parseInt(DOM.sAge.value) || 25,
                provider: DOM.sProv.value, model: DOM.sModel.value, 
                customPrompt: DOM.sCust.value,
                darkmode: DOM.sDark.checked, color: DOM.sColor.value
            };
            state.apiKeys[DOM.sProv.value] = DOM.sKey.value;
            
            localStorage.setItem('mango_settings', JSON.stringify(state.settings));
            localStorage.setItem('mango_keys', JSON.stringify(state.apiKeys));
            applySettingsToUI();
            DOM.modalSettings.classList.add('hidden');
        }

        // --- 7. EVENT LISTENERS ---
        function setupEventListeners() {
            DOM.btnSettings.onclick = (e) => { e.stopPropagation(); DOM.modalSettings.classList.remove('hidden'); };
            DOM.btnCloseSettings.onclick = (e) => { e.stopPropagation(); DOM.modalSettings.classList.add('hidden'); };
            DOM.btnSaveSettings.onclick = (e) => { e.stopPropagation(); saveSettings(); };
            DOM.modalSettings.onclick = (e) => e.stopPropagation();
            
            DOM.btnAddPersona.onclick = (e) => { e.stopPropagation(); addPersona(); };
            DOM.btnCancelEdit.onclick = (e) => { e.stopPropagation(); cancelEdit(); };

            DOM.btnClear.onclick = () => {
                const p = getActivePersona();
                if(confirm(`Erase chat history with ${p.name}?`)) { 
                    stopTTS(); 
                    state.chatHistory = []; 
                    localStorage.removeItem(`mango_history_${state.activePersonaId}`); 
                    loadHistory(); 
                }
            };

            DOM.btnAddVoices.onclick = (e) => {
                e.stopPropagation();
                try {
                    window.location.href = "intent:#Intent;action=com.android.settings.TTS_SETTINGS;end";
                } catch(err) {
                    console.log("Intent failed to launch.");
                }
                setTimeout(() => {
                    alert("To add more languages to your phone:\n\n1. Go to your phone's Settings.\n2. Search for 'Text-to-Speech' or 'TTS'.\n3. Tap the gear icon next to your Preferred Engine.\n4. Tap 'Install voice data'.\n5. Download the languages you want, then return here and refresh!");
                }, 500);
            };

            DOM.btnShare.onclick = async (e) => {
                e.stopPropagation();
                if (state.chatHistory.length === 0) return alert("No chat history to share yet!");
                const shareText = state.chatHistory.map(msg => {
                    const sender = msg.role === 'user' ? state.settings.fname : getActivePersona().name;
                    return `${sender}: ${msg.content.replace(/\[File Attached\]/g, '')}`; 
                }).join('\n\n');

                try {
                    if (navigator.share) await navigator.share({ title: 'Chat', text: shareText });
                    else {
                        await navigator.clipboard.writeText(shareText);
                        const originalText = DOM.btnShare.innerText;
                        DOM.btnShare.innerText = "✅";
                        setTimeout(() => { DOM.btnShare.innerText = originalText; }, 1500);
                    }
                } catch (err) {}
            };

            DOM.btnPasteKey.onclick = async (e) => {
                e.stopPropagation(); 
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) {
                        DOM.sKey.value = text;
                        const originalText = DOM.btnPasteKey.innerText;
                        DOM.btnPasteKey.innerText = "Pasted!";
                        setTimeout(() => { DOM.btnPasteKey.innerText = originalText; }, 1500);
                    }
                } catch (err) { alert('Could not access clipboard. Please paste manually.'); }
            };

            DOM.btnPreviewVoice.onclick = (e) => {
                e.stopPropagation();
                stopTTS();
                const utterance = new SpeechSynthesisUtterance(`Hi, I am ${DOM.pName.value || 'your new persona'}. How do I sound?`);
                
                utterance.lang = DOM.pLang.value || 'en-US';
                utterance.pitch = parseFloat(DOM.pPitch.value) || 1.0;
                utterance.rate = parseFloat(DOM.pRate.value) || 1.0;

                const voices = synth.getVoices();
                const selectedVoice = voices.find(v => v.voiceURI === DOM.pVoice.value || v.name === DOM.pVoice.value);
                
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                    utterance.lang = selectedVoice.lang; 
                }
                
                window.currentUtterance = utterance; 
                synth.speak(utterance);
            };

            // THE MANUAL TTS PAUSE BUG FIX
            DOM.btnTtsToggle.onclick = (e) => {
                e.stopPropagation();
                if (state.ttsPaused) {
                    synth.resume();
                    
                    // Magic Fix for Android/Chrome: Force a rapid loop of resume commands
                    // to kick the TTS engine out of its deep suspended state.
                    let kick = setInterval(() => {
                        if (!synth.paused) {
                            clearInterval(kick);
                        } else {
                            synth.resume();
                        }
                    }, 50);
                    
                    // Failsafe to stop the loop after 1 second
                    setTimeout(() => clearInterval(kick), 1000);

                    state.ttsPaused = false;
                    DOM.btnTtsToggle.innerText = '⏸️'; 
                } else {
                    synth.pause();
                    state.ttsPaused = true;
                    DOM.btnTtsToggle.innerText = '▶️'; 
                }
            };

            DOM.textIn.addEventListener('input', () => {
                if(DOM.textIn.value.trim().length > 0 || state.currentBase64File) {
                    DOM.btnSend.classList.remove('hidden'); DOM.btnMic.classList.add('hidden');
                } else {
                    DOM.btnSend.classList.add('hidden'); DOM.btnMic.classList.remove('hidden');
                }
            });

            DOM.btnSend.onclick = () => processInput(DOM.textIn.value);
            DOM.textIn.onkeypress = (e) => { if(e.key === 'Enter') processInput(DOM.textIn.value); };

            DOM.btnMic.onclick = (e) => {
                e.stopPropagation();
                if (state.isProcessing || !recognition) return;
                if (state.isListening) {
                    recognition.stop();
                } else { 
                    stopTTS(); 
                    try { recognition.start(); } catch(err) { console.error(err); } 
                }
            };

            DOM.fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const isPDF = file.type === 'application/pdf';
                state.currentFileType = isPDF ? 'pdf' : 'image';
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    state.currentBase64File = event.target.result;
                    DOM.imgPreviewCont.classList.remove('hidden');
                    
                    if(isPDF) {
                        DOM.imgPreview.classList.add('hidden');
                        DOM.pdfPreview.classList.remove('hidden');
                    } else {
                        DOM.imgPreview.src = state.currentBase64File;
                        DOM.imgPreview.classList.remove('hidden');
                        DOM.pdfPreview.classList.add('hidden');
                    }
                    
                    DOM.btnSend.classList.remove('hidden'); DOM.btnMic.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            });

            DOM.btnRemoveImg.onclick = () => {
                state.currentBase64File = null;
                state.currentFileType = null;
                DOM.imgPreviewCont.classList.add('hidden');
                DOM.fileInput.value = '';
                DOM.textIn.dispatchEvent(new Event('input')); 
            };
        }

        // --- 8. EAR (Speech Recognition) ---
        function initSpeechRecognition() {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRec) { DOM.btnMic.style.display = 'none'; return; }
            recognition = new SpeechRec();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                state.isListening = true;
                DOM.btnMic.classList.add('mic-active');
                DOM.textIn.placeholder = "Listening...";
                stopTTS(); 
            };
            
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript.trim();
                if (transcript) { DOM.textIn.value = transcript; processInput(transcript); }
            };

            recognition.onend = () => {
                state.isListening = false;
                DOM.btnMic.classList.remove('mic-active');
                if(!state.isProcessing) DOM.textIn.placeholder = "Message...";
            };
        }

        // --- 9. MOUTH (Speech Synthesis) ---
        function speakText(text) {
            stopTTS();
            let cleanText = text.replace(/[\u{1F600}-\u{1F6FF}|[\u{2600}-\u{26FF}]/gu, '');
            cleanText = cleanText.replace(/[*#`_\[\]()]/g, '').trim();
            if(!cleanText) return;

            const activePersona = getActivePersona();
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = activePersona.lang || 'en-US';
            utterance.pitch = activePersona.pitch !== undefined ? activePersona.pitch : 1.0;
            utterance.rate = activePersona.rate !== undefined ? activePersona.rate : 1.0;

            if (activePersona.voiceURI) {
                const voices = synth.getVoices();
                const selectedVoice = voices.find(v => v.voiceURI === activePersona.voiceURI || v.name === activePersona.voiceURI);
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                    utterance.lang = selectedVoice.lang; 
                }
            }
            
            utterance.onstart = () => {
                DOM.btnTtsToggle.classList.remove('hidden');
                DOM.btnTtsToggle.innerText = '⏸️';
            };
            utterance.onend = () => {
                DOM.btnTtsToggle.classList.add('hidden');
            };
            utterance.onerror = () => {
                DOM.btnTtsToggle.classList.add('hidden');
            };

            window.currentUtterance = utterance; 
            synth.speak(utterance);
        }

        // --- 10. BRAIN (Core Logic & API Fetch) ---
        async function processInput(text) {
            if (state.isProcessing || (!text.trim() && !state.currentBase64File)) return;
            const p = state.settings.provider;
            
            if (!state.apiKeys[p]) { alert(`Please enter your API Key for ${p} in Settings.`); return; }

            if (state.currentFileType === 'pdf' && (p === 'openai' || p === 'groq')) {
                alert(`${p.toUpperCase()} currently does not support inline PDF reading via this standard interface. Please use Gemini or Claude, or attach an image instead.`);
                return;
            }

            const userText = text.trim();
            const fileData = state.currentBase64File;
            const fileType = state.currentFileType;
            
            DOM.textIn.value = '';
            DOM.btnRemoveImg.click();
            DOM.textIn.placeholder = "Thinking...";
            DOM.btnMic.classList.add('mic-thinking');
            DOM.status.innerText = "Thinking...";
            state.isProcessing = true;

            renderMessage('user', userText, fileData, fileType);
            
            let msgContent = userText;
            if (fileData && p !== 'claude') { 
                msgContent = userText ? `${userText} [File Attached]` : "[File Attached]"; 
            }
            state.chatHistory.push({ role: 'user', content: msgContent });

            try {
                const response = await fetchAIResponse(userText, fileData, fileType);
                renderMessage('assistant', response);
                state.chatHistory.push({ role: 'assistant', content: response });
                localStorage.setItem(`mango_history_${state.activePersonaId}`, JSON.stringify(state.chatHistory));
                speakText(response);
            } catch (err) {
                console.error(err);
                renderMessage('assistant', "Oops! I hit a snag. Check your API keys and internet connection.");
            }

            state.isProcessing = false;
            DOM.btnMic.classList.remove('mic-thinking');
            DOM.textIn.placeholder = "Message...";
            DOM.status.innerText = "Online";
            DOM.textIn.dispatchEvent(new Event('input')); 
        }

        async function fetchAIResponse(userText, fileData, fileType) {
            const sysPrompt = buildSystemPrompt();
            const p = state.settings.provider;
            const key = state.apiKeys[p];
            const mod = state.settings.model;

            if (p === 'openai' || p === 'groq') {
                const url = p === 'openai' ? 'https://api.openai.com/v1/chat/completions' : 'https://api.groq.com/openai/v1/chat/completions';
                let messages = [{ role: "system", content: sysPrompt }, ...state.chatHistory.slice(-8)];
                
                let currentMessageContent = userText || "Analyze this image";
                if (fileData && fileType === 'image' && p === 'openai') {
                    currentMessageContent = [
                        { type: "text", text: userText || "What is in this image?" },
                        { type: "image_url", image_url: { url: fileData } }
                    ];
                }
                messages.pop(); 
                messages.push({ role: "user", content: currentMessageContent });

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: mod, messages: messages })
                });
                if(!res.ok) throw new Error("API Error");
                const data = await res.json();
                return data.choices[0].message.content;

            } else if (p === 'gemini') {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${mod}:generateContent?key=${key}`;
                
                let contents = state.chatHistory.slice(-8, -1).map(m => ({
                    role: m.role === 'assistant' ? 'model' : 'user',
                    parts: [{ text: m.content }]
                }));

                let currentParts = [{ text: userText || "Analyze this file." }];
                if (fileData) {
                    const base64Str = fileData.split(',')[1];
                    const mimeType = fileData.match(/[^:]\w+\/[\w-+\d.]+(?=;|,)/)[0];
                    currentParts.push({ inline_data: { mime_type: mimeType, data: base64Str } });
                }
                contents.push({ role: 'user', parts: currentParts });

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ system_instruction: { parts: [{text: sysPrompt}] }, contents: contents })
                });
                if(!res.ok) throw new Error("API Error");
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;

            } else if (p === 'claude') {
                let currentMsgParts = [];
                if (fileData) {
                    const base64Str = fileData.split(',')[1];
                    const mimeType = fileData.match(/[^:]\w+\/[\w-+\d.]+(?=;|,)/)[0];
                    if (fileType === 'pdf') {
                        currentMsgParts.push({ type: "document", source: { type: "base64", media_type: mimeType, data: base64Str }});
                    } else {
                        currentMsgParts.push({ type: "image", source: { type: "base64", media_type: mimeType, data: base64Str }});
                    }
                }
                currentMsgParts.push({ type: "text", text: userText || "Please review the attached file." });

                let messages = state.chatHistory.slice(-8);
                messages.pop(); 
                messages.push({ role: "user", content: currentMsgParts });

                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerously-allow-browser': 'true' 
                    },
                    body: JSON.stringify({
                        model: mod, system: sysPrompt, max_tokens: 1024, messages: messages
                    })
                });
                if(!res.ok) throw new Error("API Error");
                const data = await res.json();
                return data.content[0].text;
            }
        }

        function buildSystemPrompt() {
            const userAge = parseInt(state.settings.age) || 25;
            let ageRule = "Maintain a natural conversational tone.";
            if (userAge < 12) ageRule = "Keep your answers very short, simple, and easy to understand for a child. Use emojis and be very playful.";
            else if (userAge < 18) ageRule = "Talk like a cool teenager. Relatable, concise, and fun.";

            const activePersona = getActivePersona();
            
            let prompt = `You are assuming the persona of ${activePersona.name}, also acting as a ${activePersona.fname}. Your persona age is ${activePersona.age}.
Personality Profile: ${activePersona.personality}\n`;

            if (activePersona.referenceBooks) {
                prompt += `\nDEFAULT KNOWLEDGE BASE: Your default reference books are [${activePersona.referenceBooks}]. Whenever answering a question relevant to these texts, YOU MUST cite exact verses, chapters, or page numbers to support your answer.\n`;
            }

            prompt += `\nDYNAMIC PDF OVERRIDE RULE: If a PDF document is attached anywhere in this conversation, you MUST immediately override your default reference books. Use the attached PDF as your SOLE reference material for answering questions, citing specific pages or sections from it. Continue using the PDF as your primary reference until the user explicitly instructs you in the chat to refer back to your default books or a different text.\n`;

            prompt += `
User Profile: You are speaking to ${state.settings.name} (Nickname: ${state.settings.fname}). The user is ${state.settings.age} years old.

STRICT RULES:
1. ${ageRule}
2. Stay deeply in character as ${activePersona.name} at all times.
3. Speak and respond ONLY in the language associated with this code: ${activePersona.lang}.
4. ABSOLUTELY DO NOT write, generate, or output any computer code, HTML, or scripts under any circumstances.
5. ABSOLUTELY DO NOT generate, create, or request images.
6. Keep responses concise as they will be read aloud via Text-to-Speech. Do not use complex markdown like tables.`;

            if (state.settings.customPrompt) {
                prompt += `\nAdditional Global Instructions: ${state.settings.customPrompt}`;
            }

            return prompt;
        }

        // --- 11. UTILITIES ---
        function renderMessage(role, text, fileData = null, fileType = null) {
            const div = document.createElement('div');
            const isModel = role === 'assistant';
            const p = getActivePersona();
            
            div.className = `p-4 rounded-2xl max-w-[85%] ${isModel ? 'bg-white dark:bg-slate-800 border dark:border-slate-700 shadow mr-auto' : 'bg-primary text-white ml-auto'} mb-2`;
            
            let mediaHTML = '';
            if (fileData) {
                if (fileType === 'pdf') {
                    mediaHTML = `<div class="bg-red-100 text-red-600 text-xs font-bold p-2 rounded mb-2 inline-block border border-red-300">📄 PDF Document Attached</div>`;
                } else {
                    mediaHTML = `<img src="${fileData}" class="max-w-full h-auto rounded mb-2 border border-white/20">`;
                }
            }

            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            div.innerHTML = `
                <div class="text-[10px] uppercase font-bold tracking-wider ${isModel ? 'text-primary' : 'text-white/70'} mb-1">
                    ${isModel ? `${p.name} (${p.fname})` : state.settings.fname}
                </div>
                ${mediaHTML}
                <div class="text-sm leading-relaxed">${formattedText}</div>
            `;
            DOM.log.appendChild(div);
            DOM.log.scrollTop = DOM.log.scrollHeight;
        }

        function loadHistory() {
            DOM.log.innerHTML = '';
            const hist = localStorage.getItem(`mango_history_${state.activePersonaId}`);
            
            if (hist) {
                try {
                    const parsed = JSON.parse(hist);
                    if (parsed.length > 0) {
                        state.chatHistory = parsed;
                        parsed.forEach(m => renderMessage(m.role, m.content));
                        return;
                    }
                } catch (e) { console.error("History parse error", e); }
            } 
            
            state.chatHistory = [];
            const p = getActivePersona();
            renderMessage('assistant', `Greetings ${state.settings.fname}, I am ${p.name}. How can I assist you today?`);
        }
    </script>
</body>
