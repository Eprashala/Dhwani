<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhwani Acoustic Reader - Optimized</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
        button { background: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #004494; }
        input[type="text"], input[type="password"] { padding: 10px; width: calc(100% - 22px); margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        .hidden { display: none; }
        #status { font-weight: bold; color: #d9534f; margin-top: 15px; font-size: 18px; }
        .db-controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        /* New UI for Database List */
        .db-list { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
        .db-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; }
        .db-item-title { font-weight: bold; font-size: 16px; }
        .db-item-count { color: #666; font-size: 14px; margin-left: 10px; }
        .btn-small { padding: 6px 10px; font-size: 14px; margin-top: 0; margin-left: 5px; }
        .btn-add { background: #28a745; }
        .btn-add:hover { background: #218838; }
        .btn-del { background: #dc3545; }
        .btn-del:hover { background: #c82333; }
    </style>
</head>
<body>

    <h1>Dhwani Acoustic Reader</h1>
    <div id="status">Status: Waiting to start...</div>

    <div class="card" id="identifierModule">
        <h2>Identifier Module</h2>
        <p>Place the coin exactly 1cm from the bottom microphone and press Detect.</p>
        <button onclick="detectCoin()" style="width: 100%; font-weight: bold; font-size: 18px; background: #28a745;">🔊 Detect Coin</button>
        <h3 id="resultDisplay" style="text-align: center; font-size: 24px; margin-top: 20px;">Result: --</h3>
    </div>

    <div class="card" id="loginModule">
        <h2>Admin Access</h2>
        <input type="password" id="adminPassword" placeholder="Enter Admin Password">
        <button onclick="checkPassword()" style="width: 100%;">Login to Learner</button>
    </div>

    <div class="card hidden" id="learnerModule">
        <h2>Learner Module (Admin)</h2>
        <input type="text" id="coinName" placeholder="e.g., Rs 5, Rs 10">
        <button onclick="learnCoin()" style="width: 100%; font-weight: bold;">🎙️ Learn & Save Profile</button>
        
        <div class="db-list" id="dbListContainer">
            <h3>Database Manager</h3>
            <div id="dbItems"></div>
        </div>

        <div class="db-controls" style="border-top: 1px solid #ddd; padding-top: 15px;">
            <button onclick="exportJSON()" style="background:#6c757d;">💾 Export JSON</button>
            <input type="file" id="jsonUpload" accept=".json" style="display:none" onchange="importJSON(event)">
            <button onclick="document.getElementById('jsonUpload').click()" style="background:#17a2b8;">📂 Import JSON</button>
            <button onclick="clearAllDatabase()" style="background:#dc3545;">🗑️ Clear Entire DB</button>
        </div>
    </div>

<script>
    // --- Audio System Variables ---
    let audioCtx;
    let analyser;
    let micStream;
    let coinDatabase = JSON.parse(localStorage.getItem('dhwaniDB_v2')) || {};
    
    // --- Data Migration for old versions ---
    // This safely upgrades your old 1D arrays into the new Multi-Template 2D arrays
    for (let key in coinDatabase) {
        if (coinDatabase[key].length > 0 && !Array.isArray(coinDatabase[key][0])) {
            coinDatabase[key] = [coinDatabase[key]];
            localStorage.setItem('dhwaniDB_v2', JSON.stringify(coinDatabase));
        }
    }

    renderDatabaseUI();

    // --- Admin Authentication ---
    function checkPassword() {
        const pass = document.getElementById('adminPassword').value;
        if (pass === 'Admin@123') {
            document.getElementById('loginModule').classList.add('hidden');
            document.getElementById('learnerModule').classList.remove('hidden');
            setStatus("Admin logged in. Ready to learn.", "green");
        } else {
            setStatus("Incorrect Password", "red");
        }
    }

    // --- Core Acoustic Engine ---
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            
            const source = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; 
            analyser.smoothingTimeConstant = 0.2; 
            source.connect(analyser);
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    async function captureAcousticSignature() {
        await initAudio();
        return new Promise((resolve) => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'sine';
            const now = audioCtx.currentTime;
            
            osc.frequency.setValueAtTime(12000, now);
            osc.frequency.exponentialRampToValueAtTime(18000, now + 0.1);
            
            osc.start(now);
            osc.stop(now + 0.1);

            setTimeout(() => {
                const dataArray = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatFrequencyData(dataArray);
                const highFreqData = Array.from(dataArray).slice(450, 900); 
                resolve(highFreqData);
            }, 50); 
        });
    }

    // --- Learner Function (Optimized for Appending) ---
    async function learnCoin() {
        const name = document.getElementById('coinName').value.trim();
        if (!name) return alert("Please enter a name for the coin.");
        
        setStatus("Learning... Keep still.", "blue");
        
        let signatures = [];
        for(let i=0; i<3; i++) {
            let sig = await captureAcousticSignature();
            signatures.push(sig);
            await new Promise(r => setTimeout(r, 200)); 
        }

        let masterProfile = signatures[0].map((_, colIndex) => 
            signatures.reduce((acc, row) => acc + row[colIndex], 0) / signatures.length
        );

        // If coin doesn't exist, create it. If it does, append the new profile.
        if (!coinDatabase[name]) {
            coinDatabase[name] = [];
        }
        coinDatabase[name].push(masterProfile);
        
        localStorage.setItem('dhwaniDB_v2', JSON.stringify(coinDatabase));
        renderDatabaseUI();
        
        setStatus(`Successfully added learning to: ${name}`, "green");
        document.getElementById('coinName').value = '';
    }

    // --- Identifier Function (Optimized for Multi-Template Matching) ---
    async function detectCoin() {
        if (Object.keys(coinDatabase).length === 0) {
            return setStatus("Database is empty. Learn a coin first.", "red");
        }

        setStatus("Detecting...", "blue");
        const liveSignature = await captureAcousticSignature();
        
        let bestMatch = "Unknown";
        let highestScore = -1;

        // Iterate through all coins AND all profiles saved within that coin
        for (const [coinName, profilesArray] of Object.entries(coinDatabase)) {
            for (const savedProfile of profilesArray) {
                let score = cosineSimilarity(liveSignature, savedProfile);
                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = coinName;
                }
            }
        }

        if (highestScore > 0.95) { 
            document.getElementById('resultDisplay').innerText = `Result: ${bestMatch}`;
            document.getElementById('resultDisplay').style.color = "#28a745";
            speakAloud(bestMatch);
            setStatus(`Match Confidence: ${(highestScore*100).toFixed(1)}%`, "green");
        } else {
            document.getElementById('resultDisplay').innerText = `No Match Found`;
            document.getElementById('resultDisplay').style.color = "#d9534f";
            speakAloud("No Match Found");
            setStatus(`Below threshold (${(highestScore*100).toFixed(1)}%)`, "red");
        }
    }

    function cosineSimilarity(A, B) {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < A.length; i++) {
            dotProduct += A[i] * B[i];
            normA += A[i] * A[i];
            normB += B[i] * B[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    function speakAloud(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // --- NEW: Granular Database UI & Management Functions ---
    function renderDatabaseUI() {
        const container = document.getElementById('dbItems');
        container.innerHTML = ''; // Clear current list

        if (Object.keys(coinDatabase).length === 0) {
            container.innerHTML = '<p style="color:#888; font-size: 14px;">No coins learned yet.</p>';
            return;
        }

        for (const [coinName, profilesArray] of Object.entries(coinDatabase)) {
            const count = profilesArray.length;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'db-item';
            
            itemDiv.innerHTML = `
                <div>
                    <span class="db-item-title">${coinName}</span>
                    <span class="db-item-count">(${count} saved samples)</span>
                </div>
                <div>
                    <button class="btn-small btn-add" onclick="prepareAddMore('${coinName}')">➕ Add</button>
                    <button class="btn-small btn-del" onclick="deleteSingleCoin('${coinName}')">🗑️ Delete</button>
                </div>
            `;
            container.appendChild(itemDiv);
        }
    }

    function prepareAddMore(coinName) {
        document.getElementById('coinName').value = coinName;
        setStatus(`Ready to add more data to ${coinName}. Press Learn.`, "blue");
    }

    function deleteSingleCoin(coinName) {
        if (confirm(`Are you sure you want to delete ALL data for "${coinName}"?`)) {
            delete coinDatabase[coinName];
            localStorage.setItem('dhwaniDB_v2', JSON.stringify(coinDatabase));
            renderDatabaseUI();
            setStatus(`Deleted ${coinName}`, "red");
        }
    }

    function clearAllDatabase() {
        if (confirm("Are you sure you want to delete the ENTIRE database? This cannot be undone.")) {
            coinDatabase = {}; 
            localStorage.removeItem('dhwaniDB_v2'); 
            renderDatabaseUI();
            setStatus("Entire database wiped.", "red");
        }
    }

    // --- JSON Export/Import ---
    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(coinDatabase, null, 2));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "dhwani_database.json");
        dlAnchorElem.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                coinDatabase = JSON.parse(e.target.result);
                // Safe migration check on import
                for (let key in coinDatabase) {
                    if (coinDatabase[key].length > 0 && !Array.isArray(coinDatabase[key][0])) {
                        coinDatabase[key] = [coinDatabase[key]];
                    }
                }
                localStorage.setItem('dhwaniDB_v2', JSON.stringify(coinDatabase));
                renderDatabaseUI();
                setStatus("JSON imported successfully.", "green");
            } catch (err) {
                setStatus("Invalid JSON file.", "red");
            }
        };
        reader.readAsText(file);
    }

    function setStatus(msg, color) {
        const el = document.getElementById('status');
        el.innerText = `Status: ${msg}`;
        el.style.color = color;
    }
</script>
</body>
</html>
