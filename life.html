                        if(!pData || !hData) return;

                        let key = `${body.name}_in_${houseNum}`;
                        let exactVerse = ExactVerses[key];

                        // Procedurally Synthesize the Reading
                        let synthesized = {
                            title: `${pData.name} (${body.name}) residing in House ${houseNum} (${hData.name})`,
                            verse: exactVerse ? exactVerse.verse : "स्वस्थाने ग्रहफलं ज्ञेयं भावानुरूपतः।",
                            source: exactVerse ? exactVerse.source : "Parashari Siddhanta (Synthesized Matrix)",
                            meaning: exactVerse ? exactVerse.meaning : `The fundamental energy of ${pData.name} is deeply intertwined with the material domain of the ${houseNum}th House.`,
                            
                            // Deep Synthesis Logic
                            adhyatmic: `${pData.adhyatmic} This pure soul-energy is currently expressing its karma through the domain of ${hData.name}. ${hData.adhyatmic} The cosmic lesson here involves balancing the intrinsic nature of ${pData.name} with the evolutionary demands of this house.`,
                            khagoliya: `${pData.khagoliya} Astronomically, from the perspective of the birthplace, this planetary mass was positioned at ${hData.khagoliya} The intersection of the planet's gravitational vector with this specific spatial sector defines its physical manifestation in the sky.`,
                            vaigyanic: `${pData.vaigyanic} Biologically, this planetary frequency acts upon the organism by modulating ${hData.vaigyanic} The interaction between the cosmic radiation and the biological neural pathways dictates the native's psychological and physiological responses in this area of life.`,
                            
                            remedy: pData.remedy
                        };

                        reading.push(synthesized);
                    });
                });

                // Deduplicate logic
                return Array.from(new Set(reading.map(a => JSON.stringify(a)))).map(a => JSON.parse(a));
            }
        };

        // =========================================================================
        // UI AND INTERACTION LOGIC
        // =========================================================================
        
        window.onload = () => {
            if(localStorage.getItem('jName')) document.getElementById('jName').value = localStorage.getItem('jName');
            if(localStorage.getItem('jDate')) document.getElementById('jDate').value = localStorage.getItem('jDate');
            if(localStorage.getItem('jTime')) document.getElementById('jTime').value = localStorage.getItem('jTime');
            if(localStorage.getItem('jLat')) document.getElementById('jLat').value = localStorage.getItem('jLat');
            if(localStorage.getItem('jLon')) document.getElementById('jLon').value = localStorage.getItem('jLon');
        };

        async function generateLifeReading() {
            const btn = document.getElementById('btnGen');
            const status = document.getElementById('status-msg');
            const output = document.getElementById('readingOutput');
            
            btn.disabled = true;
            status.style.display = "block";
            output.innerHTML = "";

            let timeStr = document.getElementById('jTime').value;
            if (timeStr.split(':').length === 2) timeStr += ":00";

            const payload = {
                date: document.getElementById('jDate').value,
                time: timeStr,
                lat: document.getElementById('jLat').value,
                lon: document.getElementById('jLon').value
            };

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    // THE MAGIC HAPPENS HERE: The OmniMatrix dynamically synthesizes the reading
                    const readings = OmniMatrix.analyzeLifeMoment(data, document.getElementById('timeFrom').value);
                    
                    if(readings.length === 0) {
                        output.innerHTML = `<h3 style="text-align:center; color:#e74c3c;">System Anomaly: Could not synthesize data.</h3>`;
                    } else {
                        renderReadings(readings);
                    }
                } else {
                    alert("Backend Math Error: " + data.message);
                }
            } catch (err) {
                alert("System Interruption: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                status.style.display = "none";
                
                // Scroll down smoothly to the readings
                if(output.innerHTML !== "") {
                    setTimeout(() => {
                        window.scrollTo({ top: document.getElementById('readingOutput').offsetTop - 50, behavior: 'smooth' });
                    }, 200);
                }
            }
        }

        function renderReadings(readings) {
            const output = document.getElementById('readingOutput');
            
            readings.forEach((r, index) => {
                let remedyHTML = '';
                if(r.remedy) {
                    remedyHTML = `
                        <div class="remedy-box">
                            <h4 class="remedy-title">📿 Cosmic Alignment Protocol (Remedy): ${r.remedy.name}</h4>
                            ${r.remedy.verse ? `<div style="color: #f1c40f; margin-bottom:8px; font-size:18px;">${r.remedy.verse}</div>` : ''}
                            <div class="remedy-logic"><b>Vaigyanic & Khagoliya Logic:</b> ${r.remedy.logic}</div>
                        </div>
                    `;
                }

                // Staggered animation delay
                let delay = index * 0.15;

                let cardHTML = `
                    <div class="reading-card" style="animation-delay: ${delay}s;">
                        <h3 class="reading-title">
                            <span>✨ ${r.title}</span>
                        </h3>
                        
                        <div class="verse-box">
                            <div class="verse-sanskrit">${r.verse}</div>
                            <div class="verse-source">— ${r.source}</div>
                            <div class="verse-meaning">"${r.meaning}"</div>
                        </div>

                        <div class="analysis-grid">
                            <div class="analysis-col col-adhyatmic">
                                <div class="col-title adh">🕉️ Adhyatmic (Spiritual)</div>
                                <div class="col-text">${r.adhyatmic}</div>
                            </div>
                            <div class="analysis-col col-khagoliya">
                                <div class="col-title kha">🔭 Khagoliya (Astronomical)</div>
                                <div class="col-text">${r.khagoliya}</div>
                            </div>
                            <div class="analysis-col col-vaigyanic">
                                <div class="col-title vai">🧬 Vaigyanic (Scientific)</div>
                                <div class="col-text">${r.vaigyanic}</div>
                            </div>
                        </div>
                        ${remedyHTML}
                    </div>
                `;
                output.innerHTML += cardHTML;
            });
        }
    </script>
