<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyotish Seismic Correlation Engine - Deep Dataset</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e67e22;
            --light: #ecf0f1;
            --border: #bdc3c7;
            --hover: #e8f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .add-form {
            background: var(--light);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }

        .add-form h3 { margin-top: 0; font-size: 1.1em; color: var(--primary); }
        
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-row input {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            flex: 1;
            min-width: 120px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            gap: 20px;
        }

        .search-container {
            flex-grow: 1;
        }

        #search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid var(--border);
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #search-box:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover { background-color: var(--accent); transform: translateY(-1px); }
        .btn-add { background-color: #8e44ad; }
        .btn-kundli { background-color: #f39c12; color: #fff; border: 1px solid #d68910; }
        .btn-kundli:hover { background-color: #d68910; }

        #data-loader {
            text-align: center;
            padding: 60px;
            font-size: 1.5em;
            color: var(--primary);
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px dashed var(--border);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(44, 62, 80, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .table-wrapper {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 5px;
            display: none; /* Hidden until data loads */
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--border); padding: 12px 10px; text-align: left; }
        
        #earthquake-table > thead > tr > th {
            background-color: var(--secondary);
            color: white;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }
        #earthquake-table > thead > tr > th:hover { background-color: #2c3e50; }

        .sort-arrow { font-size: 0.8em; margin-left: 5px; color: #f1c40f; }

        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: var(--hover); }

        .details-table {
            font-size: 0.9em;
            margin-top: 5px;
            margin-bottom: 15px;
            width: 100%;
            background: #fff;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .details-table th { 
            background-color: #7f8c8d; 
            top: auto; 
            position: static; 
            cursor: pointer; 
            color: white;
        }
        .details-table th:hover { background-color: #95a5a6; }
        
        .loader { display: none; font-weight: bold; color: var(--accent); margin-left: 15px; }

        #ai-prompt-container {
            display: none; margin-top: 30px; background: var(--light);
            padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent);
        }

        textarea {
            width: 100%; height: 300px; padding: 15px; font-family: 'Courier New', monospace;
            font-size: 14px; border: 1px solid var(--border); border-radius: 4px;
            resize: vertical; background: #2b2b2b; color: #a9b7c6;
        }

        .status { font-size: 0.85em; color: #27ae60; font-weight: bold; }
        .error { font-size: 0.85em; color: #c0392b; font-weight: bold; }
        .btn-toggle { font-size: 0.8em; padding: 6px 10px; background-color: #3498db; }

        .view-controls {
            padding: 10px; 
            background: #ecf0f1; 
            border-bottom: 1px solid #bdc3c7;
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<script src="earthquakes.js"></script>

<div class="container">
    <h1>Maharishi Varahamihira Seismic AI Engine</h1>
    
    <div class="add-form">
        <h3>Add Custom Seismic Event</h3>
        <div class="form-row">
            <input type="text" id="new-loc" placeholder="Location (e.g., Japan)" list="loc-suggestions" oninput="autoFillCoordinates()">
            <datalist id="loc-suggestions"></datalist>
            
            <input type="number" id="new-mag" placeholder="Magnitude" step="0.1">
            <input type="date" id="new-date">
            <input type="time" id="new-time" step="1">
            <input type="number" id="new-lat" placeholder="Latitude" step="0.0001">
            <input type="number" id="new-lon" placeholder="Longitude" step="0.0001">
            <button onclick="addCustomEq()" class="btn-add">Add to List</button>
        </div>
    </div>

    <div class="controls">
        <div>
            <button onclick="calculateSelected()">1. Calculate Selected via Swisseph</button>
            <span id="loading" class="loader">⚙️ Calculating...</span>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-box" placeholder="🔍 Search region, year, magnitude..." onkeyup="filterTable()">
        </div>

        <div>
            <button onclick="generatePrompt()" style="background-color: #27ae60;">2. Generate AI Prompt</button>
        </div>
    </div>

    <div id="data-loader">
        <span class="spinner"></span> Parsing massive seismic dataset. Please wait...
    </div>

    <div class="table-wrapper" id="table-wrapper">
        <table id="earthquake-table">
            <thead>
                <tr>
                    <th style="width: 40px; cursor: default;"><input type="checkbox" id="select-all" onclick="toggleAll(this)"></th>
                    <th onclick="sortTable('location')">Location <span id="arrow-location" class="sort-arrow"></span></th>
                    <th onclick="sortTable('mag')">Magnitude <span id="arrow-mag" class="sort-arrow">▼</span></th>
                    <th onclick="sortTable('date')">Date <span id="arrow-date" class="sort-arrow"></span></th>
                    <th onclick="sortTable('time')">Time (UTC) <span id="arrow-time" class="sort-arrow"></span></th>
                    <th onclick="sortTable('lat')">Latitude <span id="arrow-lat" class="sort-arrow"></span></th>
                    <th onclick="sortTable('lon')">Longitude <span id="arrow-lon" class="sort-arrow"></span></th>
                    <th style="cursor: default;">Status</th>
                    <th style="cursor: default; min-width: 200px;">Actions</th>
                </tr>
            </thead>
            <tbody id="eq-body">
                </tbody>
        </table>
    </div>

    <div id="ai-prompt-container">
        <h3 style="margin-top: 0;">AI Pattern Recognition Prompt</h3>
        <p>Copy this prompt into Gemini to evaluate triggers.</p>
        <textarea id="ai-prompt-text"></textarea>
        <br><br>
        <button onclick="copyPrompt()">Copy to Clipboard</button>
        <span id="copy-status" style="margin-left:15px; color: #27ae60; font-weight:bold;"></span>
    </div>
</div>

<script>
    // Fallback if the external earthquakes.js file fails to load
    if (typeof earthquakes === 'undefined') {
        var earthquakes = [
            { id: 1, location: "Error: No Data. Run Python Script.", mag: 0, date: "1970-01-01", time: "00:00:00", lat: 0, lon: 0 }
        ];
    }

    const rashis = ["Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"];
    const nakshatras = ["Ashvini", "Bharani", "Krittika", "Rohini", "Mrigashirsha", "Ardra", "Punarvasu", "Pushya", "Ashlesha", "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Svati", "Vishakha", "Anuradha", "Jyeshtha", "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"];

    // State Management
    let displayData = []; // The array currently being viewed/filtered
    let calculatedData = {}; // Stores Swisseph backend returns
    let sortCol = 'mag'; 
    let sortAsc = false;
    let innerSortState = {}; 

    // --- INITIALIZATION ---
    window.onload = () => {
        // We use a slight timeout so the browser can paint the "Loading" message 
        // before the main thread is locked up processing 4,000 table rows.
        setTimeout(() => {
            displayData = [...earthquakes];
            updateLocationSuggestions();
            sortTable('mag'); // Renders the table inherently
            
            // Swap visibility
            document.getElementById('data-loader').style.display = 'none';
            document.getElementById('table-wrapper').style.display = 'block';
        }, 100);
    };

    // --- GLOBAL SEARCH BOX FILTERING ---
    function filterTable() {
        const query = document.getElementById('search-box').value.toLowerCase().trim();
        
        if (query === '') {
            displayData = [...earthquakes];
        } else {
            // Filter the master array for any matches
            displayData = earthquakes.filter(eq => {
                return (
                    eq.location.toLowerCase().includes(query) ||
                    eq.date.includes(query) ||
                    eq.mag.toString().includes(query) ||
                    eq.lat.toString().includes(query) ||
                    eq.lon.toString().includes(query)
                );
            });
        }
        
        // Preserve current sort direction, negate it temporarily so sortTable restores it
        const currentAsc = sortAsc;
        sortAsc = !currentAsc; 
        sortTable(sortCol);
    }

    // --- AUTOCOMPLETE & AUTO-FILL LOGIC ---
    function updateLocationSuggestions() {
        const datalist = document.getElementById('loc-suggestions');
        datalist.innerHTML = ''; 
        
        // Extract unique locations
        const uniqueLocations = [...new Set(earthquakes.map(eq => eq.location))].sort();
        
        uniqueLocations.forEach(loc => {
            const option = document.createElement('option');
            option.value = loc;
            datalist.appendChild(option);
        });
    }

    function autoFillCoordinates() {
        const inputLoc = document.getElementById('new-loc').value;
        // Search dataset for an exact string match
        const match = earthquakes.find(eq => eq.location === inputLoc);
        
        if (match) {
            document.getElementById('new-lat').value = match.lat;
            document.getElementById('new-lon').value = match.lon;
        }
    }

    function addCustomEq() {
        const loc = document.getElementById('new-loc').value;
        const mag = parseFloat(document.getElementById('new-mag').value);
        const date = document.getElementById('new-date').value;
        let time = document.getElementById('new-time').value;
        const lat = parseFloat(document.getElementById('new-lat').value);
        const lon = parseFloat(document.getElementById('new-lon').value);

        if(!loc || isNaN(mag) || !date || !time || isNaN(lat) || isNaN(lon)) {
            return alert("Please fill out all fields correctly.");
        }
        if(time.split(':').length === 2) time += ":00";
        const newId = earthquakes.length > 0 ? Math.max(...earthquakes.map(e => e.id)) + 1 : 1;
        
        const newRecord = { id: newId, location: loc, mag: mag, date: date, time: time, lat: lat, lon: lon };
        earthquakes.push(newRecord);

        // Clear form
        document.getElementById('new-loc').value = '';
        document.getElementById('new-mag').value = '';
        document.getElementById('new-date').value = '';
        document.getElementById('new-time').value = '';
        document.getElementById('new-lat').value = '';
        document.getElementById('new-lon').value = '';

        updateLocationSuggestions();
        filterTable(); // Re-apply any active search filter
    }

    // --- TABLE RENDERING & SORTING ---
    function sortTable(col) {
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = (col === 'mag' || col === 'date') ? false : true; }

        displayData.sort((a, b) => {
            let valA = a[col], valB = b[col];
            if (col === 'date' || col === 'time') {
                valA = new Date(a.date + 'T' + a.time).getTime(); valB = new Date(b.date + 'T' + b.time).getTime();
            } else if (typeof valA === 'string') {
                valA = valA.toLowerCase(); valB = valB.toLowerCase();
            }
            if (valA < valB) return sortAsc ? -1 : 1;
            if (valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });

        document.querySelectorAll('#earthquake-table > thead .sort-arrow').forEach(el => el.innerHTML = '');
        const arrowSpan = document.getElementById(`arrow-${sortCol}`);
        if(arrowSpan) arrowSpan.innerText = sortAsc ? '▲' : '▼';
        
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('eq-body');
        
        // Extremely fast string building for large datasets
        let htmlStr = '';

        displayData.forEach(eq => {
            // Keep track of checkboxes checking states manually if needed, but for rendering speed we reset them
            const statusObj = calculatedData[eq.id] 
                ? { text: "Success ✓", class: "status", btnDisplay: "inline-block" }
                : { text: "Pending", class: "", btnDisplay: "none" };

            if(!innerSortState[eq.id]) innerSortState[eq.id] = { col: 'name', asc: true };

            htmlStr += `
                <tr>
                    <td><input type="checkbox" class="eq-checkbox" value="${eq.id}"></td>
                    <td><strong>${eq.location}</strong></td>
                    <td style="font-weight:bold; color: #c0392b;">${eq.mag.toFixed(1)}</td>
                    <td>${eq.date}</td>
                    <td>${eq.time}</td>
                    <td style="font-size:0.9em;">${eq.lat}</td>
                    <td style="font-size:0.9em;">${eq.lon}</td>
                    <td id="status-${eq.id}" class="${statusObj.class}">${statusObj.text}</td>
                    <td>
                        <button onclick="toggleRow(${eq.id})" id="btn-show-${eq.id}" class="btn-toggle" style="display:${statusObj.btnDisplay};">Expand View</button>
                    </td>
                </tr>
                <tr id="detail-row-${eq.id}" style="display:none;">
                    <td colspan="9" style="padding: 0;">
                        <div class="view-controls">
                            <button onclick="switchTab(${eq.id}, 'table')" class="btn-toggle" style="background:#2980b9;">Data Table</button>
                            <button onclick="switchTab(${eq.id}, 'kundli')" class="btn-toggle btn-kundli">Show Kundli</button>
                        </div>
                        
                        <div id="view-table-${eq.id}">
                            <table class="details-table" id="details-table-${eq.id}">
                                <thead>
                                    <tr>
                                        <th onclick="sortInnerTable(${eq.id}, 'name')">Graha/Upagraha <span id="inner-arrow-${eq.id}-name" class="sort-arrow"></span></th>
                                        <th onclick="sortInnerTable(${eq.id}, 'abs_deg')">Degree <span id="inner-arrow-${eq.id}-abs_deg" class="sort-arrow"></span></th>
                                        <th onclick="sortInnerTable(${eq.id}, 'rashi')">Rashi <span id="inner-arrow-${eq.id}-rashi" class="sort-arrow"></span></th>
                                        <th onclick="sortInnerTable(${eq.id}, 'nakshatra')">Nakshatra <span id="inner-arrow-${eq.id}-nakshatra" class="sort-arrow"></span></th>
                                    </tr>
                                </thead>
                                <tbody id="details-body-${eq.id}"></tbody>
                            </table>
                        </div>

                        <div id="view-kundli-${eq.id}" style="display:none; text-align:center; padding: 20px; background: white;">
                            <canvas id="kundli-canvas-${eq.id}" width="600" height="600" style="max-width: 100%; height: auto; border: 1px solid #ccc;"></canvas>
                        </div>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = htmlStr;

        // If data was already calculated, repopulate the inner tables after the DOM reset
        displayData.forEach(eq => {
            if(calculatedData[eq.id]) populateDetailsTable(eq.id);
        });
    }

    function toggleAll(source) { document.querySelectorAll('.eq-checkbox').forEach(cb => cb.checked = source.checked); }

    function toggleRow(id) {
        const row = document.getElementById(`detail-row-${id}`);
        const btn = document.getElementById(`btn-show-${id}`);
        if (row.style.display === 'none') {
            row.style.display = 'table-row';
            btn.innerText = 'Close View';
            btn.style.backgroundColor = '#e74c3c'; 
            switchTab(id, 'table'); 
        } else {
            row.style.display = 'none';
            btn.innerText = 'Expand View';
            btn.style.backgroundColor = '#3498db'; 
        }
    }

    function switchTab(id, tabType) {
        if (tabType === 'table') {
            document.getElementById(`view-table-${id}`).style.display = 'block';
            document.getElementById(`view-kundli-${id}`).style.display = 'none';
        } else {
            document.getElementById(`view-table-${id}`).style.display = 'none';
            document.getElementById(`view-kundli-${id}`).style.display = 'block';
            drawKundli(id); 
        }
    }

    function getAstroInfo(absDeg) {
        const rashiIndex = Math.floor(absDeg / 30) % 12;
        const nakshatraIndex = Math.floor(absDeg / (360/27)) % 27;
        return { rashi: rashis[rashiIndex], nakshatra: nakshatras[nakshatraIndex] };
    }

    // --- SWISSEPH BACKEND CALL ---
    async function calculateSelected() {
        const checkboxes = document.querySelectorAll('.eq-checkbox:checked');
        if (checkboxes.length === 0) return alert("Select at least one earthquake.");

        document.getElementById('loading').style.display = 'inline-block';

        for (let checkbox of checkboxes) {
            const eqId = parseInt(checkbox.value);
            const eq = earthquakes.find(e => e.id === eqId);
            const statusCell = document.getElementById(`status-${eqId}`);

            statusCell.innerHTML = "Fetching...";
            statusCell.className = "";

            try {
                const response = await fetch('https://eprashala.pythonanywhere.com/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: eq.date, time: eq.time, lat: eq.lat, lon: eq.lon })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (data.status === 'success') {
                    statusCell.innerHTML = "Success ✓";
                    statusCell.className = "status";
                    
                    let entities = [];
                    data.houses.forEach(houseArray => houseArray.forEach(ent => {
                        const info = getAstroInfo(ent.abs_deg);
                        ent.rashi = info.rashi;
                        ent.nakshatra = info.nakshatra;
                        entities.push(ent);
                    }));

                    calculatedData[eqId] = { asc_sign: data.asc_sign, entities: entities };
                    
                    sortInnerTable(eqId, 'name', true);
                    const btn = document.getElementById(`btn-show-${eqId}`);
                    if(btn) btn.style.display = 'inline-block';

                } else {
                    statusCell.innerHTML = "API Error";
                    statusCell.className = "error";
                }
            } catch (error) {
                console.error("Error:", error);
                statusCell.innerHTML = "Net Error";
                statusCell.className = "error";
            }
        }
        document.getElementById('loading').style.display = 'none';
    }

    function sortInnerTable(eqId, col, forceAsc = false) {
        let state = innerSortState[eqId];
        if (forceAsc) { state.col = col; state.asc = true; } 
        else if (state.col === col) { state.asc = !state.asc; } 
        else { state.col = col; state.asc = true; }

        calculatedData[eqId].entities.sort((a, b) => {
            let valA = a[col], valB = b[col];
            if (typeof valA === 'string') { valA = valA.toLowerCase(); valB = valB.toLowerCase(); }
            if (valA < valB) return state.asc ? -1 : 1;
            if (valA > valB) return state.asc ? 1 : -1;
            return 0;
        });

        populateDetailsTable(eqId);
        
        const headerRow = document.getElementById(`details-table-${eqId}`).querySelector('thead tr');
        if(headerRow) {
            headerRow.querySelectorAll('.sort-arrow').forEach(el => el.innerHTML = '');
            const arrowSpan = document.getElementById(`inner-arrow-${eqId}-${col}`);
            if(arrowSpan) arrowSpan.innerText = state.asc ? '▲' : '▼';
        }
    }

    function populateDetailsTable(id) {
        const tbody = document.getElementById(`details-body-${id}`);
        if(!tbody) return;
        tbody.innerHTML = '';
        
        calculatedData[id].entities.forEach(ent => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${ent.name}</strong> <span style="font-size:0.8em; color:#7f8c8d;">(${ent.type})</span></td>
                <td>${ent.abs_deg.toFixed(4)}°</td>
                <td>${ent.rashi}</td>
                <td>${ent.nakshatra}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- KUNDLI DRAWING ENGINE ---
    function drawKundli(eqId) {
        const canvas = document.getElementById(`kundli-canvas-${eqId}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "#2c3e50";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.strokeRect(0, 0, w, h); 
        ctx.moveTo(0, 0); ctx.lineTo(w, h); 
        ctx.moveTo(w, 0); ctx.lineTo(0, h);
        ctx.moveTo(w/2, 0); ctx.lineTo(0, h/2);
        ctx.moveTo(0, h/2); ctx.lineTo(w/2, h);
        ctx.moveTo(w/2, h); ctx.lineTo(w, h/2);
        ctx.moveTo(w, h/2); ctx.lineTo(w/2, 0);
        ctx.stroke();

        if(!calculatedData[eqId]) return;
        const ascSign = calculatedData[eqId].asc_sign;
        const entities = calculatedData[eqId].entities;

        const config = [
            {h: 1,  tx: w/2, ty: h/4, align: 'center', rx: w/2, ry: 20},
            {h: 2,  tx: w/4, ty: h/8 + 10, align: 'center', rx: w/4, ry: 20},
            {h: 3,  tx: 35,  ty: h/4, align: 'left',   rx: 15, ry: h/4},
            {h: 4,  tx: w/4 + 10, ty: h/2, align: 'center', rx: 15, ry: h/2},
            {h: 5,  tx: 35,  ty: 3*h/4, align: 'left', rx: 15, ry: 3*h/4},
            {h: 6,  tx: w/4, ty: 7*h/8 - 10, align: 'center', rx: w/4, ry: h - 20},
            {h: 7,  tx: w/2, ty: 3*h/4, align: 'center', rx: w/2, ry: h - 20},
            {h: 8,  tx: 3*w/4, ty: 7*h/8 - 10, align: 'center', rx: 3*w/4, ry: h - 20},
            {h: 9,  tx: w - 35, ty: 3*h/4, align: 'right', rx: w - 15, ry: 3*h/4},
            {h: 10, tx: 3*w/4 - 10, ty: h/2, align: 'center', rx: w - 15, ry: h/2},
            {h: 11, tx: w - 35, ty: h/4, align: 'right', rx: w - 15, ry: h/4},
            {h: 12, tx: 3*w/4, ty: h/8 + 10, align: 'center', rx: 3*w/4, ry: 20}
        ];

        config.forEach(c => {
            const rashiNum = ((ascSign - 1 + c.h - 1) % 12) + 1;
            ctx.fillStyle = "#e67e22"; 
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(rashiNum, c.rx, c.ry); 

            const houseEnts = entities.filter(e => e.house === c.h);
            const lineHeight = 15; 
            const totalTextHeight = houseEnts.length * lineHeight;
            let yOffset = c.ty - (totalTextHeight / 2) + (lineHeight / 2); 
            
            ctx.textAlign = c.align;
            ctx.font = "bold 11px Courier New"; 
            
            houseEnts.forEach(ent => {
                const text = `${ent.name} ${ent.deg.toFixed(1)}° ${ent.nakshatra}`;
                
                ctx.lineWidth = 3;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
                ctx.strokeText(text, c.tx, yOffset);
                
                ctx.fillStyle = "#111111"; 
                ctx.fillText(text, c.tx, yOffset);
                
                yOffset += lineHeight; 
            });
        });
    }

    function generatePrompt() {
        const checkboxes = document.querySelectorAll('.eq-checkbox:checked');
        if (checkboxes.length === 0) return alert("Select an earthquake.");

        let promptText = "Analyze this seismic astrological dataset focusing on Graha Yuddha, Syzygy, and Nakshatra Mandalas.\n\n";

        let count = 0;
        checkboxes.forEach(cb => {
            const eqId = parseInt(cb.value);
            if (calculatedData[eqId]) {
                count++;
                const eq = earthquakes.find(e => e.id === eqId);
                promptText += `[EVENT ${count}] Location: ${eq.location} | Mag: ${eq.mag} | Date: ${eq.date} UTC\n`;
                
                const keyPlanets = ['Surya', 'Chandra', 'Mangal', 'Budh', 'Guru', 'Shukra', 'Shani', 'Rahu', 'Ketu'];
                keyPlanets.forEach(kp => {
                    const ent = calculatedData[eqId].entities.find(e => e.name === kp);
                    if (ent) promptText += `- ${kp.padEnd(8)}: ${ent.abs_deg.toFixed(2)}° (${ent.rashi}, ${ent.nakshatra})\n`;
                });
                promptText += "\n";
            }
        });

        if (count === 0) return alert("No calculations found. Calculate first.");
        promptText += "Identify common astrological patterns.";

        document.getElementById('ai-prompt-text').value = promptText;
        document.getElementById('ai-prompt-container').style.display = 'block';
        document.getElementById('ai-prompt-container').scrollIntoView({ behavior: 'smooth' });
    }

    function copyPrompt() {
        const copyText = document.getElementById("ai-prompt-text");
        copyText.select(); document.execCommand("copy");
        document.getElementById('copy-status').innerText = "Copied!";
        setTimeout(() => document.getElementById('copy-status').innerText = "", 3000);
    }
</script>
