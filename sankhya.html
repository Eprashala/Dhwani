<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Sankhya Shastra Engine | Absolute Precision</title>
    <style>
        :root {
            --primary: #d4af37;
            --bg-color: #1a0b2e;
            --panel-bg: rgba(0, 0, 0, 0.5);
            --text-color: #f4e8c1;
            --error-color: #ff4c4c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 20px;
        }

        .container {
            background: var(--panel-bg);
            border: 2px solid var(--primary);
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid var(--primary);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus { outline: none; box-shadow: 0 0 8px var(--primary); }

        #devanagariName {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 1px;
            cursor: not-allowed;
        }

        /* Autocomplete Dropdown Styles */
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #2a1b3d;
            border: 1px solid var(--primary);
            border-top: none;
            border-radius: 0 0 5px 5px;
            z-index: 1000;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 14px;
        }

        .suggestion-item:hover { background: rgba(212, 175, 55, 0.3); }

        button {
            width: 100%;
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 15px var(--primary); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-top: 2px dashed var(--primary);
            display: none;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .value { font-weight: bold; color: var(--primary); }
        #statusMsg { text-align: center; font-style: italic; color: #888; margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

    <h1>Vedic Sankhya Shastra Engine</h1>

    <div class="container">
        <div class="flex-row">
            <input type="text" id="englishName" placeholder="Enter Name (English)" autocomplete="off">
            <input type="text" id="devanagariName" placeholder="संस्कृत (Auto-fill)" readonly>
        </div>

        <div class="flex-row">
            <input type="date" id="dob">
            <input type="time" id="tob" value="12:00">
        </div>

        <div class="input-group">
            <input type="text" id="birthPlace" placeholder="Search Birth Place (City, State)..." autocomplete="off">
            <div id="locationSuggestions" class="suggestions-box"></div>
            <input type="hidden" id="geoLat">
            <input type="hidden" id="geoLon">
        </div>
        
        <button id="calcBtn">Generate Vedic Profile</button>
        <div id="statusMsg"></div>

        <div id="resultBox" class="result-box">
            <h3 style="color: var(--primary); text-align: center; margin-top: 0;">Cosmic Matrix Synthesis</h3>
            <div class="data-row"><span>Tithi Moolank (Driver):</span> <span id="outMoolank" class="value">-</span></div>
            <div class="data-row"><span>Panchang Bhagyank (Destiny):</span> <span id="outBhagyank" class="value">-</span></div>
            <div class="data-row"><span>Katapayadi Namank (Name):</span> <span id="outNamank" class="value">-</span></div>
            <div class="data-row"><span>Janma Nakshatra:</span> <span id="outNakshatra" class="value">-</span></div>
            <div class="data-row"><span>Coordinates Used:</span> <span id="outCoords" class="value">-</span></div>
            
			<p style="font-size: 0.9em; margin-top: 15px; text-align: justify; line-height: 1.5;" id="synthesisText"></p>
            <button id="showMoreBtn" style="display: none; background-color: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; font-size: 14px; padding: 8px;">📖 Reveal Deep Vedic Interpretation</button>
            <div id="detailedInterpretation" style="display: none; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 5px; border-left: 3px solid var(--primary); text-align: left; font-size: 0.95em; line-height: 1.6;"></div>
            </div>
    </div>

    <script>
        // --- 1. SANSKRIT TRANSLITERATION ENGINE ---
        let transliterationTimeout;
        const englishNameInput = document.getElementById('englishName');
        const devanagariNameInput = document.getElementById('devanagariName');

        englishNameInput.addEventListener('input', function() {
            clearTimeout(transliterationTimeout);
            const text = this.value.trim();
            if (!text) { devanagariNameInput.value = ''; return; }
            
            // Using Google's Input Tools API for highly accurate real-time phonetics
            transliterationTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://inputtools.google.com/request?text=${encodeURIComponent(text)}&itc=hi-t-i0-und&num=1`);
                    const data = await response.json();
                    if (data[0] === 'SUCCESS') {
                        devanagariNameInput.value = data[1][0][1][0];
                    }
                } catch (e) { console.error("Transliteration matrix failed."); }
            }, 300); // 300ms debounce
        });

        // --- 2. GEOSPATIAL AUTOCOMPLETE (OpenStreetMap) ---
        let locationTimeout;
        const placeInput = document.getElementById('birthPlace');
        const suggestionsBox = document.getElementById('locationSuggestions');
        const latInput = document.getElementById('geoLat');
        const lonInput = document.getElementById('geoLon');

        placeInput.addEventListener('input', function() {
            clearTimeout(locationTimeout);
            const query = this.value.trim();
            if (query.length < 3) { suggestionsBox.style.display = 'none'; return; }

            locationTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`);
                    const results = await response.json();
                    
                    suggestionsBox.innerHTML = '';
                    if (results.length > 0) {
                        results.forEach(place => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.innerText = place.display_name;
                            div.onclick = () => {
                                placeInput.value = place.display_name;
                                latInput.value = place.lat;
                                lonInput.value = place.lon;
                                suggestionsBox.style.display = 'none';
                            };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.style.display = 'block';
                    } else { suggestionsBox.style.display = 'none'; }
                } catch (e) { console.error("Geospatial fetch failed."); }
            }, 400); // 400ms debounce
        });

        // Close dropdown if clicked outside
        document.addEventListener('click', (e) => {
            if (e.target !== placeInput) suggestionsBox.style.display = 'none';
        });

        // --- 3. TRUE KATAPAYADI VARGA CALCULATION ---
        // Maps pure Devanagari consonants to numeric values. Vowels (Matras) are inherently ignored.
        const katapayadiDevanagari = {
            'क':1, 'ट':1, 'प':1, 'य':1,
            'ख':2, 'ठ':2, 'फ':2, 'र':2,
            'ग':3, 'ड':3, 'ब':3, 'ल':3,
            'घ':4, 'ढ':4, 'भ':4, 'व':4,
            'ङ':5, 'ण':5, 'म':5, 'श':5,
            'च':6, 'त':6, 'ष':6,
            'छ':7, 'थ':7, 'स':7,
            'ज':8, 'द':8, 'ह':8,
            'झ':9, 'ध':9,
            'ञ':0, 'न':0
        };

        function getDigitSum(num) {
            let n = parseInt(num);
            while (n > 9) n = n.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
            return n;
        }

        function calculateTrueNamank(devanagariString) {
            let sum = 0;
            for (let char of devanagariString) {
                if (katapayadiDevanagari[char] !== undefined) {
                    sum += katapayadiDevanagari[char];
                }
            }
            return sum === 0 ? 0 : getDigitSum(sum);
        }

        // --- 4. ENGINE EXECUTION ---
        document.getElementById('calcBtn').addEventListener('click', async () => {
            const devanagariName = devanagariNameInput.value.trim();
            const dob = document.getElementById('dob').value;
            const tob = document.getElementById('tob').value;
            const lat = latInput.value;
            const lon = lonInput.value;
            const statusMsg = document.getElementById('statusMsg');

            if (!devanagariName || !dob || !lat) {
                statusMsg.innerText = "Error: Name, Date, and verified Birth Place are required.";
                statusMsg.style.color = "var(--error-color)";
                return;
            }

            document.getElementById('calcBtn').disabled = true;
            statusMsg.style.color = "var(--primary)";
            statusMsg.innerText = "Querying Eprashala Ephemeris Server...";
            document.getElementById('resultBox').style.display = 'none';

            const eprashalaEndpoint = "https://eprashala.pythonanywhere.com/calculate";
            
            // NEW FIX: Ensure time includes seconds to satisfy Python's %H:%M:%S expectation
            let formattedTime = tob;
            if (formattedTime.split(':').length === 2) {
                formattedTime += ":00"; // Converts "12:00" to "12:00:00"
            }

            // Payload keys matched exactly to what app.py expects
            const payload = {
                date: dob,
                time: formattedTime,
                lat: parseFloat(lat),
                lon: parseFloat(lon)
            };

            try {
                const response = await fetch(eprashalaEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status !== 'success') {
                    throw new Error("Ephemeris server returned an error.");
                }

                // FIX 2: Extracting raw degrees from app.py to calculate Panchang manually
                const sunData = data.grahas_data.find(g => g.name === 'Surya');
                const moonData = data.grahas_data.find(g => g.name === 'Chandra');
                
                const sunDeg = sunData.abs_deg;
                const moonDeg = moonData.abs_deg;

                // --- VEDIC MATH SYNTHESIS ---
                
                // 1. Calculate Tithi (12-degree increments of Moon ahead of Sun)
                const tithiAngle = (moonDeg - sunDeg + 360) % 360;
                const tithi = Math.floor(tithiAngle / 12) + 1; // 1 to 30

                // 2. Calculate Nakshatra (13°20' segments)
                const nakshatras = ["Ashwini", "Bharani", "Krittika", "Rohini", "Mrigashira", "Ardra", "Punarvasu", "Pushya", "Ashlesha", "Magha", "Purva Phalguni", "Uttara Phalguni", "Hasta", "Chitra", "Swati", "Vishakha", "Anuradha", "Jyeshtha", "Mula", "Purva Ashadha", "Uttara Ashadha", "Shravana", "Dhanishta", "Shatabhisha", "Purva Bhadrapada", "Uttara Bhadrapada", "Revati"];
                const nakIndex = Math.floor(moonDeg / (360 / 27));
                const birthNakshatra = nakshatras[nakIndex];

                // 3. Calculate Yoga & Karana for the Destiny Matrix
                const yogaAngle = (sunDeg + moonDeg) % 360;
                const yoga = Math.floor(yogaAngle / (360 / 27)) + 1;
                const karana = Math.floor(tithiAngle / 6) + 1;

                // 4. Calculate Vara (Day of Week)
                const d = new Date(dob);
                const vara = d.getDay() + 1; // Sunday = 1, Monday = 2, etc.

                // --- SANKHYA SHASTRA ASSIGNMENTS ---

                // Driver (Moolank): The digit sum of the exact Tithi
                const tithiMoolank = getDigitSum(tithi);
                
                // Destiny (Bhagyank): Sum of the 5 Limbs of Time (Panch-Anga: Tithi + Vara + Nakshatra + Yoga + Karana)
                const panchangSum = tithi + vara + (nakIndex + 1) + yoga + karana;
                const panchangBhagyank = getDigitSum(panchangSum);
                
                // Name (Namank): Katapayadi Varga
                const namank = calculateTrueNamank(devanagariName);

                // --- UI RENDERING ---
                document.getElementById('outMoolank').innerText = `${tithiMoolank} (Tithi: ${tithi})`;
                document.getElementById('outBhagyank').innerText = panchangBhagyank;
                document.getElementById('outNamank').innerText = namank;
                document.getElementById('outNakshatra').innerText = birthNakshatra;
                document.getElementById('outCoords').innerText = `${parseFloat(lat).toFixed(4)}°, ${parseFloat(lon).toFixed(4)}°`;

                document.getElementById('synthesisText').innerHTML = `<strong>Diagnostic Synthesis:</strong> The vibration of the Sanskrit seed-syllables in <em>${devanagariName}</em> yields a Namank of <strong>${namank}</strong>. Because the birth occurred at exact coordinates (${parseFloat(lat).toFixed(2)}, ${parseFloat(lon).toFixed(2)}), the Lunar position was firmly in <strong>${birthNakshatra}</strong>. The exact angle between the Sun and Moon resulted in Tithi <strong>${tithi}</strong>, yielding a core driver (Moolank) of <strong>${tithiMoolank}</strong>. The summation of the 5 limbs of time (Panchang) formulates a karmic path (Bhagyank) of <strong>${panchangBhagyank}</strong>.`;

                document.getElementById('resultBox').style.display = 'block';
				showMoreBtn.style.display = 'block';
                statusMsg.innerText = "Matrix Stabilized. Profile Complete.";

            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Connection failed. Please verify the date format and internet connection.";
                statusMsg.style.color = "var(--error-color)";
            } finally {
                document.getElementById('calcBtn').disabled = false;
            }
        });
    // --- 5. DEEP VEDIC INTERPRETATION FETCHER ---
        const showMoreBtn = document.getElementById('showMoreBtn');
        const detailedDiv = document.getElementById('detailedInterpretation');

        // This makes the button appear only after a successful calculation
        document.getElementById('calcBtn').addEventListener('click', () => {
            detailedDiv.style.display = 'none';
            showMoreBtn.innerText = "📖 Reveal Deep Vedic Interpretation";
        });

        // The exact variables we need from the global scope (extracted during calculation)
        showMoreBtn.addEventListener('click', async () => {
            if (detailedDiv.style.display === 'block') {
                detailedDiv.style.display = 'none';
                showMoreBtn.innerText = "📖 Reveal Deep Vedic Interpretation";
                return;
            }

            const moolankStr = document.getElementById('outMoolank').innerText.split(' ')[0]; // Gets the digit
            const bhagyankStr = document.getElementById('outBhagyank').innerText;
            const namankStr = document.getElementById('outNamank').innerText;

            try {
                showMoreBtn.innerText = "Loading Cosmic Texts...";
                
                // Fetching the local num.json file
                const response = await fetch('num.json'); 
                if (!response.ok) throw new Error("Could not locate num.json");
                
                const numData = await response.json();
                
                const mData = numData[moolankStr] || numData["default"];
                const bData = numData[bhagyankStr] || numData["default"];
                const nData = numData[namankStr] || numData["default"];

                detailedDiv.innerHTML = `
                    <h4 style="color: var(--primary); margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 5px;">Moolank ${moolankStr} (${mData.planet}) - The Core Driver</h4>
                    <p>${mData.moolank_meaning}</p>
                    
                    <h4 style="color: var(--primary); border-bottom: 1px solid #555; padding-bottom: 5px;">Bhagyank ${bhagyankStr} (${bData.planet}) - The Karmic Destiny</h4>
                    <p>${bData.bhagyank_meaning}</p>
                    
                    <h4 style="color: var(--primary); border-bottom: 1px solid #555; padding-bottom: 5px;">Namank ${namankStr} (${nData.planet}) - The Sonic Vibration</h4>
                    <p>${nData.namank_meaning}</p>
                    
                    <h4 style="color: #4cff4c; border-bottom: 1px solid #555; padding-bottom: 5px;">Suggested Remedial Matrix</h4>
                    <ul style="margin: 0; padding-left: 20px;">
                        <li><strong>For Moolank:</strong> ${mData.remedies}</li>
                        <li><strong>For Bhagyank:</strong> ${bData.remedies}</li>
                    </ul>
                `;
                
                detailedDiv.style.display = 'block';
                showMoreBtn.innerText = "Collapse Interpretation";

            } catch (error) {
                console.error(error);
                detailedDiv.innerHTML = `<span style="color: var(--error-color);">Error: Could not load the interpretation matrix. Ensure 'num.json' is in the same directory.</span>`;
                detailedDiv.style.display = 'block';
                showMoreBtn.innerText = "📖 Reveal Deep Vedic Interpretation";
            }
        });

        
	</script>
</body>
</html>
